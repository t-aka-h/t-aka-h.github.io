<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Meta Ray-Ban Display: 600x600 fixed viewport, no scroll -->
  <meta name="viewport" content="width=600, height=600, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#06030D">
  <title>Dartline Display</title>
  <link rel="icon" type="image/png" sizes="32x32"  href="assets/icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="display/display.css">
</head>
<body>
  <main id="stage">
    <header class="hud-top">
      <div class="hud-top__brand">
        <span class="hud-top__brandName">Dartline</span>
      </div>
      <div class="hud-top__center">
        <div class="hud-top__roundLabel" id="hudRoundLabel">READY</div>
        <div class="hud-top__dots" id="hudDots">
          <span class="hudDot"></span><span class="hudDot"></span><span class="hudDot"></span>
        </div>
      </div>
      <div class="hud-top__right">
        <div class="hud-top__totalLabel">TOTAL</div>
        <div class="hud-top__totalValue" id="hudTotal">0</div>
      </div>
    </header>

    <section class="big">
      <div id="boardStage" class="board-stage">
        <canvas id="dartboardCanvas" class="dartboard-canvas"></canvas>
        <div id="aimOverlay" class="aim-overlay">CALIBRATING…<br><span class="aim-overlay__sub">iPhone を構える姿勢で静止</span></div>
        <div id="scoreToast" class="score-toast" aria-hidden="true">
          <div class="score-toast__label">—</div>
          <div class="score-toast__pts">0</div>
        </div>
      </div>
    </section>

    <div id="cricketMarksBar" class="cricket-marks hidden" aria-hidden="true"></div>

    <footer class="hud-bottom">
      <span class="hud-bottom__best" id="hudBest">BEST —</span>
      <span class="hud-bottom__session">Dartline Display · <span id="session">—</span></span>
      <span class="hud-bottom__status" id="status">connecting</span>
    </footer>

    <div id="gameOverModal" class="game-over hidden" aria-hidden="true">
      <div class="game-over__title">GAME OVER</div>
      <div class="game-over__score" id="gameOverScore">0</div>
      <div class="game-over__badge hidden" id="gameOverBadge">NEW BEST!</div>
      <div class="game-over__hint">PINCH to play again</div>
    </div>

    <div id="pinchHint" class="pinch-hint hidden">PINCH to start</div>
    <div id="pinchPulse" class="pinch-pulse" aria-hidden="true">✓</div>

    <div id="roundIntroOverlay" class="round-intro hidden" aria-hidden="true">
      <div class="round-intro__round" id="roundIntroRound">ROUND 1</div>
      <div class="round-intro__arrow">→</div>
      <div class="round-intro__target" id="roundIntroTarget">20</div>
    </div>

    <div id="playerChangeOverlay" class="player-change hidden" aria-hidden="true">
      <div class="player-change__label">YOUR TURN</div>
      <div class="player-change__name" id="playerChangeName">PLAYER 2</div>
    </div>
  </main>

  <script src="shared/protocol.js"></script>
  <script src="shared/dartboard.js"></script>
  <script src="shared/sound.js"></script>
  <script src="shared/game.js"></script>
  <script src="display/dartboard.js"></script>
  <script src="display/display.js"></script>
</body>
</html>
