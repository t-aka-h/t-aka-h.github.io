<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Meta Ray-Ban Display: 600x600 fixed viewport, no scroll -->
  <meta name="viewport" content="width=600, height=600, initial-scale=1, user-scalable=no">
  <title>Dartline Display</title>
  <link rel="stylesheet" href="display/display.css">
</head>
<body>
  <main id="stage">
    <header class="hud-top">
      <span class="title">DARTLINE</span>
      <span class="session" id="session">—</span>
    </header>

    <section class="big">
      <div id="aimStage" class="aim-stage">
        <div class="aim-grid"></div>
        <div class="aim-center"></div>
        <div id="aimCrosshair" class="aim-crosshair">
          <div class="aim-crosshair__dot"></div>
        </div>
        <div id="aimOverlay" class="aim-overlay">CALIBRATING…<br><span class="aim-overlay__sub">iPhone を構える姿勢で静止</span></div>
      </div>
    </section>

    <footer class="hud-bottom">
      <span class="status" id="status">connecting</span>
      <span class="rate" id="rate">0 Hz</span>
    </footer>
  </main>

  <div id="throwOverlay" class="throw-overlay" aria-hidden="true">
    <div class="throw-overlay__title">THROWN</div>
    <div class="throw-overlay__force" id="throwForce">force 0.00</div>
    <div class="throw-overlay__bar"><div class="throw-overlay__fill" id="throwFill"></div></div>
  </div>

  <script src="shared/protocol.js"></script>
  <script src="display/display.js"></script>
</body>
</html>
