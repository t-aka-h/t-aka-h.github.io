<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Meta Ray-Ban Display: 600x600 fixed viewport, no scroll -->
  <meta name="viewport" content="width=600, height=600, initial-scale=1, user-scalable=no">
  <title>Dartline Display</title>
  <link rel="stylesheet" href="display/display.css">
</head>
<body>
  <main id="stage">
    <header class="hud-top">
      <span class="title">DARTLINE</span>
      <span class="session" id="session">—</span>
    </header>

    <section class="big">
      <div class="readout">
        <div class="line"><span class="k">ax</span><span class="v" id="ax">0.00</span></div>
        <div class="line"><span class="k">ay</span><span class="v" id="ay">0.00</span></div>
        <div class="line"><span class="k">az</span><span class="v" id="az">0.00</span></div>
      </div>
      <div class="readout">
        <div class="line"><span class="k">α</span><span class="v" id="alpha">0.0</span></div>
        <div class="line"><span class="k">β</span><span class="v" id="beta">0.0</span></div>
        <div class="line"><span class="k">γ</span><span class="v" id="gamma">0.0</span></div>
      </div>
    </section>

    <footer class="hud-bottom">
      <span class="status" id="status">connecting</span>
      <span class="rate" id="rate">0 Hz</span>
    </footer>
  </main>

  <script src="shared/protocol.js"></script>
  <script src="display/display.js"></script>
</body>
</html>
