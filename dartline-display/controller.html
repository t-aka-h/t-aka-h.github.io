<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#06030D">
  <title>Dartline Display — Controller</title>
  <link rel="icon" type="image/png" sizes="32x32"  href="assets/icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="controller/controller.css">
</head>
<body>
  <main id="app">
    <header class="brand">
      <h1 class="brand__title">Dartline Display</h1>
      <p class="brand__subtitle">CONTROLLER</p>
      <div class="brand__accent">
        <svg class="brand__dart" viewBox="0 0 60 16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- shaft -->
          <rect x="14" y="7" width="32" height="2" fill="#FFB547"/>
          <!-- tip -->
          <polygon points="46,5 56,8 46,11" fill="#D5DCE6"/>
          <polygon points="50,7 54,8 50,9" fill="#FFFFFF"/>
          <!-- fletching -->
          <polygon points="14,7 4,3 8,8 4,13 14,9" fill="#FF2D87"/>
          <polygon points="14,7 10,5 12,8 10,11 14,9" fill="#FF6FA9"/>
        </svg>
      </div>
    </header>

    <section id="permissionCard" class="card hidden">
      <p>センサーを使うには許可が必要です。</p>
      <button id="permissionButton" class="primary">センサーを有効化</button>
    </section>

    <section class="mini-board">
      <canvas id="miniDartboardCanvas" class="mini-board__canvas"></canvas>
      <div id="miniAimOverlay" class="mini-board__overlay">CALIBRATING…</div>
      <div class="mini-board__hint">Main view → Glass</div>
    </section>

    <section id="modeSelect" class="mode-select">
      <div class="mode-select__title">MODE</div>
      <div class="mode-select__list" id="modeList"></div>
    </section>

    <section id="scoreboard" class="scoreboard hidden">
      <div class="scoreboard__row">
        <div class="scoreboard__chip" id="roundChip">ROUND — / 8</div>
        <div class="scoreboard__dots" id="throwDots">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>
      <div class="scoreboard__total">
        <div class="scoreboard__totalLabel">TOTAL</div>
        <div class="scoreboard__totalValue" id="totalValue">0</div>
      </div>
      <div class="scoreboard__row scoreboard__row--meta">
        <div class="scoreboard__best" id="bestChip">BEST 0</div>
        <div class="scoreboard__lastHit" id="lastHitChip"></div>
      </div>
    </section>

    <section id="actionPanel" class="action-panel">
      <button id="mainButton" class="big-button" data-mode="start">
        <span class="big-button__label" id="mainButtonLabel">START</span>
        <span class="big-button__sub" id="mainButtonSub">8 ラウンド × 3 投</span>
      </button>
    </section>

    <footer class="footer">
      <div class="footer__row">
        <div class="footer__chip" id="aimStateChip" data-state="init">AIMING</div>
        <div class="footer__actions">
          <button id="audioTestButton" class="footer__action footer__action--audio" data-state="off">♪ TEST</button>
          <button id="recalibrateButton" class="footer__action">⊙ Re-center</button>
        </div>
      </div>
      <div class="footer__row footer__row--meta">
        <span class="footer__meta">Session <span id="sessionId">—</span></span>
        <span class="footer__meta footer__meta--status" id="status">init</span>
      </div>
    </footer>
  </main>

  <script src="shared/protocol.js"></script>
  <script src="shared/motion.js"></script>
  <script src="shared/sound.js"></script>
  <script src="shared/haptics.js"></script>
  <script src="shared/dartboard.js"></script>
  <script src="shared/game.js"></script>
  <script src="display/dartboard.js"></script>
  <script src="controller/controller.js"></script>
</body>
</html>
