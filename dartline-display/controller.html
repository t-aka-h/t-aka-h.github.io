<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#06030D">
  <title>Dartline Display — Controller</title>
  <link rel="stylesheet" href="controller/controller.css">
</head>
<body>
  <main id="app">
    <header class="brand">
      <h1>Dartline Display</h1>
      <p class="subtitle">Controller</p>
    </header>

    <section id="connection" class="card">
      <div class="row">
        <span class="label">Session</span>
        <span id="sessionId" class="value">—</span>
      </div>
      <div class="row">
        <span class="label">Status</span>
        <span id="status" class="value">init</span>
      </div>
    </section>

    <section id="permissionCard" class="card hidden">
      <p>センサーを使うには許可が必要です。</p>
      <button id="permissionButton" class="primary">センサーを有効化</button>
    </section>

    <section id="throwCard" class="card">
      <h2>Throw Detector</h2>
      <div class="row">
        <span class="label">Peak (m/s²)</span>
        <span id="peakMag" class="value">0.00</span>
      </div>
      <div class="row">
        <span class="label">Last force</span>
        <span id="lastForce" class="value">—</span>
      </div>
      <div class="row">
        <span class="label">Throws</span>
        <span id="throwCount" class="value">0</span>
      </div>
    </section>

    <section id="aimCard" class="card">
      <h2>Aim</h2>
      <div class="row">
        <span class="label">State</span>
        <span id="aimState" class="value">init</span>
      </div>
      <div class="row">
        <span class="label">x · y</span>
        <span id="aimXY" class="value">0.00  ·  0.00</span>
      </div>
      <button id="lockButton" class="primary primary--lock">LOCK</button>
      <button id="recalibrateButton" class="secondary">Re-center</button>
      <p class="hint">LOCK で照準を固定 → 振って投擲 → 着弾が表示されます。もう一度 LOCK で解除。</p>
    </section>
  </main>

  <div id="throwFlash" class="throw-flash" aria-hidden="true">
    <div class="throw-flash__title">THROWN</div>
    <div class="throw-flash__force"></div>
  </div>

  <script src="shared/protocol.js"></script>
  <script src="shared/motion.js"></script>
  <script src="shared/sound.js"></script>
  <script src="controller/controller.js"></script>
</body>
</html>
