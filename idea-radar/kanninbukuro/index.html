<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#05050a">
<title>堪忍袋 — Kanninbukuro</title>
<style>
  :root{
    --bg:#05050a; --bg2:#0a0612;
    --cyan:#22e0ff; --magenta:#ff2bd6; --red:#ff2b4a; --orange:#ff8a1e;
    --gold:#d4af37; --goldlite:#fff3c4;
    --ink:#f4f2ff; --sub:#9b93c0;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    color:var(--ink);
    position:fixed;inset:0;
    touch-action:none;user-select:none;-webkit-user-select:none;
    overscroll-behavior:none;
  }
  #stage{position:absolute;inset:0;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  /* HUD */
  #hud{position:absolute;top:0;left:0;right:0;padding:env(safe-area-inset-top) 18px 0;
    pointer-events:none;z-index:5;}
  .toprow{display:flex;justify-content:space-between;align-items:flex-start;margin-top:14px;}
  .stat{font-variant-numeric:tabular-nums;}
  .stat .lbl{font-size:10px;letter-spacing:.18em;color:var(--sub);}
  .stat .val{font-size:22px;font-weight:800;letter-spacing:.02em;
    text-shadow:0 0 14px rgba(34,224,255,.45);}
  #gwrap{margin:12px auto 0;max-width:520px;height:9px;border-radius:9px;
    background:rgba(255,255,255,.07);overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);}
  #gbar{height:100%;width:0%;border-radius:9px;
    background:linear-gradient(90deg,var(--cyan),var(--magenta) 65%,var(--red));
    box-shadow:0 0 18px rgba(255,43,214,.6);transition:width .12s ease-out;}
  #glabel{text-align:center;margin-top:6px;font-size:11px;letter-spacing:.22em;color:var(--sub);}

  /* center cue */
  #cue{position:absolute;left:0;right:0;bottom:23%;text-align:center;z-index:6;pointer-events:none;
    transition:opacity .4s;}
  #cue .big{font-size:19px;font-weight:800;letter-spacing:.04em;
    text-shadow:0 0 18px rgba(34,224,255,.5);}
  #cue .sm{font-size:12px;color:var(--sub);margin-top:6px;letter-spacing:.06em;}
  .limit #cue .big{color:var(--red);text-shadow:0 0 22px rgba(255,43,74,.8);animation:thr .5s infinite;}
  @keyframes thr{50%{transform:scale(1.08)}}

  /* title */
  #title{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:30px;
    background:radial-gradient(120% 80% at 50% 30%,rgba(20,8,30,.35),rgba(5,5,10,.92));}
  #title h1{font-size:13vw;max-font-size:80px;font-weight:900;letter-spacing:.06em;line-height:1;
    background:linear-gradient(180deg,#fff,var(--magenta));-webkit-background-clip:text;background-clip:text;
    color:transparent;text-shadow:0 0 40px rgba(255,43,214,.35);}
  #title .ro{font-size:13px;letter-spacing:.5em;color:var(--cyan);margin:14px 0 4px;text-indent:.5em;}
  #title p{font-size:13px;color:var(--sub);line-height:1.8;max-width:300px;margin-top:18px;}
  .startbtn{margin-top:30px;pointer-events:auto;cursor:pointer;
    padding:16px 40px;border-radius:40px;font-size:17px;font-weight:800;letter-spacing:.08em;color:#0a0510;
    background:linear-gradient(90deg,var(--cyan),var(--magenta));border:none;
    box-shadow:0 0 30px rgba(255,43,214,.55),0 6px 24px rgba(0,0,0,.5);}
  .startbtn:active{transform:scale(.96);}

  /* result */
  #result{position:absolute;inset:0;z-index:30;display:none;flex-direction:column;
    align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(120% 80% at 50% 40%,rgba(15,6,24,.6),rgba(5,5,10,.96));}
  #cardImg{width:min(74vw,300px);border-radius:14px;box-shadow:0 18px 50px rgba(0,0,0,.6),0 0 0 1px rgba(212,175,55,.25);}
  .rbtns{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap;justify-content:center;}
  .rbtn{pointer-events:auto;cursor:pointer;padding:13px 22px;border-radius:30px;font-size:14px;font-weight:800;
    letter-spacing:.06em;border:none;color:var(--ink);background:rgba(255,255,255,.08);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);}
  .rbtn.primary{color:#0a0510;background:linear-gradient(90deg,var(--cyan),var(--magenta));
    box-shadow:0 0 24px rgba(255,43,214,.5);}
  .rbtn:active{transform:scale(.95);}
  #rhint{font-size:11px;color:var(--sub);margin-top:14px;letter-spacing:.04em;text-align:center;}
  .credit{position:absolute;bottom:calc(env(safe-area-inset-bottom) + 8px);left:0;right:0;text-align:center;
    font-size:10px;letter-spacing:.18em;color:rgba(155,147,192,.5);z-index:4;pointer-events:none;}
</style>
</head>
<body>
<div id="stage">
  <canvas id="cv"></canvas>

  <div id="hud">
    <div class="toprow">
      <div class="stat"><div class="lbl">ガマン秒</div><div class="val" id="secVal">0.0</div></div>
      <div class="stat" style="text-align:right"><div class="lbl">毅然度</div><div class="val" id="scoreVal">0</div></div>
    </div>
    <div id="gwrap"><div id="gbar"></div></div>
    <div id="glabel">我慢ゲージ</div>
  </div>

  <div id="cue">
    <div class="big" id="cueBig">連打して我慢をためろ</div>
    <div class="sm" id="cueSm">理不尽を、ぜんぶ。</div>
  </div>

  <div class="credit">KANNINBUKURO · Idea Radar</div>

  <div id="title">
    <h1>堪忍袋</h1>
    <div class="ro">K A N N I N B U K U R O</div>
    <p>連打で我慢をため込み、限界で<br><b>長押しして緒を切る</b>。<br>溜めるほど爆発はデカい。<br>でも溜めすぎると…自滅。</p>
    <button class="startbtn" id="startBtn">ためはじめる</button>
  </div>

  <div id="result">
    <img id="cardImg" alt="緒切れ証明書">
    <div class="rbtns">
      <button class="rbtn primary" id="shareBtn">シェア / 保存</button>
      <button class="rbtn" id="againBtn">もう一度</button>
    </div>
    <div id="rhint"></div>
  </div>
</div>

<script>
(function(){
"use strict";
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2.5);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=Math.floor(W*DPR); cv.height=Math.floor(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize); resize();

// ---------- audio ----------
let AC=null, master=null;
function initAudio(){
  if(AC) return;
  try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
  master=AC.createGain(); master.gain.value=0.9; master.connect(AC.destination);
}
function now(){ return AC?AC.currentTime:0; }
function tone(freq,dur,type,vol,attack){
  if(!AC) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'sine'; o.frequency.value=freq;
  const t=now(); g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol||0.3,t+(attack||0.005));
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.02);
}
function noise(dur,vol,cut,type){
  if(!AC) return;
  const n=Math.floor(AC.sampleRate*dur), buf=AC.createBuffer(1,n,AC.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const s=AC.createBufferSource(); s.buffer=buf;
  const f=AC.createBiquadFilter(); f.type=type||'bandpass'; f.frequency.value=cut||1400; f.Q.value=0.9;
  const g=AC.createGain(); g.gain.value=vol||0.3;
  s.connect(f); f.connect(g); g.connect(master); s.start();
}
function playTap(){ tone(900+Math.random()*180,0.06,'square',0.10,0.003); }
function playFray(){ noise(0.10,0.22,2200,'bandpass'); tone(1600,0.05,'triangle',0.06); }
// continuous creak
let creakO=null,creakG=null,creakF=null,creakLFO=null;
function startCreak(){
  if(!AC||creakO) return;
  creakO=AC.createOscillator(); creakO.type='sawtooth'; creakO.frequency.value=52;
  creakF=AC.createBiquadFilter(); creakF.type='lowpass'; creakF.frequency.value=240; creakF.Q.value=6;
  creakG=AC.createGain(); creakG.gain.value=0.0001;
  creakLFO=AC.createOscillator(); creakLFO.type='sine'; creakLFO.frequency.value=5.5;
  const lg=AC.createGain(); lg.gain.value=8;
  creakLFO.connect(lg); lg.connect(creakO.frequency);
  creakO.connect(creakF); creakF.connect(creakG); creakG.connect(master);
  creakO.start(); creakLFO.start();
}
function setCreak(v){ if(creakG) creakG.gain.setTargetAtTime(Math.max(0.0001,v),now(),0.08); }
function stopCreak(){ if(creakG) setCreak(0); }
function playBurst(strength){
  // sub-bass missing-fundamental sweep + noise hit
  if(!AC) return;
  const base=55;
  [1,2,3,4,5].forEach((h,i)=>{
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='sine'; o.frequency.setValueAtTime(base*h*1.6,now());
    o.frequency.exponentialRampToValueAtTime(base*h*0.7,now()+0.5);
    const v=(0.34/(i+1))*(0.6+strength*0.5);
    g.gain.setValueAtTime(0.0001,now());
    g.gain.exponentialRampToValueAtTime(v,now()+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,now()+0.9);
    o.connect(g); g.connect(master); o.start(); o.stop(now()+0.95);
  });
  noise(0.28,0.5*(0.6+strength*0.4),900,'lowpass');
  noise(0.12,0.3,3000,'highpass');
}
function playSelfDestruct(){
  if(!AC) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(120,now());
  o.frequency.exponentialRampToValueAtTime(34,now()+0.7);
  g.gain.setValueAtTime(0.0001,now()); g.gain.exponentialRampToValueAtTime(0.4,now()+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,now()+0.8);
  o.connect(g); g.connect(master); o.start(); o.stop(now()+0.85);
  noise(0.4,0.45,600,'lowpass');
}
function vibe(p){ if(navigator.vibrate){ try{ navigator.vibrate(p); }catch(e){} } }

// ---------- game state ----------
const ST={TITLE:0,CHARGE:1,LIMIT:2,BURST:3,DONE:4};
let state=ST.TITLE;
let gauge=0;            // 0..100
let mochi=0;            // accumulated charge (uncapped feel)
let scale=1, scaleV=0;  // spring scale for bag
let wob=0;             // wobble amount
let startT=0, sec=0;
let holding=false, holdStart=0, isHold=false;
let limitT=0;          // time entering limit
let cueEl=document.getElementById('cue');
let particles=[];
let strings=6, frayed=0;
let shakeT=0;
let outcome=null;      // {kind,sec,score,rank,line}
let lastTapT=0;
let demoPulse=0;
const bag={x:0,y:0,r:0};

const RANKS=[
  {min:18, name:'仏', sub:'BUDDHA', col:'#ffe48a', poems:[
    'あなたは耐え抜いた。そして、自ら選んで切れた。',
    '限界まで飲み込み、最後は静かに手放した。',
    'これは弱さではない。許しの果ての、決断である。']},
  {min:11, name:'菩薩', sub:'BODHISATTVA', col:'#22e0ff', poems:[
    '長く堪え、惜しまず爆ぜた。見事な引き際。',
    '我慢の重みが、花火の大きさになった。',
    'よく耐えた。あとは、笑って忘れていい。']},
  {min:5, name:'不動明王', sub:'ACALA', col:'#ff8a1e', poems:[
    '静かな怒りを、いっきに解き放った。',
    'ためた分だけ、空が明るく燃えた。',
    '怒っていい日もある。今日が、その日だ。']},
  {min:0, name:'阿修羅', sub:'ASURA', col:'#ff2b4a', poems:[
    '早かった。でも、それでいい。',
    '我慢は美徳じゃない。切れていい。',
    '短気は損気——なんて、誰が決めた。']}
];
const SELF={name:'自滅', sub:'MELTDOWN', col:'#b06bff', poems:[
  'ためすぎた。袋は、勝手に弾けた。',
  '限界を見誤った。それも、人間だ。',
  '溜め込みすぎると、自分を壊す。覚えておこう。']};

function pickRank(s){
  for(const r of RANKS){ if(s>=r.min) return r; }
  return RANKS[RANKS.length-1];
}

// ---------- input ----------
const stage=document.getElementById('stage');
function onDown(e){
  initAudio(); if(AC&&AC.state==='suspended') AC.resume();
  if(state===ST.TITLE||state===ST.BURST||state===ST.DONE) return;
  holding=true; holdStart=performance.now(); isHold=false;
}
function onUp(e){
  if(!holding) return;
  holding=false;
  if(state!==ST.CHARGE && state!==ST.LIMIT) return;
  const dt=performance.now()-holdStart;
  if(dt>=300){
    // long-press release
    if(gauge>=12) doBurst(false);
    else { addTap(); }
  }else{
    addTap();
  }
}
function addTap(){
  if(state!==ST.CHARGE && state!==ST.LIMIT) return;
  if(state===ST.TITLE) return;
  const inc=4.0 + Math.random()*1.4;
  gauge=Math.min(100,gauge+inc);
  mochi+=inc;
  scaleV+=0.10;            // spring kick
  wob=Math.min(1,wob+0.18);
  if(cueEl.style.opacity!=='0'){ cueEl.style.opacity='0'; }
  playTap(); vibe(12);
  // fraying
  const wantFray=Math.min(strings, Math.floor(gauge/ (100/strings)));
  if(wantFray>frayed){ frayed=wantFray; playFray(); vibe(20); }
  // enter limit
  if(gauge>=100 && state===ST.CHARGE){ enterLimit(); }
}
function enterLimit(){
  state=ST.LIMIT; limitT=performance.now();
  document.body.classList.add('limit');
  document.getElementById('cueBig').textContent='いま、緒を切れ！';
  document.getElementById('cueSm').textContent='長押しして、離す';
  cueEl.style.opacity='1';
  vibe([0,40,30,40]);
}
stage.addEventListener('pointerdown',onDown,{passive:false});
window.addEventListener('pointerup',onUp,{passive:false});
window.addEventListener('pointercancel',()=>{holding=false;});

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('againBtn').addEventListener('click',startGame);
document.getElementById('shareBtn').addEventListener('click',shareCard);

function startGame(){
  initAudio(); if(AC&&AC.state==='suspended') AC.resume();
  state=ST.CHARGE; gauge=0; mochi=0; scale=1; scaleV=0; wob=0;
  frayed=0; particles=[]; shakeT=0; outcome=null; sec=0; demoPulse=0;
  startT=performance.now();
  document.body.classList.remove('limit');
  document.getElementById('title').style.display='none';
  document.getElementById('result').style.display='none';
  document.getElementById('cueBig').textContent='連打して我慢をためろ';
  document.getElementById('cueSm').textContent='理不尽を、ぜんぶ。';
  cueEl.style.opacity='1';
  startCreak();
}

// ---------- burst / self destruct ----------
function spawnParticles(strength,colors){
  const n=Math.floor(180+strength*420);
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const sp=(1.5+Math.random()*9)*(0.6+strength);
    particles.push({
      x:bag.x, y:bag.y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-2,
      life:1, dec:0.006+Math.random()*0.012, size:1.2+Math.random()*3.4,
      col:colors[(Math.random()*colors.length)|0]
    });
  }
}
function doBurst(selfDestruct){
  const strength=Math.min(1, mochi/120);
  sec=(performance.now()-startT)/1000;
  state=ST.BURST; document.body.classList.remove('limit');
  stopCreak(); cueEl.style.opacity='0';
  shakeT=1;
  if(selfDestruct){
    playSelfDestruct(); vibe([0,120,60,200,40,120]);
    spawnParticles(strength,['#b06bff','#7a3bff','#ff2bd6','#ffffff']);
    outcome={kind:'self', sec:sec, score:Math.round(mochi*7),
      rank:SELF, line:SELF.poems[(Math.random()*SELF.poems.length)|0]};
  }else{
    playBurst(strength); vibe([0,60,30,140]);
    spawnParticles(strength,['#ffffff','#ff2bd6','#ff8a1e','#ffd86b','#22e0ff']);
    const score=Math.round(sec*60 + mochi*9 + (gauge>=100?300:0));
    const rank=pickRank(sec);
    outcome={kind:'ok', sec:sec, score:score, rank:rank,
      line:rank.poems[(Math.random()*rank.poems.length)|0]};
  }
  flash=1;
  setTimeout(showResult,1400);
}
let flash=0;

// ---------- result card ----------
function showResult(){
  state=ST.DONE;
  drawCard();
  const r=document.getElementById('result');
  r.style.display='flex';
  document.getElementById('rhint').textContent=
    outcome.kind==='self' ? 'ためすぎた。袋は自ら弾けた。' : 'カードを長押しで保存もできます';
}
let cardBlob=null, cardCanvas=null;
function drawCard(){
  const w=1080,h=1920;
  const c=cardCanvas||(cardCanvas=document.createElement('canvas'));
  c.width=w; c.height=h; const x=c.getContext('2d');
  // bg
  const bg=x.createRadialGradient(w/2,h*0.42,80,w/2,h*0.42,h*0.75);
  bg.addColorStop(0,'#1a0c28'); bg.addColorStop(1,'#05050a');
  x.fillStyle=bg; x.fillRect(0,0,w,h);
  // gold frame
  const fg=x.createLinearGradient(0,0,w,h);
  fg.addColorStop(0,'#8a6a1e'); fg.addColorStop(.25,'#fff3c4');
  fg.addColorStop(.5,'#d4af37'); fg.addColorStop(.75,'#fff3c4'); fg.addColorStop(1,'#8a6a1e');
  x.strokeStyle=fg; x.lineWidth=10; roundRect(x,46,46,w-92,h-92,28); x.stroke();
  x.lineWidth=2; x.strokeStyle='rgba(212,175,55,.4)'; roundRect(x,74,74,w-148,h-148,18); x.stroke();
  // header
  x.textAlign='center'; x.fillStyle='#d4af37';
  x.font='600 34px sans-serif'; x.fillText('堪 忍 袋  緒 切 れ  証 明 書',w/2,210);
  x.fillStyle='rgba(255,243,196,.5)'; x.font='600 22px sans-serif';
  x.fillText(outcome.kind==='self'?'C E R T I F I C A T E   O F   M E L T D O W N':'C E R T I F I C A T E   O F   T H E   S N A P',w/2,250);
  // big rank
  const r=outcome.rank;
  x.shadowColor=r.col; x.shadowBlur=60; x.fillStyle=r.col;
  x.font='900 200px sans-serif'; x.fillText(r.name,w/2,h*0.40);
  x.shadowBlur=0;
  x.fillStyle='rgba(255,255,255,.65)'; x.font='600 30px sans-serif';
  x.fillText(r.sub,w/2,h*0.40+70);
  // stats
  const sy=h*0.56;
  x.fillStyle='rgba(255,255,255,.5)'; x.font='600 26px sans-serif';
  x.fillText('ガマンした時間',w/2-230,sy);
  x.fillText('毅 然 度',w/2+230,sy);
  x.fillStyle='#fff'; x.font='800 80px sans-serif';
  x.fillText(outcome.sec.toFixed(1)+'″',w/2-230,sy+88);
  x.fillStyle=r.col; x.fillText(String(outcome.score),w/2+230,sy+88);
  // divider
  x.strokeStyle='rgba(212,175,55,.5)'; x.lineWidth=2;
  x.beginPath(); x.moveTo(w*0.2,sy+150); x.lineTo(w*0.8,sy+150); x.stroke();
  // poem
  x.fillStyle='rgba(255,255,255,.92)'; x.font='500 38px sans-serif';
  wrapText(x,outcome.line,w/2,sy+230,w-280,52);
  // seal
  x.save(); x.translate(w/2,h*0.86);
  x.strokeStyle=r.col; x.lineWidth=8; x.globalAlpha=.9;
  x.beginPath(); x.arc(0,0,90,0,Math.PI*2); x.stroke();
  x.rotate(-0.12); x.fillStyle=r.col; x.font='900 60px sans-serif'; x.textAlign='center';
  x.fillText('毅',0,-2); x.font='600 20px sans-serif'; x.fillText('然',0,34);
  x.restore();
  // footer
  x.textAlign='center'; x.fillStyle='rgba(155,147,192,.7)'; x.font='600 24px sans-serif';
  x.fillText('堪忍袋 · KANNINBUKURO',w/2,h-150);
  x.fillStyle='rgba(155,147,192,.45)'; x.font='500 20px sans-serif';
  x.fillText('t-aka-h.github.io/idea-radar',w/2,h-110);

  const url=c.toDataURL('image/png');
  document.getElementById('cardImg').src=url;
  c.toBlob(b=>{cardBlob=b;},'image/png');
}
function roundRect(x,px,py,w,h,r){x.beginPath();x.moveTo(px+r,py);x.arcTo(px+w,py,px+w,py+h,r);
  x.arcTo(px+w,py+h,px,py+h,r);x.arcTo(px,py+h,px,py,r);x.arcTo(px,py,px+w,py,r);x.closePath();}
function wrapText(x,t,cx,cy,maxw,lh){
  const ch=[...t]; let line='',lines=[];
  for(const c of ch){ if(x.measureText(line+c).width>maxw && line){lines.push(line);line=c;} else line+=c; }
  if(line)lines.push(line);
  lines.forEach((l,i)=>x.fillText(l,cx,cy+i*lh));
}
async function shareCard(){
  if(!cardBlob){ drawCard(); await new Promise(r=>setTimeout(r,120)); }
  const file=cardBlob?new File([cardBlob],'kanninbukuro.png',{type:'image/png'}):null;
  if(file && navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file],title:'堪忍袋',
      text:`#堪忍袋 ${outcome.sec.toFixed(1)}秒ためて、緒が切れた。［${outcome.rank.name}］`}); return; }catch(e){}
  }
  // fallback: download
  const a=document.createElement('a'); a.href=document.getElementById('cardImg').src;
  a.download='kanninbukuro.png'; a.click();
}

// ---------- draw bag ----------
function drawBag(t){
  const cx=W/2, cy=H*0.46;
  const baseR=Math.min(W,H)*0.14;
  const grow=baseR*(0.55) * (gauge/100);
  const r=baseR+grow;
  bag.x=cx; bag.y=cy+r*0.15; bag.r=r;
  const g=gauge/100;
  // color cyan -> magenta -> red
  let col;
  if(g<0.5){ col=mix('#22e0ff','#ff2bd6',g/0.5); }
  else{ col=mix('#ff2bd6','#ff2b4a',(g-0.5)/0.5); }
  const pulse=(state===ST.LIMIT)?(0.5+0.5*Math.sin(t*0.018)):0;
  const wobx=Math.sin(t*0.02)*wob*r*0.05 + (state===ST.LIMIT?Math.sin(t*0.09)*r*0.04:0);
  const woby=Math.cos(t*0.025)*wob*r*0.04;
  ctx.save();
  ctx.translate(cx+wobx, cy+woby);
  ctx.scale(scale,scale*(1-0.04*wob));
  // body blob
  const grd=ctx.createRadialGradient(0,-r*0.2,r*0.1,0,r*0.1,r*1.25);
  grd.addColorStop(0, lighten(col,0.5));
  grd.addColorStop(0.55, col);
  grd.addColorStop(1, darken(col,0.55));
  ctx.globalCompositeOperation='lighter';
  ctx.shadowColor=col; ctx.shadowBlur=40+pulse*40;
  ctx.beginPath();
  // pouch shape: rounded bottom, pinched neck top
  const neckY=-r*0.78, neckW=r*0.42;
  ctx.moveTo(-neckW,neckY);
  ctx.bezierCurveTo(-r*1.18,-r*0.5,-r*1.05,r*0.95,0,r*1.02);
  ctx.bezierCurveTo(r*1.05,r*0.95,r*1.18,-r*0.5,neckW,neckY);
  ctx.closePath();
  ctx.fillStyle=grd; ctx.fill();
  ctx.globalCompositeOperation='source-over';
  // outline
  ctx.shadowBlur=24+pulse*30; ctx.strokeStyle=lighten(col,0.4); ctx.lineWidth=2.5; ctx.stroke();
  // highlight
  ctx.shadowBlur=0; ctx.globalCompositeOperation='lighter';
  ctx.beginPath(); ctx.ellipse(-r*0.32,-r*0.1,r*0.22,r*0.4,-0.3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,'+(0.10+g*0.06)+')'; ctx.fill();
  ctx.globalCompositeOperation='source-over';
  // neck strings (緒)
  const nx=0, ny=neckY;
  for(let i=0;i<strings;i++){
    const a=(i/(strings-1)-0.5);
    const sx=nx+a*neckW*1.7;
    const isFray=i<frayed;
    ctx.beginPath();
    ctx.strokeStyle=isFray? 'rgba(255,80,80,0.85)':lighten(col,0.5);
    ctx.lineWidth=isFray?2:3; ctx.shadowColor=ctx.strokeStyle; ctx.shadowBlur=isFray?6:10;
    if(isFray){
      // broken/curled string
      ctx.moveTo(sx,ny);
      ctx.lineTo(sx+a*10, ny-r*0.18-Math.random()*2);
      ctx.lineTo(sx+a*22+Math.sin(t*0.05+i)*4, ny-r*0.30);
    }else{
      ctx.moveTo(sx,ny);
      ctx.quadraticCurveTo(sx+a*6, ny-r*0.22, sx+a*14, ny-r*0.42);
    }
    ctx.stroke();
  }
  // knot
  ctx.shadowBlur=12; ctx.fillStyle=lighten(col,0.35);
  ctx.beginPath(); ctx.ellipse(0,neckY,neckW*0.6,r*0.10,0,0,Math.PI*2); ctx.fill();
  // face mark (我) when high
  if(g>0.35){
    ctx.shadowBlur=0; ctx.globalAlpha=Math.min(1,(g-0.35)/0.3);
    ctx.fillStyle='rgba(255,255,255,0.92)'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='900 '+(r*0.6)+'px sans-serif';
    ctx.fillText('我',0,r*0.12);
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

function mix(a,b,t){const A=hx(a),B=hx(b);return rgb(A[0]+(B[0]-A[0])*t,A[1]+(B[1]-A[1])*t,A[2]+(B[2]-A[2])*t);}
function lighten(c,t){const A=hx(c);return rgb(A[0]+(255-A[0])*t,A[1]+(255-A[1])*t,A[2]+(255-A[2])*t);}
function darken(c,t){const A=hx(c);return rgb(A[0]*(1-t),A[1]*(1-t),A[2]*(1-t));}
function hx(c){if(c[0]==='#')return [parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];return [255,255,255];}
function rgb(r,g,b){return 'rgb('+(r|0)+','+(g|0)+','+(b|0)+')';}

// ---------- main loop ----------
let last=performance.now();
function loop(ts){
  const dt=ts-last; last=ts;
  // background
  ctx.setTransform(DPR,0,0,DPR,0,0);
  let sx=0,sy=0;
  if(shakeT>0){ sx=(Math.random()-0.5)*18*shakeT; sy=(Math.random()-0.5)*18*shakeT; shakeT=Math.max(0,shakeT-dt*0.0016);}
  ctx.clearRect(0,0,W,H);
  ctx.save(); ctx.translate(sx,sy);
  const bgg=ctx.createRadialGradient(W/2,H*0.4,40,W/2,H*0.4,H*0.8);
  bgg.addColorStop(0,'#120a1e'); bgg.addColorStop(1,'#05050a');
  ctx.fillStyle=bgg; ctx.fillRect(-30,-30,W+60,H+60);

  // spring scale
  const target=1 + (gauge/100)*0.05;
  scaleV += (target-scale)*0.02; scaleV*=0.86; scale+=scaleV;
  wob*=0.94;

  // timing
  if(state===ST.CHARGE||state===ST.LIMIT){
    sec=(ts-startT)/1000;
    document.getElementById('secVal').textContent=sec.toFixed(1);
    const liveScore=Math.round(sec*60+mochi*9);
    document.getElementById('scoreVal').textContent=liveScore;
    document.getElementById('gbar').style.width=gauge.toFixed(1)+'%';
    setCreak(Math.min(0.25,(gauge/100)*0.25));
    // demo pulse on idle before first tap
    if(gauge===0){ demoPulse+=dt; const p=Math.sin(demoPulse*0.004); scale=1+Math.max(0,p)*0.05; }
    // self destruct timer
    if(state===ST.LIMIT){
      const held=ts-limitT;
      if(held>2600){ doBurst(true); }
      // creak intensifies
      setCreak(0.25+0.15*Math.abs(Math.sin(ts*0.02)));
    }
  }

  // draw bag (skip during full burst fade if destroyed)
  if(state!==ST.TITLE){
    if(state!==ST.BURST || particles.length===0) drawBag(ts);
    else if(state===ST.BURST){ /* bag gone, only particles */ }
  }

  // particles
  if(particles.length){
    ctx.globalCompositeOperation='lighter';
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.vy+=0.12; p.vx*=0.99; p.vy*=0.99;
      p.x+=p.vx; p.y+=p.vy; p.life-=p.dec;
      if(p.life<=0){ particles.splice(i,1); continue; }
      ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.col; ctx.shadowColor=p.col; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over'; ctx.shadowBlur=0;
  }

  // flash
  if(flash>0){ ctx.fillStyle='rgba(255,255,255,'+flash*0.6+')'; ctx.fillRect(-30,-30,W+60,H+60); flash=Math.max(0,flash-dt*0.0025); }
  ctx.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
})();
