<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#05030D">
<title>日かげ — 猛暑のおさんぽ</title>
<style>
  :root{
    --bg:#05030D; --cyan:#46E3FF; --mag:#FF2D87; --orange:#FF6B1A; --gold:#FFD400;
    --navy:#0E1230;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;background:var(--bg);overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;color:#fff}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
  #stage{position:relative;width:100%;height:100%;max-width:520px;background:var(--bg);overflow:hidden;touch-action:none}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px;z-index:5}
  .hidden{display:none!important}
  h1{font-size:15vw;max-font-size:78px;font-weight:900;letter-spacing:.06em;
     background:linear-gradient(180deg,#fff,var(--cyan) 60%,var(--mag));-webkit-background-clip:text;background-clip:text;color:transparent;
     text-shadow:0 0 36px rgba(70,227,255,.35);line-height:1}
  h1 small{display:block;font-size:.28em;letter-spacing:.4em;font-weight:700;color:var(--cyan);-webkit-text-fill-color:var(--cyan);margin-top:.5em;text-shadow:none;opacity:.85}
  .sub{margin-top:18px;font-size:3.8vw;max-font-size:17px;color:#cdd6ea;line-height:1.7;font-weight:600}
  .sub b{color:var(--gold)}
  .tap{margin-top:34px;font-size:4.6vw;max-font-size:20px;font-weight:800;color:#fff;
       padding:16px 40px;border:2px solid var(--cyan);border-radius:999px;background:rgba(70,227,255,.08);
       box-shadow:0 0 30px rgba(70,227,255,.3);animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.06);opacity:1}}
  .ovTitle{font-size:8vw;max-font-size:40px;font-weight:900;letter-spacing:.04em}
  .bigNum{font-size:22vw;max-font-size:120px;font-weight:900;line-height:.9;
          background:linear-gradient(180deg,#fff,var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 40px rgba(70,227,255,.4)}
  .bigNum .u{font-size:.26em;-webkit-text-fill-color:var(--cyan);color:var(--cyan);font-weight:800;margin-left:.1em}
  .title-badge{margin-top:14px;font-size:5vw;max-font-size:24px;font-weight:900;color:var(--gold);text-shadow:0 0 22px rgba(255,212,0,.5)}
  .meta{margin-top:8px;font-size:3.6vw;max-font-size:15px;color:#9fb0cc;font-weight:600}
  .btnRow{margin-top:30px;display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
  .btn{font-size:4.2vw;max-font-size:18px;font-weight:800;padding:14px 26px;border-radius:999px;border:2px solid var(--cyan);
       background:rgba(70,227,255,.1);color:#fff;box-shadow:0 0 22px rgba(70,227,255,.25);cursor:pointer}
  .btn.share{border-color:var(--mag);background:rgba(255,45,135,.12);box-shadow:0 0 22px rgba(255,45,135,.3)}
  .btn:active{transform:scale(.95)}
  /* HUD */
  #hud{position:absolute;top:0;left:0;right:0;padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;z-index:4;pointer-events:none}
  #dist{font-size:9vw;max-font-size:46px;font-weight:900;line-height:.9;letter-spacing:.02em;text-shadow:0 0 18px rgba(70,227,255,.5)}
  #dist .u{font-size:.32em;color:var(--cyan);font-weight:800;margin-left:.12em}
  #combo{font-size:5vw;max-font-size:22px;font-weight:900;color:var(--gold);text-shadow:0 0 16px rgba(255,212,0,.6);min-height:1em;text-align:right;transition:transform .1s}
  #pawWrap{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:4;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
  #pawLabel{font-size:3vw;max-font-size:12px;font-weight:800;letter-spacing:.2em;color:#8295b5}
  .credit{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:11px;color:#5b6680;z-index:3;pointer-events:none}
  .maxf{}
</style>
</head>
<body>
<div id="wrap"><div id="stage">
  <canvas id="cv"></canvas>

  <div id="hud" class="hidden">
    <div id="dist">0<span class="u">m</span></div>
    <div id="combo"></div>
  </div>
  <div id="pawWrap" class="hidden">
    <canvas id="paw" width="120" height="120" style="width:56px;height:56px"></canvas>
    <div id="pawLabel">にくきゅう</div>
  </div>

  <!-- TITLE -->
  <div id="titleScr" class="overlay">
    <h1>日かげ<small>HIKAGE</small></h1>
    <div class="sub">40℃の道は <b>肉球をやけど</b> させる。<br>タップで日かげへ <b>ひと跳び</b>。<br>愛犬と、無事におさんぽしよう。🐕</div>
    <div class="tap" id="startBtn">タップでスタート</div>
  </div>

  <!-- GAME OVER -->
  <div id="overScr" class="overlay hidden">
    <div class="ovTitle">おさんぽ おわり</div>
    <div class="bigNum" style="margin-top:18px"><span id="ovDist">0</span><span class="u">m</span></div>
    <div class="title-badge" id="ovBadge">日かげの達人</div>
    <div class="meta" id="ovMeta">最高肉球温度 —</div>
    <div class="btnRow">
      <div class="btn" id="retryBtn">もう一度</div>
      <div class="btn share" id="shareBtn">結果をシェア</div>
    </div>
  </div>

  <div class="credit">Idea Radar · L12×L09 · 日かげ — 猛暑のおさんぽ</div>
</div></div>

<script>
"use strict";
(function(){
const stage=document.getElementById('stage');
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const pawCv=document.getElementById('paw'), pctx=pawCv.getContext('2d');
const hud=document.getElementById('hud'), pawWrap=document.getElementById('pawWrap');
const distEl=document.getElementById('dist'), comboEl=document.getElementById('combo');
const titleScr=document.getElementById('titleScr'), overScr=document.getElementById('overScr');
const ovDist=document.getElementById('ovDist'), ovBadge=document.getElementById('ovBadge'), ovMeta=document.getElementById('ovMeta');
const creditEl=document.querySelector('.credit');

let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2.5);
  W=stage.clientWidth; H=stage.clientHeight;
  cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize); resize();

/* ---------- AUDIO (WebAudio synth, no files) ---------- */
let AC=null, master=null, drone=null, droneGain=null;
function initAudio(){
  if(AC) return;
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    master=AC.createGain(); master.gain.value=0.9; master.connect(AC.destination);
  }catch(e){AC=null;}
}
function now(){return AC?AC.currentTime:0;}
function tone(freq,dur,type,gain,sweepTo){
  if(!AC)return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(freq,now());
  if(sweepTo) o.frequency.exponentialRampToValueAtTime(Math.max(20,sweepTo),now()+dur);
  g.gain.setValueAtTime(0.0001,now());
  g.gain.exponentialRampToValueAtTime(gain,now()+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,now()+dur);
  o.connect(g); g.connect(master); o.start(); o.stop(now()+dur+0.03);
}
function noise(dur,gain,filtFreq,filtType){
  if(!AC)return;
  const n=Math.floor(AC.sampleRate*dur), buf=AC.createBuffer(1,n,AC.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const s=AC.createBufferSource(); s.buffer=buf;
  const f=AC.createBiquadFilter(); f.type=filtType||'lowpass'; f.frequency.value=filtFreq||1200;
  const g=AC.createGain(); g.gain.value=gain;
  s.connect(f); f.connect(g); g.connect(master); s.start();
}
// missing-fundamental heat drone (55Hz base via 2-5 harmonics)
function startDrone(){
  if(!AC||drone) return;
  droneGain=AC.createGain(); droneGain.gain.value=0.0; droneGain.connect(master);
  drone=[];
  [110,165,220,275].forEach((f,i)=>{
    const o=AC.createOscillator(); o.type='sawtooth'; o.frequency.value=f;
    const g=AC.createGain(); g.gain.value=[0.5,0.32,0.2,0.13][i];
    o.connect(g); g.connect(droneGain); o.start(); drone.push(o);
  });
  const lf=AC.createBiquadFilter(); lf.type='lowpass'; lf.frequency.value=400;
}
function stopDrone(){
  if(drone){drone.forEach(o=>{try{o.stop()}catch(e){}}); drone=null;}
}
function sndJump(){ tone(540,0.16,'sine',0.18,300); noise(0.10,0.06,1800);}
function sndCool(combo){ const b=880+Math.min(combo,12)*55; tone(b,0.16,'sine',0.2); tone(b*1.5,0.2,'sine',0.12,b*0.7);}
function sndHot(){ noise(0.18,0.22,900); tone(140,0.18,'sawtooth',0.16,80);}
function sndWater(){ noise(0.5,0.12,2600,'bandpass'); tone(1200,0.4,'sine',0.05,500);}
function sndOver(){ noise(0.4,0.3,700); tone(120,0.5,'sawtooth',0.3,55);}
function sndRest(){ tone(660,0.5,'sine',0.12,990); tone(880,0.6,'sine',0.08);}

/* ---------- HAPTICS ---------- */
function vib(p){ try{ if(navigator.vibrate) navigator.vibrate(p);}catch(e){} }

/* ---------- GAME ---------- */
const PXM=24;            // pixels per meter (display)
const GROUND_FRAC=0.72;  // ground line as fraction of H
let state='title';
let dogX, groundY, traveled, speed, temp, maxTemp, combo, bestCombo, jumping, jy, jvy, jumpHold;
let zones, lastZoneEnd, hazePhase, sky, shake, flash, particles, restUntil, distM, waters, lastStepX;
let starsSeed=[];

function rnd(a,b){return a+Math.random()*(b-a);}

function reset(){
  groundY=H*GROUND_FRAC;
  dogX=W*0.30;
  traveled=0; speed=150; temp=0; maxTemp=0; combo=0; bestCombo=0;
  jumping=false; jy=0; jvy=0; jumpHold=0;
  zones=[]; lastZoneEnd=0; hazePhase=0; sky=0; shake=0; flash=0;
  particles=[]; restUntil=-1; distM=0; waters=[]; lastStepX=0;
  // safe opening: long shade run
  pushZone(0, 360, 'shade', 'tree');
  ensureZones(traveled + W*1.4);
  starsSeed=[]; for(let i=0;i<40;i++) starsSeed.push([Math.random(),Math.random()*0.5,Math.random()]);
}

let zSinceRest=0;
function pushZone(x0,len,type,deco){
  const z={x0:x0,x1:x0+len,type:type,deco:deco||'tree'};
  zones.push(z); lastZoneEnd=z.x1;
  return z;
}
function ensureZones(uptoX){
  while(lastZoneEnd<uptoX){
    const d=Math.min(traveled/4200,1); // difficulty 0..1
    // occasional dusk rest section
    if(zSinceRest>=6 && Math.random()<0.5){
      const z=pushZone(lastZoneEnd, rnd(560,760),'shade', Math.random()<0.5?'tree':'eave');
      z.rest=true; z.water=z.x0+rnd(120,300); waters.push(z.water);
      zSinceRest=0; continue;
    }
    // shade platform (landing zone) then sun gap
    const shadeLen=rnd(150-90*d, 240-110*d);
    const deco=['tree','pole','eave'][Math.floor(Math.random()*3)];
    const sz=pushZone(lastZoneEnd, Math.max(60,shadeLen),'shade',deco);
    if(Math.random()<0.28){ sz.water=sz.x0+rnd(20,shadeLen-20); waters.push(sz.water); }
    const sunLen=rnd(90+90*d, 170+150*d);
    pushZone(lastZoneEnd, sunLen,'sun');
    zSinceRest++;
  }
}
function zoneAt(x){
  for(let i=0;i<zones.length;i++){ const z=zones[i]; if(x>=z.x0 && x<z.x1) return z; }
  return null;
}

function startGame(){
  initAudio(); if(AC&&AC.state==='suspended')AC.resume();
  reset(); state='playing';
  titleScr.classList.add('hidden'); overScr.classList.add('hidden');
  hud.classList.remove('hidden'); pawWrap.classList.remove('hidden');
  if(creditEl) creditEl.classList.add('hidden');
  startDrone(); vib(12);
}

function gameOver(){
  state='over'; stopDrone(); sndOver(); vib([0,90,40,160]); shake=20;
  distM=Math.floor(traveled/PXM);
  ovDist.textContent=distM.toLocaleString();
  const b=badgeFor(distM,maxTemp);
  ovBadge.textContent=b;
  ovMeta.textContent='最高肉球温度 '+Math.round(36+ (maxTemp/100)*42)+'℃ ・ 連続日かげ '+bestCombo;
  hud.classList.add('hidden'); pawWrap.classList.add('hidden');
  if(creditEl) creditEl.classList.remove('hidden');
  overScr.classList.remove('hidden');
}

function badgeFor(dist,maxT){
  if(dist>=800 && maxT<46) return '氷の肉球 🧊';
  if(dist>=1500) return '日かげの達人 🌿';
  if(dist>=900) return '打ち水マスター 💧';
  if(dist>=500) return '日かげ名人';
  if(dist>=200) return 'おさんぽ上手';
  return 'まだまだ修行 🐾';
}

function jump(){
  if(state!=='playing') return;
  if(!jumping){
    jumping=true; jvy=-560; jumpHold=0; sndJump(); vib(8);
  }
}
function onTap(e){
  if(e&&e.cancelable) e.preventDefault();
  if(state==='title'){ startGame(); return; }
  if(state==='playing'){ jump(); return; }
}
stage.addEventListener('touchstart',onTap,{passive:false});
stage.addEventListener('mousedown',function(e){
  // ignore clicks on buttons (overlay handles their own)
  if(e.target.closest('.btn')||e.target.closest('.tap')) return;
  onTap(e);
});
window.addEventListener('keydown',function(e){ if(e.code==='Space'){e.preventDefault(); if(state==='title')startGame(); else jump();}});

document.getElementById('startBtn').addEventListener('click',function(e){e.stopPropagation();startGame();});
document.getElementById('retryBtn').addEventListener('click',function(e){e.stopPropagation();startGame();});
document.getElementById('shareBtn').addEventListener('click',function(e){e.stopPropagation();shareResult();});

function addParticles(x,y,col,n,spd,life){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=rnd(spd*0.3,spd);
    particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s - rnd(0,spd*0.5),
      life:life,max:life,col:col,r:rnd(1.5,3.5)});
  }
}

/* ---------- UPDATE ---------- */
let last=0;
function loop(t){
  const dt=Math.min((t-last)/1000||0,0.05); last=t;
  if(state==='playing') update(dt);
  render();
  requestAnimationFrame(loop);
}
function update(dt){
  speed=150 + Math.min(traveled/1000,1)*70 + (traveled/1000)*14; // ramps
  speed=Math.min(speed,380);
  traveled += speed*dt;
  ensureZones(traveled + W*1.5);
  // cull old zones
  while(zones.length>2 && zones[0].x1 < traveled - dogX/PXM*0 - 400) zones.shift();

  // footstep cadence (visual+audio subtle) handled in render via legPhase

  // jump physics
  if(jumping){
    jvy += 1500*dt; jy += jvy*dt; jumpHold+=dt;
    if(jy>=0){ // landed
      jy=0; jumping=false; landResolve();
    }
  }

  // temperature
  const z=zoneAt(traveled);
  hazePhase += dt*4;
  let inRest=false;
  if(jumping){
    temp += 6*dt; // passive airborne
  } else if(z){
    if(z.type==='sun'){
      const d=Math.min(traveled/4200,1);
      temp += (40+26*d)*dt;
      if(Math.random()<dt*30) addParticles(dogX, groundY-2, 'rgba(255,120,30,', 1, 60, 0.5);
    } else {
      temp -= 60*dt;
      inRest = !!z.rest;
    }
  }
  // water cooling
  for(let i=waters.length-1;i>=0;i--){
    if(traveled>=waters[i] && traveled<waters[i]+6){
      temp -= 14; if(temp<0)temp=0; sndWater();
      addParticles(dogX, groundY, 'rgba(70,227,255,', 16, 140, 0.6);
      waters.splice(i,1);
      vib(10);
    } else if(waters[i] < traveled-50){ waters.splice(i,1); }
  }
  // dusk sky during rest
  const targetSky = inRest?1:0;
  sky += (targetSky-sky)*Math.min(dt*2,1);
  if(inRest && Math.random()<dt*1.2 && !update._restAnnounced){ update._restAnnounced=true; sndRest(); setTimeout(()=>update._restAnnounced=false,1500); }

  if(temp<0)temp=0;
  if(temp>maxTemp)maxTemp=temp;
  if(temp>=100){ gameOver(); return; }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.life-=dt; if(p.life<=0){particles.splice(i,1);continue;}
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=300*dt;
  }
  if(shake>0) shake=Math.max(0,shake-dt*40);
  if(flash>0) flash=Math.max(0,flash-dt*3);

  // HUD
  distM=Math.floor(traveled/PXM);
  distEl.innerHTML=distM.toLocaleString()+'<span class="u">m</span>';
  comboEl.textContent= combo>1 ? '☀ '+combo+' れんぞく' : '';
}
function landResolve(){
  const z=zoneAt(traveled);
  if(z && z.type==='shade'){
    combo++; if(combo>bestCombo)bestCombo=combo;
    temp -= 7; if(temp<0)temp=0;
    sndCool(combo);
    addParticles(dogX, groundY, 'rgba(70,227,255,', 14, 130, 0.55);
    comboEl.style.transform='scale(1.3)'; setTimeout(()=>comboEl.style.transform='scale(1)',100);
    vib(combo>=5?[0,12,20,12]:8);
  } else {
    combo=0; temp+=6; flash=1; sndHot();
    addParticles(dogX, groundY-2, 'rgba(255,90,30,', 12, 120, 0.5);
    vib([0,20,30,20]);
  }
}

/* ---------- RENDER ---------- */
function render(){
  ctx.save();
  let sx=0,sy=0;
  if(shake>0){ sx=(Math.random()-0.5)*shake; sy=(Math.random()-0.5)*shake; ctx.translate(sx,sy); }
  // background sky
  drawSky();
  drawGround();
  drawDeco();
  drawDog();
  drawParticles();
  // heat vignette
  const heat=temp/100;
  if(heat>0.02){
    const g=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.75);
    g.addColorStop(0,'rgba(255,40,10,0)');
    g.addColorStop(1,'rgba(255,30,5,'+(0.05+heat*0.5)+')');
    ctx.fillStyle=g; ctx.fillRect(-20,-20,W+40,H+40);
  }
  if(flash>0){ ctx.fillStyle='rgba(255,90,30,'+(flash*0.4)+')'; ctx.fillRect(-20,-20,W+40,H+40); }
  // drone gain track temp
  if(droneGain&&AC){ const tg=0.02+heat*0.16; droneGain.gain.setTargetAtTime(state==='playing'?tg:0, AC.currentTime, 0.15); }
  ctx.restore();
  drawPaw();
}
function lerp(a,b,t){return a+(b-a)*t;}
function drawSky(){
  // day -> dusk by sky
  const top1=[5,3,13], top2=[20,16,46];
  const r=Math.round(lerp(top1[0],top2[0],sky)), g=Math.round(lerp(top1[1],top2[1],sky)), b=Math.round(lerp(top1[2],top2[2],sky));
  const grd=ctx.createLinearGradient(0,0,0,groundY);
  grd.addColorStop(0,'rgb('+r+','+g+','+b+')');
  // horizon glow: hot orange in day, indigo in dusk
  const hr=Math.round(lerp(255,40,sky)), hg=Math.round(lerp(120,40,sky)), hb=Math.round(lerp(30,110,sky));
  grd.addColorStop(1,'rgb('+hr+','+hg+','+hb+')');
  ctx.fillStyle=grd; ctx.fillRect(0,0,W,groundY+2);
  // sun/moon
  const sunY=lerp(groundY*0.32, groundY*0.5, sky);
  const sunX=W*0.78;
  ctx.save(); ctx.globalCompositeOperation='lighter';
  const sg=ctx.createRadialGradient(sunX,sunY,2,sunX,sunY,70);
  if(sky<0.5){ sg.addColorStop(0,'rgba(255,230,150,0.9)'); sg.addColorStop(1,'rgba(255,140,30,0)'); }
  else { sg.addColorStop(0,'rgba(180,200,255,0.7)'); sg.addColorStop(1,'rgba(120,140,255,0)'); }
  ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sunX,sunY,70,0,7); ctx.fill();
  ctx.restore();
  // dusk stars
  if(sky>0.3){
    ctx.fillStyle='rgba(255,255,255,'+((sky-0.3)*0.9)+')';
    for(let i=0;i<starsSeed.length;i++){ const s=starsSeed[i]; ctx.fillRect(s[0]*W, s[1]*groundY, 1.5,1.5); }
  }
}
function worldToScreen(wx){ return dogX + (wx - traveled); }
function drawGround(){
  const gy=groundY;
  // base ground band
  ctx.fillStyle='#08060f'; ctx.fillRect(0,gy,W,H-gy+20);
  // draw zones
  for(let i=0;i<zones.length;i++){
    const z=zones[i];
    let x0=worldToScreen(z.x0), x1=worldToScreen(z.x1);
    if(x1<-40||x0>W+40) continue;
    x0=Math.max(x0,-40); x1=Math.min(x1,W+40);
    const w=x1-x0;
    if(z.type==='sun'){
      const g=ctx.createLinearGradient(0,gy,0,H);
      g.addColorStop(0,'#FFD400'); g.addColorStop(0.4,'#FF6B1A'); g.addColorStop(1,'#7a1e05');
      ctx.fillStyle=g; ctx.fillRect(x0,gy,w,H-gy+20);
      // scan shimmer
      ctx.save(); ctx.globalAlpha=0.18; ctx.fillStyle='#fff';
      for(let s=0;s<3;s++){ const yy=gy+8+s*16+Math.sin(hazePhase+s+x0*0.02)*3; ctx.fillRect(x0,yy,w,2); }
      ctx.restore();
    } else {
      ctx.fillStyle= z.rest? '#0a1430':'#0E1230';
      ctx.fillRect(x0,gy,w,H-gy+20);
      // cool top edge glow
      ctx.save(); ctx.globalCompositeOperation='lighter';
      ctx.fillStyle='rgba(70,227,255,0.16)'; ctx.fillRect(x0,gy,w,4);
      ctx.restore();
      // shade hatch
      ctx.strokeStyle='rgba(70,227,255,0.07)'; ctx.lineWidth=1;
      for(let xx=x0;xx<x1;xx+=14){ ctx.beginPath(); ctx.moveTo(xx,gy); ctx.lineTo(xx-10,H); ctx.stroke(); }
      // water puddle
      if(z.water!=null){
        const wx=worldToScreen(z.water);
        if(wx>-20&&wx<W+20){
          ctx.save(); ctx.globalCompositeOperation='lighter';
          const pg=ctx.createRadialGradient(wx,gy+10,1,wx,gy+10,24);
          pg.addColorStop(0,'rgba(70,227,255,0.5)'); pg.addColorStop(1,'rgba(70,227,255,0)');
          ctx.fillStyle=pg; ctx.beginPath(); ctx.ellipse(wx,gy+10,24,7,0,0,7); ctx.fill();
          ctx.restore();
        }
      }
    }
  }
  // ground top line
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke();
  // heat haze over sun (rising lines)
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(let i=0;i<zones.length;i++){ const z=zones[i]; if(z.type!=='sun')continue;
    let x0=worldToScreen(z.x0),x1=worldToScreen(z.x1); if(x1<0||x0>W)continue;
    for(let xx=Math.max(0,x0); xx<Math.min(W,x1); xx+=22){
      const a=0.05+0.04*Math.sin(hazePhase*1.5+xx*0.05);
      ctx.strokeStyle='rgba(255,180,80,'+a+')'; ctx.lineWidth=2;
      ctx.beginPath();
      for(let yy=gy;yy>gy-50;yy-=6){ const off=Math.sin((yy*0.1)+hazePhase*2+xx)*4; ctx.lineTo(xx+off,yy); }
      ctx.stroke();
    }
  }
  ctx.restore();
}
function drawDeco(){
  // overhead shade casters above shade zones
  for(let i=0;i<zones.length;i++){
    const z=zones[i]; if(z.type!=='shade')continue;
    const cx=worldToScreen((z.x0+z.x1)/2); if(cx<-80||cx>W+80)continue;
    const gy=groundY;
    if(z.deco==='tree'){
      // trunk
      ctx.strokeStyle='#1a2440'; ctx.lineWidth=8; ctx.beginPath(); ctx.moveTo(cx,gy); ctx.lineTo(cx,gy-70); ctx.stroke();
      // neon canopy
      ctx.save(); ctx.shadowBlur=18; ctx.shadowColor='rgba(70,227,255,0.5)';
      ctx.fillStyle='#13351f';
      ctx.beginPath(); ctx.ellipse(cx,gy-92,44,32,0,0,7); ctx.fill();
      ctx.strokeStyle='rgba(120,255,180,0.55)'; ctx.lineWidth=2; ctx.stroke();
      ctx.restore();
    } else if(z.deco==='pole'){
      ctx.strokeStyle='#2a3350'; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(cx,gy); ctx.lineTo(cx,gy-110); ctx.stroke();
      ctx.fillStyle='#46E3FF'; ctx.save(); ctx.shadowBlur=14; ctx.shadowColor='#46E3FF'; ctx.fillRect(cx-3,gy-118,6,10); ctx.restore();
    } else { // eave
      ctx.fillStyle='#161d36'; ctx.save(); ctx.shadowBlur=14; ctx.shadowColor='rgba(70,227,255,0.4)';
      const w=Math.min(120, (worldToScreen(z.x1)-worldToScreen(z.x0)) );
      ctx.beginPath(); ctx.moveTo(cx-w/2,gy-66); ctx.lineTo(cx+w/2,gy-66); ctx.lineTo(cx+w/2-12,gy-50); ctx.lineTo(cx-w/2+12,gy-50); ctx.closePath(); ctx.fill();
      ctx.restore();
    }
    // ground shadow ellipse
    ctx.save(); ctx.globalCompositeOperation='multiply';
    ctx.fillStyle='rgba(0,0,20,0.4)'; ctx.beginPath(); ctx.ellipse(cx,gy+6,46,8,0,0,7); ctx.fill(); ctx.restore();
  }
}
let legPhase=0;
function drawDog(){
  const gy=groundY;
  const x=dogX, y=gy - 20 - jy*-1 + jy; // jy is <=0 when airborne (we used jy as offset; recompute)
  // jy stored as vertical position offset; when jumping jy goes negative (up). We set landed at jy=0.
  const dy = gy - 22 + jy; // body baseline
  legPhase += 0.25;
  const hot=Math.min(temp/100,1);
  // body tint: cyan -> orange with heat
  const r=Math.round(lerp(70,255,hot)), g=Math.round(lerp(227,120,hot)), b=Math.round(lerp(255,40,hot));
  const outline='rgb('+r+','+g+','+b+')';
  ctx.save();
  ctx.translate(x, dy);
  // trail
  ctx.save(); ctx.globalCompositeOperation='lighter';
  ctx.globalAlpha=0.25; ctx.fillStyle=outline;
  ctx.beginPath(); ctx.ellipse(-26,2,14,9,0,0,7); ctx.fill();
  ctx.restore();
  // legs (running) — hidden a bit when airborne
  const air=jumping;
  ctx.strokeStyle=outline; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.shadowBlur=12; ctx.shadowColor=outline;
  const legSwing=air?0.5:Math.sin(legPhase);
  const legSwing2=air?-0.5:Math.sin(legPhase+Math.PI);
  function leg(ox,sw){ ctx.beginPath(); ctx.moveTo(ox,4); ctx.lineTo(ox+sw*7, 20); ctx.stroke();
    // paw glow
    ctx.save(); ctx.shadowBlur=14; ctx.shadowColor=outline; ctx.fillStyle=outline;
    ctx.beginPath(); ctx.arc(ox+sw*7,21,2.6,0,7); ctx.fill(); ctx.restore(); }
  leg(-12,legSwing); leg(-6,legSwing2); leg(10,legSwing2*0.8); leg(16,legSwing*0.8);
  // body
  ctx.fillStyle='#0a0f1f';
  ctx.beginPath(); ctx.ellipse(0,0,22,13,0,0,7); ctx.fill(); ctx.stroke();
  // head
  ctx.beginPath(); ctx.arc(19,-9,11,0,7); ctx.fillStyle='#0a0f1f'; ctx.fill(); ctx.stroke();
  // snout
  ctx.beginPath(); ctx.moveTo(27,-9); ctx.lineTo(34,-6); ctx.lineTo(27,-3); ctx.closePath(); ctx.fillStyle='#0a0f1f'; ctx.fill(); ctx.stroke();
  // ear
  ctx.beginPath(); ctx.moveTo(13,-17); ctx.lineTo(20,-22); ctx.lineTo(20,-12); ctx.closePath(); ctx.fillStyle=outline; ctx.fill();
  // eye
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(21,-10,2.1,0,7); ctx.fill();
  ctx.fillStyle='#0a0f1f'; ctx.beginPath(); ctx.arc(21.6,-10,1,0,7); ctx.fill();
  // tail (wag)
  ctx.beginPath(); ctx.moveTo(-20,-4); ctx.quadraticCurveTo(-34,-12-Math.sin(legPhase*0.7)*4,-30,-18); ctx.lineWidth=4; ctx.stroke();
  ctx.restore();
}
function drawParticles(){
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(const p of particles){
    const a=Math.max(0,p.life/p.max);
    ctx.fillStyle=p.col+a+')';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill();
  }
  ctx.restore();
}
function drawPaw(){
  // HUD paw glyph reflecting temperature by color
  const hot=Math.min(temp/100,1);
  pctx.clearRect(0,0,120,120);
  // color white->orange->red
  let r,g,b;
  if(hot<0.5){ const t=hot/0.5; r=lerp(120,255,t); g=lerp(220,180,t); b=lerp(255,40,t); }
  else { const t=(hot-0.5)/0.5; r=255; g=lerp(180,30,t); b=lerp(40,20,t); }
  const col='rgb('+(r|0)+','+(g|0)+','+(b|0)+')';
  // gauge ring
  pctx.lineWidth=8;
  pctx.strokeStyle='rgba(255,255,255,0.12)';
  pctx.beginPath(); pctx.arc(60,60,50,0,7); pctx.stroke();
  pctx.strokeStyle=col; pctx.shadowBlur=14; pctx.shadowColor=col;
  pctx.beginPath(); pctx.arc(60,60,50,-Math.PI/2, -Math.PI/2 + hot*Math.PI*2); pctx.stroke();
  pctx.shadowBlur=0;
  // paw print
  pctx.fillStyle=col;
  function pad(x,y,rx,ry){ pctx.beginPath(); pctx.ellipse(x,y,rx,ry,0,0,7); pctx.fill(); }
  pad(60,68,16,13);
  pad(45,46,6,8); pad(58,40,6,9); pad(72,42,6,8); pad(82,52,5.5,7.5);
}

/* ---------- SHARE CARD (9:16) ---------- */
function buildCard(){
  const cw=1080,ch=1920;
  const c=document.createElement('canvas'); c.width=cw; c.height=ch;
  const x=c.getContext('2d');
  // bg
  const bg=x.createLinearGradient(0,0,0,ch);
  bg.addColorStop(0,'#05030D'); bg.addColorStop(0.6,'#0a0a1f'); bg.addColorStop(1,'#1a0a05');
  x.fillStyle=bg; x.fillRect(0,0,cw,ch);
  // horizon heat glow
  let rg=x.createRadialGradient(cw/2,ch*0.92,40,cw/2,ch*0.92,700);
  rg.addColorStop(0,'rgba(255,107,26,0.35)'); rg.addColorStop(1,'rgba(255,107,26,0)');
  x.fillStyle=rg; x.fillRect(0,0,cw,ch);
  // frame
  x.strokeStyle='rgba(70,227,255,0.5)'; x.lineWidth=6; x.strokeRect(40,40,cw-80,ch-80);
  // title
  x.textAlign='center';
  x.shadowColor='rgba(70,227,255,0.6)'; x.shadowBlur=40;
  x.fillStyle='#fff'; x.font='900 150px -apple-system,"Hiragino Sans",sans-serif';
  x.fillText('日かげ',cw/2,300);
  x.shadowBlur=0;
  x.fillStyle='#46E3FF'; x.font='800 46px sans-serif'; x.fillText('H I K A G E',cw/2,372);
  x.fillStyle='#9fb0cc'; x.font='600 40px sans-serif'; x.fillText('猛暑のおさんぽ',cw/2,440);
  // dog silhouette
  drawCardDog(x,cw/2,720,3.6);
  // distance
  x.fillStyle='#9fb0cc'; x.font='700 52px sans-serif'; x.fillText('おさんぽ距離',cw/2,1030);
  x.shadowColor='rgba(70,227,255,0.6)'; x.shadowBlur=44;
  const grd=x.createLinearGradient(0,1060,0,1260); grd.addColorStop(0,'#fff'); grd.addColorStop(1,'#46E3FF');
  x.fillStyle=grd; x.font='900 250px -apple-system,sans-serif';
  x.fillText(distM.toLocaleString(),cw/2-50,1250);
  x.fillStyle='#46E3FF'; x.font='900 90px sans-serif'; x.fillText('m', cw/2 + measure(x,distM.toLocaleString(),250)/2 + 20, 1250);
  x.shadowBlur=0;
  // badge
  x.fillStyle='#FFD400'; x.font='900 90px -apple-system,"Hiragino Sans",sans-serif';
  x.shadowColor='rgba(255,212,0,0.55)'; x.shadowBlur=34;
  x.fillText(ovBadge.textContent, cw/2, 1470); x.shadowBlur=0;
  // meta
  x.fillStyle='#9fb0cc'; x.font='600 46px sans-serif';
  x.fillText('最高肉球温度 '+Math.round(36+(maxTemp/100)*42)+'℃ ・ 連続日かげ '+bestCombo, cw/2, 1560);
  // paw stamps
  x.fillStyle='rgba(70,227,255,0.8)';
  for(let i=0;i<5;i++){ pawStamp(x, cw/2-200+i*100, 1690, 26); }
  // footer
  x.fillStyle='#6b7790'; x.font='600 40px sans-serif';
  x.fillText('Idea Radar 🌏 t-aka-h.github.io/idea-radar', cw/2, 1840);
  return c;
}
function measure(x,t,size){ x.font='900 '+size+'px sans-serif'; return x.measureText(t).width; }
function drawCardDog(x,cx,cy,s){
  x.save(); x.translate(cx,cy); x.scale(s,s);
  x.strokeStyle='#46E3FF'; x.lineWidth=4; x.lineCap='round'; x.shadowBlur=16; x.shadowColor='#46E3FF';
  x.fillStyle='#0a0f1f';
  // legs
  [[-12,18],[-6,16],[10,17],[16,15]].forEach(l=>{ x.beginPath(); x.moveTo(l[0],4); x.lineTo(l[0]+2,22); x.stroke(); });
  x.beginPath(); x.ellipse(0,0,22,13,0,0,7); x.fill(); x.stroke();
  x.beginPath(); x.arc(19,-9,11,0,7); x.fill(); x.stroke();
  x.beginPath(); x.moveTo(27,-9); x.lineTo(34,-6); x.lineTo(27,-3); x.closePath(); x.fill(); x.stroke();
  x.fillStyle='#46E3FF'; x.beginPath(); x.moveTo(13,-17); x.lineTo(20,-22); x.lineTo(20,-12); x.closePath(); x.fill();
  x.fillStyle='#fff'; x.beginPath(); x.arc(21,-10,2.1,0,7); x.fill();
  x.beginPath(); x.moveTo(-20,-4); x.quadraticCurveTo(-34,-16,-30,-22); x.lineWidth=4; x.strokeStyle='#46E3FF'; x.stroke();
  x.restore();
}
function pawStamp(x,cx,cy,s){
  function pad(px,py,rx,ry){ x.beginPath(); x.ellipse(px,py,rx,ry,0,0,7); x.fill(); }
  pad(cx,cy+s*0.5,s*0.65,s*0.55);
  pad(cx-s*0.55,cy-s*0.6,s*0.24,s*0.32); pad(cx-s*0.18,cy-s*0.85,s*0.24,s*0.34);
  pad(cx+s*0.18,cy-s*0.85,s*0.24,s*0.34); pad(cx+s*0.55,cy-s*0.6,s*0.24,s*0.32);
}
async function shareResult(){
  const card=buildCard();
  const title='日かげ — '+distM+'m おさんぽ達成 🐕';
  const text='【日かげ】愛犬と '+distM+'m おさんぽ！称号「'+ovBadge.textContent+'」 #日かげ #IdeaRadar';
  const url=location.href;
  card.toBlob(async function(blob){
    const file=new File([blob],'hikage_'+distM+'m.png',{type:'image/png'});
    try{
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:title,text:text}); return;
      }
      if(navigator.share){ await navigator.share({title:title,text:text,url:url}); return; }
    }catch(e){ if(e&&e.name==='AbortError') return; }
    // fallback: download
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='hikage_'+distM+'m.png'; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),4000);
  },'image/png');
}

requestAnimationFrame(loop);
})();
