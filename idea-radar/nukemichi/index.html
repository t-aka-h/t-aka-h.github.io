<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#05060E">
<title>Nukemichi（抜け道） — 手数料を取り戻せ</title>
<meta name="description" content="降る売上コインを「外部決済」レーンへ流し、Apple税を取り戻すジャストタイミング体感ゲー。スマホ新法で開いた抜け道を通せ。">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#05060E;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",system-ui,sans-serif;color:#eaf2ff;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;}
  canvas{display:block;touch-action:none;background:#05060E;box-shadow:0 0 60px rgba(70,227,255,.06);}
  #hint{position:fixed;left:0;right:0;bottom:env(safe-area-inset-bottom,8px);text-align:center;font-size:11px;color:#5b6b86;letter-spacing:.04em;pointer-events:none;z-index:5;}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="hint">drag / 指でコインを左右に流す</div>
<script>
(()=>{
"use strict";
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
// logical 9:16
const BASE_W=440, BASE_H=782;
function resize(){
  const vw=window.innerWidth, vh=window.innerHeight;
  const ar=BASE_W/BASE_H;
  let w=vw,h=vw/ar; if(h>vh){h=vh;w=vh*ar;}
  DPR=Math.min(window.devicePixelRatio||1,2.5);
  cv.style.width=w+'px'; cv.style.height=h+'px';
  cv.width=Math.round(w*DPR); cv.height=Math.round(h*DPR);
  W=cv.width; H=cv.height;
}
window.addEventListener('resize',resize); resize();
const S=()=>W/ (BASE_W*DPR); // not used; we scale by W directly
function px(v){return v*W/BASE_W;} // BASE_W logical -> device px (W already *DPR)

// ---------- audio ----------
let AC=null, master=null;
function audioInit(){ if(AC)return; try{AC=new (window.AudioContext||window.webkitAudioContext)(); master=AC.createGain(); master.gain.value=0.9; master.connect(AC.destination);}catch(e){} }
function now(){return AC?AC.currentTime:0;}
function tone(freq,t0,dur,type,g,sweepTo){
  if(!AC)return; const o=AC.createOscillator(),ga=AC.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(freq,t0);
  if(sweepTo) o.frequency.exponentialRampToValueAtTime(Math.max(20,sweepTo),t0+dur);
  ga.gain.setValueAtTime(0.0001,t0); ga.gain.exponentialRampToValueAtTime(g,t0+0.008);
  ga.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(ga); ga.connect(master); o.start(t0); o.stop(t0+dur+0.02);
}
function subBass(t0,dur,g){ // missing-fundamental thud: 55Hz + harmonics
  if(!AC)return; [55,110,165,220].forEach((f,i)=>tone(f,t0,dur,'sine',g*(i===0?0.5:0.32/(i)) ,f*0.7));
}
function noiseBurst(t0,dur,g){
  if(!AC)return; const n=AC.createBufferSource(); const b=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate);
  const d=b.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
  n.buffer=b; const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=900;
  const ga=AC.createGain(); ga.gain.value=g; n.connect(f); f.connect(ga); ga.connect(master); n.start(t0); n.stop(t0+dur);
}
function sndPerfect(combo){ const t=now(); subBass(t,0.5,0.5); const base=523.25; const steps=[0,4,7]; steps.forEach((s,i)=>tone(base*Math.pow(2,(s+Math.min(combo,8))/12),t+i*0.05,0.18,'triangle',0.35)); tone(base*2.0,t+0.16,0.12,'sine',0.2); }
function sndGood(){ const t=now(); tone(660,t,0.1,'triangle',0.28); subBass(t,0.22,0.28); }
function sndMeh(){ const t=now(); tone(300,t,0.14,'sine',0.18,200); }
function sndSafe(){ const t=now(); tone(880,t,0.06,'square',0.12); tone(1320,t+0.04,0.05,'square',0.08); }
function sndBan(){ const t=now(); noiseBurst(t,0.45,0.4); subBass(t,0.5,0.55); tone(220,t,0.4,'sawtooth',0.25,80); }
function sndStart(){ const t=now(); tone(440,t,0.12,'triangle',0.2,660); subBass(t,0.3,0.3); }
function vib(p){ try{navigator.vibrate&&navigator.vibrate(p);}catch(e){} }

// ---------- game ----------
const COL={bg:'#05060E', apple:'#1E90FF', ext:'#FFC83D', red:'#FF2D55', take:'#34E5A0', cyan:'#46E3FF', ink:'#eaf2ff'};
const FACES=[120,480,600,1200,2400,4800];
let state='title'; // title, play, over
let take=0, takeShown=0, savedTax=0, combo=0, bestCombo=0, strikes=0, timeLeft=60, lastT=0;
let goldTotal=0, goldToExt=0; // for 回避率
let coin=null, queue=[];
let particles=[], pops=[], shake=0, flash=null;
let dividerBase, gateY, difficulty=0, elapsed=0, comboMult=1;

function rnd(a,b){return a+Math.random()*(b-a);}
function spawnCoin(){
  const redP = Math.min(0.16 + difficulty*0.16, 0.34);
  const isRed = Math.random()<redP;
  const face = isRed?0:FACES[(Math.random()*FACES.length)|0];
  if(!isRed) goldTotal++;
  return { x: W*0.5+rnd(-W*0.18,W*0.18), y: -px(40), tx: W*0.5, vy: px(70)*(1+difficulty*1.1),
           face, red:isRed, r:px(30), landed:false, rot:rnd(-0.3,0.3), vr:rnd(-1,1) };
}
function startGame(){
  audioInit(); if(AC&&AC.state==='suspended')AC.resume();
  state='play'; take=0;takeShown=0;savedTax=0;combo=0;bestCombo=0;strikes=0;timeLeft=60;
  goldTotal=0;goldToExt=0;difficulty=0;elapsed=0;comboMult=1;particles=[];pops=[];shake=0;flash=null;
  dividerBase=W*0.5; gateY=H*0.835;
  coin=spawnCoin(); queue=[spawnCoin(),spawnCoin()];
  sndStart(); vib(12);
}

function addParticles(x,y,color,n,spd){ for(let i=0;i<n;i++){const a=rnd(0,Math.PI*2),s=rnd(spd*0.3,spd); particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-px(60),life:1,color,r:rnd(px(2),px(5))});} }
function popText(x,y,txt,color,big){ pops.push({x,y,txt,color,life:1,big:!!big}); }

function dividerX(){ const amp=px(8)+difficulty*px(34); return dividerBase + Math.sin(elapsed*2.2)*amp; }

function landCoin(c){
  c.landed=true;
  const dv=dividerX();
  const lane = c.x < dv ? 'apple' : 'ext'; // left=Apple(70%), right=外部(80%)
  if(!c.red){
    if(lane==='ext'){
      const gain=Math.round(c.face*0.80); combo++; comboMult=1+Math.min(combo,20)*0.05;
      const add=Math.round(gain*comboMult); take+=add; savedTax+=Math.round(c.face*0.10); goldToExt++;
      if(combo>bestCombo)bestCombo=combo;
      addParticles(c.x,gateY,COL.ext,18,px(260)); addParticles(c.x,gateY,COL.take,10,px(180));
      popText(c.x,gateY-px(40),'+¥'+add.toLocaleString(),COL.take,combo>=3);
      if(combo>0&&combo%5===0){ flash={c:COL.ext,a:0.22}; }
      (comboMult>1.4?sndPerfect(combo):sndGood()); vib(combo%5===0?[0,30,20,40]:24);
    } else {
      const gain=Math.round(c.face*0.70); take+=gain; combo=0;comboMult=1;
      addParticles(c.x,gateY,COL.apple,8,px(120));
      popText(c.x,gateY-px(36),'+¥'+gain.toLocaleString()+' (Apple税)',COL.apple,false);
      sndMeh(); vib(10);
    }
  } else { // red 規約違反
    if(lane==='apple'){ // safe dump
      combo=Math.max(combo,combo); // keep combo
      addParticles(c.x,gateY,'#7fa8d8',7,px(90));
      popText(c.x,gateY-px(36),'SAFE',COL.cyan,false); sndSafe(); vib(8);
    } else { // routed illegal coin to 外部 = BANリスク
      strikes++; combo=0;comboMult=1;
      flash={c:COL.red,a:0.5}; shake=px(16);
      addParticles(c.x,gateY,COL.red,22,px(300));
      popText(c.x,gateY-px(44),'BANリスク',COL.red,true);
      sndBan(); vib([0,70,40,70]);
    }
  }
  // next
  coin=queue.shift(); queue.push(spawnCoin());
}

let pointerX=null, dragging=false;
function setPointer(e){
  const r=cv.getBoundingClientRect();
  const cx=(e.touches?e.touches[0].clientX:e.clientX);
  pointerX=(cx-r.left)/r.width*W;
}
function down(e){
  if(state==='title'){ startGame(); e.preventDefault(); return; }
  if(state==='over'){
    if(overCardRect && hit(e, overShareRect)){ doShare(); e.preventDefault(); return; }
    if(overCardRect && hit(e, overAgainRect)){ startGame(); e.preventDefault(); return; }
    return;
  }
  dragging=true; setPointer(e); e.preventDefault();
}
function move(e){ if(dragging){ setPointer(e); e.preventDefault(); } }
function up(e){ dragging=false; }
function hit(e,rect){ if(!rect)return false; const r=cv.getBoundingClientRect(); const cx=(e.changedTouches?e.changedTouches[0].clientX:e.clientX); const cy=(e.changedTouches?e.changedTouches[0].clientY:e.clientY); const x=(cx-r.left)/r.width*W, y=(cy-r.top)/r.height*H; return x>=rect.x&&x<=rect.x+rect.w&&y>=rect.y&&y<=rect.y+rect.h; }
cv.addEventListener('mousedown',down); cv.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
cv.addEventListener('touchstart',down,{passive:false}); cv.addEventListener('touchmove',move,{passive:false}); window.addEventListener('touchend',up);

// ---------- update ----------
function update(dt){
  if(state!=='play')return;
  elapsed+=dt; timeLeft-=dt; difficulty=Math.min(elapsed/55,1);
  if(timeLeft<=0||strikes>=3){ endGame(); return; }
  if(coin){
    if(dragging&&pointerX!=null) coin.tx=Math.max(coin.r,Math.min(W-coin.r,pointerX));
    coin.x+=(coin.tx-coin.x)*Math.min(1,dt*12);
    coin.y+=coin.vy*dt; coin.rot+=coin.vr*dt;
    if(coin.y>=gateY){ coin.y=gateY; landCoin(coin); }
  }
  takeShown+=(take-takeShown)*Math.min(1,dt*9);
  for(const p of particles){ p.vy+=px(520)*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt*1.4; }
  particles=particles.filter(p=>p.life>0);
  for(const p of pops){ p.y-=px(34)*dt; p.life-=dt*0.9; }
  pops=pops.filter(p=>p.life>0);
  if(shake>0) shake=Math.max(0,shake-px(60)*dt);
  if(flash) { flash.a-=dt*1.3; if(flash.a<=0)flash=null; }
}
function endGame(){ state='over'; if(bestCombo<combo)bestCombo=combo; buildOverRects(); const t=now(); subBass(t,0.7,0.5); tone(523,t,0.4,'triangle',0.2); tone(784,t+0.12,0.5,'triangle',0.18); vib([0,40,30,80]); }

// ---------- draw ----------
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function bg(){
  ctx.fillStyle=COL.bg; ctx.fillRect(0,0,W,H);
  const g=ctx.createRadialGradient(W*0.5,H*0.2,0,W*0.5,H*0.2,H*0.9);
  g.addColorStop(0,'rgba(30,40,80,.35)'); g.addColorStop(1,'rgba(5,6,14,0)'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(70,227,255,.04)'; ctx.lineWidth=1;
  for(let y=0;y<H;y+=px(7)){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}
function drawCoin(c){
  ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot*0.15);
  const col=c.red?COL.red:COL.ext;
  ctx.shadowColor=col; ctx.shadowBlur=px(22);
  const grad=ctx.createRadialGradient(-c.r*0.3,-c.r*0.3,c.r*0.2,0,0,c.r);
  grad.addColorStop(0,c.red?'#ff8aa3':'#fff2c0'); grad.addColorStop(1,col);
  ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(0,0,c.r,0,7); ctx.fill();
  ctx.shadowBlur=0; ctx.lineWidth=px(2); ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.stroke();
  ctx.fillStyle=c.red?'#3a0010':'#4a3500'; ctx.textAlign='center'; ctx.textBaseline='middle';
  if(c.red){ ctx.font='900 '+px(20)+'px system-ui'; ctx.fillText('⚠',0,-px(2)); ctx.font='800 '+px(9)+'px system-ui'; ctx.fillText('違反',0,px(13)); }
  else { ctx.font='800 '+px(15)+'px system-ui'; ctx.fillText('¥'+c.face.toLocaleString(),0,0); }
  ctx.restore();
}
function drawGates(){
  const dv=dividerX();
  // left Apple
  ctx.save();
  const lg=ctx.createLinearGradient(0,gateY,0,H); lg.addColorStop(0,'rgba(30,144,255,.30)'); lg.addColorStop(1,'rgba(30,144,255,.05)');
  ctx.fillStyle=lg; ctx.fillRect(0,gateY,dv,H-gateY);
  const rg=ctx.createLinearGradient(0,gateY,0,H); rg.addColorStop(0,'rgba(255,200,61,.34)'); rg.addColorStop(1,'rgba(255,200,61,.05)');
  ctx.fillStyle=rg; ctx.fillRect(dv,gateY,W-dv,H-gateY);
  // divider
  ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=px(2); ctx.setLineDash([px(6),px(6)]);
  ctx.beginPath(); ctx.moveTo(dv,gateY); ctx.lineTo(dv,H); ctx.stroke(); ctx.setLineDash([]);
  // top edge glow
  ctx.shadowColor=COL.apple; ctx.shadowBlur=px(12); ctx.strokeStyle=COL.apple; ctx.lineWidth=px(2.5);
  ctx.beginPath(); ctx.moveTo(0,gateY); ctx.lineTo(dv,gateY); ctx.stroke();
  ctx.shadowColor=COL.ext; ctx.strokeStyle=COL.ext; ctx.beginPath(); ctx.moveTo(dv,gateY); ctx.lineTo(W,gateY); ctx.stroke();
  ctx.shadowBlur=0;
  // labels
  ctx.textAlign='center';
  ctx.fillStyle='#bcd2f5'; ctx.font='800 '+px(13)+'px system-ui'; ctx.fillText('Apple税',dv*0.5,gateY+px(28));
  ctx.fillStyle=COL.apple; ctx.font='900 '+px(22)+'px system-ui'; ctx.fillText('手取り 70%',dv*0.5,gateY+px(54));
  ctx.fillStyle='#6f86a8'; ctx.font='700 '+px(10)+'px system-ui'; ctx.fillText('（30%カット）',dv*0.5,gateY+px(74));
  ctx.fillStyle='#f6e3a8'; ctx.font='800 '+px(13)+'px system-ui'; ctx.fillText('外部決済',dv+(W-dv)*0.5,gateY+px(28));
  ctx.fillStyle=COL.ext; ctx.font='900 '+px(22)+'px system-ui'; ctx.fillText('手取り 80%',dv+(W-dv)*0.5,gateY+px(54));
  ctx.fillStyle='#9a8a55'; ctx.font='700 '+px(10)+'px system-ui'; ctx.fillText('（手数料20%）',dv+(W-dv)*0.5,gateY+px(74));
  ctx.restore();
}
function drawHUD(){
  ctx.textAlign='left';
  ctx.fillStyle='#7f93b5'; ctx.font='700 '+px(11)+'px system-ui'; ctx.fillText('手取り',px(18),px(28));
  ctx.fillStyle=COL.take; ctx.font='900 '+px(46)+'px system-ui';
  ctx.shadowColor=COL.take; ctx.shadowBlur=px(16);
  ctx.fillText('¥'+Math.round(takeShown).toLocaleString(),px(16),px(70)); ctx.shadowBlur=0;
  ctx.fillStyle='#6f86a8'; ctx.font='700 '+px(10.5)+'px system-ui';
  ctx.fillText('Appleから取り戻した税 ¥'+Math.round(savedTax).toLocaleString(),px(18),px(90));
  // combo
  if(combo>1){ ctx.textAlign='right'; ctx.fillStyle=COL.ext; ctx.font='900 '+px(30)+'px system-ui';
    ctx.shadowColor=COL.ext;ctx.shadowBlur=px(12); ctx.fillText('x'+combo,W-px(16),px(48)); ctx.shadowBlur=0;
    ctx.fillStyle='#9a8a55';ctx.font='700 '+px(10)+'px system-ui'; ctx.fillText('COMBO  ×'+comboMult.toFixed(2),W-px(16),px(64)); }
  // strikes + timer
  ctx.textAlign='right'; ctx.font='900 '+px(16)+'px system-ui';
  for(let i=0;i<3;i++){ ctx.fillStyle=i<strikes?COL.red:'rgba(255,255,255,.18)'; ctx.fillText('◆',W-px(16)-i*px(20),px(88)); }
  // timer bar
  const tw=W-px(32), tx=px(16), ty=px(102);
  ctx.fillStyle='rgba(255,255,255,.10)'; rr(tx,ty,tw,px(6),px(3)); ctx.fill();
  const frac=Math.max(0,timeLeft/60); ctx.fillStyle= timeLeft<10?COL.red:COL.cyan;
  rr(tx,ty,tw*frac,px(6),px(3)); ctx.fill();
}
function drawQueue(){
  for(let i=0;i<queue.length;i++){ const q=queue[i]; ctx.save(); ctx.globalAlpha=0.25-i*0.08;
    ctx.fillStyle=q.red?COL.red:COL.ext; ctx.beginPath(); ctx.arc(W*0.5+(i-0.5)*px(40),px(132),px(9),0,7); ctx.fill(); ctx.restore(); }
}
function drawFX(){
  for(const p of particles){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); }
  ctx.globalAlpha=1;
  ctx.textAlign='center';
  for(const p of pops){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color; ctx.font='900 '+px(p.big?22:15)+'px system-ui';
    ctx.shadowColor=p.color;ctx.shadowBlur=px(10); ctx.fillText(p.txt,p.x,p.y); ctx.shadowBlur=0; }
  ctx.globalAlpha=1;
  if(flash){ ctx.fillStyle=flash.c; ctx.globalAlpha=Math.max(0,flash.a); ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; }
}

function drawTitle(){
  bg();
  ctx.textAlign='center';
  ctx.fillStyle=COL.ext; ctx.font='900 '+px(13)+'px system-ui'; ctx.fillText('スマホ新法で開いた',W/2,H*0.26);
  ctx.fillStyle=COL.ink; ctx.font='900 '+px(58)+'px system-ui';
  ctx.shadowColor=COL.cyan;ctx.shadowBlur=px(24); ctx.fillText('抜け道',W/2,H*0.36); ctx.shadowBlur=0;
  ctx.fillStyle=COL.cyan; ctx.font='800 '+px(20)+'px system-ui'; ctx.fillText('N U K E M I C H I',W/2,H*0.40);
  // coins illustration
  ctx.save(); ctx.translate(W*0.36,H*0.52); ctx.shadowColor=COL.ext;ctx.shadowBlur=px(20);
  ctx.fillStyle=COL.ext; ctx.beginPath(); ctx.arc(0,0,px(26),0,7); ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle='#4a3500'; ctx.font='800 '+px(13)+'px system-ui'; ctx.fillText('¥',0,px(1)); ctx.restore();
  ctx.save(); ctx.translate(W*0.64,H*0.52); ctx.shadowColor=COL.red;ctx.shadowBlur=px(20);
  ctx.fillStyle=COL.red; ctx.beginPath(); ctx.arc(0,0,px(26),0,7); ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle='#3a0010'; ctx.font='900 '+px(18)+'px system-ui'; ctx.fillText('⚠',0,px(1)); ctx.restore();
  ctx.fillStyle='#a9bbd8'; ctx.font='700 '+px(14)+'px system-ui';
  ctx.fillText('金コイン＝売上。「外部決済」へ流して手取り80%。',W/2,H*0.63);
  ctx.fillText('Apple税レーンは70%。⚠違反コインは',W/2,H*0.665);
  ctx.fillStyle=COL.cyan; ctx.fillText('Apple側へ逃がせ（外部に入れるとBANリスク）',W/2,H*0.70);
  // start button pulse
  const pulse=1+Math.sin(elapsed*4)*0.04;
  ctx.save(); ctx.translate(W/2,H*0.83); ctx.scale(pulse,pulse);
  ctx.fillStyle=COL.cyan; ctx.shadowColor=COL.cyan; ctx.shadowBlur=px(24);
  rr(-px(120),-px(30),px(240),px(60),px(30)); ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle='#04222b'; ctx.font='900 '+px(22)+'px system-ui'; ctx.fillText('タップで開始',0,px(1)); ctx.restore();
  ctx.fillStyle='#5b6b86'; ctx.font='700 '+px(11)+'px system-ui'; ctx.fillText('60秒 / 違反3回でゲームオーバー',W/2,H*0.91);
}

// ---------- result card ----------
let overCardRect=null, overShareRect=null, overAgainRect=null;
function titleFor(t){ if(t<30000)return'課金される側'; if(t<80000)return'外部決済の見習い'; if(t<150000)return'抜け道の使い手'; if(t<300000)return'Apple税ハンター'; return'手数料の支配者'; }
function buildOverRects(){
  const cw=W*0.86, ch=H*0.74, cx=(W-cw)/2, cy=H*0.07;
  overCardRect={x:cx,y:cy,w:cw,h:ch};
  const bw=cw*0.84, bx=cx+(cw-bw)/2;
  overShareRect={x:bx,y:cy+ch-px(120),w:bw,h:px(48)};
  overAgainRect={x:bx,y:cy+ch-px(62),w:bw,h:px(48)};
}
function drawOver(){
  bg(); drawFX();
  const R=overCardRect; if(!R)return;
  ctx.save();
  ctx.fillStyle='rgba(10,14,26,.92)'; ctx.strokeStyle=COL.cyan; ctx.lineWidth=px(2);
  ctx.shadowColor=COL.cyan; ctx.shadowBlur=px(20); rr(R.x,R.y,R.w,R.h,px(20)); ctx.fill(); ctx.shadowBlur=0; ctx.stroke();
  ctx.textAlign='center';

  o.textAlign='center';

  o.fillStyle='#46E3FF'; o.font='800 40px system-ui'; o.fillText('N U K E M I C H I',w/2,450);

  // saved
  o.fillStyle='rgba(70,227,255,.10)'; o.beginPath();o.roundRect?o.roundRect(120,960,w-240,200,30):o.rect(120,960,w-240,200);o.fill();
  o.fillStyle='#9fb6d8'; o.font='700 40px system-ui'; o.fillText('Appleから取り戻した手数料',w/2,1040);
  o.fillStyle='#46E3FF'; o.font='900 90px system-ui'; o.fillText('¥'+Math.round(savedTax).toLocaleString(),w/2,1135);

  o.textAlign='right'; o.fillStyle='#eaf2ff'; o.fillText('×'+bestCombo,w-180,1320); o.fillStyle='#FFC83D'; o.fillText(avoid+'%',w-180,1410);

  o.fillStyle='#5b6b86'; o.font='700 34px system-ui'; o.fillText('t-aka-h.github.io/idea-radar/nukemichi',w/2,1820);
  return oc;
}
function doShare(){
  const oc=renderShareCanvas();
  const cap='Appleから手数料 ¥'+Math.round(savedTax).toLocaleString()+' を取り戻した。称号「'+titleFor(take)+'」 #抜け道 #Nukemichi';
  oc.toBlob(async (blob)=>{
    const file=new File([blob],'nukemichi.png',{type:'image/png'});
    try{
      if(navigator.canShare&&navigator.canShare({files:[file]})){ await navigator.share({files:[file],text:cap}); return; }
    }catch(e){}
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='nukemichi.png'; a.click();
    try{ navigator.clipboard&&navigator.clipboard.writeText(cap); }catch(e){}
  },'image/png');
}

// ---------- loop ----------
function frame(t){
  const dt=Math.min(0.05,(t-lastT)/1000||0); lastT=t;
  if(state==='title'){ elapsed+=dt; drawTitle(); }
  else if(state==='play'){
    update(dt);
    ctx.save(); if(shake>0) ctx.translate(rnd(-shake,shake),rnd(-shake,shake));
    bg(); drawGates(); drawQueue(); if(coin)drawCoin(coin); drawFX(); drawHUD(); ctx.restore();
  } else { drawOver(); }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// debug hooks for verification
window.NUKE={ start:startGame, state:()=>state, get:()=>({take,savedTax,combo,strikes,timeLeft,goldTotal,goldToExt}),
  forceLand:(lane)=>{ if(!coin)return; coin.x= lane==='ext'?W*0.78:W*0.22; coin.y=gateY; landCoin(coin); },
  spawnRed:()=>{ if(coin){coin.red=true;coin.face=0;} }, end:endGame };
})();
