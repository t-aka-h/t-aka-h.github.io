<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#05060f">
<title>千輪 — Senrin</title>
<style>
  :root{
    --cyan:#00e5ff; --mag:#ff2d87; --amber:#ffb547; --emer:#34d399; --vio:#b18cff;
    --bg:#05060f; --ink:#eaf0ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:-apple-system,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;
    touch-action:none;-webkit-user-select:none;user-select:none;}
  #stage{position:fixed;inset:0;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .layer{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:30px;}
  .hidden{display:none!important;}
  .title{font-size:clamp(58px,22vw,120px);font-weight:900;letter-spacing:6px;
    background:linear-gradient(180deg,#fff, var(--amber) 55%, var(--mag));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 38px rgba(255,181,71,.35);line-height:.95;}
  .romaji{font-size:14px;letter-spacing:9px;color:var(--cyan);margin-top:8px;font-weight:700;}
  .tag{font-size:13px;color:#9aa6c8;margin-top:20px;line-height:1.85;max-width:330px;}
  .nameinput{margin-top:26px;width:240px;background:rgba(255,255,255,.06);border:1px solid rgba(0,229,255,.4);
    border-radius:12px;padding:13px 16px;color:#fff;font-size:16px;text-align:center;outline:none;letter-spacing:2px;}
  .nameinput::placeholder{color:#677099;}
  .btn{margin-top:22px;padding:16px 46px;border:none;border-radius:999px;font-size:19px;font-weight:900;letter-spacing:3px;
    color:#06121a;background:linear-gradient(135deg,var(--cyan),var(--emer));cursor:pointer;
    box-shadow:0 0 30px rgba(0,229,255,.5);transition:transform .12s;}
  .btn:active{transform:scale(.95);}
  .btn.alt{background:linear-gradient(135deg,var(--amber),var(--mag));box-shadow:0 0 30px rgba(255,45,135,.45);}
  .hint{font-size:12px;color:#6b7393;margin-top:18px;letter-spacing:1px;line-height:1.8;}

  /* HUD */
  #hud{position:absolute;left:0;right:0;top:0;padding:calc(env(safe-area-inset-top) + 12px) 16px 0;pointer-events:none;}
  .recwrap{display:flex;align-items:center;gap:8px;font-size:11px;color:#9aa6c8;letter-spacing:1px;}
  .recbar{flex:1;height:7px;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.08);}
  .recfill{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--amber),var(--mag));transition:width .25s;}
  .countrow{display:flex;justify-content:space-between;align-items:baseline;margin-top:7px;}
  .shells{font-size:30px;font-weight:900;letter-spacing:1px;color:#fff;text-shadow:0 0 18px rgba(255,181,71,.5);}
  .shells small{font-size:12px;font-weight:700;color:#9aa6c8;letter-spacing:1px;margin-left:5px;}
  .rightcol{text-align:right;}
  .timer{font-size:22px;font-weight:900;color:var(--cyan);text-shadow:0 0 14px rgba(0,229,255,.6);font-variant-numeric:tabular-nums;}
  .combo{font-size:13px;font-weight:800;color:var(--amber);letter-spacing:1px;height:16px;}

  /* center toast */
  #toast{position:absolute;left:0;right:0;top:34%;text-align:center;pointer-events:none;}
  .judge{font-size:46px;font-weight:900;letter-spacing:4px;opacity:0;}

  #finaleBanner{position:absolute;left:0;right:0;top:30%;text-align:center;pointer-events:none;}
  .fbig{font-size:40px;font-weight:900;letter-spacing:5px;color:var(--amber);text-shadow:0 0 30px rgba(255,181,71,.7);}
  .fsub{font-size:16px;font-weight:800;color:var(--mag);letter-spacing:3px;margin-top:6px;}

  /* result */
  #resultLayer .card-img{width:min(78vw,300px);border-radius:18px;box-shadow:0 0 40px rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.12);}
  .rrow{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;justify-content:center;}
  .recflash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;}
  .guide{position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom) + 18px);transform:translateX(-50%);
    font-size:12px;color:#7c84a8;letter-spacing:2px;pointer-events:none;}
</style>
</head>
<body>
<div id="stage">
  <canvas id="sky"></canvas>
  <div class="recflash" id="recflash"></div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="recwrap">
      <span>RECORD 810,904</span>
      <div class="recbar"><div class="recfill" id="recfill"></div></div>
    </div>
    <div class="countrow">
      <div class="shells"><span id="shellNum">0</span><small>発</small></div>
      <div class="rightcol">
        <div class="timer" id="timer">45</div>
        <div class="combo" id="combo"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="hidden"><div class="judge" id="judge"></div></div>
  <div id="finaleBanner" class="hidden"><div class="fbig">GRAND FINALE</div><div class="fsub">連打で全弾解放！</div></div>
  <div class="guide hidden" id="playGuide">押して上げ・頂点で離す</div>

  <!-- start -->
  <div class="layer" id="startLayer">
    <div class="title">千輪</div>
    <div class="romaji">S E N R I N</div>
    <div class="tag">上がる尺玉の<b style="color:var(--amber)">頂点で指を離す</b>。<br>夜空を大輪で埋め尽くし、<br>世界記録<b style="color:var(--cyan)">810,904発</b>を越えろ。</div>
    <input class="nameinput" id="nameInput" maxlength="8" placeholder="打ち上げ手の名前" autocomplete="off">
    <button class="btn" id="startBtn">打ち上げ開始</button>
    <div class="hint">画面を押す→尺玉が上昇→<br>頂点の光の帯で離すと大輪が咲く</div>
  </div>

  <!-- result -->
  <div class="layer hidden" id="resultLayer">
    <img class="card-img" id="cardImg" alt="result">
    <div class="rrow">
      <button class="btn" id="shareBtn">シェア / 保存</button>
      <button class="btn alt" id="againBtn">もう一度</button>
    </div>
    <div class="hint" id="shareHint">画像を長押しでも保存できます</div>
  </div>
</div>

<script>
(()=>{
"use strict";
const cv = document.getElementById('sky'), ctx = cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2.5);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.floor(W*DPR); cv.height = Math.floor(H*DPR);
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize(); window.addEventListener('resize',resize);

/* ---------- palette ---------- */
const PALS = [
  ['#00e5ff','#7ef9ff'],
  ['#ffb547','#fff2b0','#00e5ff'],
  ['#ff2d87','#ffb547','#00e5ff'],
  ['#ff2d87','#ffb547','#00e5ff','#34d399','#b18cff'],
];
function paletteFor(combo){
  if(combo<3) return PALS[0];
  if(combo<6) return PALS[1];
  if(combo<10) return PALS[2];
  return PALS[3];
}

/* ---------- audio (WebAudio, missing-fundamental booms) ---------- */
let AC=null, master=null, noiseBuf=null;
function initAudio(){
  if(AC) return;
  try{
    AC = new (window.AudioContext||window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value=0.9; master.connect(AC.destination);
    const len = AC.sampleRate*1.0; noiseBuf = AC.createBuffer(1,len,AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  }catch(e){ AC=null; }
}
function resumeAudio(){ if(AC && AC.state==='suspended') AC.resume(); }
function boom(tier){ // tier 0 small,1 good,2 perfect
  if(!AC) return;
  const t = AC.currentTime;
  const harm = [55,110,165,220,275];
  const n = tier>=2?5: tier>=1?4:3;
  const amp = tier>=2?0.95: tier>=1?0.6:0.34;
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(amp,t+0.006);
  g.gain.exponentialRampToValueAtTime(0.0008, t+(tier>=2?0.55:0.38));
  g.connect(master);
  for(let i=0;i<n;i++){
    const o=AC.createOscillator();
    o.type='sine'; o.frequency.value=harm[i]*(1+ (Math.random()*0.01));
    const og=AC.createGain(); og.gain.value = 1/(i+1);
    o.connect(og); og.connect(g); o.start(t); o.stop(t+0.6);
  }
  // crack noise
  const ns=AC.createBufferSource(); ns.buffer=noiseBuf;
  const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value= tier>=2?1800:1200; bp.Q.value=0.8;
  const ng=AC.createGain(); ng.gain.setValueAtTime(amp*0.5,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  ns.connect(bp); bp.connect(ng); ng.connect(master); ns.start(t); ns.stop(t+0.14);
}
let whoosh=null;
function startWhoosh(){
  if(!AC) return; stopWhoosh();
  const ns=AC.createBufferSource(); ns.buffer=noiseBuf; ns.loop=true;
  const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=1.2;
  const t=AC.currentTime;
  bp.frequency.setValueAtTime(900,t); bp.frequency.exponentialRampToValueAtTime(1700,t+0.9);
  const g=AC.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.12,t+0.08);
  ns.connect(bp); bp.connect(g); g.connect(master); ns.start(t);
  whoosh={ns,g};
}
function stopWhoosh(){
  if(whoosh){ try{ const t=AC.currentTime; whoosh.g.gain.cancelScheduledValues(t); whoosh.g.gain.setTargetAtTime(0.0001,t,0.04); whoosh.ns.stop(t+0.2);}catch(e){} whoosh=null; }
}
function vibrate(ms){ if(navigator.vibrate){ try{navigator.vibrate(ms);}catch(e){} } }

/* ---------- game state ---------- */
const S = { phase:'idle', total:0, combo:0, maxCombo:0, timeLeft:45, finale:false, recordBroken:false, name:'' };
const MAIN_TIME=37, FINALE_TIME=9;
const RECORD=810904;
let particles=[];   // bloom particles
let shell=null;     // active rising shell
let toastEl=document.getElementById('judge'), toastWrap=document.getElementById('toast');
let lastT=0, running=false;

const apexY = ()=> H*0.30;
function bandH(){ return Math.max(34, 78 - S.combo*4); }   // px half-height of GOOD window
function perfectH(){ return Math.max(15, 34 - S.combo*2); }

/* ---------- rising shell ---------- */
function launchShell(x){
  const ax = apexY();
  const startY = H + 10;
  const dur = 0.95;                 // time to reach apex
  shell = { x, y:startY, vy:-(startY-ax)/dur, color:'#fff', trail:0, alive:true, born:performance.now() };
  startWhoosh();
}
function releaseShell(){
  if(!shell) return;
  stopWhoosh();
  const ax=apexY(), d=Math.abs(shell.y-ax);
  let tier;
  if(d<=perfectH()) tier=2;
  else if(d<=bandH()) tier=1;
  else tier=0;
  bloom(shell.x, shell.y, tier);
  if(tier>=1){ S.combo++; if(S.combo>S.maxCombo)S.maxCombo=S.combo; }
  else { S.combo=0; }
  scoreFor(tier);
  showJudge(tier);
  shell=null;
}
function scoreFor(tier){
  const base = tier>=2?8000: tier>=1?3000:500;
  const comboBonus = 1 + Math.min(S.combo,20)*0.06;
  addShells(Math.round(base*comboBonus));
}
function addShells(n){
  S.total+=n;
  document.getElementById('shellNum').textContent = S.total.toLocaleString('en-US');
  const pct = Math.min(100, S.total/RECORD*100);
  document.getElementById('recfill').style.width = pct+'%';
  if(!S.recordBroken && S.total>=RECORD){ S.recordBroken=true; recordBreak(); }
}

/* ---------- judge toast ---------- */
let toastAnim=null;
function showJudge(tier){
  const labels=['しぼみ…','GOOD','PERFECT!'];
  const cols=['#7c84a8','#34d399','#ffb547'];
  toastWrap.classList.remove('hidden');
  toastEl.textContent = labels[tier] + (tier>=1 && S.combo>1 ? '  x'+S.combo : '');
  toastEl.style.color = cols[tier];
  toastEl.style.fontSize = (tier>=2?52:tier>=1?42:34)+'px';
  toastEl.style.opacity='1'; toastEl.style.transform='scale(1.08)';
  cancelAnimationFrame(toastAnim);
  const t0=performance.now();
  const fade=()=>{
    const e=(performance.now()-t0)/650;
    if(e>=1){ toastEl.style.opacity='0'; return; }
    toastEl.style.opacity = String(1-e);
    toastEl.style.transform = 'scale('+(1.08-0.12*e)+') translateY('+(-14*e)+'px)';
    toastAnim=requestAnimationFrame(fade);
  };
  toastAnim=requestAnimationFrame(fade);
  // combo HUD
  document.getElementById('combo').textContent = S.combo>1 ? ('COMBO x'+S.combo) : '';
}

/* ---------- bloom particles ---------- */
function bloom(x,y,tier){
  const pal = paletteFor(S.combo);
  const count = tier>=2?320: tier>=1?180:70;
  const speed = tier>=2?(2.6+S.combo*0.05): tier>=1?2.2:1.3;
  const twoStage = S.combo>=10 && tier>=1;   // 千輪: secondary breaks
  for(let i=0;i<count;i++){
    const a = Math.random()*Math.PI*2;
    const sp = speed*(0.55+Math.random()*0.55)*(60);   // px/sec
    const col = pal[(Math.random()*pal.length)|0];
    particles.push({
      x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      life:1, decay:0.4+Math.random()*0.4, col,
      size:tier>=2?2.4:1.9, second: twoStage && Math.random()<0.18
    });
  }
  // bright core flash
  particles.push({x,y,vx:0,vy:0,life:1,decay:2.2,col:'#ffffff',size:tier>=2?9:6,core:true});
  boom(tier);
  if(tier>=2){ vibrate([0,32]); flashScreen(0.12); }
  else if(tier>=1) vibrate([0,16]);
  else vibrate(8);
  if(particles.length>3200) particles.splice(0, particles.length-3200);
}
function spawnSecondary(p){
  const pal=paletteFor(S.combo); const n=14;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=(0.6+Math.random()*0.6)*60;
    particles.push({x:p.x,y:p.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:1.0+Math.random()*0.6,
      col:pal[(Math.random()*pal.length)|0],size:1.6});
  }
}

/* ---------- screen flash / record break ---------- */
const recflash=document.getElementById('recflash');
function flashScreen(a){
  recflash.style.transition='none'; recflash.style.opacity=String(a);
  requestAnimationFrame(()=>{ recflash.style.transition='opacity .4s'; recflash.style.opacity='0'; });
}
function recordBreak(){
  flashScreen(0.95); vibrate([0,80,40,120]);
  toastWrap.classList.remove('hidden');
  toastEl.textContent='RECORD BROKEN!'; toastEl.style.color='#fff'; toastEl.style.fontSize='40px';
  toastEl.style.opacity='1';
  // celebratory multi-burst
  for(let i=0;i<6;i++) setTimeout(()=>bloom(W*(0.2+Math.random()*0.6), H*(0.18+Math.random()*0.4), 2), i*120);
}

/* ---------- input ---------- */
let pointerDown=false;
function onDown(e){
  initAudio(); resumeAudio();
  if(S.phase!=='play') return;
  const x=(e.touches?e.touches[0].clientX:e.clientX);
  if(S.finale){
    // grand finale: each tap = instant bloom
    bloom(x||W*Math.random(), H*(0.2+Math.random()*0.45), Math.random()<0.5?2:1);
    addShells(2000);
    return;
  }
  if(!shell){ pointerDown=true; launchShell(x|| W/2); }
}
function onUp(){
  if(S.phase!=='play'||S.finale) return;
  if(pointerDown && shell){ releaseShell(); }
  pointerDown=false;
}
cv.addEventListener('pointerdown',onDown);
window.addEventListener('pointerup',onUp);
cv.addEventListener('touchstart',e=>{e.preventDefault();},{passive:false});

/* ---------- main loop ---------- */
function frame(now){
  const dt=Math.min(0.05,(now-lastT)/1000||0); lastT=now;
  // fade trails
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='rgba(5,6,15,0.18)';
  ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='lighter';

  // apex guide (play only, not finale)
  if(S.phase==='play' && !S.finale){
    const ay=apexY(), bh=bandH();
    ctx.globalCompositeOperation='source-over';
    const grd=ctx.createLinearGradient(0,ay-bh,0,ay+bh);
    grd.addColorStop(0,'rgba(0,229,255,0)');
    grd.addColorStop(0.5,'rgba(0,229,255,0.10)');
    grd.addColorStop(1,'rgba(0,229,255,0)');
    ctx.fillStyle=grd; ctx.fillRect(0,ay-bh,W,bh*2);
    ctx.strokeStyle='rgba(0,229,255,0.5)'; ctx.lineWidth=1; ctx.setLineDash([7,9]);
    ctx.beginPath(); ctx.moveTo(0,ay); ctx.lineTo(W,ay); ctx.stroke(); ctx.setLineDash([]);
    ctx.globalCompositeOperation='lighter';
  }

  // rising shell
  if(shell){
    shell.y += shell.vy*dt;
    // glowing dot + spark trail handled by fade
    ctx.fillStyle='#fff'; ctx.shadowBlur=14; ctx.shadowColor=S.combo>=3?'#ffb547':'#00e5ff';
    ctx.beginPath(); ctx.arc(shell.x,shell.y,3,0,7); ctx.fill();
    // little sparks
    ctx.fillStyle='rgba(255,200,120,0.8)';
    ctx.beginPath(); ctx.arc(shell.x+(Math.random()*4-2),shell.y+6+Math.random()*4,1.3,0,7); ctx.fill();
    ctx.shadowBlur=0;
    if(shell.y < H*0.085){ // too high -> auto fizzle
      bloom(shell.x,shell.y,0); S.combo=0; scoreFor(0); showJudge(0); shell=null; stopWhoosh();
    }
  }

  // particles
  ctx.shadowBlur=0;
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life-=p.decay*dt;
    if(p.life<=0){
      if(p.second){ spawnSecondary(p); }
      particles.splice(i,1); continue;
    }
    if(!p.core){
      p.vy += 42*dt;            // gravity
      p.vx*=0.985; p.vy*=0.985; // drag
      p.x+=p.vx*dt; p.y+=p.vy*dt;
    }
    const al=Math.max(0,p.life);
    ctx.globalAlpha = p.core? al*0.9 : al;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y, p.size*(p.core?1: (0.5+al*0.6)),0,7); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';

  // timer
  if(S.phase==='play'){
    S.timeLeft-=dt;
    if(!S.finale && S.timeLeft<=FINALE_TIME){ enterFinale(); }
    if(S.timeLeft<=0){ S.timeLeft=0; endGame(); }
    const t=Math.ceil(S.timeLeft);
    const te=document.getElementById('timer'); te.textContent=t;
    te.style.color = S.finale? '#ff2d87' : (t<=5?'#ffb547':'#00e5ff');
  }

  requestAnimationFrame(frame);
}

function enterFinale(){
  S.finale=true;
  document.getElementById('finaleBanner').classList.remove('hidden');
  document.getElementById('playGuide').textContent='連打！';
  if(shell){ stopWhoosh(); shell=null; }
  vibrate([0,40,30,40]);
  setTimeout(()=>document.getElementById('finaleBanner').classList.add('hidden'),1800);
}

/* ---------- flow ---------- */
function startGame(){
  initAudio(); resumeAudio();
  S.phase='play'; S.total=0; S.combo=0; S.maxCombo=0; S.timeLeft=MAIN_TIME+FINALE_TIME; S.finale=false; S.recordBroken=false;
  particles=[]; shell=null;
  S.name=(document.getElementById('nameInput').value||'').trim().slice(0,8) || 'YOU';
  document.getElementById('startLayer').classList.add('hidden');
  document.getElementById('resultLayer').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('playGuide').classList.remove('hidden');
  document.getElementById('playGuide').textContent='押して上げ・頂点で離す';
  document.getElementById('shellNum').textContent='0';
  document.getElementById('recfill').style.width='0%';
  document.getElementById('combo').textContent='';
  // gentle starter window
  S.combo=0;
}
function endGame(){
  S.phase='result';
  stopWhoosh();
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('finaleBanner').classList.add('hidden');
  document.getElementById('playGuide').classList.add('hidden');
  toastWrap.classList.add('hidden');
  buildCard();
  document.getElementById('resultLayer').classList.remove('hidden');
}

/* ---------- result card (9:16) ---------- */
function rankFor(total){
  if(total>=RECORD) return {r:'大曲の匠', sub:'★ RECORD BROKEN', c:'#fff'};
  if(total>=400000) return {r:'大輪の名人', sub:'', c:'#ffb547'};
  if(total>=180000) return {r:'花火師', sub:'', c:'#00e5ff'};
  if(total>=60000) return {r:'若手煙火師', sub:'', c:'#34d399'};
  return {r:'火種', sub:'', c:'#b18cff'};
}
let cardBlob=null;
function buildCard(){
  const c=document.createElement('canvas'); c.width=1080; c.height=1920;
  const g=c.getContext('2d');
  // bg
  const bg=g.createLinearGradient(0,0,0,1920); bg.addColorStop(0,'#070914'); bg.addColorStop(1,'#02030a');
  g.fillStyle=bg; g.fillRect(0,0,1080,1920);
  // ambient bursts
  g.globalCompositeOperation='lighter';
  const pal=PALS[3];
  for(let b=0;b<5;b++){
    const bx=120+Math.random()*840, by=180+Math.random()*520, col=pal[b%pal.length];
    for(let i=0;i<90;i++){ const a=Math.random()*6.28, r=(0.3+Math.random())*150;
      g.globalAlpha=0.25+Math.random()*0.35; g.fillStyle=col;
      g.beginPath(); g.arc(bx+Math.cos(a)*r, by+Math.sin(a)*r, 2.4,0,7); g.fill(); }
  }
  g.globalAlpha=1; g.globalCompositeOperation='source-over';
  // title
  g.textAlign='center';
  g.fillStyle='#fff'; g.font='900 110px -apple-system,"Hiragino Sans",sans-serif';
  g.shadowColor='rgba(255,181,71,.6)'; g.shadowBlur=40;
  g.fillText('千輪', 540, 290);
  g.shadowBlur=0;
  g.fillStyle='#00e5ff'; g.font='800 26px sans-serif'; g.fillText('S E N R I N', 540, 340);

  // name as 文字花火
  drawNameFireworks(g, S.name, 540, 760);

  // stats
  const rk=rankFor(S.total);
  g.shadowBlur=0;
  g.fillStyle='#9aa6c8'; g.font='700 30px sans-serif'; g.fillText('打ち上げ総数', 540, 1180);
  g.fillStyle='#fff'; g.font='900 150px sans-serif';
  g.shadowColor='rgba(0,229,255,.45)'; g.shadowBlur=34;
  g.fillText(S.total.toLocaleString('en-US'), 540, 1330);
  g.shadowBlur=0;
  g.fillStyle='#9aa6c8'; g.font='700 30px sans-serif'; g.fillText('発', 540, 1380);

  g.fillStyle='#9aa6c8'; g.font='700 28px sans-serif';
  g.fillText('最高コンボ  x'+S.maxCombo, 540, 1500);

  // record bar
  const bw=760, bx=160, byy=1560, pct=Math.min(1,S.total/RECORD);
  g.fillStyle='rgba(255,255,255,.1)'; roundRect(g,bx,byy,bw,22,11); g.fill();
  const fg=g.createLinearGradient(bx,0,bx+bw,0); fg.addColorStop(0,'#00e5ff'); fg.addColorStop(.5,'#ffb547'); fg.addColorStop(1,'#ff2d87');
  g.fillStyle=fg; roundRect(g,bx,byy,bw*pct,22,11); g.fill();
  g.fillStyle='#677099'; g.font='600 22px sans-serif'; g.textAlign='left'; g.fillText('世界記録 810,904 発', bx, byy-16); g.textAlign='center';

  // rank
  g.fillStyle=rk.c; g.font='900 64px sans-serif';
  g.shadowColor=rk.c; g.shadowBlur=24; g.fillText('称号  '+rk.r, 540, 1700); g.shadowBlur=0;
  if(rk.sub){ g.fillStyle='#fff'; g.font='900 40px sans-serif'; g.fillText(rk.sub, 540, 1760); }

  // footer
  g.fillStyle='#5d6688';
  g.font='600 24px sans-serif';
  g.fillText('千輪 — Idea Radar  ·  t-aka-h.github.io/idea-radar', 540, 1850);

  const url=c.toDataURL('image/png');
  document.getElementById('cardImg').src=url;
  c.toBlob(b=>{ cardBlob=b; }, 'image/png');
}
function drawNameFireworks(g,name,cx,cy){
  g.textAlign='center';
  g.shadowColor='rgba(255,45,135,.6)'; g.shadowBlur=46;
  g.fillStyle='#fff'; g.font='900 96px -apple-system,"Hiragino Sans",sans-serif';
  g.fillText(name, cx, cy);
  g.shadowBlur=0;
  // sparks around the name
  g.globalCompositeOperation='lighter';
  const w=Math.min(700, name.length*120);
  const pal=PALS[3];
  for(let i=0;i<160;i++){
    const a=Math.random()*6.28, r=Math.random();
    const x=cx + Math.cos(a)*(w*0.5)*r*(0.6+Math.random()*0.6);
    const y=cy-30 + Math.sin(a)*150*r;
    g.globalAlpha=0.3+Math.random()*0.5; g.fillStyle=pal[(Math.random()*pal.length)|0];
    g.beginPath(); g.arc(x,y,2.2,0,7); g.fill();
  }
  g.globalAlpha=1; g.globalCompositeOperation='source-over';
  g.fillStyle='#9aa6c8'; g.font='700 26px sans-serif'; g.fillText('打ち上げ手', cx, cy+60);
}
function roundRect(g,x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }

/* ---------- share ---------- */
async function share(){
  if(!cardBlob){ return; }
  const file=new File([cardBlob],'senrin.png',{type:'image/png'});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], text:'千輪で'+S.total.toLocaleString('en-US')+'発を打ち上げた！ #千輪 #Senrin'}); return; }catch(e){}
  }
  const a=document.createElement('a'); a.href=document.getElementById('cardImg').src; a.download='senrin.png'; a.click();
}

/* ---------- wire up ---------- */
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('againBtn').addEventListener('click',()=>{ document.getElementById('startLayer').classList.remove('hidden'); document.getElementById('resultLayer').classList.add('hidden'); S.phase='idle'; });
document.getElementById('shareBtn').addEventListener('click',share);

// debug hooks for verification
window.__senrin = {
  state:S,
  launch:(x)=>{ launchShell(x||W/2); },
  forceBloom:(tier)=>bloom(W/2,apexY(),tier==null?2:tier),
  testRelease:(offset)=>{ shell={x:W/2,y:apexY()+(offset||0),vy:0,alive:true}; const before=S.total; releaseShell(); return {combo:S.combo, gained:S.total-before, judge:document.getElementById('judge').textContent}; },
  endNow:()=>endGame(),
  addShells
};

lastT=performance.now();
requestAnimationFrame(frame);
})();
</script>
