<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#05060f">
<title>兆 -Chō- ｜ 1兆の正気じゃなさを指で殴る</title>
<meta name="description" content="1タップ=1万円。連打で資産を積み上げ、100万→1億→1兆と桁が宇宙の彼方へ吹き飛ぶスケール体感ゲー。1兆がどれだけ遠いか、指で思い知れ。">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body { width:100%; height:100%; overflow:hidden; background:#05060f; font-family:-apple-system,"Helvetica Neue",sans-serif; touch-action:manipulation; }
  #stage { position:fixed; inset:0; }
  canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }
  /* HUD */
  .hud { position:absolute; left:0; right:0; pointer-events:none; z-index:5; text-align:center; }
  #topHud { top:max(14px,env(safe-area-inset-top)); }
  #wealth { font-weight:800; letter-spacing:0.5px; font-variant-numeric:tabular-nums; font-feature-settings:"tnum"; }
  #wealthNum { font-size:9.2vw; color:#fff; text-shadow:0 0 18px rgba(70,227,255,.55),0 0 4px rgba(255,197,61,.5); line-height:1.04; }
  #wealthUnit { font-size:4.4vw; color:#FFC53D; text-shadow:0 0 14px rgba(255,138,30,.6); margin-top:2px; font-weight:700; }
  #combo { margin-top:7px; font-size:5.2vw; font-weight:900; color:#46E3FF; opacity:0; transition:opacity .15s; text-shadow:0 0 16px rgba(70,227,255,.8); font-variant-numeric:tabular-nums; }
  #combo.on { opacity:1; }
  #botHud { bottom:max(18px,env(safe-area-inset-bottom)); }
  #toCho { font-size:3.5vw; color:#9fb0d6; letter-spacing:.4px; }
  #toCho b { color:#FF2D87; font-weight:800; text-shadow:0 0 12px rgba(255,45,135,.6); font-variant-numeric:tabular-nums; }
  #hint { margin-top:6px; font-size:3.1vw; color:#5a6a8f; }
  #best { margin-top:5px; font-size:2.9vw; color:#54608a; }
  /* milestone banner */
  #banner { position:absolute; top:38%; left:0; right:0; text-align:center; z-index:8; pointer-events:none; opacity:0; }
  #banner .title { font-size:13vw; font-weight:900; letter-spacing:1px; color:#fff; }
  #banner .sub { font-size:4.4vw; font-weight:700; margin-top:2px; }
  /* buttons */
  .btnrow { position:absolute; right:14px; top:max(14px,env(safe-area-inset-top)); z-index:6; display:flex; gap:9px; }
  .gbtn { pointer-events:auto; width:44px; height:44px; border-radius:50%; border:1px solid rgba(120,150,210,.35); background:rgba(20,26,48,.55); backdrop-filter:blur(6px); color:#bcd0f5; font-size:18px; display:flex; align-items:center; justify-content:center; }
  #shareBtn { width:auto; padding:0 16px; border-radius:22px; font-size:3.6vw; font-weight:800; gap:6px; color:#fff; background:linear-gradient(135deg,#FF8A1E,#FF2D87); border:none; box-shadow:0 0 18px rgba(255,45,135,.45); position:absolute; left:50%; transform:translateX(-50%); bottom:calc(max(18px,env(safe-area-inset-bottom)) + 64px); z-index:7; pointer-events:auto; opacity:0; transition:opacity .3s; }
  #shareBtn.on { opacity:1; }
  /* start veil */
  #veil { position:absolute; inset:0; z-index:20; background:radial-gradient(120% 90% at 50% 30%,#0b1230 0%,#05060f 70%); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:8vw; }
  #veil .logo { font-size:24vw; font-weight:900; color:#FFC53D; text-shadow:0 0 30px rgba(255,138,30,.7),0 0 60px rgba(255,45,135,.4); line-height:1; }
  #veil .tag { font-size:4.6vw; font-weight:800; color:#fff; margin-top:10px; letter-spacing:.5px; }
  #veil .sub { font-size:3.5vw; color:#9fb0d6; margin-top:14px; line-height:1.6; max-width:560px; }
  #veil .go { margin-top:34px; padding:16px 44px; border-radius:40px; font-size:5vw; font-weight:900; color:#05060f; background:linear-gradient(135deg,#46E3FF,#FFC53D); box-shadow:0 0 28px rgba(70,227,255,.5); letter-spacing:1px; }
  #veil .src { position:absolute; bottom:max(14px,env(safe-area-inset-bottom)); font-size:2.7vw; color:#46557f; padding:0 8vw; line-height:1.5; }
  /* share overlay */
  #shareView { position:absolute; inset:0; z-index:30; background:rgba(2,3,9,.92); display:none; flex-direction:column; align-items:center; justify-content:center; padding:6vw; }
  #shareView img { max-width:78%; max-height:64%; border-radius:14px; box-shadow:0 0 40px rgba(255,45,135,.35); }
  #shareView .row { display:flex; gap:12px; margin-top:20px; }
  #shareView button { padding:13px 26px; border-radius:26px; font-size:4.2vw; font-weight:800; border:none; }
  #dlBtn { color:#05060f; background:linear-gradient(135deg,#46E3FF,#FFC53D); }
  #closeShare { color:#cdd8f2; background:rgba(40,48,78,.7); }
  #shareView .cap { color:#8fa0c8; font-size:3.2vw; margin-top:14px; text-align:center; }
  @media (min-width:620px){
    #wealthNum{font-size:58px} #wealthUnit{font-size:27px} #combo{font-size:32px}
    #toCho{font-size:21px} #hint{font-size:18px} #best{font-size:17px}
    #veil .logo{font-size:150px} #veil .tag{font-size:28px} #veil .sub{font-size:21px} #veil .go{font-size:30px}
    #banner .title{font-size:84px} #banner .sub{font-size:27px} #shareBtn{font-size:21px} #veil .src{font-size:15px}
    #shareView button{font-size:24px} #shareView .cap{font-size:18px}
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="cv"></canvas>

  <div class="btnrow">
    <button class="gbtn" id="muteBtn" aria-label="音">🔊</button>
    <button class="gbtn" id="resetBtn" aria-label="リセット">↺</button>
  </div>

  <div class="hud" id="topHud">
    <div id="wealth"><div id="wealthNum">¥0</div><div id="wealthUnit">&nbsp;</div></div>
    <div id="combo">×1.0</div>
  </div>

  <div id="banner"><div class="title"></div><div class="sub"></div></div>

  <div class="hud" id="botHud">
    <div id="toCho">1兆まであと <b>—</b></div>
    <div id="hint">画面を連打して1万円ずつ積み上げろ</div>
    <div id="best"></div>
  </div>

  <button id="shareBtn">📸 結果をシェア</button>

  <div id="veil">
    <div class="logo">兆</div>
    <div class="tag">1兆って、結局どれくらい？</div>
    <div class="sub">1タップ＝1万円。連打で資産を積み上げると、100万→1億→1兆と桁が宇宙の彼方へ吹き飛ぶ。<br>1兆の正気じゃなさを、指の疲労で思い知れ。</div>
    <div class="go" id="goBtn">指で殴る</div>
    <div class="src">2026年6月、SpaceXが史上最大$75B規模のIPO・企業価値$1.77兆、イーロン・マスクが世界初のトリリオネア（1兆ドル保有者）に。— Idea Radar / レンズ: ワイルドカード</div>
  </div>

  <div id="shareView">
    <img id="shareImg" alt="result">
    <div class="row">
      <button id="dlBtn">画像を保存</button>
      <button id="closeShare">閉じる</button>
    </div>
    <div class="cap">スクショして「1兆まであと◯年」を晒そう</div>
  </div>
</div>

<script>
(function(){
"use strict";
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2.5);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.round(W*DPR); cv.height = Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize); resize();

// ---------- state ----------
const PER_TAP = 10000;        // ¥1万 / tap
const TARGET  = 1e12;         // 1兆
let wealth = 0;
let combo = 1;
let comboTarget = 1;
let lastTapT = 0;
let started = false;
let muted = false;
let best = parseFloat(localStorage.getItem('cho_best')||'0')||0;
let bestSavedTier = 0;

// camera: a log10 window that frames the current frontier
let viewBot = 4.0;            // log10 of bottom of visible window
const SPAN  = 1.9;            // window spans 1.9 orders of magnitude
let camEase = 0;             // smoothed zoom shift indicator (for flash on jump)

// tap-rate tracker (for "あと◯年")
let tapTimes = [];

// milestones
const MILES = [
  {v:1e6,  name:"100万",  title:"100万", sub:"まずは庶民の到達点",  col:"#FFE08A"},
  {v:1e8,  name:"1億",    title:"億り人", sub:"1億円 — 富裕の門",    col:"#46E3FF"},
  {v:1e9,  name:"10億",   title:"10億",   sub:"ここからが異世界",    col:"#7CF6C0"},
  {v:1e10, name:"100億",  title:"100億",  sub:"もう数字が遠い",      col:"#B98BFF"},
  {v:1e11, name:"1000億", title:"1000億", sub:"あと一歩…のはずが",   col:"#FF8A1E"},
  {v:1e12, name:"1兆",    title:"兆人",   sub:"マスクの座。1兆ドル級", col:"#FF2D87"},
];
let nextMile = 0;

// particles
const parts = [];
function burst(x,y,n,colA,colB,spd){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=(Math.random()*spd+spd*0.3);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.4,life:1,r:Math.random()*3+1.6,
      c: Math.random()<0.5?colA:colB});
  }
  if(parts.length>520) parts.splice(0,parts.length-520);
}

// coins shimmer offset
let shimmer=0;

// ---------- audio (WebAudio synth, no files) ----------
let AC=null, master=null;
function audioInit(){
  if(AC) return;
  try{
    AC = new (window.AudioContext||window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value=0.9; master.connect(AC.destination);
  }catch(e){ AC=null; }
}
function tone(freq,dur,type,vol,decay){
  if(!AC||muted) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'sine'; o.frequency.value=freq;
  const t=AC.currentTime;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.006);
  g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||0.18));
  o.connect(g); g.connect(master); o.start(t); o.stop(t+(dur||0.18)+0.02);
}
function chime(step){
  if(!AC||muted) return;
  const base = 760 * Math.pow(2, Math.min(step,18)/18*0.9); // pitch rises with combo
  tone(base,0.10,'triangle',0.18,1);
  tone(base*1.5,0.08,'sine',0.09,1);
}
// missing-fundamental heavy bass (55Hz base, overtones 2F-6F)
function bass(intensity){
  if(!AC||muted) return;
  const t=AC.currentTime, f0=55;
  [2,3,4,5,6].forEach((k,i)=>{
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='sine'; o.frequency.value=f0*k;
    const v=(0.16/(i*0.5+1))*intensity;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(v,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.85);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+0.9);
  });
}
function arpeggio(){
  if(!AC||muted) return;
  const notes=[523.25,659.25,783.99,1046.5];
  notes.forEach((n,i)=> setTimeout(()=>tone(n,0.22,'triangle',0.14,1), i*70));
  setTimeout(()=>tone(2093,0.5,'sine',0.07,1), notes.length*70);
}
function vib(p){ if('vibrate' in navigator){ try{navigator.vibrate(p);}catch(e){} } }

// ---------- helpers ----------
function comma(n){ return Math.floor(n).toLocaleString('en-US'); }
function shortJP(n){
  if(n>=1e12) return (n/1e12).toFixed(n>=1e13?1:2)+"兆";
  if(n>=1e8)  return (n/1e8 ).toFixed(n>=1e9 ?0:1)+"億";
  if(n>=1e4)  return (n/1e4 ).toFixed(0)+"万";
  return Math.floor(n)+"";
}
function bigYears(y){
  if(!isFinite(y)) return "—";
  if(y>=1e8) return (y/1e8).toFixed(1)+"億年";
  if(y>=1e4) return Math.round(y/1e4).toLocaleString('en-US')+"万年";
  if(y>=1)   return Math.round(y).toLocaleString('en-US')+"年";
  if(y*365>=1) return Math.round(y*365)+"日";
  return "あと少し！";
}

// ---------- tap ----------
function doTap(){
  if(!started) return;
  const now = performance.now();
  comboTarget = Math.min(comboTarget + 0.18, 8);
  combo = comboTarget;
  lastTapT = now;
  wealth += PER_TAP * combo;
  if(wealth>TARGET) wealth=TARGET;

  tapTimes.push(now); if(tapTimes.length>40) tapTimes.shift();

  // frontier screen pos for burst
  const fy = frontierY();
  const step = Math.round((combo-1)/7*18);
  chime(step);
  vib(6);
  burst(W*0.5, fy, 5+Math.round(combo), "#FFC53D","#46E3FF", 3.2);

  // milestone check
  while(nextMile<MILES.length && wealth>=MILES[nextMile].v){
    fireMile(MILES[nextMile]); nextMile++;
  }
  // best
  if(wealth>best){ best=wealth; localStorage.setItem('cho_best', String(best)); }
}

function fireMile(m){
  showBanner(m.title, m.sub, m.col);
  bass(m.v>=1e12?1.5:1.0);
  arpeggio();
  vib([28,36,28,36,70]);
  burst(W*0.5, frontierY(), 90, m.col, "#ffffff", 6.5);
  flash = 0.9; flashCol = m.col;
  if(m.v>=TARGET){ // reached 兆
    setTimeout(()=>{ openShare(true); }, 900);
  }
  // offer share at big tiers
  if(m.v>=1e8) showShareBtn();
}

// ---------- banner ----------
const banner = document.getElementById('banner');
const bTitle = banner.querySelector('.title'), bSub = banner.querySelector('.sub');
let bannerT = 0;
function showBanner(t,s,col){
  bTitle.textContent=t; bSub.textContent=s; bSub.style.color=col;
  bTitle.style.color="#fff"; bTitle.style.textShadow="0 0 26px "+col+",0 0 8px "+col;
  bannerT = 1.4;
}

let flash=0, flashCol="#fff";

// ---------- camera mapping ----------
// map a log10 value -> screen Y within current window
function levelToY(L){
  const top = viewBot + SPAN;
  const t = (L - viewBot)/(top - viewBot); // 0 bottom .. 1 top
  const bottomY = H*0.86, topY = H*0.16;
  return bottomY + (topY-bottomY)*t;
}
function curLevel(){ return Math.log10(Math.max(wealth, Math.pow(10,viewBot))); }
function frontierY(){ return levelToY(Math.max(curLevel(), viewBot+0.02)); }

// ---------- main loop ----------
let last=performance.now();
function loop(t){
  const dt=Math.min((t-last)/1000, 0.05); last=t;
  shimmer += dt*1.4;

  // combo decay
  if(t-lastTapT > 380){ comboTarget = Math.max(1, comboTarget - dt*3.0); combo=comboTarget; }
  // camera: keep frontier near 72% of window; ease window up as wealth climbs
  const L = curLevel();
  const desiredBot = Math.max(4.0, L - SPAN*0.72);
  const prevBot = viewBot;
  viewBot += (desiredBot - viewBot)*Math.min(1, dt*3.2);
  camEase = Math.abs(viewBot-prevBot);

  draw(dt);
  updateHUD();
  requestAnimationFrame(loop);
}

function draw(dt){
  // bg
  ctx.clearRect(0,0,W,H);
  const hue = Math.min(1, curLevel()/12);
  const g = ctx.createRadialGradient(W*0.5,H*0.34,0, W*0.5,H*0.34, H*0.9);
  g.addColorStop(0, `rgba(${10+hue*30|0},${14+hue*4|0},${30+hue*20|0},1)`);
  g.addColorStop(1, "#05060f");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  drawStars();
  drawRuler();
  drawColumn();
  drawSideGauge();
  drawParticles(dt);

  if(flash>0){
    ctx.globalAlpha=flash*0.5; ctx.fillStyle=flashCol; ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1; flash=Math.max(0, flash-dt*2.2);
  }
}

// starfield (deterministic)
const stars=[]; for(let i=0;i<70;i++){ stars.push({x:Math.random(),y:Math.random(),s:Math.random()*1.6+0.3,p:Math.random()}); }
function drawStars(){
  ctx.save();
  for(const s of stars){
    const tw=0.4+0.6*Math.abs(Math.sin(shimmer*0.7+s.p*6.28));
    ctx.globalAlpha=tw*0.5; ctx.fillStyle="#9fc4ff";
    ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.s, 0, 6.28); ctx.fill();
  }
  ctx.restore();
}

// vertical magnitude ruler within window (ticks at each power of ten)
function drawRuler(){
  const cx=W*0.5;
  ctx.save();
  // axis glow
  ctx.strokeStyle="rgba(80,110,170,0.18)"; ctx.lineWidth=1;
  for(let p=4; p<=12; p++){
    const y=levelToY(p);
    if(y<-20||y>H+20) continue;
    ctx.beginPath(); ctx.moveTo(cx-W*0.42,y); ctx.lineTo(cx+W*0.42,y); ctx.stroke();
    const mile = MILES.find(m=>Math.abs(Math.log10(m.v)-p)<0.01);
    ctx.font="700 "+(W*0.032)+"px -apple-system,sans-serif";
    ctx.textBaseline="middle";
    if(mile){
      ctx.fillStyle=mile.col; ctx.globalAlpha=0.95;
      ctx.textAlign="left"; ctx.fillText(mile.name, cx-W*0.40, y-W*0.028);
      ctx.globalAlpha=0.5; ctx.beginPath(); ctx.moveTo(cx-W*0.42,y); ctx.lineTo(cx+W*0.42,y);
      ctx.strokeStyle=mile.col; ctx.lineWidth=1.4; ctx.stroke(); ctx.globalAlpha=1;
    }
  }
  ctx.restore();
}

// the rising glowing wealth column
function drawColumn(){
  const cx=W*0.5, colW=Math.min(W*0.30, 150);
  const baseY=levelToY(viewBot);
  const fy=frontierY();
  const topY=Math.min(baseY,fy);
  // column body (gradient gold)
  const grad=ctx.createLinearGradient(0,baseY,0,topY);
  grad.addColorStop(0,"#7a4a00"); grad.addColorStop(0.5,"#FFB02E"); grad.addColorStop(1,"#FFE89A");
  ctx.save();
  roundRectPath(cx-colW/2, topY, colW, baseY-topY, 12);
  ctx.fillStyle=grad; ctx.shadowColor="rgba(255,160,30,0.6)"; ctx.shadowBlur=24; ctx.fill();
  ctx.shadowBlur=0;
  // coin stripes
  ctx.clip();
  ctx.globalAlpha=0.35;
  for(let y=baseY; y>topY; y-=9){
    const o=Math.sin((y*0.06)+shimmer*2)*2;
    ctx.fillStyle="rgba(255,255,255,0.14)";
    ctx.fillRect(cx-colW/2, y-2+o, colW, 1.6);
  }
  ctx.restore();
  // frontier line + glow
  ctx.save();
  ctx.strokeStyle="#FFF6D8"; ctx.lineWidth=3; ctx.shadowColor="#FFC53D"; ctx.shadowBlur=20;
  ctx.beginPath(); ctx.moveTo(cx-colW/2-6,fy); ctx.lineTo(cx+colW/2+6,fy); ctx.stroke();
  ctx.restore();
}

// side mini gauge 0 -> 兆 (true absolute log scale) showing "you are here"
function drawSideGauge(){
  const x=W-Math.max(20,W*0.05), top=H*0.20, bot=H*0.80, h=bot-top;
  ctx.save();
  ctx.strokeStyle="rgba(120,150,210,0.3)"; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(x,top); ctx.lineTo(x,bot); ctx.stroke();
  // 兆 marker at top, 1万 at bottom
  ctx.fillStyle="#FF2D87"; ctx.font="800 "+(W*0.026)+"px sans-serif"; ctx.textAlign="right"; ctx.textBaseline="middle";
  ctx.fillText("兆", x-7, top);
  ctx.fillStyle="#566"; ctx.fillText("万", x-7, bot);
  // you marker: log10(wealth) from 4..12 -> bot..top
  const L=Math.max(4,Math.min(12, wealth>0?Math.log10(wealth):4));
  const yt = bot + (top-bot)*((L-4)/8);
  ctx.fillStyle="#46E3FF"; ctx.shadowColor="#46E3FF"; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.arc(x,yt,5,0,6.28); ctx.fill(); ctx.shadowBlur=0;
  // filled portion
  ctx.strokeStyle="#46E3FF"; ctx.globalAlpha=0.55; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(x,bot); ctx.lineTo(x,yt); ctx.stroke();
  ctx.restore();
}

function drawParticles(dt){
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.vy+=8*dt; p.x+=p.vx; p.y+=p.vy; p.life-=dt*1.3;
    if(p.life<=0){ parts.splice(i,1); continue; }
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.c;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,6.28); ctx.fill();
  }
  ctx.restore();
}

function roundRectPath(x,y,w,h,r){
  r=Math.min(r,w/2,Math.abs(h)/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

// ---------- HUD ----------
const elNum=document.getElementById('wealthNum'), elUnit=document.getElementById('wealthUnit'),
      elCombo=document.getElementById('combo'), elTo=document.querySelector('#toCho b'),
      elBest=document.getElementById('best'), elHint=document.getElementById('hint');
let hudAcc=0;
function updateHUD(){
  elNum.textContent="¥"+comma(wealth);
  elUnit.textContent= wealth>=1e4? "（約"+shortJP(wealth)+"円）" : " ";
  if(combo>1.05){ elCombo.classList.add('on'); elCombo.textContent="×"+combo.toFixed(1); }
  else elCombo.classList.remove('on');
  // years to 1兆
  const now=performance.now();
  let yenPerSec=0;
  if(tapTimes.length>=2){
    const span=(tapTimes[tapTimes.length-1]-tapTimes[0])/1000;
    if(span>0 && now-lastTapT<1500){ yenPerSec = (tapTimes.length-1)/span * PER_TAP * Math.max(1,combo); }
  }
  if(wealth>=TARGET){ elTo.textContent="達成！🎉"; }
  else if(yenPerSec>0){ elTo.textContent=bigYears((TARGET-wealth)/yenPerSec/(3600*24*365)); }
  else { elTo.textContent="—"; }
  if(best>0){ elBest.textContent="ベスト記録: ¥"+comma(best)+"（"+shortJP(best)+"）"; }
  // banner fade
  if(bannerT>0){ bannerT-=1/60; banner.style.opacity=Math.min(1, bannerT*2.2).toFixed(2);
    banner.style.transform="translateY("+((1.4-bannerT)*-10)+"px)"; }
  else banner.style.opacity=0;
}

// ---------- share card 9:16 ----------
function makeCard(reached){
  const c=document.createElement('canvas'); c.width=1080; c.height=1920;
  const x=c.getContext('2d');
  const hue=Math.min(1,(wealth>0?Math.log10(wealth):4)/12);
  const g=x.createRadialGradient(540,640,0,540,640,1300);
  g.addColorStop(0, reached? "#2a0a2a" : `rgb(${10+hue*40|0},${16+hue*8|0},${40+hue*30|0})`);
  g.addColorStop(1,"#05060f"); x.fillStyle=g; x.fillRect(0,0,1080,1920);
  // stars
  for(let i=0;i<90;i++){ x.globalAlpha=Math.random()*0.5+0.1; x.fillStyle="#9fc4ff";
    x.beginPath(); x.arc(Math.random()*1080,Math.random()*1920,Math.random()*2+0.4,0,6.28); x.fill(); }
  x.globalAlpha=1;
  // top label
  x.textAlign="center"; x.fillStyle="#9fb0d6"; x.font="700 46px -apple-system,sans-serif";
  x.fillText("本日の積み上げ", 540, 300);
  // big amount
  x.fillStyle="#fff"; x.shadowColor="#46E3FF"; x.shadowBlur=40;
  x.font="900 120px -apple-system,sans-serif";
  let amt="¥"+comma(wealth);
  if(amt.length>13){ x.font="900 86px -apple-system,sans-serif"; }
  x.fillText(amt, 540, 470);
  x.shadowBlur=0;
  x.fillStyle="#FFC53D"; x.font="800 64px -apple-system,sans-serif";
  x.fillText("（約"+shortJP(Math.max(wealth,1))+"円）", 540, 560);
  // tier title
  let tier="—"; for(const m of MILES){ if(wealth>=m.v) tier=m.title; }
  x.fillStyle="#FF2D87"; x.shadowColor="#FF2D87"; x.shadowBlur=30; x.font="900 110px -apple-system,sans-serif";
  x.fillText(reached? "兆人" : tier, 540, 880); x.shadowBlur=0;
  // gauge line "you are here on 0->兆"
  const gx=540, gy0=1040, gy1=1380;
  x.strokeStyle="rgba(120,150,210,0.4)"; x.lineWidth=8;
  x.beginPath(); x.moveTo(gx,gy0); x.lineTo(gx,gy1); x.stroke();
  x.fillStyle="#FF2D87"; x.font="800 44px sans-serif"; x.fillText("兆", gx, gy0-30);
  x.fillStyle="#667"; x.fillText("万", gx, gy1+50);
  const L=Math.max(4,Math.min(12,wealth>0?Math.log10(wealth):4));
  const yt=gy1+(gy0-gy1)*((L-4)/8);
  x.strokeStyle="#46E3FF"; x.lineWidth=8; x.beginPath(); x.moveTo(gx,gy1); x.lineTo(gx,yt); x.stroke();
  x.fillStyle="#46E3FF"; x.shadowColor="#46E3FF"; x.shadowBlur=24; x.beginPath(); x.arc(gx,yt,16,0,6.28); x.fill(); x.shadowBlur=0;
  x.fillStyle="#cdd8f2"; x.font="700 40px sans-serif"; x.textAlign="left"; x.fillText("← あなたは ここ", gx+40, yt);
  x.textAlign="center";
  // self-deprecating line
  let line;
  if(reached || wealth>=TARGET){ line="ついに1兆に到達した狂人"; }
  else {
    const tn=tapTimes.length>=2 ? (TARGET-wealth)/( (PER_TAP*Math.max(1,combo)) * Math.max(0.5,(tapTimes.length-1)/Math.max(0.001,(tapTimes[tapTimes.length-1]-tapTimes[0])/1000)) )/(3600*24*365) : Infinity;
    line="1兆まであと "+bigYears(isFinite(tn)?tn: 47000);
  }
  x.fillStyle="#fff"; x.font="900 62px -apple-system,sans-serif"; x.fillText(line, 540, 1560);
  // footer
  x.fillStyle="#FFC53D"; x.font="900 80px -apple-system,sans-serif"; x.fillText("兆 -Chō-", 540, 1720);
  x.fillStyle="#6b7aa0"; x.font="600 34px sans-serif"; x.fillText("Idea Radar ｜ 1兆の正気じゃなさを指で殴る", 540, 1790);
  return c;
}
let lastCardURL=null;
function openShare(reached){
  const c=makeCard(reached);
  c.toBlob(function(blob){
    if(lastCardURL) URL.revokeObjectURL(lastCardURL);
    lastCardURL=URL.createObjectURL(blob);
    document.getElementById('shareImg').src=lastCardURL;
    document.getElementById('shareView').style.display='flex';
    // try native share
    if(navigator.share && navigator.canShare){
      try{
        const f=new File([blob],"cho.png",{type:"image/png"});
        if(navigator.canShare({files:[f]})){
          navigator.share({files:[f], text:"1兆まであと…｜兆 -Chō-"}).catch(()=>{});
        }
      }catch(e){}
    }
  },"image/png");
}
function showShareBtn(){ document.getElementById('shareBtn').classList.add('on'); }

// ---------- wiring ----------
document.getElementById('stage').addEventListener('pointerdown', function(e){
  if(!started) return;
  if(e.target.closest('button')) return;
  if(document.getElementById('shareView').style.display==='flex') return;
  audioInit(); doTap();
}, {passive:true});

document.getElementById('goBtn').addEventListener('click', function(){
  started=true; audioInit(); if(AC&&AC.state==='suspended') AC.resume();
  document.getElementById('veil').style.display='none';
  elHint.textContent="連打でコンボ加速 → 1万円が雪だるま式に";
});
document.getElementById('muteBtn').addEventListener('click', function(){
  muted=!muted; this.textContent=muted?'🔈':'🔊';
});
document.getElementById('resetBtn').addEventListener('click', function(){
  wealth=0; combo=1; comboTarget=1; nextMile=0; viewBot=4.0; tapTimes=[]; parts.length=0;
  bannerT=0; flash=0; banner.style.opacity=0;
  document.getElementById('shareBtn').classList.remove('on');
});
document.getElementById('shareBtn').addEventListener('click', function(){ audioInit(); openShare(wealth>=TARGET); });
document.getElementById('closeShare').addEventListener('click', function(){ document.getElementById('shareView').style.display='none'; });
document.getElementById('dlBtn').addEventListener('click', function(){
  if(!lastCardURL) return; const a=document.createElement('a'); a.href=lastCardURL; a.download='cho-result.png'; a.click();
});

requestAnimationFrame(loop);
})();
</script>
