<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#05060E">
<title>Bokashi（ぼかし）— 見る前に、こすって消せ</title>
<style>
  :root{
    --bg:#05060E; --cyan:#00E5FF; --magenta:#FF2D87; --amber:#FBBF24; --red:#EC1A33;
    --ink:#E8EEFF; --sub:#8A93B2;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--bg);overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Segoe UI",sans-serif;color:var(--ink);}
  #wrap{position:fixed;inset:0;touch-action:none;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;gap:14px;z-index:5;
    background:radial-gradient(120% 80% at 50% 38%, rgba(0,229,255,.07), rgba(5,6,14,.0) 60%);}
  .hidden{display:none!important;}
  .logo{font-weight:900;font-style:italic;letter-spacing:.04em;font-size:clamp(42px,15vw,82px);
    background:linear-gradient(180deg,#fff, var(--cyan) 55%, var(--magenta));-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 30px rgba(0,229,255,.25);line-height:1;}
  .jp{font-weight:800;font-size:clamp(15px,4.6vw,20px);color:var(--amber);letter-spacing:.34em;margin-top:-2px;}
  .tag{color:var(--sub);font-size:clamp(13px,3.8vw,16px);line-height:1.7;max-width:18em;}
  .tag b{color:var(--ink);font-weight:700;}
  .btn{margin-top:8px;font-weight:800;font-size:clamp(17px,5vw,22px);letter-spacing:.06em;color:#04121a;
    background:linear-gradient(180deg,#7df1ff,var(--cyan));border:none;border-radius:999px;padding:16px 40px;
    box-shadow:0 0 26px rgba(0,229,255,.5),inset 0 0 12px rgba(255,255,255,.4);cursor:pointer;}
  .btn:active{transform:scale(.96);}
  .btn.ghost{background:rgba(255,255,255,.06);color:var(--ink);box-shadow:inset 0 0 0 1.5px rgba(255,45,135,.5);}
  .row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:6px;}
  .credit{position:absolute;bottom:12px;left:0;right:0;text-align:center;color:var(--sub);font-size:11px;letter-spacing:.08em;opacity:.7;}
  .statbig{font-weight:900;font-style:italic;font-size:clamp(54px,20vw,120px);color:var(--amber);line-height:1;text-shadow:0 0 30px rgba(251,191,36,.4);}
  .statlbl{color:var(--sub);font-size:13px;letter-spacing:.3em;}
  .subline{color:var(--ink);font-size:clamp(14px,4vw,17px);}
  .subline span{color:var(--magenta);font-weight:800;}
  #shareImg{width:min(58vw,300px);border-radius:14px;box-shadow:0 10px 40px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.08);margin-bottom:4px;}
  .hud{position:absolute;top:calc(env(safe-area-inset-top,0) + 12px);left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 16px;z-index:4;pointer-events:none;}
  .hud .lives{font-size:22px;letter-spacing:2px;filter:drop-shadow(0 0 6px rgba(236,26,51,.6));}
  .hud .mid{font-weight:900;font-style:italic;font-size:30px;color:var(--ink);text-shadow:0 0 14px rgba(0,229,255,.35);font-variant-numeric:tabular-nums;}
  .hud .wave{font-size:12px;letter-spacing:.28em;color:var(--sub);text-align:right;}
  .hud .wave b{display:block;color:var(--amber);font-size:16px;font-weight:800;letter-spacing:.1em;}
  .combo{position:absolute;top:46%;left:0;right:0;text-align:center;z-index:4;pointer-events:none;font-weight:900;font-style:italic;
    font-size:clamp(26px,9vw,46px);color:var(--magenta);text-shadow:0 0 22px rgba(255,45,135,.6);opacity:0;transition:opacity .15s;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <div class="hud hidden" id="hud">
    <div class="lives" id="lives">❤︎❤︎❤︎</div>
    <div class="mid" id="timer">0.0</div>
    <div class="wave">WAVE<b id="wave">1</b></div>
  </div>
  <div class="combo" id="combo"></div>

  <!-- TITLE -->
  <div class="overlay" id="title">
    <div class="logo">BOKASHI</div>
    <div class="jp">ぼ か し</div>
    <div class="tag">四方から<b>ネタバレ</b>が飛んでくる。<br><b>見てしまう前に</b>、指でこすって消せ。<br>1つでも目に届くと…結果が、割れる。</div>
    <button class="btn" id="startBtn">録 画 を 守 る</button>
    <div class="tag" style="font-size:12px;opacity:.7;margin-top:2px">指でなぞる＝ぼかし／まとめてぼかすとコンボ</div>
  </div>

  <!-- RESULT -->
  <div class="overlay hidden" id="result">
    <img id="shareImg" alt="result card"/>
    <div class="row">
      <button class="btn" id="shareBtn">シェア / 保存</button>
      <button class="btn ghost" id="againBtn">もう一度</button>
    </div>
  </div>

  <div class="credit">Idea Radar 🏆 ぼかし — t-aka-h.github.io</div>
</div>

<script>
(()=>{
"use strict";
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
const DPR=Math.min(window.devicePixelRatio||1,2.5);
let W=0,H=0,CX=0,CY=0;
function resize(){
  W=window.innerWidth; H=window.innerHeight;
  cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
  CX=W/2; CY=H*0.5;
}
window.addEventListener('resize',resize); resize();

// ---------- AUDIO (WebAudio synth, no files) ----------
let AC=null, master=null;
function audioInit(){
  if(AC) return;
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    master=AC.createGain(); master.gain.value=0.9; master.connect(AC.destination);
  }catch(e){AC=null;}
}
function now(){return AC?AC.currentTime:0;}
// rub noise — short bandpass white noise burst, louder with speed
let lastRub=0;
function sRub(speed){
  if(!AC) return; const t=now(); if(t-lastRub<0.018) return; lastRub=t;
  const dur=0.06; const buf=AC.createBuffer(1,Math.floor(AC.sampleRate*dur),AC.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  const src=AC.createBufferSource(); src.buffer=buf;
  const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1600+Math.min(speed,40)*70; bp.Q.value=0.8;
  const g=AC.createGain(); const v=Math.min(0.05+speed*0.004,0.22);
  g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  src.connect(bp); bp.connect(g); g.connect(master); src.start(t); src.stop(t+dur);
}
// neutralize blip — triangle up-sweep, pitch rises with combo
function sBlip(combo){
  if(!AC) return; const t=now();
  const o=AC.createOscillator(); o.type='triangle';
  const base=520*Math.pow(1.06, Math.min(combo,12));
  o.frequency.setValueAtTime(base,t); o.frequency.exponentialRampToValueAtTime(base*2.2,t+0.12);
  const g=AC.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.16,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+0.18);
}
// hit — groan: 55Hz sine + harmonics (missing fundamental) + low noise + downward pitch
function sHit(){
  if(!AC) return; const t=now();
  [55,110,165,220].forEach((f,i)=>{
    const o=AC.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(f,t); o.frequency.exponentialRampToValueAtTime(f*0.6,t+0.5);
    const g=AC.createGain(); const v=[0.0,0.22,0.16,0.1][i];
    g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.6);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+0.62);
  });
  // breathy groan noise
  const dur=0.45; const buf=AC.createBuffer(1,Math.floor(AC.sampleRate*dur),AC.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
  const src=AC.createBufferSource(); src.buffer=buf;
  const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.setValueAtTime(700,t); lp.frequency.exponentialRampToValueAtTime(180,t+dur);
  const g=AC.createGain(); g.gain.setValueAtTime(0.18,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  src.connect(lp); lp.connect(g); g.connect(master); src.start(t); src.stop(t+dur);
}
function vib(p){ try{navigator.vibrate&&navigator.vibrate(p);}catch(e){} }

// ---------- SPOILER POOL (fictional / generic — spoils nothing real) ----------
const SPOILERS=[
 "89分 劇的ヘディング弾","PK戦の結末は…","まさかの主役が退場","延長後半 決勝点","オウンゴールで悲劇",
 "ロスタイム5分の逆転","エースがハットトリック","守護神が止めた！","無名の交代選手が…","終了間際にVAR判定",
 "最終回 衝撃のラスト","あのキャラが まさかの…","主人公が選んだ相手は","黒幕の正体は","最後に生き残るのは",
 "感動の最終話 まさかの再会","犯人はあの人だった","真のラスボスは仲間","2人はついに結ばれ","伝説の必殺技 解禁",
 "優勝チーム ついに決定","MVPはまさかのあの選手","ドラフト1位指名は","逆転サヨナラ満塁弾","9回裏 大逆転劇"
];

// ---------- STATE ----------
let bubbles=[], particles=[], trail=[];
let state='title'; // title | play | over
let lives=3, wave=1, startT=0, elapsed=0, neutralized=0, maxCombo=0, score=0;
let strokeCombo=0, comboShown=0;
let spawnTimer=0, spawnInterval=1400, baseSpeed=0.9, bubBase=54;
let waveTimer=0;
let shake=0, flash=0; // flash 0..1 red exposure
let stun=0;
let pulse=0;
let pointer={x:0,y:0,px:0,py:0,down:false,speed:0};

const hitR=()=>Math.max(30, Math.min(W,H)*0.085);

function reset(){
  bubbles=[];particles=[];trail=[];
  lives=3;wave=1;elapsed=0;neutralized=0;maxCombo=0;score=0;
  strokeCombo=0;spawnTimer=0;spawnInterval=1400;baseSpeed=0.9;bubBase=Math.max(40,Math.min(W,H)*0.14);
  waveTimer=0;shake=0;flash=0;stun=0;
  startT=performance.now();
}

function spawnBubble(){
  const edge=Math.floor(Math.random()*4);
  let x,y; const m=40;
  if(edge===0){x=Math.random()*W;y=-m;}
  else if(edge===1){x=W+m;y=Math.random()*H;}
  else if(edge===2){x=Math.random()*W;y=H+m;}
  else{x=-m;y=Math.random()*H;}
  // target = eye with jitter
  const tx=CX+(Math.random()*2-1)*hitR()*0.4, ty=CY+(Math.random()*2-1)*hitR()*0.4;
  const ang=Math.atan2(ty-y,tx-x);
  const r=bubBase*(0.8+Math.random()*0.4);
  const txt=SPOILERS[Math.floor(Math.random()*SPOILERS.length)];
  bubbles.push({x,y,ang,r,txt,
    rub:0, rubNeed:r*1.7+18, mosaic:false, dead:false, neut:false,
    sink:0, born:performance.now(),
    seed:Math.random()*1000, color:0 /*0 cyan->1 magenta*/});
}

function addParticles(x,y,col,n,spd){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=spd*(0.3+Math.random());
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col,r:2+Math.random()*3});
  }
}

// ---------- INPUT ----------
function pt(e){
  const t=e.touches?e.touches[0]:e;
  return {x:t.clientX, y:t.clientY};
}
function down(e){
  if(state!=='play') return;
  e.preventDefault();
  const p=pt(e); pointer.x=p.x;pointer.y=p.y;pointer.px=p.x;pointer.py=p.y;pointer.down=true;pointer.speed=0;
  strokeCombo=0; trail.length=0;
}
function move(e){
  if(state!=='play'||!pointer.down) return;
  e.preventDefault();
  const p=pt(e);
  pointer.px=pointer.x;pointer.py=pointer.y;pointer.x=p.x;pointer.y=p.y;
  const dx=pointer.x-pointer.px, dy=pointer.y-pointer.py;
  const d=Math.hypot(dx,dy); pointer.speed=d;
  trail.push({x:p.x,y:p.y,life:1}); if(trail.length>22) trail.shift();
  if(d>1.2) sRub(d);
  // rub bubbles along the segment
  rubAlong(pointer.px,pointer.py,pointer.x,pointer.y,d);
}
function up(e){ pointer.down=false; pointer.speed=0; strokeCombo=0; }

function rubAlong(x0,y0,x1,y1,dist){
  for(const b of bubbles){
    if(b.neut||b.dead) continue;
    // distance from bubble center to segment
    const dd=segDist(b.x,b.y,x0,y0,x1,y1);
    if(dd < b.r+16){
      b.rub += dist+6;
      b.mosaic=true;
      b.color=Math.min(1,b.rub/b.rubNeed);
      if(b.rub>=b.rubNeed){
        b.neut=true; b.sink=0;
        neutralized++; strokeCombo++;
        maxCombo=Math.max(maxCombo,strokeCombo);
        score+=10*strokeCombo;
        sBlip(strokeCombo);
        addParticles(b.x,b.y, strokeCombo>=2?'#FF2D87':'#00E5FF', 10+strokeCombo*3, 3+strokeCombo);
        vib(strokeCombo>=2?[12,8,12]:8);
        if(strokeCombo>=2) showCombo(strokeCombo);
      }
    }
  }
}
function segDist(px,py,x0,y0,x1,y1){
  const vx=x1-x0,vy=y1-y0; const wx=px-x0,wy=py-y0;
  const len=vx*vx+vy*vy; let t= len? (wx*vx+wy*vy)/len : 0; t=Math.max(0,Math.min(1,t));
  const cx=x0+vx*t, cy=y0+vy*t; return Math.hypot(px-cx,py-cy);
}

const comboEl=document.getElementById('combo');
let comboHide=0;
function showCombo(n){
  comboEl.textContent='COMBO ×'+n; comboEl.style.opacity='1'; comboHide=performance.now()+700;
}

cv.addEventListener('touchstart',down,{passive:false});
cv.addEventListener('touchmove',move,{passive:false});
cv.addEventListener('touchend',up,{passive:false});
cv.addEventListener('mousedown',down);
cv.addEventListener('mousemove',move);
window.addEventListener('mouseup',up);

// ---------- UPDATE ----------
function update(dt){
  if(state!=='play') return;
  elapsed=(performance.now()-startT)/1000;
  pulse+=dt*4;
  // wave progression every ~11s
  waveTimer+=dt;
  if(waveTimer>=11){ waveTimer=0; wave++; spawnInterval=Math.max(440,spawnInterval*0.86);
    baseSpeed*=1.12; bubBase=Math.max(Math.min(W,H)*0.075, bubBase*0.93);
    document.getElementById('wave').textContent=wave; }
  // spawn
  if(stun<=0){
    spawnTimer+=dt*1000;
    const need=spawnInterval;
    if(spawnTimer>=need){ spawnTimer=0; spawnBubble(); if(wave>=4&&Math.random()<0.45) spawnBubble(); if(wave>=7&&Math.random()<0.4) spawnBubble(); }
  } else { stun-=dt; }

  const hr=hitR();
  for(const b of bubbles){
    if(b.neut){ b.sink+=dt*2.2; if(b.sink>=1) b.dead=true; continue; }
    // move toward center, accelerate near center
    const dToC=Math.hypot(b.x-CX,b.y-CY);
    const ratio=Math.max(0,Math.min(1,dToC/(Math.max(W,H)*0.6)));
    const sp=(baseSpeed*(1.0+(1-ratio)*1.3))*dt*60;
    b.x+=Math.cos(b.ang)*sp; b.y+=Math.sin(b.ang)*sp;
    // reached eye -> hit (if not neutralized)
    if(dToC < hr+b.r*0.35){
      b.dead=true; onHit(b);
    }
  }
  bubbles=bubbles.filter(b=>!b.dead);
  // particles
  for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vx*=0.94;p.vy*=0.94;p.vy+=0.05; p.life-=dt*1.6; }
  particles=particles.filter(p=>p.life>0);
  for(const t of trail){ t.life-=dt*3; }
  trail=trail.filter(t=>t.life>0);
  if(shake>0) shake=Math.max(0,shake-dt*60);
  if(flash>0) flash=Math.max(0,flash-dt*2.2);
  if(comboHide&&performance.now()>comboHide){ comboEl.style.opacity='0'; comboHide=0; }
}

function onHit(b){
  if(lives<=0) return;
  lives--;
  flash=1; shake=18; stun=0.45;
  sHit(); vib([60,40,90]);
  addParticles(CX,CY,'#EC1A33',26,5);
  document.getElementById('lives').textContent='❤︎'.repeat(lives)+'·'.repeat(3-lives);
  if(lives<=0) gameOver();
}

// ---------- RENDER ----------
function draw(){
  ctx.clearRect(0,0,W,H);
  // bg
  const g=ctx.createRadialGradient(CX,CY,10,CX,CY,Math.max(W,H)*0.75);
  g.addColorStop(0,'#0a0e1c'); g.addColorStop(1,'#05060E');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  let ox=0,oy=0;
  if(shake>0){ ox=(Math.random()*2-1)*shake; oy=(Math.random()*2-1)*shake; }
  ctx.save(); ctx.translate(ox,oy);

  // eye / timeline
  drawEye();

  // bubbles
  for(const b of bubbles) drawBubble(b);

  // particles
  ctx.globalCompositeOperation='lighter';
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';

  // trail
  if(trail.length>1){
    ctx.globalCompositeOperation='lighter';
    for(let i=1;i<trail.length;i++){
      const a=trail[i-1],b=trail[i]; const al=b.life;
      ctx.strokeStyle='rgba(255,45,135,'+(al*0.6)+')'; ctx.lineWidth=14*al; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,'+(al*0.7)+')'; ctx.lineWidth=4*al;
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    }
    ctx.globalCompositeOperation='source-over';
  }
  ctx.restore();

  // red exposure flash
  if(flash>0){
    ctx.fillStyle='rgba(255,255,255,'+(flash*0.5)+')'; ctx.fillRect(0,0,W,H);
    const rg=ctx.createRadialGradient(CX,CY,10,CX,CY,Math.max(W,H)*0.7);
    rg.addColorStop(0,'rgba(236,26,51,'+(flash*0.0)+')'); rg.addColorStop(1,'rgba(236,26,51,'+(flash*0.85)+')');
    ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
  }
}

function drawEye(){
  const hr=hitR();
  const p=(Math.sin(pulse)*0.5+0.5);
  // danger ring
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  for(let i=0;i<3;i++){
    ctx.strokeStyle='rgba(251,191,36,'+(0.16-i*0.04+p*0.06)+')';
    ctx.lineWidth=2; ctx.beginPath(); ctx.arc(CX,CY,hr+8+i*10+p*4,0,7); ctx.stroke();
  }
  // core
  const cg=ctx.createRadialGradient(CX,CY,2,CX,CY,hr);
  cg.addColorStop(0,'rgba(255,236,170,'+(0.9)+')');
  cg.addColorStop(0.5,'rgba(251,191,36,0.45)');
  cg.addColorStop(1,'rgba(251,191,36,0)');
  ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(CX,CY,hr,0,7); ctx.fill();
  // iris
  ctx.fillStyle='rgba(20,12,2,0.85)'; ctx.beginPath(); ctx.arc(CX,CY,hr*0.42,0,7); ctx.fill();
  ctx.fillStyle='rgba(0,229,255,'+(0.5+p*0.4)+')'; ctx.beginPath(); ctx.arc(CX,CY,hr*0.2,0,7); ctx.fill();
  ctx.restore();
  // label
  ctx.fillStyle='rgba(138,147,178,.6)'; ctx.font='600 11px -apple-system,sans-serif';
  ctx.textAlign='center'; ctx.fillText('TIMELINE',CX,CY+hr+24);
}

function roundRect(x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

function drawBubble(b){
  const txt=b.txt;
  ctx.save();
  ctx.font='800 15px -apple-system,"Hiragino Sans",sans-serif';
  const tw=Math.min(W*0.7, ctx.measureText(txt).width+34);
  const bw=tw, bh=46;
  let scale=1, alpha=1;
  if(b.neut){ scale=1-b.sink*0.5; alpha=1-b.sink; }
  ctx.globalAlpha=alpha;
  ctx.translate(b.x,b.y); ctx.scale(scale,scale);
  const col = b.neut ? '#5a6070' : (b.color>0?lerpC(0,229,255, 255,45,135, b.color):'#00E5FF');
  // glow
  ctx.shadowColor=col; ctx.shadowBlur=b.neut?4:16;
  ctx.fillStyle='rgba(8,12,24,0.92)';
  roundRect(-bw/2,-bh/2,bw,bh,12); ctx.fill();
  ctx.shadowBlur=0;
  ctx.lineWidth=2; ctx.strokeStyle=col; roundRect(-bw/2,-bh/2,bw,bh,12); ctx.stroke();
  // content
  if(b.neut){
    ctx.fillStyle='rgba(140,150,180,.5)'; ctx.font='800 16px -apple-system,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('✓ ぼかし完了',0,0);
  } else if(b.mosaic){
    // mosaic blocks
    const cols=Math.floor(bw/9), rows=4; const cw=bw/cols, ch=(bh-12)/rows;
    let s=b.seed;
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
      s=(s*9301+49297)%233280; const rnd=s/233280;
      const t=b.color;
      const cr=Math.floor(lerp(0,255,t*rnd)), cg2=Math.floor(lerp(160,45,t)), cb=Math.floor(lerp(255,135,t));
      ctx.fillStyle='rgba('+cr+','+cg2+','+cb+','+(0.55+rnd*0.4)+')';
      ctx.fillRect(-bw/2+4+c*cw, -bh/2+6+r*ch, cw-1, ch-1);
    }
  } else {
    ctx.fillStyle='#bdf3ff'; ctx.font='800 15px -apple-system,"Hiragino Sans",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(txt,0,0);
  }
  ctx.restore();
}
function lerp(a,b,t){return a+(b-a)*t;}
function lerpC(r1,g1,b1,r2,g2,b2,t){return 'rgb('+Math.round(lerp(r1,r2,t))+','+Math.round(lerp(g1,g2,t))+','+Math.round(lerp(b1,b2,t))+')';}

// ---------- HUD ----------
function hudUpdate(){
  if(state!=='play') return;
  document.getElementById('timer').textContent=elapsed.toFixed(1);
}

// ---------- LOOP ----------
let last=performance.now();
function loop(t){
  let dt=(t-last)/1000; last=t; if(dt>0.05)dt=0.05;
  update(dt); draw(); hudUpdate();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ---------- FLOW ----------
const titleEl=document.getElementById('title'), resultEl=document.getElementById('result'), hudEl=document.getElementById('hud');
function startGame(){
  audioInit(); if(AC&&AC.state==='suspended') AC.resume();
  reset(); state='play';
  titleEl.classList.add('hidden'); resultEl.classList.add('hidden'); hudEl.classList.remove('hidden');
  document.getElementById('lives').textContent='❤︎❤︎❤︎';
  document.getElementById('wave').textContent='1';
  vib(10);
}
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('againBtn').addEventListener('click',startGame);

function gameOver(){
  state='over';
  bubbles=[]; trail=[];
  setTimeout(()=>{
    hudEl.classList.add('hidden');
    buildCard();
    resultEl.classList.remove('hidden');
  },650);
}

// ---------- SHARE CARD (9:16) ----------
let cardBlob=null;
function buildCard(){
  const c=document.createElement('canvas'); c.width=1080;c.height=1920; const x=c.getContext('2d');
  // bg
  const g=x.createRadialGradient(540,720,40,540,720,1300);
  g.addColorStop(0,'#0b1124'); g.addColorStop(1,'#05060E'); x.fillStyle=g; x.fillRect(0,0,1080,1920);
  // scattered mosaic decor
  for(let i=0;i<70;i++){
    const bx=Math.random()*1080, by=Math.random()*1920, s=10+Math.random()*30;
    x.fillStyle=Math.random()<0.5?'rgba(0,229,255,'+(0.04+Math.random()*0.1)+')':'rgba(255,45,135,'+(0.04+Math.random()*0.1)+')';
    x.fillRect(bx,by,s,s);
  }
  // logo
  x.textAlign='center';
  x.save(); x.translate(540,300);
  x.font='900 italic 132px -apple-system,"Hiragino Sans",sans-serif';
  const lg=x.createLinearGradient(-300,-60,300,60); lg.addColorStop(0,'#ffffff');lg.addColorStop(.55,'#00E5FF');lg.addColorStop(1,'#FF2D87');
  x.fillStyle=lg; x.shadowColor='rgba(0,229,255,.4)';x.shadowBlur=40; x.fillText('BOKASHI',0,0);
  x.restore();
  x.shadowBlur=0; x.fillStyle='#FBBF24'; x.font='800 34px -apple-system,sans-serif'; x.fillText('ぼ　か　し',540,360);

  // label
  x.fillStyle='#8A93B2'; x.font='700 38px -apple-system,sans-serif'; x.fillText('ノーネタバレ生存時間',540,640);
  // big time
  x.save(); x.shadowColor='rgba(251,191,36,.5)';x.shadowBlur=50;
  x.fillStyle='#FBBF24'; x.font='900 italic 260px -apple-system,sans-serif';
  x.fillText(elapsed.toFixed(1),540,860); x.restore();
  x.fillStyle='#8A93B2'; x.font='800 44px -apple-system,sans-serif'; x.fillText('秒',540,930);

  // stats row
  x.fillStyle='rgba(255,255,255,.05)'; roundRectX(x,140,1020,800,200,28); x.fill();
  x.strokeStyle='rgba(255,45,135,.35)';x.lineWidth=2; roundRectX(x,140,1020,800,200,28); x.stroke();
  drawStat(x, 340,1090, neutralized, 'ぼかした数', '#00E5FF');
  drawStat(x, 740,1090, '×'+maxCombo, '最大コンボ', '#FF2D87');

  // verdict line
  let verdict = elapsed<10?'…一瞬で割れた':(elapsed<25?'まだ見てない、はず':(elapsed<45?'結果を死守！':'ネタバレ完全防御の達人'));
  x.fillStyle='#E8EEFF'; x.font='800 46px -apple-system,sans-serif'; x.fillText(verdict,540,1400);

  // mosaic strip
  for(let i=0;i<24;i++){ x.fillStyle=i%2?'#0e1430':'#142046'; x.fillRect(120+i*36,1500,34,34); }
  x.fillStyle='rgba(0,229,255,.18)'; x.fillRect(120,1500,864,34);

  // footer
  x.fillStyle='#8A93B2'; x.font='600 30px -apple-system,sans-serif';
  x.fillText('見る前に、こすって消せ。',540,1700);
  x.fillStyle='#5b6373'; x.font='600 26px -apple-system,sans-serif';
  x.fillText('Idea Radar 🏆 — t-aka-h.github.io/idea-radar/bokashi',540,1840);

  const url=c.toDataURL('image/png');
  document.getElementById('shareImg').src=url;
  c.toBlob(b=>{cardBlob=b;}, 'image/png');
}
function roundRectX(x,px,py,w,h,r){ x.beginPath();x.moveTo(px+r,py);x.arcTo(px+w,py,px+w,py+h,r);x.arcTo(px+w,py+h,px,py+h,r);x.arcTo(px,py+h,px,py,r);x.arcTo(px,py,px+w,py,r);x.closePath(); }
function drawStat(x,cx,cy,val,lbl,col){
  x.textAlign='center'; x.fillStyle=col; x.font='900 italic 92px -apple-system,sans-serif';
  x.shadowColor=col;x.shadowBlur=24; x.fillText(''+val,cx,cy+40); x.shadowBlur=0;
  x.fillStyle='#8A93B2'; x.font='700 30px -apple-system,sans-serif'; x.fillText(lbl,cx,cy+90);
}

document.getElementById('shareBtn').addEventListener('click',async()=>{
  vib(12);
  try{
    if(cardBlob && navigator.canShare){
      const file=new File([cardBlob],'bokashi.png',{type:'image/png'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:'BOKASHI ぼかし',text:'ノーネタバレ生存 '+elapsed.toFixed(1)+'秒！ #ぼかし'});
        return;
      }
    }
  }catch(e){}
  // fallback download
  const a=document.createElement('a'); a.href=document.getElementById('shareImg').src; a.download='bokashi_'+elapsed.toFixed(1)+'s.png'; a.click();
});

// prevent scroll/zoom gestures
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('dblclick',e=>e.preventDefault());
})();
</script>
