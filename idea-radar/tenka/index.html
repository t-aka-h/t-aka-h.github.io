<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#06060A">
<title>転嫁 Ten'ka — 値上げを、ここで止めろ</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#06060A;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Segoe UI',sans-serif;color:#eef1f8;touch-action:none;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#05050a;}
  canvas{display:block;touch-action:none;}
  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;z-index:10;
    background:radial-gradient(120% 80% at 50% 18%,#0d1020 0%,#06060a 70%);}
  .hide{display:none!important;}
  .logo{font-size:13vw;font-weight:900;letter-spacing:2px;line-height:1;
    background:linear-gradient(180deg,#fff,#ff5d7e 60%,#ff2d55);-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 38px rgba(255,45,85,.45);}
  .romaji{font-size:5vw;font-weight:800;letter-spacing:6px;color:#ff8aa0;margin-top:4px;}
  .tag{font-size:3.7vw;color:#aeb6cf;line-height:1.85;margin:22px 8px 6px;max-width:560px;}
  .tag b{color:#ff5d7e;}
  .num{color:#fbbf24;font-weight:800;}
  .gates{display:flex;gap:9px;margin:18px 0 6px;flex-wrap:wrap;justify-content:center;}
  .chip{font-size:3.1vw;font-weight:800;padding:6px 13px;border-radius:999px;border:1.5px solid;background:rgba(255,255,255,.03);}
  .btn{margin-top:26px;font-size:5.4vw;font-weight:900;letter-spacing:3px;padding:17px 52px;border:none;border-radius:999px;color:#0a0a12;cursor:pointer;
    background:linear-gradient(180deg,#ff7d96,#ff2d55);box-shadow:0 0 34px rgba(255,45,85,.6),inset 0 1px 0 rgba(255,255,255,.4);}
  .btn:active{transform:scale(.96);}
  .how{font-size:3.1vw;color:#6f7796;margin-top:20px;line-height:1.9;max-width:500px;}
  .src{font-size:2.6vw;color:#525a78;margin-top:18px;line-height:1.7;}
  /* result */
  .rcard{width:min(74vw,300px);border-radius:20px;box-shadow:0 14px 50px rgba(0,0,0,.6);margin-bottom:4px;}
  .rrow{display:flex;gap:12px;margin-top:18px;}
  .btn2{font-size:4vw;font-weight:800;letter-spacing:1px;padding:13px 26px;border-radius:999px;border:1.5px solid #2a3350;background:#10142200;color:#cfd6ee;cursor:pointer;}
  .btn2.primary{background:linear-gradient(180deg,#ff7d96,#ff2d55);border:none;color:#0a0a12;box-shadow:0 0 26px rgba(255,45,85,.5);}
  .btn2:active{transform:scale(.95);}
  .credit{position:fixed;bottom:7px;left:0;right:0;text-align:center;font-size:2.5vw;color:#3a4060;z-index:5;pointer-events:none;}
</style>
</head>
<body>
<div id="stage"><canvas id="game"></canvas></div>

<!-- TITLE -->
<div class="overlay" id="title">
  <div class="logo">転嫁</div>
  <div class="romaji">TEN'KA</div>
  <div class="tag">2026年6月、食品値上げ<span class="num">559品目</span>。<br>原材料費の高騰が<b>包装→人件費→物流</b>と連鎖して<br>店頭価格に<b>転嫁</b>される——その前に、<b>止めろ。</b></div>
  <div class="gates">
    <span class="chip" style="color:#22d3ee;border-color:#22d3ee">包装</span>
    <span class="chip" style="color:#34d399;border-color:#34d399">人件費</span>
    <span class="chip" style="color:#fbbf24;border-color:#fbbf24">物流</span>
  </div>
  <button class="btn" id="startBtn">家計を守る</button>
  <div class="how">落ちてくる<b style="color:#ff5d7e">赤い高騰スパイク</b>を、<br>各ゲートを通る一瞬に<b>タップ</b>して吸収。<br>店頭価格に届かせるな。</div>
  <div class="src">発想元: Euromonitor 2026「Beyond Affordability」／2026年6月 値上げ559品目（原材料99.9%・包装81.3%・人件費66%・物流61.8%）</div>
</div>

<!-- RESULT -->
<div class="overlay hide" id="result">
  <canvas class="rcard" id="rcard" width="540" height="960"></canvas>
  <div class="rrow">
    <button class="btn2 primary" id="shareBtn">シェア</button>
    <button class="btn2" id="againBtn">もう一度</button>
  </div>
</div>

<div class="credit">Idea Radar · 転嫁 Ten'ka — 単一HTML / Canvas+WebAudio+Vibration · 完全オンデバイス</div>

<script>
(function(){
"use strict";
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1,U=1; // U = scale unit relative to 800px height
function resize(){
  const r=document.getElementById('stage').getBoundingClientRect();
  // portrait-first: clamp width to a phone-ish aspect
  let w=r.width, h=r.height;
  const maxW=Math.min(w, h*0.62);
  W=maxW; H=h;
  DPR=Math.min(window.devicePixelRatio||1,2.5);
  cv.style.width=W+'px'; cv.style.height=H+'px';
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  U=H/800;
}
window.addEventListener('resize',resize); resize();

/* ---------- AUDIO (WebAudio, missing-fundamental bass, no assets) ---------- */
let AC=null;
function audio(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } if(AC&&AC.state==='suspended')AC.resume(); return AC; }
function noiseBuf(d){ const ac=audio(); const n=Math.floor(ac.sampleRate*d); const b=ac.createBuffer(1,n,ac.sampleRate); const ch=b.getChannelData(0); for(let i=0;i<n;i++)ch[i]=(Math.random()*2-1); return b; }
function env(g,t,a,d,pk){ g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(pk,t+a); g.gain.exponentialRampToValueAtTime(0.0001,t+a+d); }
// absorb success: gate-specific pitch + missing fundamental bass + tick
function sAbsorb(gate,combo){
  const ac=audio(); if(!ac)return; const t=ac.currentTime;
  const base=[330,392,466][gate]||330; // gate timbre
  const mul=1+Math.min(combo,12)*0.03;
  // bright tick
  const o=ac.createOscillator(),g=ac.createGain(); o.type='triangle'; o.frequency.setValueAtTime(base*2*mul,t);
  o.frequency.exponentialRampToValueAtTime(base*0.6*mul,t+0.10); env(g,t,0.005,0.12,0.20); o.connect(g).connect(ac.destination); o.start(t); o.stop(t+0.16);
  // missing-fundamental bass: 110/165/220 harmonics of 55
  [110,165,220].forEach((f,i)=>{ const b=ac.createOscillator(),bg=ac.createGain(); b.type='sine'; b.frequency.setValueAtTime(f*mul,t); env(bg,t,0.01,0.20,0.14/(i+1)); b.connect(bg).connect(ac.destination); b.start(t); b.stop(t+0.26); });
  // noise sweep tick
  const nb=ac.createBufferSource(); nb.buffer=noiseBuf(0.05); const nf=ac.createBiquadFilter(); nf.type='bandpass'; nf.frequency.setValueAtTime(2200,t); nf.frequency.exponentialRampToValueAtTime(500,t+0.05); const ng=ac.createGain(); env(ng,t,0.002,0.05,0.16); nb.connect(nf).connect(ng).connect(ac.destination); nb.start(t); nb.stop(t+0.07);
}
function sPerfect(gate,combo){ sAbsorb(gate,combo); const ac=audio(); if(!ac)return; const t=ac.currentTime; const o=ac.createOscillator(),g=ac.createGain(); o.type='sine'; o.frequency.setValueAtTime(880,t); o.frequency.exponentialRampToValueAtTime(1320,t+0.09); env(g,t,0.004,0.10,0.10); o.connect(g).connect(ac.destination); o.start(t); o.stop(t+0.14); }
// fail: 値上げ発火, 40Hz buzz + down sweep
function sFail(){ const ac=audio(); if(!ac)return; const t=ac.currentTime;
  const o=ac.createOscillator(),g=ac.createGain(); o.type='sawtooth'; o.frequency.setValueAtTime(220,t); o.frequency.exponentialRampToValueAtTime(70,t+0.34); env(g,t,0.01,0.40,0.26); o.connect(g).connect(ac.destination); o.start(t); o.stop(t+0.46);
  const b=ac.createOscillator(),bg=ac.createGain(); b.type='square'; b.frequency.setValueAtTime(44,t); env(bg,t,0.01,0.42,0.18); b.connect(bg).connect(ac.destination); b.start(t); b.stop(t+0.46);
}
function sDie(){ const ac=audio(); if(!ac)return; const t=ac.currentTime; [220,330,440,55].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type=i===3?'sine':'triangle';o.frequency.setValueAtTime(f,t);env(g,t,0.006,0.30,i===3?0.18:0.08);o.connect(g).connect(ac.destination);o.start(t);o.stop(t+0.34);}); }
function sStart(){ const ac=audio(); if(!ac)return; const t=ac.currentTime; [196,262,330].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(f,t+i*0.06);env(g,t+i*0.06,0.01,0.18,0.12);o.connect(g).connect(ac.destination);o.start(t+i*0.06);o.stop(t+i*0.06+0.22);}); }
function vibe(p){ if(navigator.vibrate){try{navigator.vibrate(p);}catch(e){}} }

/* ---------- GAME ---------- */
const GATES=[
  {name:'包装', color:'#22d3ee', rgb:[34,211,238], yf:0.40},
  {name:'人件費', color:'#34d399', rgb:[52,211,153], yf:0.56},
  {name:'物流', color:'#fbbf24', rgb:[251,191,36], yf:0.72},
];
const BARRIER_YF=0.865, SPAWN_YF=0.135;
let state='title';
let spikes=[],parts=[],floats=[];
let kakei=100, score=0, combo=0, maxCombo=0, wave=1;
let absorbedHeat=0, totalHeat=0, defended=0, leaked=0;
let spawnT=0, waveT=0, shake=0, flash=0, flashCol=[255,45,85], elapsed=0;
let sid=0, last=0, running=false;

function pipeX(){ return W*0.5; }
function pipeW(){ return Math.min(W*0.46, 210*U); }

function reset(){
  spikes=[];parts=[];floats=[];kakei=100;score=0;combo=0;maxCombo=0;wave=1;
  absorbedHeat=0;totalHeat=0;defended=0;leaked=0;spawnT=0.6;waveT=0;shake=0;flash=0;elapsed=0;sid=0;
}
function spawnRules(){
  // anti-frustration: concurrency + spacing
  const maxConc = wave<3?1 : wave<5?2 : 3;
  if(spikes.length>=maxConc) return false;
  // require vertical spacing so spikes are reachable in turn
  const minGap = H*0.22;
  const spawnY = H*SPAWN_YF;
  for(const s of spikes){ if(s.y - spawnY < minGap) return false; }
  return true;
}
function spawn(){
  const px=pipeX(), pw=pipeW();
  spikes.push({ id:sid++, x:px, y:H*SPAWN_YF, heat:1.0, r:0,
    vy:(108+wave*20)*U, absorbed:[false,false,false], dead:false, trail:[], wob:Math.random()*6.28 });
}
function nearestGate(ty){ let bi=0,bd=1e9; for(let i=0;i<GATES.length;i++){const gy=H*GATES[i].yf; const d=Math.abs(gy-ty); if(d<bd){bd=d;bi=i;}} return bi; }

function tapAt(ty){
  if(state!=='playing')return;
  const gi=nearestGate(ty);
  const gy=H*GATES[gi].yf;
  const perfectHalf=34*U, goodHalf=78*U;
  // find closest spike in this gate window not yet absorbed at this gate
  let best=null,bd=1e9;
  for(const s of spikes){ if(s.dead||s.absorbed[gi])continue; const d=Math.abs(s.y-gy); if(d<goodHalf && d<bd){bd=d;best=s;} }
  if(!best){ // miss tap: tiny combo nudge down? keep flow, no penalty
    spawnRipple(pipeX(), gy, GATES[gi].rgb, 0.4); return; }
  best.absorbed[gi]=true;
  const perfect = bd<perfectHalf;
  const factor = perfect?0.62:0.80;
  const removed = best.heat*(1-factor);
  best.heat*=factor;
  combo++; if(combo>maxCombo)maxCombo=combo;
  score += Math.round((perfect?120:60)*Math.max(1,combo*0.5+0.5));
  // fx
  burst(best.x,gy,GATES[gi].rgb, perfect?16:10, perfect?3.4:2.4);
  gatePulse[gi]=1;
  floats.push({x:best.x,y:gy,txt:perfect?'PERFECT':'GOOD',col:perfect?'#ffffff':GATES[gi].color,life:1,vy:-1.1*U});
  if(perfect){sPerfect(gi,combo);vibe(12);}else{sAbsorb(gi,combo);vibe(8);}
  // fully neutralized?
  if(best.absorbed[0]&&best.absorbed[1]&&best.absorbed[2]){
    best.dead=true; defended++; absorbedHeat+= (1-best.heat); totalHeat+=1;
    score+=220; sDie(); vibe([10,18,26]);
    burst(best.x,best.y,[255,255,255],26,4.6);
    floats.push({x:best.x,y:best.y,txt:'吸収完了 +220',col:'#7af0c8',life:1.2,vy:-1.3*U});
  }
}
let gatePulse=[0,0,0];

function leak(s){
  // spike reached store price barrier with remaining heat
  s.dead=true; absorbedHeat+=(1-s.heat); totalHeat+=1; leaked++;
  const dmg=Math.max(4,Math.round(s.heat*32));
  kakei-=dmg; combo=0;
  flash=1; flashCol=[255,45,85]; shake=Math.min(16,8+dmg*0.3);
  sFail(); vibe([30,22,34]);
  burst(s.x,H*BARRIER_YF,[255,45,85],22,4.2);
  floats.push({x:s.x,y:H*BARRIER_YF-20*U,txt:'値上げ -'+dmg,col:'#ff5d7e',life:1.3,vy:-1.2*U});
  if(kakei<=0){ kakei=0; gameOver(); }
}

function burst(x,y,rgb,n,sp){
  for(let i=0;i<n;i++){ const a=Math.random()*6.28, v=(0.5+Math.random())*sp*U*60;
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:0.5+Math.random()*0.4,t:0,rgb,sz:(1.5+Math.random()*2.5)*U}); }
}
function spawnRipple(x,y,rgb,s){ for(let i=0;i<5;i++){const a=Math.random()*6.28,v=Math.random()*40*U*s; parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:0.3,t:0,rgb,sz:1.4*U});} }

function update(dt){
  elapsed+=dt;
  // waves
  waveT+=dt; if(waveT>8){ waveT=0; wave++; }
  // spawn
  spawnT-=dt;
  if(spawnT<=0){ const base=Math.max(0.85, 2.2-wave*0.16); if(spawnRules()){ spawn(); spawnT=base*(0.85+Math.random()*0.3);} else spawnT=0.15; }
  // spikes
  const by=H*BARRIER_YF;
  for(const s of spikes){
    if(s.dead)continue;
    s.y+=s.vy*dt; s.wob+=dt*7;
    s.r = (s.heat)*pipeW()*0.34 + 6*U;
    s.trail.push({x:s.x,y:s.y}); if(s.trail.length>7)s.trail.shift();
    if(s.y>=by){ leak(s); }
  }
  // dead spikes have already burst; remove them
  spikes=spikes.filter(s=>!s.dead);
  // particles
  for(const p of parts){ p.t+=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=240*U*dt; }
  parts=parts.filter(p=>p.t<p.life);
  for(const f of floats){ f.life-=dt*1.3; f.y+=f.vy; }
  floats=floats.filter(f=>f.life>0);
  for(let i=0;i<3;i++) gatePulse[i]=Math.max(0,gatePulse[i]-dt*3.2);
  shake*=Math.pow(0.001,dt); if(shake<0.3)shake=0;
  flash=Math.max(0,flash-dt*2.2);
}

function rr(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function draw(){
  ctx.save();
  if(shake>0){ ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake); }
  // bg
  const g=ctx.createRadialGradient(W*0.5,H*0.2,0,W*0.5,H*0.2,H*0.9);
  g.addColorStop(0,'#0c0e1a'); g.addColorStop(1,'#06060a');
  ctx.fillStyle=g; ctx.fillRect(-30,-30,W+60,H+60);

  const px=pipeX(), pw=pipeW();
  // pipe
  ctx.fillStyle='#11141f';
  rr(ctx,px-pw/2,H*0.10,pw,H*0.80,18*U); ctx.fill();
  ctx.strokeStyle='rgba(120,140,190,.18)'; ctx.lineWidth=2*U; ctx.stroke();
  // raw-material source label (top)
  ctx.globalCompositeOperation='lighter';
  const sg=ctx.createLinearGradient(0,H*0.10,0,H*0.16); sg.addColorStop(0,'rgba(255,45,85,.5)'); sg.addColorStop(1,'rgba(255,45,85,0)');
  ctx.fillStyle=sg; rr(ctx,px-pw/2,H*0.10,pw,H*0.06,18*U); ctx.fill();
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='#ff7d96'; ctx.font=`900 ${13*U}px sans-serif`; ctx.textAlign='center';
  ctx.fillText('原材料 ▼ 高騰', px, H*0.085);

  // gates
  for(let i=0;i<GATES.length;i++){
    const G=GATES[i], gy=H*G.yf; const pulse=gatePulse[i];
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const a=0.22+pulse*0.5;
    ctx.fillStyle=`rgba(${G.rgb[0]},${G.rgb[1]},${G.rgb[2]},${a})`;
    const gh=(20+pulse*16)*U;
    rr(ctx,px-pw/2,gy-gh/2,pw,gh,8*U); ctx.fill();
    ctx.restore();
    ctx.strokeStyle=G.color; ctx.globalAlpha=0.5+pulse*0.5; ctx.lineWidth=(2+pulse*3)*U;
    ctx.beginPath(); ctx.moveTo(px-pw/2,gy); ctx.lineTo(px+pw/2,gy); ctx.stroke(); ctx.globalAlpha=1;
    ctx.fillStyle=G.color; ctx.font=`800 ${12*U}px sans-serif`; ctx.textAlign='left';
    ctx.fillText(G.name, px-pw/2+8*U, gy-gh/2-5*U);
  }
  // barrier (store price)
  const by=H*BARRIER_YF;
  ctx.save(); ctx.globalCompositeOperation='lighter';
  const bg=ctx.createLinearGradient(0,by,0,by+30*U); bg.addColorStop(0,'rgba(255,45,85,.55)'); bg.addColorStop(1,'rgba(255,45,85,0)');
  ctx.fillStyle=bg; ctx.fillRect(px-pw/2,by,pw,30*U); ctx.restore();
  ctx.strokeStyle='#ff2d55'; ctx.lineWidth=3*U; ctx.beginPath(); ctx.moveTo(px-pw/2,by); ctx.lineTo(px+pw/2,by); ctx.stroke();
  ctx.fillStyle='#ff8aa0'; ctx.font=`800 ${12*U}px sans-serif`; ctx.textAlign='center';
  ctx.fillText('店頭価格 ▲ 値上げ', px, by+20*U);

  // spikes
  ctx.globalCompositeOperation='lighter';
  for(const s of spikes){
    // trail
    for(let i=0;i<s.trail.length;i++){ const tp=s.trail[i],al=(i/s.trail.length)*0.25;
      ctx.fillStyle=`rgba(255,45,85,${al})`; ctx.beginPath(); ctx.arc(tp.x,tp.y,s.r*0.7,0,6.28); ctx.fill(); }
    const wobx=Math.sin(s.wob)*3*U;
    const grd=ctx.createRadialGradient(s.x+wobx,s.y,0,s.x+wobx,s.y,s.r*1.6);
    grd.addColorStop(0,'rgba(255,210,220,.95)'); grd.addColorStop(0.4,'rgba(255,45,85,.9)'); grd.addColorStop(1,'rgba(255,45,85,0)');
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(s.x+wobx,s.y,s.r*1.6,0,6.28); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s.x+wobx,s.y,s.r*0.4,0,6.28); ctx.fill();
  }
  // particles
  for(const p of parts){ const al=1-p.t/p.life; ctx.fillStyle=`rgba(${p.rgb[0]},${p.rgb[1]},${p.rgb[2]},${al})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*al,0,6.28); ctx.fill(); }
  ctx.globalCompositeOperation='source-over';
  // floats
  for(const f of floats){ ctx.globalAlpha=Math.min(1,f.life); ctx.fillStyle=f.col; ctx.font=`900 ${13*U}px sans-serif`; ctx.textAlign='center';
    ctx.fillText(f.txt,f.x,f.y); ctx.globalAlpha=1; }

  // HUD
  drawHUD();
  ctx.restore();
  // flash
  if(flash>0){ ctx.fillStyle=`rgba(${flashCol[0]},${flashCol[1]},${flashCol[2]},${flash*0.4})`; ctx.fillRect(0,0,W,H); }
}

function drawHUD(){
  ctx.textAlign='left';
  // kakei meter
  const mx=14*U,my=20*U,mw=W-28*U,mh=14*U;
  ctx.fillStyle='rgba(255,255,255,.08)'; rr(ctx,mx,my,mw,mh,7*U); ctx.fill();
  const kc = kakei>50?[52,211,153]:kakei>25?[251,191,36]:[255,45,85];
  ctx.fillStyle=`rgb(${kc[0]},${kc[1]},${kc[2]})`; rr(ctx,mx,my,mw*kakei/100,mh,7*U); ctx.fill();
  ctx.fillStyle='#cfd6ee'; ctx.font=`800 ${11*U}px sans-serif`;
  ctx.fillText('家計 '+Math.ceil(kakei), mx+4*U, my+mh+13*U);
  // score / wave
  ctx.textAlign='right'; ctx.fillStyle='#fff'; ctx.font=`900 ${22*U}px sans-serif`;
  ctx.fillText(score.toLocaleString(), W-14*U, my+mh+16*U);
  ctx.fillStyle='#8b93b3'; ctx.font=`700 ${10*U}px sans-serif`;
  ctx.fillText('WAVE '+wave, W-14*U, my+mh+30*U);
  // combo
  if(combo>1){ ctx.textAlign='center'; ctx.fillStyle='#fbbf24'; ctx.font=`900 ${16*U}px sans-serif`;
    ctx.fillText('COMBO ×'+combo, W*0.5, my+mh+30*U); }
}

function loop(ts){
  if(!running)return;
  if(!last)last=ts; let dt=(ts-last)/1000; last=ts; if(dt>0.05)dt=0.05;
  if(state==='playing') update(dt);
  draw();
  requestAnimationFrame(loop);
}

/* ---------- FLOW ---------- */
function startGame(){
  audio(); sStart(); reset(); state='playing';
  document.getElementById('title').classList.add('hide');
  document.getElementById('result').classList.add('hide');
  if(!running){ running=true; last=0; requestAnimationFrame(loop); }
}
function gameOver(){
  state='over';
  setTimeout(()=>{ buildCard(); document.getElementById('result').classList.remove('hide'); }, 420);
}

function rateOf(){
  const rate = totalHeat>0 ? absorbedHeat/totalHeat : 0;
  return rate;
}
function rankOf(rate){
  // max achievable absorption ≈ 0.76 (3 gates × PERFECT), tuned thresholds
  if(rate>=0.72)return['SS','#ff5d7e','値上げを跳ね返す家計の砦'];
  if(rate>=0.62)return['S','#fbbf24','転嫁を許さぬ防衛の達人'];
  if(rate>=0.50)return['A','#34d399','賢い家計のやりくり名人'];
  if(rate>=0.36)return['B','#22d3ee','まずまずの節約戦士'];
  if(rate>=0.20)return['C','#9aa4c8','値上げに揉まれる日々'];
  return['D','#6f7796','家計、火の車'];
}

const rcard=document.getElementById('rcard'), rx=rcard.getContext('2d');
function buildCard(){
  const w=540,h=960; const c=rx;
  const rate=rateOf(); const[rank,rcol,rmsg]=rankOf(rate);
  // bg
  const g=c.createLinearGradient(0,0,0,h); g.addColorStop(0,'#0c0e1a'); g.addColorStop(1,'#06060a');
  c.fillStyle=g; c.fillRect(0,0,w,h);
  // border glow
  c.strokeStyle=rcol; c.lineWidth=4; c.globalAlpha=.5; rrC(c,16,16,w-32,h-32,26); c.stroke(); c.globalAlpha=1;
  // header
  c.textAlign='center'; c.fillStyle='#ff7d96'; c.font='900 30px sans-serif'; c.fillText('転嫁  TEN\'KA',w/2,74);
  c.fillStyle='#8b93b3'; c.font='700 17px sans-serif'; c.fillText('値上げを、ここで止めた',w/2,104);
  // rank big
  c.save(); c.shadowColor=rcol; c.shadowBlur=44; c.fillStyle=rcol; c.font='900 200px sans-serif'; c.fillText(rank,w/2,330); c.restore();
  c.fillStyle='#cfd6ee'; c.font='800 22px sans-serif'; c.fillText(rmsg,w/2,378);
  // pipe mini visual
  drawMiniPipe(c,w/2,430,170,rate,rcol);
  // stats
  const sy=660;
  statRow(c,'吸収率', Math.round(rate*100)+'%', rcol, sy);
  statRow(c,'最大コンボ', '×'+maxCombo, '#fbbf24', sy+58);
  statRow(c,'到達ウェーブ', 'WAVE '+wave, '#22d3ee', sy+116);
  statRow(c,'転嫁を止めた', defended+' 件', '#34d399', sy+174);
  // footer
  c.fillStyle='#ff8aa0'; c.font='800 20px sans-serif'; c.fillText('559品目の値上げから家計を守った',w/2,892);
  c.fillStyle='#525a78'; c.font='600 14px sans-serif'; c.fillText('Idea Radar · 転嫁 Ten\'ka',w/2,920);
}
function rrC(c,x,y,w,h,r){ c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath(); }
function statRow(c,label,val,col,y){
  c.textAlign='left'; c.fillStyle='#8b93b3'; c.font='700 19px sans-serif'; c.fillText(label,60,y);
  c.textAlign='right'; c.fillStyle=col; c.font='900 26px sans-serif'; c.fillText(val,w_-60,y);
  c.textAlign='center'; c.strokeStyle='rgba(255,255,255,.07)'; c.lineWidth=1; c.beginPath(); c.moveTo(60,y+16); c.lineTo(w_-60,y+16); c.stroke();
}
let w_=540;
function drawMiniPipe(c,cx,cy,len,rate,col){
  c.strokeStyle='rgba(120,140,190,.25)'; c.lineWidth=44; c.lineCap='round';
  c.beginPath(); c.moveTo(cx,cy); c.lineTo(cx,cy+len); c.stroke();
  c.strokeStyle=col; c.globalAlpha=.85; c.lineWidth=44; c.beginPath(); c.moveTo(cx,cy); c.lineTo(cx,cy+len*rate); c.stroke(); c.globalAlpha=1;
  c.lineCap='butt';
  ['#22d3ee','#34d399','#fbbf24'].forEach((gc,i)=>{ const gy=cy+len*(0.3+i*0.25); c.strokeStyle=gc; c.lineWidth=5; c.beginPath(); c.moveTo(cx-28,gy); c.lineTo(cx+28,gy); c.stroke(); });
}

/* ---------- INPUT ---------- */
function pointerY(e){
  const rect=cv.getBoundingClientRect();
  const cy=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
  return cy;
}
function handleTaps(e){
  if(state!=='playing')return;
  e.preventDefault();
  if(e.touches){ for(let i=0;i<e.changedTouches.length;i++){ const t=e.changedTouches[i]; const rect=cv.getBoundingClientRect(); tapAt(t.clientY-rect.top); } }
  else { tapAt(pointerY(e)); }
}
cv.addEventListener('touchstart',handleTaps,{passive:false});
cv.addEventListener('mousedown',handleTaps);

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('againBtn').addEventListener('click',startGame);
document.getElementById('shareBtn').addEventListener('click',async()=>{
  const rate=rateOf(); const[rank]=rankOf(rate);
  const txt=`転嫁 Ten'ka — 559品目の値上げから家計を守った！\n家計防衛ランク ${rank}（吸収率${Math.round(rate*100)}%）\n#転嫁 #Tenka #IdeaRadar`;
  try{
    const blob=await new Promise(r=>rcard.toBlob(r,'image/png'));
    const file=new File([blob],'tenka.png',{type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file],text:txt}); return;
    }
    if(navigator.share){ await navigator.share({text:txt}); return; }
    // fallback download
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='tenka.png'; a.click();
  }catch(err){ /* user canceled */ }
});

// idle title render
function idle(){ if(state==='title'){ const g=ctx.createRadialGradient(W*.5,H*.2,0,W*.5,H*.2,H*.9); g.addColorStop(0,'#0c0e1a');g.addColorStop(1,'#06060a'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); } if(state==='title')requestAnimationFrame(idle); }
idle();
})();
</script>
