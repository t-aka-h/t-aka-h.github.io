<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>堂々巡り — Dōdōmeguri</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#06030d;
    font-family:-apple-system,'Hiragino Sans',sans-serif;color:#e8eaf0;
    -webkit-user-select:none;user-select:none;touch-action:none;}
  #stage{position:fixed;inset:0;}
  canvas{display:block;width:100%;height:100%;}
  .layer{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:24px;}
  .hidden{display:none!important;}
  h1{font-size:13vw;font-weight:900;letter-spacing:2px;line-height:.95;
    background:linear-gradient(90deg,#00E5FF,#FF2D87);-webkit-background-clip:text;
    background-clip:text;color:transparent;}
  .romaji{font-size:4.4vw;letter-spacing:6px;color:#7aa2ff;margin-top:6px;font-weight:700;}
  .tag{font-size:3.4vw;color:#9aa0b4;margin-top:18px;line-height:1.8;max-width:80%;}
  .how{font-size:3.5vw;color:#c7ccdb;line-height:2;margin-top:22px;}
  .how b{color:#FBBF24;}
  .btn{margin-top:30px;font-size:5vw;font-weight:900;letter-spacing:2px;color:#06030d;
    background:linear-gradient(90deg,#00E5FF,#7aa2ff);border:none;border-radius:999px;
    padding:18px 52px;box-shadow:0 0 30px rgba(0,229,255,.5);}
  .btn:active{transform:scale(.96);}
  .credit{position:fixed;bottom:14px;left:0;right:0;text-align:center;font-size:2.7vw;color:#3f4458;}
  /* result */
  #result{background:rgba(6,3,13,.82);backdrop-filter:blur(4px);}
  #cardWrap{width:min(74vw,300px);aspect-ratio:9/16;border-radius:18px;overflow:hidden;
    box-shadow:0 0 40px rgba(255,45,135,.35);}
  #cardWrap canvas{width:100%;height:100%;}
  .rbtns{display:flex;gap:14px;margin-top:22px;flex-wrap:wrap;justify-content:center;}
  .rbtn{font-size:4.2vw;font-weight:800;letter-spacing:1px;border:none;border-radius:999px;
    padding:14px 30px;}
  .rbtn.play{color:#06030d;background:linear-gradient(90deg,#00E5FF,#7aa2ff);}
  .rbtn.share{color:#fff;background:#1b2236;border:1px solid #2a3450;}
  .rbtn:active{transform:scale(.96);}
  #hud{position:fixed;top:0;left:0;right:0;padding:16px 18px 0;display:flex;
    justify-content:space-between;align-items:flex-start;pointer-events:none;font-weight:800;}
  .hud-l{font-size:3.2vw;color:#9aa0b4;line-height:1.7;}
  .hud-l span{color:#FBBF24;}
  .hud-r{text-align:right;}
  #combo{font-size:9vw;font-weight:900;color:#00E5FF;line-height:1;
    text-shadow:0 0 18px rgba(0,229,255,.6);}
  #comboLbl{font-size:2.8vw;color:#9aa0b4;letter-spacing:2px;}
  #flash{position:fixed;left:0;right:0;top:38%;text-align:center;font-size:8vw;font-weight:900;
    pointer-events:none;opacity:0;letter-spacing:2px;}
  #lives{position:fixed;bottom:18px;left:0;right:0;text-align:center;font-size:3.2vw;
    color:#6b7187;pointer-events:none;letter-spacing:3px;}
</style>
</head>
<body>
<div id="stage"><canvas id="cv"></canvas></div>

<!-- TITLE -->
<div id="title" class="layer">
  <h1>堂々巡り</h1>
  <div class="romaji">DŌDŌMEGURI</div>
  <div class="tag">AIエージェントが陥る無限ループ —<br>巻き締まる渦から、刹那に脱出させろ。</div>
  <div class="how">渦を周る光点が<b>アンバーの脱出ゲート</b>を通る刹那<br><b>長押しでチャージ → 離して断ち切る</b><br>溜めすぎ＝オーバーヒート／空振り＝渦が締まる</div>
  <button class="btn" id="startBtn">START</button>
  <div class="credit">Idea Radar 優勝作 · 2026-06-16</div>
</div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div class="hud-l">EJECTS <span id="ejects">0</span><br>燃やした ¥<span id="burn">0</span></div>
  <div class="hud-r"><div id="combo">0</div><div id="comboLbl">COMBO</div></div>
</div>
<div id="flash" class="hidden"></div>
<div id="lives" class="hidden"></div>

<!-- RESULT -->
<div id="result" class="layer hidden">
  <div id="cardWrap"><canvas id="card" width="540" height="960"></canvas></div>
  <div class="rbtns">
    <button class="rbtn play" id="again">もう一度</button>
    <button class="rbtn share" id="shareBtn">シェア</button>
  </div>
  <div class="credit">t-aka-h.github.io/idea-radar/dodomeguri</div>
</div>

<script>
(function(){
"use strict";
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2.5);
function resize(){W=window.innerWidth;H=window.innerHeight;
  cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
window.addEventListener('resize',resize);resize();

// ---------- Audio (WebAudio, missing-fundamental bass, no files) ----------
let AC=null;
function ac(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} }
  if(AC&&AC.state==='suspended')AC.resume(); return AC; }
function tone(freq,t0,dur,type,gain,glideTo){
  const a=ac(); if(!a)return;
  const o=a.createOscillator(),g=a.createGain();
  o.type=type||'sine';o.frequency.setValueAtTime(freq,t0);
  if(glideTo)o.frequency.exponentialRampToValueAtTime(glideTo,t0+dur);
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(gain,t0+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g).connect(a.destination);o.start(t0);o.stop(t0+dur+0.02);
}
// missing fundamental bass: stack 2-5x of 55Hz
function bass(t0,dur,vol){
  [110,165,220,275].forEach((f,i)=>tone(f,t0,dur,'sine',(vol||0.5)*(1-i*0.16)));
}
function noiseBurst(t0,dur,vol,lp){
  const a=ac();if(!a)return;
  const n=Math.floor(a.sampleRate*dur),buf=a.createBuffer(1,n,a.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
  const s=a.createBufferSource();s.buffer=buf;
  const f=a.createBiquadFilter();f.type='lowpass';f.frequency.value=lp||1200;
  const g=a.createGain();g.gain.value=vol||0.3;
  s.connect(f).connect(g).connect(a.destination);s.start(t0);
}
function sfxCharge(){const a=ac();if(!a)return;tone(300,a.currentTime,0.5,'sawtooth',0.06,720);}
function sfxEject(combo){const a=ac();if(!a)return;const t=a.currentTime;
  bass(t,0.5,0.55);
  const base=[523,659,784,1046];const step=Math.min(combo,6);
  for(let i=0;i<4;i++)tone(base[i]*Math.pow(2,step*0.04),t+i*0.045,0.35,'triangle',0.16);
  noiseBurst(t,0.12,0.22,2600);
}
function sfxMisfire(){const a=ac();if(!a)return;const t=a.currentTime;
  tone(360,t,0.4,'sawtooth',0.18,70);noiseBurst(t,0.18,0.2,800);}
function sfxOverheat(){const a=ac();if(!a)return;const t=a.currentTime;bass(t,0.7,0.4);noiseBurst(t,0.4,0.16,500);}
function sfxDead(){const a=ac();if(!a)return;const t=a.currentTime;
  tone(220,t,0.9,'sine',0.3,40);bass(t,0.9,0.4);noiseBurst(t,0.5,0.2,700);}
function vib(p){ if(navigator.vibrate)try{navigator.vibrate(p);}catch(e){} }

// ---------- Game state ----------
const COL={cyan:'#00E5FF',mag:'#FF2D87',amber:'#FBBF24',bg:'#06030d'};
let state='title';
let g=null; // game obj
let particles=[];

function newGame(){
  g={
    cx:W/2, cy:H*0.52,
    R0:Math.min(W,H)*0.40,      // outer radius (health)
    radius:Math.min(W,H)*0.40,  // current spiral radius = health
    rMin:Math.min(W,H)*0.07,
    mAng:0, mSpeed:2.15,        // marker angular speed (rad/s)
    gAng:Math.PI, gSpeed:-0.85, // gate angular speed
    gateHalf:0.46,              // gate window half-angle
    holding:false, holdStart:0, charge:0,
    overheated:false,
    combo:0, bestCombo:0, ejects:0, burn:0, score:0,
    shake:0, slowmo:0, dead:false, t:0,
    pulse:0, ringFlash:0
  };
  particles=[];
}

// angular distance (abs, wrapped to [0,PI])
function angDist(a,b){let d=Math.abs(a-b)%(2*Math.PI);if(d>Math.PI)d=2*Math.PI-d;return d;}

const CHARGE_TIME=0.62; // sec to full
const OVERHEAT_LIMIT=1.18; // charge value where it counts as overheat fail

function press(){
  if(state!=='play'||g.dead)return;
  g.holding=true;g.holdStart=g.t;g.charge=0;g.overheated=false;
  sfxCharge();vib(8);
}
function release(){
  if(state!=='play'||g.dead||!g.holding)return;
  g.holding=false;
  const inWin=angDist(g.mAng,g.gAng)<=g.gateHalf;
  if(g.charge>=OVERHEAT_LIMIT){ // held too long -> overheat misfire
    overheatFail();return;
  }
  if(inWin && g.charge>0.18){
    cleanEject();
  } else {
    misfire();
  }
  g.charge=0;
}

function cleanEject(){
  const acc=1-angDist(g.mAng,g.gAng)/g.gateHalf; // 0..1 centering
  const chargeBonus=0.5+g.charge;                // reward fuller charge
  const depth=1+(g.R0-g.radius)/g.R0;            // deeper = more
  g.combo++;
  g.ejects++;
  const gain=Math.round((40+acc*60)*chargeBonus*depth*(1+g.combo*0.12));
  g.score+=gain;
  if(g.combo>g.bestCombo)g.bestCombo=g.combo;
  // reward: relax spiral a touch
  g.radius=Math.min(g.R0,g.radius+g.R0*0.05);
  // difficulty up
  g.gSpeed-= (g.gSpeed<0? -0.07:0.07)*0 ; // keep direction
  g.mSpeed=Math.min(4.2,g.mSpeed+0.10);
  g.gateHalf=Math.max(0.2,g.gateHalf-0.012);
  g.shake=Math.min(14,8+acc*8);
  g.slowmo=0.13;g.ringFlash=1;
  burstFrom(markerXY(),acc>0.7?28:18, acc>0.7?COL.cyan:COL.amber);
  sfxEject(g.combo);
  vib(acc>0.7?[0,40,20,40]:[0,28]);
  showFlash(acc>0.7?'CLEAN!':'EJECT', acc>0.7?COL.cyan:'#7aa2ff');
}
function misfire(){
  g.combo=0;
  const b=Math.round(20+Math.random()*40);
  g.burn+=b;
  tighten(g.R0*0.085);
  g.shake=12;
  sfxMisfire();vib([0,60,40,60]);
  showFlash('MISFIRE −¥'+b, COL.mag);
}
function overheatFail(){
  g.combo=0;
  const b=Math.round(60+Math.random()*60);
  g.burn+=b;
  tighten(g.R0*0.11);
  g.shake=16;g.overheated=true;
  sfxOverheat();vib([0,90,40,90]);
  showFlash('OVERHEAT −¥'+b, '#ff5a3c');
}
function tighten(amt){
  g.radius-=amt;
  g.mSpeed=Math.min(4.4,g.mSpeed+0.16);
  if(g.radius<=g.rMin){ gameOver(); }
}
function markerXY(){return {x:g.cx+Math.cos(g.mAng)*g.radius, y:g.cy+Math.sin(g.mAng)*g.radius};}

function burstFrom(p,n,color){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*6;
    particles.push({x:p.x,y:p.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:1,color:color,r:2+Math.random()*3});}
}

let flashTimer=0;const flashEl=document.getElementById('flash');
function showFlash(txt,color){flashEl.textContent=txt;flashEl.style.color=color;
  flashEl.style.textShadow='0 0 22px '+color;flashEl.style.opacity='1';
  flashEl.classList.remove('hidden');flashTimer=0.7;}

function gameOver(){
  if(g.dead)return;
  g.dead=true;g.radius=Math.max(0,g.radius);
  sfxDead();vib([0,120,60,200]);
  burstFrom({x:g.cx,y:g.cy},60,COL.mag);
  setTimeout(()=>{state='result';buildCard();show('result');hide('hud');hide('lives');},1100);
}

// ---------- Loop ----------
let last=0;
function frame(ts){
  const now=ts/1000; let dt=last?Math.min(0.05,now-last):0.016; last=now;
  if(state==='play'&&g){
    let sm=g.slowmo>0?0.32:1; if(g.slowmo>0)g.slowmo-=dt;
    const sdt=dt*sm;
    g.t+=sdt;
    if(!g.dead){
      g.mAng+=g.mSpeed*sdt;
      g.gAng+=g.gSpeed*sdt;
      g.pulse+=sdt;
      // doom drift: spiral very slowly tightens to force engagement
      g.radius-=g.R0*0.006*sdt*60* (1/60);
      if(g.radius<=g.rMin)gameOver();
      if(g.holding){
        g.charge=(g.t-g.holdStart)/CHARGE_TIME;
        if(g.charge>=OVERHEAT_LIMIT){ // auto fail on overheat
          g.holding=false;overheatFail();g.charge=0;
        } else if(g.charge>1.0){ // in overheat warning, bleed tokens
          g.burn+=Math.round(40*sdt);
        }
      }
    }
    if(g.shake>0)g.shake=Math.max(0,g.shake-dt*40);
    if(g.ringFlash>0)g.ringFlash=Math.max(0,g.ringFlash-dt*3);
    updateParticles(sdt);
    updateHUD();
    if(flashTimer>0){flashTimer-=dt;if(flashTimer<=0)flashEl.classList.add('hidden');
      else flashEl.style.opacity=Math.min(1,flashTimer*3);}
  } else {
    updateParticles(dt);
  }
  draw();
  requestAnimationFrame(frame);
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.94;p.vy*=0.94;p.life-=dt*1.8;
    if(p.life<=0)particles.splice(i,1);}
}

// ---------- Draw ----------
function draw(){
  ctx.clearRect(0,0,W,H);
  // bg radial
  const bg=ctx.createRadialGradient(W/2,H*0.5,0,W/2,H*0.5,Math.max(W,H)*0.8);
  bg.addColorStop(0,'#0d0820');bg.addColorStop(1,'#06030d');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  if(!g){return;}
  ctx.save();
  if(g.shake>0){ctx.translate((Math.random()-0.5)*g.shake,(Math.random()-0.5)*g.shake);}
  const cx=g.cx,cy=g.cy;

  // inward spiral trail (the loop) - logarithmic-ish
  const turns=4.2, segs=160;
  ctx.lineWidth=2;
  for(let i=0;i<segs;i++){
    const f=i/segs;
    const r=g.radius*(0.18+0.82*(1-f)); // from outer (radius) inward
    const ang=f*turns*Math.PI*2 + g.t*0.4;
    const x=cx+Math.cos(ang)*r, y=cy+Math.sin(ang)*r;
    const col= f<0.5? COL.cyan: COL.mag;
    ctx.fillStyle=col; ctx.globalAlpha=0.14+0.5*(1-f);
    const sz=1.3+2.3*(1-f);
    ctx.beginPath();ctx.arc(x,y,sz,0,7);ctx.fill();
  }
  ctx.globalAlpha=1;

  // active ring (current radius)
  ctx.beginPath();ctx.arc(cx,cy,g.radius,0,7);
  ctx.strokeStyle='rgba(122,162,255,'+(0.25+g.ringFlash*0.6)+')';
  ctx.lineWidth=2+g.ringFlash*4;ctx.stroke();

  // gate (amber arc on active ring)
  ctx.beginPath();
  ctx.arc(cx,cy,g.radius,g.gAng-g.gateHalf,g.gAng+g.gateHalf);
  ctx.strokeStyle=COL.amber;ctx.lineWidth=10;
  ctx.shadowColor=COL.amber;ctx.shadowBlur=22;ctx.stroke();ctx.shadowBlur=0;
  // gate ticks
  [-g.gateHalf,g.gateHalf].forEach(d=>{
    const x=cx+Math.cos(g.gAng+d)*g.radius,y=cy+Math.sin(g.gAng+d)*g.radius;
    ctx.fillStyle=COL.amber;ctx.beginPath();ctx.arc(x,y,4,0,7);ctx.fill();});

  // marker
  const m=markerXY();
  const inWin=angDist(g.mAng,g.gAng)<=g.gateHalf;
  let mcol = g.holding? (g.charge>1.0?'#ff5a3c': (inWin?COL.cyan:'#fff')) : '#fff';
  ctx.beginPath();ctx.arc(m.x,m.y,9,0,7);
  ctx.fillStyle=mcol;ctx.shadowColor=mcol;ctx.shadowBlur=18;ctx.fill();ctx.shadowBlur=0;

  // charge ring around marker
  if(g.holding){
    const cv2=Math.min(g.charge,OVERHEAT_LIMIT)/OVERHEAT_LIMIT;
    ctx.beginPath();ctx.arc(m.x,m.y,18,-Math.PI/2,-Math.PI/2+cv2*7);
    ctx.strokeStyle=g.charge>1.0?'#ff5a3c':COL.cyan;ctx.lineWidth=4;ctx.stroke();
  }

  // center sink (doom)
  const sinkR=g.rMin*(0.7+Math.sin(g.t*4)*0.08*(g.holding?2:1));
  const sg=ctx.createRadialGradient(cx,cy,0,cx,cy,g.rMin*2.2);
  sg.addColorStop(0,'rgba(255,45,135,'+(g.dead?0.95:0.5)+')');
  sg.addColorStop(1,'rgba(255,45,135,0)');
  ctx.fillStyle=sg;ctx.beginPath();ctx.arc(cx,cy,g.rMin*2.2,0,7);ctx.fill();
  ctx.fillStyle=g.dead?'#000':'#1a0010';ctx.beginPath();ctx.arc(cx,cy,sinkR,0,7);ctx.fill();

  // particles
  for(const p of particles){ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();}
  ctx.globalAlpha=1;

  // overheat vignette
  if(g.holding&&g.charge>1.0){ctx.fillStyle='rgba(255,40,30,0.12)';ctx.fillRect(-30,-30,W+60,H+60);}
  ctx.restore();
}

// ---------- HUD ----------
const elE=document.getElementById('ejects'),elB=document.getElementById('burn'),
  elC=document.getElementById('combo'),elLives=document.getElementById('lives');
function updateHUD(){
  elE.textContent=g.ejects;elB.textContent=g.burn;elC.textContent=g.combo;
  // health pips from radius
  const frac=(g.radius-g.rMin)/(g.R0-g.rMin);
  const pips=Math.max(0,Math.round(frac*5));
  elLives.textContent='渦の余裕  '+'◆'.repeat(pips)+'◇'.repeat(Math.max(0,5-pips));
}

// ---------- Result card ----------
function rankOf(){
  const c=g.bestCombo;
  if(c>=14)return['LOOP BREAKER','#00E5FF','無限ループを断ち切る者'];
  if(c>=9) return['DEBUGGER','#7aa2ff','暴走を見切るエンジニア'];
  if(c>=5) return['INTERRUPTER','#FBBF24','割り込みの達人'];
  if(c>=2) return['JUNIOR','#FF2D87','まだ渦に呑まれがち'];
  return['THRASHED','#ff5a3c','エージェントに振り回された'];
}
function buildCard(){
  const c=document.getElementById('card'),x=c.getContext('2d');
  const w=540,h=960;
  const bg=x.createLinearGradient(0,0,w,h);bg.addColorStop(0,'#0d0820');bg.addColorStop(1,'#06030d');
  x.fillStyle=bg;x.fillRect(0,0,w,h);
  // spiral motif
  for(let i=0;i<140;i++){const f=i/140,r=210*(1-f),ang=f*4.2*Math.PI*2;
    x.fillStyle=f<0.5?COL.cyan:COL.mag;x.globalAlpha=0.1+0.4*(1-f);
    x.beginPath();x.arc(270+Math.cos(ang)*r,360+Math.sin(ang)*r,1+2.4*(1-f),0,7);x.fill();}
  x.globalAlpha=1;
  const r=rankOf();
  x.textAlign='center';
  x.fillStyle='#7aa2ff';x.font='bold 26px sans-serif';x.fillText('堂々巡り · DŌDŌMEGURI',270,70);
  x.fillStyle=r[1];x.font='900 56px sans-serif';
  x.shadowColor=r[1];x.shadowBlur=24;x.fillText(r[0],270,690);x.shadowBlur=0;
  x.fillStyle='#c7ccdb';x.font='22px sans-serif';x.fillText(r[2],270,728);
  // big stat
  x.fillStyle='#fff';x.font='900 150px sans-serif';
  x.shadowColor=COL.cyan;x.shadowBlur=30;x.fillText(g.bestCombo,270,440);x.shadowBlur=0;
  x.fillStyle='#9aa0b4';x.font='bold 24px sans-serif';x.fillText('MAX COMBO',270,478);
  // sub stats
  x.font='bold 28px sans-serif';
  x.fillStyle='#FBBF24';x.fillText('EJECTS  '+g.ejects,270,800);
  x.fillStyle='#FF2D87';x.fillText('燃やしたトークン  ¥'+g.burn,270,840);
  // footer
  x.fillStyle='#4f5468';x.font='20px sans-serif';
  x.fillText('Idea Radar 2026-06-16',270,902);
  x.fillText('t-aka-h.github.io/idea-radar/dodomeguri',270,930);
}
async function share(){
  const c=document.getElementById('card');
  const cap='堂々巡り — MAX COMBO '+g.bestCombo+' / EJECTS '+g.ejects+'。AIの無限ループを断ち切れ。#Dodomeguri';
  try{
    const blob=await new Promise(res=>c.toBlob(res,'image/png'));
    const file=new File([blob],'dodomeguri.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],text:cap});return;
    }
    if(navigator.share){await navigator.share({text:cap+' '+location.href});return;}
  }catch(e){}
  // fallback: download
  const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='dodomeguri.png';a.click();
}

// ---------- UI flow ----------
function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}
function start(){
  ac();newGame();state='play';
  hide('title');hide('result');show('hud');show('lives');
}
document.getElementById('startBtn').addEventListener('click',start);
document.getElementById('again').addEventListener('click',start);
document.getElementById('shareBtn').addEventListener('click',share);

// input: hold anywhere on stage during play
const stage=document.getElementById('stage');
function down(e){ if(state==='play'){e.preventDefault();press();} }
function up(e){ if(state==='play'){e.preventDefault();release();} }
stage.addEventListener('touchstart',down,{passive:false});
stage.addEventListener('touchend',up,{passive:false});
stage.addEventListener('touchcancel',up,{passive:false});
stage.addEventListener('mousedown',down);
window.addEventListener('mouseup',up);

requestAnimationFrame(frame);
})();
</script>
