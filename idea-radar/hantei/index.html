<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050614">
<title>Hantei（判定）— あなたがVAR主審</title>
<style>
  :root{
    --bg:#050614; --bg2:#0a0e1a;
    --cyan:#00E5FF; --magenta:#FF2D87; --amber:#FFB547; --emerald:#1FD06A;
    --ink:#EAF0F8; --sub:#9aa3bf;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    color:var(--ink);user-select:none;-webkit-user-select:none;touch-action:none;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{display:block;width:100%;height:100%;}
  /* overlays */
  .layer{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;pointer-events:none;}
  .layer.on{pointer-events:auto;}
  #overLayer{background:radial-gradient(120% 80% at 50% 30%,rgba(10,16,36,.92),rgba(4,5,14,.97));backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);}
  .hidden{display:none!important;}
  .title-big{font-size:clamp(40px,15vw,82px);font-weight:900;letter-spacing:.06em;
    background:linear-gradient(180deg,#fff,var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 30px rgba(0,229,255,.35);line-height:1;}
  .title-sub{margin-top:6px;font-size:13px;letter-spacing:.32em;color:var(--magenta);font-weight:700;}
  .desc{margin-top:26px;font-size:15px;line-height:1.8;color:var(--sub);max-width:340px;}
  .desc b{color:var(--ink);}
  .btn{margin-top:30px;pointer-events:auto;cursor:pointer;border:none;
    padding:18px 44px;border-radius:999px;font-size:19px;font-weight:800;letter-spacing:.08em;
    color:#03121a;background:linear-gradient(180deg,#7af2ff,var(--cyan));
    box-shadow:0 8px 30px rgba(0,229,255,.4),0 0 0 1px rgba(255,255,255,.2) inset;}
  .btn:active{transform:scale(.96);}
  .btn.ghost{background:rgba(255,255,255,.06);color:var(--ink);
    box-shadow:0 0 0 1px rgba(255,255,255,.18) inset;}
  .credit{position:absolute;bottom:14px;left:0;right:0;font-size:10px;color:#4a5270;letter-spacing:.1em;}
  /* result card share area */
  #shareImg{width:min(70vw,260px);border-radius:18px;box-shadow:0 12px 50px rgba(0,0,0,.6);}
  .row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .ttl-tag{font-size:12px;letter-spacing:.4em;color:var(--amber);font-weight:800;margin-bottom:4px;}
  .go-score{font-size:clamp(54px,20vw,96px);font-weight:900;line-height:.95;
    background:linear-gradient(180deg,#fff,var(--amber));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .go-rank{font-size:22px;font-weight:800;color:var(--cyan);margin-top:2px;}
  .go-meta{font-size:13px;color:var(--sub);margin-top:10px;line-height:1.7;}
  .pulse{animation:pl 1.6s ease-in-out infinite;}
  @keyframes pl{0%,100%{opacity:.55}50%{opacity:1}}
</style>
</head>
<body>
<div id="wrap"><canvas id="cv"></canvas></div>

<!-- TITLE -->
<div id="titleLayer" class="layer on">
  <div class="title-big">HANTEI</div>
  <div class="title-sub">判定 · あなたが VAR 主審</div>
  <div class="desc">スロー再生で凍りついた決定的瞬間。<br><b>指を上下になぞって</b>オフサイドの<b>判定ライン</b>を引け。<br>攻撃側がラインより前なら <b style="color:var(--magenta)">OFFSIDE</b>、後ろなら <b style="color:var(--cyan)">ONSIDE</b>。<br>3回の誤審でゲームセット。</div>
  <button class="btn" id="startBtn">主審をはじめる</button>
  <div class="credit">Idea Radar · 単一HTML · 完全オンデバイス</div>
</div>

<!-- GAME OVER -->
<div id="overLayer" class="layer hidden">
  <div class="ttl-tag">FINAL JUDGEMENT</div>
  <div class="go-score" id="goScore">0</div>
  <div class="go-rank" id="goRank">—</div>
  <div class="go-meta" id="goMeta"></div>
  <img id="shareImg" alt="result card" style="margin-top:16px;display:none;">
  <div class="row" style="margin-top:18px;">
    <button class="btn" id="againBtn">もう一度</button>
    <button class="btn ghost" id="shareBtn">結果をシェア</button>
  </div>
  <div class="credit">#Hantei #VAR #IdeaRadar</div>
</div>

<script>
"use strict";
(function(){
/* ============ Canvas / DPR ============ */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2.5);
  W = cv.clientWidth; H = cv.clientHeight;
  cv.width = Math.round(W*DPR); cv.height = Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);

/* ============ Audio (WebAudio, no files) ============ */
let AC=null;
function audio(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended') AC.resume(); return AC; }
function now(){ return AC?AC.currentTime:0; }
function tone(freq,t0,dur,type,gain,glideTo){
  const ac=audio(); if(!ac)return;
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(freq,t0);
  if(glideTo) o.frequency.exponentialRampToValueAtTime(glideTo,t0+dur);
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(gain,t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g).connect(ac.destination); o.start(t0); o.stop(t0+dur+0.05);
}
function noiseBuf(dur){
  const ac=audio(); if(!ac)return null;
  const n=Math.floor(ac.sampleRate*dur); const b=ac.createBuffer(1,n,ac.sampleRate); const d=b.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=Math.random()*2-1; return b;
}
function tick(){ const ac=audio(); if(!ac)return; const t=now(); tone(900,t,0.06,'square',0.12,420); }
function pulseLow(){ const ac=audio(); if(!ac)return; const t=now(); tone(120,t,0.18,'sine',0.22,90); }
function cheer(){
  const ac=audio(); if(!ac)return; const t=now();
  // crowd noise swell through moving bandpass
  const b=noiseBuf(1.1); if(b){const s=ac.createBufferSource();s.buffer=b;
    const bp=ac.createBiquadFilter();bp.type='bandpass';bp.Q.value=0.8;
    bp.frequency.setValueAtTime(400,t);bp.frequency.linearRampToValueAtTime(1800,t+0.5);
    const g=ac.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.5,t+0.18);
    g.gain.exponentialRampToValueAtTime(0.0001,t+1.05);
    s.connect(bp).connect(g).connect(ac.destination);s.start(t);s.stop(t+1.1);}
  // triumphant chord
  [261.6,329.6,392,523.2].forEach((f,i)=>tone(f,t+0.05+i*0.04,0.7,'triangle',0.16));
}
function boo(){
  // missing-fundamental low boo (55Hz base via harmonics) + descending sweep
  const ac=audio(); if(!ac)return; const t=now();
  const base=55;
  [1,2,3,4,5].forEach((h,i)=>{
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='sawtooth';o.frequency.setValueAtTime(base*h,t);
    const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=600;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.13/(i*0.6+1),t+0.05);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.75);
    o.connect(lp).connect(g).connect(ac.destination);o.start(t);o.stop(t+0.8);
  });
  tone(220,t,0.6,'sawtooth',0.1,80);
  const b=noiseBuf(0.7); if(b){const s=ac.createBufferSource();s.buffer=b;
    const bp=ac.createBiquadFilter();bp.type='bandpass';bp.frequency.value=300;bp.Q.value=0.6;
    const g=ac.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.16,t+0.1);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.7);
    s.connect(bp).connect(g).connect(ac.destination);s.start(t);s.stop(t+0.7);}
}
function ding(){ const t=now(); tone(880,t,0.18,'sine',0.2); tone(1320,t+0.04,0.22,'sine',0.14); }
function buzz(){ const t=now(); tone(160,t,0.25,'square',0.18,120); }
function vib(p){ if(navigator.vibrate){ try{navigator.vibrate(p);}catch(e){} } }

/* ============ Game state ============ */
const ST = { TITLE:0, INTRO:1, JUDGE:2, REVEAL:3, OVER:4 };
let state = ST.TITLE;
let score=0, streak=0, bestStreak=0, lives=3, round=0;
let dignity=0;               // 主審の威厳 0..1
let correctCount=0, wrongCount=0, totalCalls=0;
let best = +(localStorage.getItem('hantei_best')||0);

// current scene
let scene=null;
let introT=0;                // intro animation progress
let judgeStart=0, judgeDur=3.6;  // countdown seconds
let lineY=null;              // player's drawn offside line (logical y)
let dragging=false;
let revealT=0, lastResult=null;
let shakeT=0, flashT=0, flashCol='#fff';
let zoom=1, zoomTargetY=0;
const particles=[];

// pitch rect (recomputed per frame from W,H)
function pitch(){
  const m=Math.min(W*0.06,26);
  const top=Math.max(H*0.13,92), bot=H-Math.max(H*0.22,140);
  return {x:m, y:top, w:W-m*2, h:bot-top};
}

/* round/scene generation – attacking direction = UP (smaller y = more advanced) */
function newScene(){
  round++;
  const p=pitch();
  const hard = Math.min(1, round/14);            // 0..1 difficulty
  // ~70% offside line rounds, ~30% handball rounds (but first 2 always offside to teach)
  const isHand = round>2 && Math.random()<0.30;
  if(isHand){
    // handball mini round
    const armUp = Math.random()<0.5;             // ball near arm zone?
    const truthHand = Math.random()<0.5;         // ground truth
    const cx = p.x + p.w*(0.3+Math.random()*0.4);
    const cy = p.y + p.h*(0.32+Math.random()*0.3);
    scene={type:'hand', cx, cy, truthHand, hard};
  } else {
    // offside: defender front line dY, attacker front aY
    const cx = p.x + p.w*(0.28+Math.random()*0.44);
    const dY = p.y + p.h*(0.30+Math.random()*0.34);
    // closeness shrinks with difficulty
    const span = (1-hard)*p.h*0.16 + p.h*0.012;
    let delta = (Math.random()*2-1)*span;        // attacker offset from defender
    if(Math.abs(delta)<p.h*0.008) delta = (delta<0?-1:1)*p.h*0.01; // avoid dead tie
    const aY = dY + delta;                        // aY<dY => attacker advanced => OFFSIDE
    const sep = Math.max(34, Math.min(W*0.16, p.w*0.20));
    const attLeft = Math.random()<0.5;
    const aX = attLeft ? cx-sep : cx+sep;
    const dX = attLeft ? cx+sep*0.2 : cx-sep*0.2;
    scene={type:'off', dY, aY, aX, dX, cx, hard, truth:(aY<dY)?'OFFSIDE':'ONSIDE'};
  }
  lineY = p.y + p.h*0.5;
  introT=0;
}

/* ============ Drawing helpers ============ */
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function drawPitch(){
  const p=pitch();
  // bg gradient
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#070b18'); g.addColorStop(1,'#040510');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // field
  ctx.save();
  rr(p.x,p.y,p.w,p.h,14); ctx.clip();
  const fg=ctx.createLinearGradient(0,p.y,0,p.y+p.h);
  fg.addColorStop(0,'#0c3a26'); fg.addColorStop(1,'#072216');
  ctx.fillStyle=fg; ctx.fillRect(p.x,p.y,p.w,p.h);
  // mow stripes (horizontal bands)
  const bands=8, bh=p.h/bands;
  for(let i=0;i<bands;i++){ ctx.fillStyle = (i%2)?'rgba(255,255,255,.035)':'rgba(0,0,0,.05)';
    ctx.fillRect(p.x,p.y+i*bh,p.w,bh); }
  // goal area (top)
  ctx.strokeStyle='rgba(220,235,255,.28)'; ctx.lineWidth=2;
  const bw=p.w*0.5, bx=p.x+(p.w-bw)/2;
  ctx.strokeRect(bx,p.y,bw,p.h*0.18);
  const bw2=p.w*0.26, bx2=p.x+(p.w-bw2)/2;
  ctx.strokeRect(bx2,p.y,bw2,p.h*0.08);
  // goal mouth
  ctx.strokeStyle='rgba(220,235,255,.5)'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(p.x+p.w*0.4,p.y); ctx.lineTo(p.x+p.w*0.6,p.y); ctx.stroke();
  ctx.restore();
  // border
  ctx.strokeStyle='rgba(120,140,180,.35)'; ctx.lineWidth=2; rr(p.x,p.y,p.w,p.h,14); ctx.stroke();
  // attack direction arrow
  ctx.fillStyle='rgba(170,190,230,.5)'; ctx.font='600 11px -apple-system,sans-serif'; ctx.textAlign='center';
  ctx.fillText('▲ 攻撃方向（ゴール）', p.x+p.w/2, p.y-8);
}

function playerFigure(x,y,col,label,frontTick){
  // glow disc + front tick (front = top, toward goal)
  ctx.save();
  ctx.shadowColor=col; ctx.shadowBlur=18;
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.arc(x,y,11,0,7); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,.9)';
  ctx.beginPath(); ctx.arc(x,y-3,4,0,7); ctx.fill();
  ctx.restore();
  if(frontTick){
    ctx.save(); ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.shadowColor=col; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.moveTo(x-16,frontTick); ctx.lineTo(x+16,frontTick); ctx.stroke();
    ctx.restore();
  }
  if(label){ ctx.fillStyle=col; ctx.font='700 10px -apple-system,sans-serif'; ctx.textAlign='center';
    ctx.fillText(label,x,y+24); }
}

function drawBall(x,y,r){
  ctx.save(); ctx.shadowColor='#fff'; ctx.shadowBlur=10;
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x,y,r||6,0,7); ctx.fill();
  ctx.shadowBlur=0; ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(x-r*0.6,y-r*0.3); ctx.lineTo(x+r*0.6,y+r*0.3); ctx.stroke();
  ctx.restore();
}

/* HUD overlay (broadcast) */
function drawHUD(){
  // top VAR chip
  const blink = (Math.sin(performance.now()/250)>0)?1:0.4;
  ctx.save();
  ctx.globalAlpha=blink;
  ctx.fillStyle='rgba(255,45,135,.9)'; rr(14,16,108,26,13); ctx.fill();
  ctx.globalAlpha=1; ctx.fillStyle='#fff'; ctx.font='800 12px -apple-system,sans-serif'; ctx.textAlign='left';
  ctx.fillText('● VAR REVIEW',24,33);
  ctx.restore();
  // lives (top right)
  ctx.textAlign='right';
  for(let i=0;i<3;i++){
    ctx.fillStyle = i<lives?'#FF2D87':'rgba(255,255,255,.18)';
    ctx.font='16px -apple-system,sans-serif';
    ctx.fillText('♦', W-16-i*20, 33);
  }
  // score
  ctx.textAlign='left'; ctx.fillStyle='var(--ink)';
  ctx.fillStyle='#EAF0F8'; ctx.font='800 22px -apple-system,sans-serif';
  ctx.fillText(score.toLocaleString(), 16, 64);
  ctx.fillStyle='#9aa3bf'; ctx.font='600 10px -apple-system,sans-serif';
  ctx.fillText('SCORE · ROUND '+round, 16, 78);
  // streak (right)
  ctx.textAlign='right';
  ctx.fillStyle = streak>0?'#FFB547':'#566';
  ctx.font='800 16px -apple-system,sans-serif';
  ctx.fillText(streak>0?('×'+streak+' 連続'):'', W-16, 60);

  // dignity gauge (bottom lower-third)
  const gy=H-44, gx=16, gw=W-32, gh=8;
  ctx.fillStyle='rgba(255,255,255,.08)'; rr(gx,gy,gw,gh,4); ctx.fill();
  const dg=ctx.createLinearGradient(gx,0,gx+gw,0); dg.addColorStop(0,'#00E5FF'); dg.addColorStop(1,'#FFB547');
  ctx.fillStyle=dg; rr(gx,gy,gw*dignity,gh,4); ctx.fill();
  ctx.fillStyle='#9aa3bf'; ctx.font='600 10px -apple-system,sans-serif'; ctx.textAlign='left';
  ctx.fillText('主審の威厳', gx, gy-6);
}

/* ============ Particles ============ */
function burst(x,y,col,n){
  for(let i=0;i<n;i++){ const a=Math.random()*7, sp=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,col}); }
}
function ringWave(x,y,col){ particles.push({ring:true,x,y,r:10,life:1,col}); }
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){ const p=particles[i];
    if(p.ring){ p.r+=8; p.life-=dt*1.4; }
    else{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life-=dt*1.1; }
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles(){
  for(const p of particles){
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
    if(p.ring){ ctx.strokeStyle=p.col; ctx.lineWidth=3; ctx.shadowColor=p.col; ctx.shadowBlur=12;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.stroke(); }
    else{ ctx.fillStyle=p.col; ctx.shadowColor=p.col; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(p.x,p.y,2.4,0,7); ctx.fill(); }
    ctx.restore();
  }
}

/* ============ Round logic ============ */
function startRound(){
  newScene();
  state=ST.INTRO;
}
function beginJudge(){
  state=ST.JUDGE;
  judgeStart=performance.now()/1000;
  dragging=false;
  if(scene.type==='off') lineY=pitch().y+pitch().h*0.5;
}

function commitOffside(){
  const p=pitch();
  // player's call from drawn line: attacker above (smaller y than) line => OFFSIDE
  const call = (scene.aY < lineY) ? 'OFFSIDE' : 'ONSIDE';
  const correct = (call===scene.truth);
  const elapsed = performance.now()/1000 - judgeStart;
  const speedBonus = Math.max(0, Math.round((judgeDur-elapsed)/judgeDur*120));
  const precErr = Math.abs(lineY - scene.dY);
  const precBonus = Math.max(0, Math.round((1 - Math.min(1,precErr/(p.h*0.12)))*100));
  const closeBonus = Math.round((1 - Math.min(1,Math.abs(scene.aY-scene.dY)/(p.h*0.16)))*120);
  finishCall(correct, call, correct ? (120+speedBonus+precBonus+closeBonus) : 0, precErr<p.h*0.05);
}
function commitHand(callHand){
  const correct = (callHand===scene.truthHand);
  const elapsed = performance.now()/1000 - judgeStart;
  const speedBonus = Math.max(0, Math.round((judgeDur-elapsed)/judgeDur*120));
  finishCall(correct, callHand?'HANDBALL':'PLAY ON', correct?(150+speedBonus):0, false);
}
function finishCall(correct, callTxt, pts, closeCall){
  totalCalls++;
  lastResult={correct, callTxt, pts, closeCall, scene};
  if(correct){
    correctCount++; streak++; bestStreak=Math.max(bestStreak,streak);
    dignity=Math.min(1,dignity+0.12);
    score+=pts; cheer(); ding(); vib([20,40,20]);
    const p=pitch(); burst(W/2,p.y+p.h*0.4,'#00E5FF',26); burst(W/2,p.y+p.h*0.4,'#FFB547',14);
    flashCol='rgba(0,229,255,.18)';
  } else {
    wrongCount++; lives--; streak=0; dignity=Math.max(0,dignity-0.25);
    boo(); buzz(); vib([90,50,90,50,90]); shakeT=0.5;
    const p=pitch(); ringWave(W/2,p.y+p.h*0.5,'#FF2D87'); ringWave(W/2,p.y+p.h*0.5,'#FF2D87');
    flashCol='rgba(255,45,135,.2)';
  }
  flashT=0.35;
  // zoom for close offside
  if(scene.type==='off' && Math.abs(scene.aY-scene.dY) < pitch().h*0.05){
    zoom=1; zoomTargetY=(scene.aY+scene.dY)/2;
  } else { zoom=1; }
  revealT=0; state=ST.REVEAL;
}

/* ============ Input ============ */
function evtY(e){ const r=cv.getBoundingClientRect(); const cy=(e.touches?e.touches[0].clientY:e.clientY); return cy-r.top; }
function evtX(e){ const r=cv.getBoundingClientRect(); const cx=(e.touches?e.touches[0].clientX:e.clientX); return cx-r.left; }

function onDown(e){
  if(state===ST.JUDGE && scene.type==='off'){ dragging=true; lineY=clampLineY(evtY(e)); e.preventDefault(); }
}
function onMove(e){ if(dragging && state===ST.JUDGE){ lineY=clampLineY(evtY(e)); e.preventDefault(); } }
function onUp(e){
  if(state===ST.JUDGE && scene.type==='off' && dragging){ dragging=false; tick(); vib(12); commitOffside(); e.preventDefault(); }
}
function clampLineY(y){ const p=pitch(); return Math.max(p.y+6, Math.min(p.y+p.h-6, y)); }

cv.addEventListener('pointerdown',onDown);
cv.addEventListener('pointermove',onMove);
cv.addEventListener('pointerup',onUp);
cv.addEventListener('pointercancel',()=>{dragging=false;});

// tap on canvas: hand-round buttons (drawn) + reveal advance + intro skip
cv.addEventListener('pointerdown',function(e){
  const x=evtX(e), y=evtY(e);
  if(state===ST.INTRO){ /* let intro auto-advance; allow tap skip */ if(introT>0.25) beginJudge(); return; }
  if(state===ST.JUDGE && scene.type==='hand'){
    const b=handButtons();
    if(pointIn(x,y,b.no)){ tick(); commitHand(true); }
    else if(pointIn(x,y,b.play)){ tick(); commitHand(false); }
    return;
  }
  if(state===ST.REVEAL && revealT>0.5){
    if(lives<=0){ endGame(); } else { startRound(); }
  }
});
function pointIn(x,y,r){ return x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h; }
function handButtons(){
  const bw=Math.min(W*0.42,180), bh=58, gap=14;
  const y=H-130;
  return {
    no:{x:W/2-bw-gap/2,y,w:bw,h:bh,label:'HANDBALL',col:'#FF2D87'},
    play:{x:W/2+gap/2,y,w:bw,h:bh,label:'PLAY ON',col:'#00E5FF'}
  };
}

/* ============ Render frames per state ============ */
function drawJudgeLine(){
  // player line
  const p=pitch();
  ctx.save();
  const col = (scene.aY<lineY)?'#FF2D87':'#00E5FF';
  ctx.strokeStyle=col; ctx.lineWidth=3; ctx.shadowColor=col; ctx.shadowBlur=14;
  ctx.setLineDash([10,8]);
  ctx.beginPath(); ctx.moveTo(p.x,lineY); ctx.lineTo(p.x+p.w,lineY); ctx.stroke();
  ctx.setLineDash([]);
  // call label following line
  ctx.fillStyle=col; ctx.font='800 13px -apple-system,sans-serif'; ctx.textAlign='left';
  ctx.fillText('→ あなたの判定: '+((scene.aY<lineY)?'OFFSIDE':'ONSIDE'), p.x+6, lineY-8);
  // grab handle
  ctx.fillStyle=col; ctx.beginPath(); ctx.arc(p.x+p.w-14,lineY,7,0,7); ctx.fill();
  ctx.restore();
}

function render(){
  ctx.save();
  // shake
  if(shakeT>0){ const s=shakeT*10; ctx.translate((Math.random()-0.5)*s,(Math.random()-0.5)*s); }

  drawPitch();

  if(scene){
    if(scene.type==='off'){
      // zoom transform for reveal close calls
      if(state===ST.REVEAL && zoom>1.001){
        const cx=W/2, cy=zoomTargetY;
        ctx.translate(cx,cy); ctx.scale(zoom,zoom); ctx.translate(-cx,-cy);
      }
      // defender + attacker
      playerFigure(scene.dX,scene.dY,'#FF2D87','DEFENDER',scene.dY);
      // attacker animates up during intro
      let ay=scene.aY;
      if(state===ST.INTRO){ const startY=pitch().y+pitch().h*0.92; ay=startY+(scene.aY-startY)*easeOut(introT); }
      playerFigure(scene.aX,ay,'#00E5FF','ATTACKER',ay);
      drawBall(scene.aX+14, ay+4, 5);

      if(state===ST.JUDGE) drawJudgeLine();

      if(state===ST.REVEAL){
        // true offside line
        const p=pitch();
        ctx.save(); ctx.strokeStyle='#FFB547'; ctx.lineWidth=3; ctx.shadowColor='#FFB547'; ctx.shadowBlur=16;
        ctx.beginPath(); ctx.moveTo(p.x,scene.dY); ctx.lineTo(p.x+p.w,scene.dY); ctx.stroke();
        // attacker front marker line in cyan
        ctx.strokeStyle='rgba(0,229,255,.7)'; ctx.setLineDash([4,5]);
        ctx.beginPath(); ctx.moveTo(p.x,scene.aY); ctx.lineTo(p.x+p.w,scene.aY); ctx.stroke(); ctx.setLineDash([]);
        ctx.restore();
      }
    } else { // hand round
      // body
      ctx.save(); ctx.shadowColor='#FF2D87'; ctx.shadowBlur=14;
      ctx.fillStyle='#FF2D87'; ctx.beginPath(); ctx.arc(scene.cx,scene.cy,16,0,7); ctx.fill();
      ctx.restore();
      // head
      ctx.fillStyle='#ffd9b0'; ctx.beginPath(); ctx.arc(scene.cx,scene.cy-26,9,0,7); ctx.fill();
      // arm (extended)
      ctx.save(); ctx.strokeStyle='#ffd9b0'; ctx.lineWidth=7; ctx.lineCap='round';
      const ax2=scene.cx+34, ay2=scene.cy-18;
      ctx.beginPath(); ctx.moveTo(scene.cx,scene.cy-4); ctx.lineTo(ax2,ay2); ctx.stroke();
      ctx.restore();
      // ball position: handball -> near hand(ax2,ay2); play on -> on chest
      const bx = scene.truthHand? ax2+6 : scene.cx-2;
      const by = scene.truthHand? ay2-4 : scene.cy+2;
      drawBall(bx,by,8);
      // arm zone hint
      ctx.save(); ctx.strokeStyle='rgba(255,181,71,.5)'; ctx.setLineDash([3,4]); ctx.lineWidth=1.5;
      ctx.strokeRect(scene.cx+12,scene.cy-30,34,26); ctx.setLineDash([]); ctx.restore();
      ctx.fillStyle='rgba(255,181,71,.7)'; ctx.font='600 10px -apple-system,sans-serif'; ctx.textAlign='center';
      ctx.fillText('腕の範囲', scene.cx+29, scene.cy-34);

      if(state===ST.JUDGE){
        const b=handButtons();
        [b.no,b.play].forEach(btn=>{
          ctx.save(); ctx.fillStyle='rgba(8,12,26,.85)'; ctx.strokeStyle=btn.col; ctx.lineWidth=2;
          ctx.shadowColor=btn.col; ctx.shadowBlur=12;
          rr(btn.x,btn.y,btn.w,btn.h,14); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
          ctx.fillStyle=btn.col; ctx.font='800 17px -apple-system,sans-serif'; ctx.textAlign='center';
          ctx.fillText(btn.label, btn.x+btn.w/2, btn.y+btn.h/2+6); ctx.restore();
        });
      }
    }
  }
  ctx.restore(); // zoom/shake

  drawParticles();
  if(scene) drawHUD();

  // intro big prompt
  if(state===ST.INTRO){
    const a = introT>0.7 ? Math.min(1,(introT-0.7)/0.2) : (introT<0.1? introT/0.1*0.4:0.4);
    if(scene.type==='off'){
      ctx.fillStyle='rgba(5,6,20,'+(0.0)+')';
    }
    ctx.save(); ctx.globalAlpha = introT>0.78?1:0.0;
    ctx.fillStyle='#fff'; ctx.font='900 46px -apple-system,sans-serif'; ctx.textAlign='center';
    ctx.shadowColor='#00E5FF'; ctx.shadowBlur=30;
    if(introT>0.78) ctx.fillText('JUDGE!', W/2, H*0.5);
    ctx.restore();
    ctx.fillStyle='rgba(255,255,255,.55)'; ctx.font='600 12px -apple-system,sans-serif'; ctx.textAlign='center';
    ctx.fillText(scene.type==='off'?'スロー再生中…':'ハンド？', W/2, pitch().y+pitch().h+30);
  }

  // judge countdown ring + instruction
  if(state===ST.JUDGE){
    const elapsed=performance.now()/1000-judgeStart;
    const rem=Math.max(0,1-elapsed/judgeDur);
    const cx=W/2, cy=H-92, R=22;
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.arc(cx,cy,R,0,7); ctx.stroke();
    ctx.strokeStyle = rem<0.3?'#FF2D87':'#FFB547'; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.shadowColor=ctx.strokeStyle; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(cx,cy,R,-Math.PI/2,-Math.PI/2+rem*Math.PI*2); ctx.stroke();
    ctx.restore();
    ctx.fillStyle='#fff'; ctx.font='800 18px -apple-system,sans-serif'; ctx.textAlign='center';
    ctx.fillText(Math.ceil(rem*judgeDur).toString(), cx, cy+6);
    ctx.fillStyle='rgba(255,255,255,.7)'; ctx.font='700 13px -apple-system,sans-serif';
    ctx.fillText(scene.type==='off'?'指を上下になぞってラインを引け':'ハンド？それともプレーオン？', W/2, H-50);
  }

  // reveal verdict banner
  if(state===ST.REVEAL && lastResult){
    const a=Math.min(1,revealT/0.18);
    ctx.save(); ctx.globalAlpha=a;
    const txt = lastResult.scene.truth || (lastResult.scene.truthHand?'HANDBALL':'PLAY ON');
    const col = lastResult.correct? '#1FD06A':'#FF2D87';
    ctx.fillStyle=col; ctx.font='900 40px -apple-system,sans-serif'; ctx.textAlign='center';
    ctx.shadowColor=col; ctx.shadowBlur=24;
    ctx.fillText(txt, W/2, H*0.30);
    ctx.shadowBlur=0; ctx.fillStyle=lastResult.correct?'#1FD06A':'#FF2D87';
    ctx.font='800 22px -apple-system,sans-serif';
    ctx.fillText(lastResult.correct?'正しい判定 ✓':'誤審 ✗', W/2, H*0.30+38);
    if(lastResult.correct){ ctx.fillStyle='#FFB547'; ctx.font='800 18px -apple-system,sans-serif';
      ctx.fillText('+'+lastResult.pts, W/2, H*0.30+66); }
    if(lastResult.closeCall){ ctx.fillStyle='rgba(255,255,255,.7)'; ctx.font='700 12px -apple-system,sans-serif';
      ctx.fillText('際どい！', W/2, H*0.30+90); }
    ctx.restore();
    if(revealT>0.5){ ctx.fillStyle='rgba(255,255,255,'+(0.4+0.3*Math.sin(performance.now()/300))+')';
      ctx.font='700 13px -apple-system,sans-serif'; ctx.textAlign='center';
      ctx.fillText(lives<=0?'タップして結果へ':'タップで次のジャッジ', W/2, H-60); }
  }

  // flash
  if(flashT>0){ ctx.fillStyle=flashCol; ctx.globalAlpha=Math.min(1,flashT/0.35); ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; }
}

function easeOut(t){ return 1-Math.pow(1-Math.max(0,Math.min(1,t)),3); }

/* ============ Loop ============ */
let last=performance.now();
let cdLast=99;
function loop(t){
  const dt=Math.min(0.05,(t-last)/1000); last=t;
  // timers
  if(shakeT>0) shakeT=Math.max(0,shakeT-dt);
  if(flashT>0) flashT=Math.max(0,flashT-dt);
  updateParticles(dt);

  if(state===ST.INTRO){
    introT+=dt*1.35;
    if(introT>=1){ beginJudge(); }
  }
  if(state===ST.JUDGE){
    const elapsed=performance.now()/1000-judgeStart;
    const remSec=Math.ceil((1-elapsed/judgeDur)*judgeDur);
    if(remSec!==cdLast && remSec<=3 && remSec>0){ cdLast=remSec; pulseLow(); vib(8); }
    if(elapsed>=judgeDur){ // timeout -> wrong
      if(scene.type==='off'){ // force a (likely wrong) commit as timeout
        lastResult=null; finishCall(false,'TIMEOUT',0,false);
      } else { finishCall(false,'TIMEOUT',0,false); }
    }
  }
  if(state===ST.REVEAL){
    revealT+=dt;
    if(zoom<1.6 && zoom>=1 && lastResult && lastResult.scene.type==='off' && Math.abs(lastResult.scene.aY-lastResult.scene.dY)<pitch().h*0.05){
      zoom=Math.min(1.6, zoom+dt*1.2);
    }
  }

  if(state>=ST.INTRO && state<=ST.REVEAL){ render(); }
  else if(state===ST.TITLE){ // idle pitch bg behind title
    scene=scene||null; ctx.clearRect(0,0,W,H); drawIdle();
  }
  requestAnimationFrame(loop);
}
function drawIdle(){
  drawPitch();
  // demo line sweep
  const p=pitch(); const y=p.y+p.h*(0.4+0.18*Math.sin(performance.now()/1400));
  ctx.save(); ctx.strokeStyle='#FFB547'; ctx.lineWidth=3; ctx.shadowColor='#FFB547'; ctx.shadowBlur=14;
  ctx.setLineDash([10,8]); ctx.beginPath(); ctx.moveTo(p.x,y); ctx.lineTo(p.x+p.w,y); ctx.stroke();
  ctx.restore();
  playerFigure(p.x+p.w*0.4,p.y+p.h*0.45,'#FF2D87','DEFENDER',p.y+p.h*0.45);
  playerFigure(p.x+p.w*0.62,p.y+p.h*0.40,'#00E5FF','ATTACKER',p.y+p.h*0.40);
}

/* ============ Flow control ============ */
const titleLayer=document.getElementById('titleLayer');
const overLayer=document.getElementById('overLayer');

function startGame(){
  audio(); // unlock
  score=0; streak=0; bestStreak=0; lives=3; round=0; dignity=0;
  correctCount=0; wrongCount=0; totalCalls=0;
  titleLayer.classList.add('hidden'); titleLayer.classList.remove('on');
  overLayer.classList.add('hidden');
  startRound();
}
function endGame(){
  state=ST.OVER;
  if(score>best){ best=score; localStorage.setItem('hantei_best',best); }
  document.getElementById('goScore').textContent=score.toLocaleString();
  const acc = totalCalls? Math.round(correctCount/totalCalls*100):0;
  document.getElementById('goRank').textContent = rankFor(score,acc);
  document.getElementById('goMeta').innerHTML =
    '正答率 <b style="color:#EAF0F8">'+acc+'%</b>　最大連続 <b style="color:#EAF0F8">'+bestStreak+'</b>　誤審 <b style="color:#FF2D87">'+wrongCount+'</b><br>'+
    'ベストスコア '+best.toLocaleString();
  buildShareCard(acc);
  overLayer.classList.remove('hidden'); overLayer.classList.add('on');
  document.getElementById('shareImg').style.display='none';
}
function rankFor(s,acc){
  if(acc>=90 && s>=1800) return '🌍 国際主審級';
  if(acc>=80 && s>=1200) return '🏆 プロ主審';
  if(acc>=65) return '🟨 県大会の笛';
  if(acc>=50) return '🟦 草サッカーの審判';
  return '🟥 村の見物人';
}

/* share card 1080x1920 */
let shareDataUrl=null;
function buildShareCard(acc){
  const c=document.createElement('canvas'); c.width=1080; c.height=1920; const g=c.getContext('2d');
  const bg=g.createLinearGradient(0,0,0,1920); bg.addColorStop(0,'#0a1024'); bg.addColorStop(1,'#040510');
  g.fillStyle=bg; g.fillRect(0,0,1080,1920);
  // pitch stripes top accent
  for(let i=0;i<10;i++){ g.fillStyle=i%2?'rgba(31,208,106,.05)':'rgba(0,0,0,.06)'; g.fillRect(0,300+i*60,1080,60); }
  g.textAlign='center';
  g.fillStyle='#FF2D87'; g.font='800 38px -apple-system,sans-serif';
  g.fillText('● VAR REVIEW — 主審適性', 540, 180);
  g.fillStyle='#9aa3bf'; g.font='700 30px -apple-system,sans-serif';
  g.fillText('H A N T E I（判定）', 540, 240);
  // big score
  const sg=g.createLinearGradient(0,520,0,760); sg.addColorStop(0,'#fff'); sg.addColorStop(1,'#FFB547');
  g.fillStyle=sg; g.font='900 280px -apple-system,sans-serif';
  g.fillText(score.toLocaleString(), 540, 760);
  g.fillStyle='#9aa3bf'; g.font='700 34px -apple-system,sans-serif'; g.fillText('SCORE', 540, 820);
  // rank
  g.fillStyle='#00E5FF'; g.font='900 70px -apple-system,sans-serif';
  g.fillText(rankFor(score,acc), 540, 960);
  // mini pitch with line
  g.save(); g.translate(140,1080);
  g.fillStyle='#0c3a26'; g.fillRect(0,0,800,520);
  g.strokeStyle='rgba(120,140,180,.4)'; g.lineWidth=3; g.strokeRect(0,0,800,520);
  g.strokeStyle='#FFB547'; g.lineWidth=6; g.shadowColor='#FFB547'; g.shadowBlur=20;
  g.beginPath(); g.moveTo(0,250); g.lineTo(800,250); g.stroke(); g.shadowBlur=0;
  g.fillStyle='#FF2D87'; g.beginPath(); g.arc(300,256,20,0,7); g.fill();
  g.fillStyle='#00E5FF'; g.beginPath(); g.arc(500,236,20,0,7); g.fill();
  g.restore();
  // stats
  g.fillStyle='#EAF0F8'; g.font='800 46px -apple-system,sans-serif';
  g.fillText('正答率 '+acc+'%　最大連続 '+bestStreak+'　誤審 '+wrongCount, 540, 1720);
  g.fillStyle='#5b6373'; g.font='700 30px -apple-system,sans-serif';
  g.fillText('#Hantei  #VAR  #IdeaRadar', 540, 1830);
  shareDataUrl=c.toDataURL('image/png');
  const img=document.getElementById('shareImg'); img.src=shareDataUrl;
}
async function doShare(){
  const img=document.getElementById('shareImg');
  img.style.display='block';
  if(!shareDataUrl) return;
  try{
    const blob=await (await fetch(shareDataUrl)).blob();
    const file=new File([blob],'hantei.png',{type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'Hantei 主審適性',text:'あなたがVAR主審 — 私の主審適性スコアは '+score+'！ #Hantei #IdeaRadar'});
      return;
    }
  }catch(e){}
  // fallback: download
  const a=document.createElement('a'); a.href=shareDataUrl; a.download='hantei.png'; a.click();
}

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('againBtn').addEventListener('click',function(){
  overLayer.classList.remove('on'); startGame();
});
document.getElementById('shareBtn').addEventListener('click',doShare);

resize();
requestAnimationFrame(loop);
})();
