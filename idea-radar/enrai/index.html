<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#04060e">
<title>遠雷 ENRAI — 雷を数えて生き延びろ</title>
<style>
  :root{
    --bg:#04060e; --ink:#eaf2ff; --sub:#8da0c4;
    --cyan:#39e7ff; --amber:#ffb340; --crimson:#ff3a52; --green:#39ff9e;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:-apple-system,"Hiragino Sans","Yu Gothic UI",sans-serif;
    user-select:none;-webkit-user-select:none;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  #stage{position:relative;width:100%;height:100%;max-width:480px;margin:0 auto;
    overflow:hidden;background:#04060e;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .layer{position:absolute;inset:0;}
  .hud{pointer-events:none;}
  /* ---- top HUD ---- */
  #top{position:absolute;top:0;left:0;right:0;padding:14px 16px;
    display:flex;justify-content:space-between;align-items:flex-start;z-index:6;}
  #hearts{font-size:20px;letter-spacing:3px;filter:drop-shadow(0 0 6px var(--crimson));}
  .stat{text-align:right;line-height:1.25;}
  .stat b{font-size:22px;font-variant-numeric:tabular-nums;font-weight:800;
    color:var(--cyan);text-shadow:0 0 10px rgba(57,231,255,.6);}
  .stat small{display:block;font-size:10px;color:var(--sub);letter-spacing:2px;}
  #streak{position:absolute;top:54px;left:0;right:0;text-align:center;z-index:6;
    font-weight:800;font-size:15px;color:var(--amber);
    text-shadow:0 0 12px rgba(255,179,64,.7);opacity:0;transition:opacity .2s;}
  /* ---- distance readout ---- */
  #dist{position:absolute;top:42%;left:0;right:0;text-align:center;z-index:5;
    opacity:0;transition:opacity .15s;}
  #dist b{font-size:46px;font-weight:900;font-variant-numeric:tabular-nums;
    text-shadow:0 0 18px rgba(57,231,255,.5);}
  #dist small{display:block;font-size:12px;color:var(--sub);letter-spacing:3px;margin-top:-4px;}
  /* ---- verdict ---- */
  #verdict{position:absolute;top:30%;left:0;right:0;text-align:center;z-index:7;
    font-weight:900;font-size:40px;opacity:0;letter-spacing:1px;}
  /* ---- bottom timeline ---- */
  #tl{position:absolute;left:18px;right:18px;bottom:118px;height:30px;z-index:6;}
  #tlbar{position:absolute;inset:0;border-radius:16px;overflow:hidden;
    background:linear-gradient(90deg,
      rgba(57,255,158,.18) 0%, rgba(57,255,158,.18) 60%,
      rgba(255,179,64,.20) 60%, rgba(255,179,64,.20) 80%,
      rgba(57,231,255,.30) 80%, rgba(57,231,255,.30) 96%,
      rgba(255,58,82,.30) 96%, rgba(255,58,82,.30) 100%);
    border:1px solid rgba(140,160,196,.25);}
  #safeband{position:absolute;top:-3px;bottom:-3px;left:80%;width:16%;
    border-radius:8px;border:2px solid var(--cyan);
    box-shadow:0 0 14px var(--cyan),inset 0 0 10px rgba(57,231,255,.4);
    background:rgba(57,231,255,.12);}
  #marker{position:absolute;top:-8px;bottom:-8px;width:5px;left:0%;border-radius:3px;
    background:#fff;box-shadow:0 0 12px #fff,0 0 22px var(--cyan);}
  #tllabel{position:absolute;bottom:36px;left:0;right:0;text-align:center;
    font-size:10px;letter-spacing:3px;color:var(--sub);}
  /* ---- evac button ---- */
  #evac{position:absolute;left:18px;right:18px;bottom:42px;height:62px;z-index:8;
    border-radius:18px;border:1.5px solid rgba(57,231,255,.5);
    background:linear-gradient(180deg,rgba(57,231,255,.16),rgba(57,231,255,.05));
    color:var(--ink);font-weight:900;font-size:20px;letter-spacing:4px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 0 20px rgba(57,231,255,.18);transition:transform .05s;}
  #evac:active{transform:scale(.97);}
  /* ---- tutorial pointer ---- */
  #tut{position:absolute;left:0;right:0;bottom:154px;text-align:center;z-index:9;
    font-size:13px;color:var(--cyan);font-weight:700;
    text-shadow:0 0 10px rgba(57,231,255,.6);opacity:0;transition:opacity .3s;}
  #tutarrow{position:absolute;bottom:150px;z-index:9;font-size:24px;opacity:0;
    transition:opacity .3s;animation:bob 1s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
  /* ---- panels ---- */
  .panel{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:28px;
    background:radial-gradient(120% 90% at 50% 30%,rgba(8,12,24,.72),rgba(4,6,14,.95));
    backdrop-filter:blur(2px);}
  .hide{display:none!important;}
  .logo{font-size:62px;font-weight:900;letter-spacing:10px;line-height:1;
    color:#fff;text-shadow:0 0 26px var(--cyan),0 0 60px rgba(57,231,255,.5);}
  .logo .jp{display:block;font-size:24px;letter-spacing:18px;color:var(--cyan);
    margin-top:8px;text-shadow:0 0 18px rgba(57,231,255,.6);}
  .tag{margin-top:18px;font-size:14px;color:var(--sub);line-height:1.7;max-width:300px;}
  .btn{margin-top:30px;padding:16px 46px;border-radius:40px;border:none;
    font-weight:900;font-size:19px;letter-spacing:3px;color:#04060e;cursor:pointer;
    background:linear-gradient(180deg,#9af0ff,var(--cyan));
    box-shadow:0 0 28px rgba(57,231,255,.55);}
  .btn.ghost{background:transparent;color:var(--cyan);border:1.5px solid var(--cyan);
    box-shadow:none;margin-top:14px;padding:13px 36px;font-size:15px;}
  .hint{margin-top:22px;font-size:11px;color:#5d6b8a;letter-spacing:1px;}
  /* result card */
  #cardWrap{margin-top:6px;}
  #card{width:230px;height:auto;border-radius:14px;
    box-shadow:0 8px 40px rgba(0,0,0,.6);}
  .gtitle{font-size:30px;font-weight:900;letter-spacing:4px;color:var(--crimson);
    text-shadow:0 0 20px rgba(255,58,82,.6);}
  .credit{position:absolute;bottom:8px;left:0;right:0;text-align:center;
    font-size:9px;color:#3b4663;letter-spacing:1px;z-index:21;}
</style>
</head>
<body>
<div id="wrap"><div id="stage">
  <canvas id="scene"></canvas>

  <!-- HUD -->
  <div class="layer hud">
    <div id="top">
      <div id="hearts">❤❤❤</div>
      <div class="stat"><b id="score">0</b><small>SCORE</small></div>
    </div>
    <div id="streak"></div>
    <div id="dist"><b id="distkm">—</b><small id="distlbl">嵐まで</small></div>
    <div id="verdict"></div>
    <div id="tllabel">嵐の接近</div>
    <div id="tl">
      <div id="tlbar"></div>
      <div id="safeband"></div>
      <div id="marker"></div>
    </div>
    <div id="tut"></div>
    <div id="tutarrow">▼</div>
  </div>

  <!-- evac button (also whole-screen tap works) -->
  <button id="evac">避　難</button>

  <!-- title -->
  <div class="panel" id="title">
    <div class="logo">ENRAI<span class="jp">遠 雷</span></div>
    <div class="tag">ピカッと光ってから<b style="color:#fff">ゴロゴロ</b>まで——<br>その遅れで嵐の距離を読み、<br>豪雨が来る寸前に<b style="color:var(--cyan)">避難</b>しろ。</div>
    <button class="btn" id="startBtn">は じ め る</button>
    <div class="hint">音を出すと腹に響きます🔊 ／ 画面のどこでもタップで避難</div>
  </div>

  <!-- game over -->
  <div class="panel hide" id="over">
    <div class="gtitle">ずぶ濡れ…</div>
    <div id="cardWrap"><canvas id="card"></canvas></div>
    <button class="btn" id="againBtn">もう一度</button>
    <button class="btn ghost" id="shareBtn">記録をシェア</button>
  </div>

  <div class="credit">Idea Radar 🏆 2026-06-21 ／ L-Wildcard 台風7号・遠隔豪雨</div>
</div></div>

<script>
(()=>{
'use strict';
// ---------- elements ----------
const stage=document.getElementById('stage');
const cv=document.getElementById('scene'), ctx=cv.getContext('2d');
const $=id=>document.getElementById(id);
const elHearts=$('hearts'),elScore=$('score'),elStreak=$('streak'),
  elDist=$('dist'),elDistKm=$('distkm'),elDistLbl=$('distlbl'),
  elVerdict=$('verdict'),elMarker=$('marker'),elSafe=$('safeband'),
  elEvac=$('evac'),elTut=$('tut'),elArrow=$('tutarrow'),
  elTitle=$('title'),elOver=$('over');

// ---------- sizing ----------
let W=0,H=0,DPR=Math.min(devicePixelRatio||1,2.5);
function resize(){
  const r=stage.getBoundingClientRect();
  W=r.width;H=r.height;
  cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
  buildSkyline();
}
addEventListener('resize',resize);

// ---------- skyline (deterministic) ----------
let buildings=[];
function rng(seed){let s=seed>>>0;return()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296;}}
function buildSkyline(){
  buildings=[];const r=rng(7);let x=0;const base=H*0.86;
  while(x<W+40){
    const w=18+r()*46, h=40+r()*Math.min(H*0.42,260);
    const wins=[];const cols=Math.max(1,Math.floor(w/12));const rows=Math.floor(h/16);
    for(let c=0;c<cols;c++)for(let rr=0;rr<rows;rr++){if(r()<0.32)wins.push([c,rr]);}
    buildings.push({x,w,top:base-h,cols,rows,wins});x+=w+2+r()*8;
  }
}

// ---------- audio (WebAudio, missing-fundamental thunder) ----------
let AC=null,master=null;
function audioInit(){
  if(AC)return;
  try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return;}
  master=AC.createGain();master.gain.value=0.9;master.connect(AC.destination);
}
function resumeAudio(){if(AC&&AC.state==='suspended')AC.resume();}
let noiseBuf=null;
function getNoise(){
  if(noiseBuf)return noiseBuf;
  const n=AC.sampleRate*2;noiseBuf=AC.createBuffer(1,n,AC.sampleRate);
  const d=noiseBuf.getChannelData(0);for(let i=0;i<n;i++)d[i]=Math.random()*2-1;
  return noiseBuf;
}
// thunder: nearness 0(far)..1(very close)
function thunder(nearness){
  if(!AC)return;const t=AC.currentTime;
  const out=AC.createGain();out.gain.value=0.0001;out.connect(master);
  // sub bank — missing fundamental (40-60Hz base + harmonics)
  const baseF=42+nearness*16;
  [1,2,3,4,5].forEach((m,i)=>{
    const o=AC.createOscillator();o.type=i<2?'sine':'triangle';
    o.frequency.value=baseF*m*(0.99+Math.random()*0.02);
    const g=AC.createGain();g.gain.value=(0.5/(i+1));
    o.connect(g);g.connect(out);o.start(t);o.stop(t+1.6);
    o.frequency.setValueAtTime(baseF*m,t);
    o.frequency.exponentialRampToValueAtTime(baseF*m*0.7,t+1.4);
  });
  // rumble noise through lowpass
  const ns=AC.createBufferSource();ns.buffer=getNoise();ns.loop=true;
  const lp=AC.createBiquadFilter();lp.type='lowpass';
  lp.frequency.value=200+nearness*420;lp.Q.value=0.7;
  const ng=AC.createGain();ng.gain.value=0.0001;
  ns.connect(lp);lp.connect(ng);ng.connect(out);ns.start(t);ns.stop(t+1.7);
  // crack (high) for near strikes
  if(nearness>0.45){
    const cs=AC.createBufferSource();cs.buffer=getNoise();
    const hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=1800;
    const cg=AC.createGain();cg.gain.value=0.0001;
    cs.connect(hp);hp.connect(cg);cg.connect(out);cs.start(t);cs.stop(t+0.4);
    cg.gain.setValueAtTime(0.0001,t);
    cg.gain.linearRampToValueAtTime(0.5*nearness,t+0.01);
    cg.gain.exponentialRampToValueAtTime(0.0001,t+0.3);
  }
  // envelope
  const peak=0.5+nearness*0.5;
  out.gain.setValueAtTime(0.0001,t);
  out.gain.linearRampToValueAtTime(peak,t+0.04);
  out.gain.exponentialRampToValueAtTime(0.0001,t+1.5);
  ng.gain.setValueAtTime(0.0001,t);
  ng.gain.linearRampToValueAtTime(0.6*peak,t+0.03);
  ng.gain.exponentialRampToValueAtTime(0.0001,t+1.4);
}
function tone(freq,dur,type='sine',vol=0.3){
  if(!AC)return;const t=AC.currentTime;
  const o=AC.createOscillator();o.type=type;o.frequency.value=freq;
  const g=AC.createGain();g.gain.value=0.0001;o.connect(g);g.connect(master);
  g.gain.linearRampToValueAtTime(vol,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t);o.stop(t+dur+0.02);
}
function chime(){tone(880,0.18,'triangle',0.25);tone(1320,0.22,'sine',0.18);}
function hitBurst(){ // direct-hit distorted low
  if(!AC)return;const t=AC.currentTime;
  const o=AC.createOscillator();o.type='sawtooth';o.frequency.value=70;
  const ws=AC.createWaveShaper();const c=new Float32Array(256);
  for(let i=0;i<256;i++){const x=i/128-1;c[i]=Math.tanh(x*4);}ws.curve=c;
  const g=AC.createGain();g.gain.value=0.0001;
  o.connect(ws);ws.connect(g);g.connect(master);
  o.frequency.setValueAtTime(120,t);o.frequency.exponentialRampToValueAtTime(40,t+0.6);
  g.gain.linearRampToValueAtTime(0.6,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.8);
  o.start(t);o.stop(t+0.85);
}
function vibe(p){if(navigator.vibrate)try{navigator.vibrate(p);}catch(e){}}

// ---------- game state ----------
const SAFE_LO=0.80, SAFE_HI=0.96, PERFECT_LO=0.86, PERFECT_HI=0.93;
let state='title';
let hp,score,streak,bestStreak,wave,nearest,fastestMs,survived;
let G=null; // current wave object
let flash=0;        // 0..1 white flash
let shake=0;
let rainHit=0;      // blackout/rain overlay 0..1
let lastT=0;

function reset(){
  hp=3;score=0;streak=0;bestStreak=0;wave=0;nearest=999;fastestMs=9999;survived=0;
  flash=0;shake=0;rainHit=0;G=null;
  renderHUD();
}
function renderHUD(){
  elHearts.textContent='❤'.repeat(Math.max(0,hp))+'♡'.repeat(Math.max(0,3-hp));
  elScore.textContent=score.toLocaleString();
}

// spawn a wave
function nextWave(){
  wave++;
  // approach window shrinks as storm intensifies
  const dur=Math.max(1.25, 3.3 - wave*0.13);
  // thunder fires partway (teaches flash->thunder gap shrinking)
  const thunderFrac=0.5;
  // distance derived from flash->thunder real seconds
  const delaySec=dur*thunderFrac;
  const km=Math.max(1,Math.round(delaySec*0.34*10)/10*10)/10; // ~ delay*0.34 km, keep 1 decimal
  G={dur,t0:performance.now()/1000,frac:0,thunderFrac,thunderDone:false,
     km:Math.max(0.5,Math.round(delaySec*340/100)/10), resolved:false,tutorial:wave===1};
  // flash now
  doFlash(0.9);
  // tutorial cues
  if(G.tutorial){
    elTut.textContent='光った！ 帯が光ったらタップで避難';elTut.style.opacity='1';
    elArrow.style.opacity='1';positionArrow();
  }else{elTut.style.opacity='0';elArrow.style.opacity='0';}
  elDist.style.opacity='0';
}
function positionArrow(){
  const tl=$('tl').getBoundingClientRect(),st=stage.getBoundingClientRect();
  const cx=tl.left-st.left+tl.width*((SAFE_LO+SAFE_HI)/2);
  elArrow.style.left=(cx-12)+'px';
}

function doFlash(v){flash=Math.max(flash,v);}

// resolve a tap / evac
function evac(){
  if(state!=='playing'||!G||G.resolved)return;
  resumeAudio();
  const f=G.frac;
  G.resolved=true;
  if(f<SAFE_LO){
    // too early: wasted run
    showVerdict('早すぎ',getCss('--sub'));
    streak=0;updateStreak();
    tone(220,0.18,'sine',0.2);vibe(20);
    setTimeout(()=>queueNext(0.35),420);
  }else{
    // safe!
    const perfect=f>=PERFECT_LO&&f<=PERFECT_HI;
    survived++;
    const ms=Math.round((1-Math.min(1,(SAFE_HI-f)/(SAFE_HI-SAFE_LO)))*0); // placeholder
    const reactMs=Math.round((f-SAFE_LO)/(SAFE_HI-SAFE_LO)*1000); // proxy ms within window (lower=earlier)
    streak++;bestStreak=Math.max(bestStreak,streak);
    if(G.km<nearest)nearest=G.km;
    const base=perfect?260:150;
    const gain=Math.round(base*(1+streak*0.18));
    score+=gain;
    showVerdict(perfect?'PERFECT 避難!':'SAFE',perfect?getCss('--cyan'):getCss('--green'));
    if(perfect){chime();tone(1760,0.2,'sine',0.16);}else chime();
    vibe(perfect?[14,30,14]:30);
    renderHUD();updateStreak();
    setTimeout(()=>queueNext(0.3),perfect?520:440);
  }
}

function directHit(){
  G.resolved=true;
  hp--;survived=survived; // no increment
  streak=0;updateStreak();
  showVerdict('直撃',getCss('--crimson'));
  rainHit=1;shake=18;doFlash(1);
  hitBurst();vibe([60,40,90,40,120]);
  renderHUD();
  if(hp<=0){setTimeout(gameOver,700);}
  else setTimeout(()=>queueNext(0.5),760);
}

let nextTimer=null;
function queueNext(delay){
  if(state!=='playing')return;
  clearTimeout(nextTimer);
  nextTimer=setTimeout(()=>{if(state==='playing')nextWave();},delay*1000);
  G=null;
}

function showVerdict(txt,col){
  elVerdict.textContent=txt;elVerdict.style.color=col;
  elVerdict.style.transition='none';elVerdict.style.opacity='1';
  elVerdict.style.transform='scale(1.15)';
  requestAnimationFrame(()=>{
    elVerdict.style.transition='opacity .5s, transform .5s';
    elVerdict.style.opacity='0';elVerdict.style.transform='scale(1)';
  });
}
function updateStreak(){
  if(streak>=2){elStreak.textContent='🔥 '+streak+' 連続生還';elStreak.style.opacity='1';}
  else elStreak.style.opacity='0';
}
function getCss(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

// ---------- main loop ----------
function loop(now){
  now/=1000;const dt=Math.min(0.05,now-(lastT||now));lastT=now;
  // decay fx
  flash=Math.max(0,flash-dt*2.4);
  shake=Math.max(0,shake-dt*42);
  rainHit=Math.max(0,rainHit-dt*0.9);

  if(state==='playing'&&G&&!G.resolved){
    G.frac=Math.min(1,(now-G.t0)/G.dur);
    // thunder when reaching thunderFrac
    if(!G.thunderDone&&G.frac>=G.thunderFrac){
      G.thunderDone=true;
      const nearness=Math.min(1,1-(G.km/4));
      thunder(Math.max(0.1,nearness));
      vibe(nearness>0.5?[20,30,40]:[15]);
      elDistKm.textContent=G.km.toFixed(1);elDist.style.opacity='1';
      doFlash(0.25);
    }
    // marker position
    elMarker.style.left=(G.frac*100)+'%';
    // safe band pulse
    const inSafe=G.frac>=SAFE_LO&&G.frac<=SAFE_HI;
    elSafe.style.opacity=inSafe?String(0.7+0.3*Math.sin(now*18)):'1';
    elSafe.style.boxShadow=inSafe?'0 0 22px var(--cyan),inset 0 0 14px rgba(57,231,255,.6)':'0 0 14px var(--cyan)';
    // direct hit
    if(G.frac>=1){directHit();}
  }else{
    elSafe.style.opacity='0.5';
  }
  draw(now);
  requestAnimationFrame(loop);
}

function draw(now){
  const sx=(Math.random()-0.5)*shake, sy=(Math.random()-0.5)*shake;
  ctx.save();ctx.translate(sx,sy);
  // sky gradient
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#070b18');g.addColorStop(0.6,'#05070f');g.addColorStop(1,'#02030a');
  ctx.fillStyle=g;ctx.fillRect(-20,-20,W+40,H+40);
  // distant storm glow at horizon
  if(state==='playing'&&G){
    const hz=H*0.5;
    const glow=ctx.createRadialGradient(W*0.5,hz,10,W*0.5,hz,W*0.7);
    const a=0.05+(G?Math.max(0,1-G.km/4)*0.10:0);
    glow.addColorStop(0,'rgba(57,231,255,'+a+')');glow.addColorStop(1,'rgba(57,231,255,0)');
    ctx.fillStyle=glow;ctx.fillRect(0,0,W,H);
  }
  // lightning bolt during flash
  if(flash>0.4){drawBolt(now);}
  // skyline
  ctx.fillStyle='#0a0f1f';
  for(const b of buildings){
    ctx.fillRect(b.x,b.top,b.w,H-b.top);
  }
  // window lights
  for(const b of buildings){
    const cw=b.w/b.cols;
    for(const[c,rr]of b.wins){
      ctx.fillStyle='rgba(255,200,120,'+(0.25+(flash>0?flash*0.5:0))+')';
      ctx.fillRect(b.x+c*cw+2,b.top+rr*16+3,Math.max(2,cw-4),7);
    }
  }
  // building edge neon (cyan rim when flash)
  if(flash>0.1){
    ctx.strokeStyle='rgba(57,231,255,'+flash*0.5+')';ctx.lineWidth=1.2;
    for(const b of buildings){ctx.strokeRect(b.x,b.top,b.w,H-b.top);}
  }
  // rain streaks when storm near or hit
  const rainAmt = rainHit*1 + (state==='playing'&&G?Math.max(0,1-G.km/2)*0.4:0);
  if(rainAmt>0.05){
    ctx.strokeStyle='rgba(160,200,255,'+Math.min(0.5,rainAmt*0.5)+')';ctx.lineWidth=1;
    const n=Math.floor(rainAmt*120);
    for(let i=0;i<n;i++){
      const x=Math.random()*W, y=Math.random()*H, len=10+Math.random()*16;
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-3,y+len);ctx.stroke();
    }
  }
  ctx.restore();
  // full-screen white flash
  if(flash>0){ctx.fillStyle='rgba(235,245,255,'+Math.min(1,flash*0.9)+')';ctx.fillRect(0,0,W,H);}
  // direct-hit dark/red vignette
  if(rainHit>0){
    ctx.fillStyle='rgba(2,2,8,'+rainHit*0.6+')';ctx.fillRect(0,0,W,H);
    const vg=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.7);
    vg.addColorStop(0,'rgba(255,58,82,0)');vg.addColorStop(1,'rgba(255,58,82,'+rainHit*0.4+')');
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  }
}
function drawBolt(now){
  ctx.save();
  ctx.strokeStyle='rgba(200,240,255,'+Math.min(1,flash)+')';
  ctx.lineWidth=2.5;ctx.shadowColor='#9af0ff';ctx.shadowBlur=18;
  const startX=W*(0.2+0.6*((Math.floor(now*3))%5)/5);
  let x=startX,y=0;ctx.beginPath();ctx.moveTo(x,y);
  const seg=8+Math.floor(Math.random()*4);
  for(let i=0;i<seg;i++){
    x+=(Math.random()-0.5)*60;y+=H*0.5/seg;
    ctx.lineTo(x,y);
  }
  ctx.stroke();
  // branch
  ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(x,y);
  ctx.lineTo(x+(Math.random()-0.5)*80,y+40);ctx.stroke();
  ctx.restore();
}

// ---------- game over + share card ----------
function gameOver(){
  state='over';clearTimeout(nextTimer);
  bestStreak=Math.max(bestStreak,streak);
  drawCard();
  elOver.classList.remove('hide');
}
function drawCard(){
  const c=$('card'),x=c.getContext('2d');
  const w=540,h=960;c.width=w;c.height=h;
  // bg
  const g=x.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#070b18');g.addColorStop(1,'#02030a');x.fillStyle=g;x.fillRect(0,0,w,h);
  // border
  x.strokeStyle='rgba(57,231,255,.5)';x.lineWidth=6;x.strokeRect(16,16,w-32,h-32);
  // bolt motif
  x.strokeStyle='rgba(57,231,255,.35)';x.lineWidth=5;x.shadowColor='#39e7ff';x.shadowBlur=22;
  let bx=w*0.5,by=70;x.beginPath();x.moveTo(bx,by);
  for(let i=0;i<7;i++){bx+=(Math.sin(i*2.1)*54);by+=70;x.lineTo(bx,by);}
  x.stroke();x.shadowBlur=0;
  // title
  x.textAlign='center';x.fillStyle='#fff';
  x.font='900 92px -apple-system,sans-serif';x.shadowColor='#39e7ff';x.shadowBlur=28;
  x.fillText('ENRAI',w/2,250);
  x.font='800 40px -apple-system,sans-serif';x.fillStyle='#39e7ff';
  x.fillText('遠 雷',w/2,308);x.shadowBlur=0;
  // stats
  const stats=[
    ['しのいだ豪雨', survived+' 波', '#fff'],
    ['最接近', (nearest===999?'—':nearest.toFixed(1)+' km'), '#39e7ff'],
    ['最長連続生還', bestStreak+' 連続', '#ffb340'],
    ['SCORE', score.toLocaleString(), '#39ff9e'],
  ];
  let yy=440;
  for(const[l,v,col]of stats){
    x.fillStyle='#8da0c4';x.font='600 26px -apple-system,sans-serif';x.textAlign='left';
    x.fillText(l,70,yy);
    x.fillStyle=col;x.font='900 48px -apple-system,sans-serif';x.textAlign='right';
    x.shadowColor=col;x.shadowBlur=14;x.fillText(v,w-70,yy+6);x.shadowBlur=0;
    yy+=110;
  }
  // footer
  x.textAlign='center';x.fillStyle='#5d6b8a';x.font='600 24px -apple-system,sans-serif';
  x.fillText('遠雷を数えて生き延びろ',w/2,h-110);
  x.fillStyle='#39e7ff';x.font='800 28px -apple-system,sans-serif';
  x.fillText('t-aka-h.github.io/idea-radar/enrai',w/2,h-66);
}
async function share(){
  const c=$('card');
  c.toBlob(async (blob)=>{
    const file=new File([blob],'enrai.png',{type:'image/png'});
    const text='遠雷ENRAI — '+survived+'波しのいで生還。最接近'+(nearest===999?'—':nearest.toFixed(1)+'km')+' #ENRAI #遠雷';
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      try{await navigator.share({files:[file],text});return;}catch(e){}
    }
    // fallback: download
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='enrai.png';a.click();
  },'image/png');
}

// ---------- input ----------
function tapEvac(e){e.preventDefault();evac();}
elEvac.addEventListener('touchstart',tapEvac,{passive:false});
elEvac.addEventListener('mousedown',tapEvac);
// whole-screen tap during play
stage.addEventListener('touchstart',(e)=>{
  if(state==='playing'&&!e.target.closest('.panel')&&e.target!==elEvac)evac();
},{passive:true});
stage.addEventListener('mousedown',(e)=>{
  if(state==='playing'&&!e.target.closest('.panel')&&e.target!==elEvac)evac();
});

function start(){
  audioInit();resumeAudio();
  reset();state='playing';
  elTitle.classList.add('hide');elOver.classList.add('hide');
  setTimeout(()=>nextWave(),500);
}
$('startBtn').addEventListener('click',start);
$('againBtn').addEventListener('click',start);
$('shareBtn').addEventListener('click',share);

// ---------- boot ----------
resize();reset();requestAnimationFrame(loop);
})();
</script>
