<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#05060f">
<title>頂 — Itadaki｜夏至の最強開運タップ</title>
<style>
  :root{ --gold:#FFC83D; --gold2:#FF9A1F; --cyan:#46E3FF; --pink:#FF2D87; --bg:#05060f; --ink:#f4f1e4; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;}
  body{font-family:-apple-system,'Hiragino Mincho ProN','Hiragino Sans',serif;color:var(--ink);}
  #app{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{display:block;touch-action:none;}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:26px;gap:14px;z-index:5;}
  .hidden{display:none!important;}
  .title{font-size:74px;font-weight:900;letter-spacing:6px;margin:0;
    background:linear-gradient(180deg,#fff,var(--gold) 55%,var(--gold2));-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 38px rgba(255,180,60,.45);}
  .romaji{font-size:15px;letter-spacing:7px;color:var(--gold);margin:-6px 0 2px;font-family:-apple-system,sans-serif;}
  .lede{font-size:14px;line-height:1.9;color:#d9d3bf;max-width:330px;font-family:-apple-system,'Hiragino Sans',sans-serif;}
  .kichi{font-size:13px;letter-spacing:2px;color:var(--cyan);font-family:-apple-system,sans-serif;
    border:1px solid rgba(70,227,255,.4);border-radius:999px;padding:7px 16px;background:rgba(70,227,255,.06);}
  .btn{margin-top:10px;font-family:-apple-system,sans-serif;font-weight:800;font-size:18px;letter-spacing:3px;color:#1a1305;
    background:linear-gradient(180deg,#FFE08A,var(--gold) 60%,var(--gold2));border:none;border-radius:999px;
    padding:16px 46px;box-shadow:0 0 34px rgba(255,180,60,.5),inset 0 1px 0 rgba(255,255,255,.6);cursor:pointer;}
  .btn:active{transform:translateY(1px) scale(.99);}
  .small{font-size:11px;color:#7c7766;font-family:-apple-system,sans-serif;letter-spacing:1px;line-height:1.7;}
  .hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;
    padding:16px 18px;z-index:4;pointer-events:none;font-family:-apple-system,sans-serif;}
  .hud .lbl{font-size:10px;letter-spacing:2px;color:#9a9484;}
  .hud .val{font-size:22px;font-weight:900;color:#fff;text-shadow:0 0 12px rgba(255,200,90,.5);}
  .hud .r{text-align:right;}
  .instruct{position:absolute;left:0;right:0;bottom:11%;text-align:center;z-index:4;pointer-events:none;
    font-family:-apple-system,sans-serif;font-size:14px;letter-spacing:2px;color:#cdbf9a;
    text-shadow:0 0 16px rgba(0,0,0,.8);transition:opacity .3s;}
  .attackdots{position:absolute;left:0;right:0;top:54px;display:flex;gap:10px;justify-content:center;z-index:4;pointer-events:none;}
  .dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.16);box-shadow:inset 0 0 0 1px rgba(255,255,255,.18);}
  .dot.just{background:radial-gradient(circle,#fff,var(--gold));box-shadow:0 0 12px var(--gold);}
  .dot.good{background:var(--cyan);box-shadow:0 0 10px var(--cyan);}
  .dot.miss{background:#3a3f63;}
  #cardWrap{position:absolute;inset:0;z-index:6;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    background:rgba(3,4,10,.82);backdrop-filter:blur(3px);padding:20px;}
  #cardCanvas{width:auto;max-width:78vw;max-height:64vh;border-radius:14px;box-shadow:0 14px 60px rgba(0,0,0,.6);}
  .row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .btn2{font-family:-apple-system,sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;color:#f4f1e4;
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:13px 26px;cursor:pointer;}
  .btn2.pri{color:#1a1305;background:linear-gradient(180deg,#FFE08A,var(--gold));border:none;}
  .btn2:active{transform:translateY(1px);}
  .flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:3;mix-blend-mode:screen;}
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <!-- HUD -->
  <div class="hud hidden" id="hud">
    <div><div class="lbl">運気スコア</div><div class="val" id="scoreVal">0</div></div>
    <div class="r"><div class="lbl">本日の吉</div><div class="val" id="luckVal" style="font-size:14px;color:var(--cyan)">大安×寅の日×夏至</div></div>
  </div>
  <div class="attackdots hidden" id="dots"></div>
  <div class="instruct hidden" id="instruct">太陽が<b>頂</b>に届く刹那を<b>タップ</b></div>
  <div class="flash" id="flash"></div>

  <!-- START -->
  <div class="overlay" id="start">
    <div class="romaji">I T A D A K I</div>
    <h1 class="title">頂</h1>
    <div class="kichi" id="todayKichi">2026.6.21 夏至 — 大安×寅の日</div>
    <div class="lede">一年で最も高く昇る夏至の太陽。<br>その太陽が天の<b>頂（南中）</b>に届く刹那をジャストで掴み、<br>下半期の運気を頂点まで引き上げよ。</div>
    <button class="btn" id="startBtn">天を仰ぐ</button>
    <div class="small">3回の運気アタック・完全オンデバイス<br>音が出ます / 端末は縦向きで</div>
  </div>

  <!-- RESULT CARD -->
  <div id="cardWrap" class="hidden">
    <canvas id="cardCanvas"></canvas>
    <div class="row">
      <button class="btn2 pri" id="shareBtn">お守りをシェア</button>
      <button class="btn2" id="retryBtn">もう一度</button>
    </div>
    <div class="small" id="saveHint">うまく共有できない時は画像を長押しで保存</div>
  </div>
</div>

<script>
(function(){
"use strict";
//============ canvas / sizing ============
var DPR = Math.min(window.devicePixelRatio||1, 2.5);
var cv = document.getElementById('game'), ctx = cv.getContext('2d');
var W=0,H=0;
function resize(){
  // portrait 9:16 fit
  var vw=window.innerWidth, vh=window.innerHeight;
  var aspect=9/16, w=vw, h=vw/aspect;
  if(h>vh){ h=vh; w=vh*aspect; }
  W=w; H=h;
  cv.style.width=w+'px'; cv.style.height=h+'px';
  cv.width=Math.round(w*DPR); cv.height=Math.round(h*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize); resize();

//============ audio (WebAudio synthesis only) ============
var AC=null;
function audio(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended') AC.resume(); return AC; }
function now(){ return AC?AC.currentTime:0; }
function tone(freq,t0,dur,type,gain,glideTo){
  if(!AC) return;
  var o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(freq,t0);
  if(glideTo) o.frequency.exponentialRampToValueAtTime(glideTo,t0+dur);
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(gain,t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g); g.connect(AC.destination); o.start(t0); o.stop(t0+dur+0.05);
}
// missing fundamental low body: 55 + harmonics
function subBody(t0,dur,base,gain){
  if(!AC) return;
  var hs=[base,base*2,base*3,base*4];
  for(var i=0;i<hs.length;i++){ tone(hs[i],t0,dur,'sine',gain*(i===0?0.55:0.4/(i+1)),null); }
}
function bell(t0,freq,dur,gain){
  if(!AC) return;
  var o=AC.createOscillator(), g=AC.createGain();
  o.type='triangle'; o.frequency.setValueAtTime(freq,t0);
  g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(gain,t0+0.006);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g); g.connect(AC.destination); o.start(t0); o.stop(t0+dur+0.05);
}
function sfxClick(){ if(!audio())return; var t=now(); tone(1200,t,0.05,'square',0.06,820); }
function sfxJust(grade){
  if(!audio())return; var t=now();
  // solemn chord C-E-G-C
  var ch=[261.63,329.63,392.00,523.25];
  for(var i=0;i<ch.length;i++) tone(ch[i],t+i*0.03,0.85,'sine',0.10,null);
  for(var j=0;j<ch.length;j++) tone(ch[j]*2,t+0.02+j*0.03,0.5,'triangle',0.035,null);
  subBody(t,1.0,55,0.16);
  bell(t+0.02,1976,1.1,0.10); bell(t+0.05,2637,0.9,0.06);
}
function sfxGood(){
  if(!audio())return; var t=now();
  tone(523.25,t,0.5,'sine',0.09,null); tone(659.25,t+0.02,0.5,'sine',0.07,null);
  subBody(t,0.5,55,0.08); bell(t+0.02,1568,0.6,0.05);
}
function sfxKyo(){
  if(!audio())return; var t=now();
  tone(220,t,0.5,'sine',0.07,90); tone(174,t,0.45,'triangle',0.05,80);
}

function vibe(p){ if(navigator.vibrate){ try{ navigator.vibrate(p); }catch(e){} } }

//============ state ============
var STATE='start'; // start | rising | between | done
var attack=0;            // 0..2
var ATTACKS=3;
var results=[];          // 'just'|'good'|'kyo'
var score=0, displayScore=0;
var combo=0;
var luck=0, displayLuck=0; // 0..1 gauge
// per-attack tuning: [arc duration s, zenith hold factor, JUST window (|t-.5|), GOOD window]
var TUNE=[
  {dur:3.2, hold:0.20, jwin:0.060, gwin:0.135},
  {dur:2.7, hold:0.15, jwin:0.045, gwin:0.110},
  {dur:2.3, hold:0.10, jwin:0.030, gwin:0.090}
];
var t0Anim=0;           // start time of current rise
var tapped=false;
var rng=Math.random;

//============ particles ============
var P=[]; // pool
function spawnRay(cx,cy,col){
  for(var i=0;i<16;i++){
    var a=(i/16)*Math.PI*2 + rng()*0.1;
    P.push({type:'ray',x:cx,y:cy,a:a,len:0,maxlen:H*0.42*(0.7+rng()*0.5),life:0,max:0.42,col:col,w:2+rng()*2});
  }
}
function spawnKichi(cx,cy,n,col){
  for(var i=0;i<n;i++){
    var a=rng()*Math.PI*2, sp=40+rng()*150;
    P.push({type:'kichi',x:cx,y:cy,vx:Math.cos(a)*sp*0.4,vy:-Math.abs(Math.sin(a)*sp)-30-rng()*80,
      life:0,max:0.9+rng()*0.7,col:col,r:2+rng()*3.5,kanji:rng()<0.5?'吉':'寿'});
  }
}
function spawnEmber(cx,cy,col){
  for(var i=0;i<10;i++){
    var a=rng()*Math.PI*2, sp=10+rng()*40;
    P.push({type:'ember',x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-20,life:0,max:1.2+rng()*0.8,col:col,r:1+rng()*2});
  }
}
function updateParticles(dt){
  for(var i=P.length-1;i>=0;i--){
    var p=P[i]; p.life+=dt;
    if(p.life>=p.max){ P.splice(i,1); continue; }
    if(p.type==='ray'){ p.len=p.maxlen*Math.min(1,p.life/0.12); }
    else { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=120*dt; }
  }
}
function drawParticles(){
  for(var i=0;i<P.length;i++){
    var p=P[i], k=1-p.life/p.max;
    if(p.type==='ray'){
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.a);
      ctx.globalAlpha=k*0.9; ctx.strokeStyle=p.col; ctx.lineWidth=p.w; ctx.lineCap='round';
      ctx.shadowColor=p.col; ctx.shadowBlur=14;
      ctx.beginPath(); ctx.moveTo(p.len*0.18,0); ctx.lineTo(p.len,0); ctx.stroke();
      ctx.restore();
    } else if(p.type==='kichi'){
      ctx.save(); ctx.globalAlpha=k; ctx.fillStyle=p.col; ctx.shadowColor=p.col; ctx.shadowBlur=10;
      ctx.font='600 '+(11+p.r*2)+"px 'Hiragino Mincho ProN',serif"; ctx.textAlign='center';
      ctx.fillText(p.kanji,p.x,p.y); ctx.restore();
    } else {
      ctx.save(); ctx.globalAlpha=k*0.8; ctx.fillStyle=p.col; ctx.shadowColor=p.col; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); ctx.restore();
    }
  }
}

//============ sun arc geometry ============
// t in [0,1]; eased so sun nearly pauses near zenith (t=0.5)
function easeArc(t,hold){
  // map linear t -> warped t that slows near 0.5
  var c=t-0.5;
  // cubic emphasis around center scaled by hold
  return t + (-c)*hold*(1-Math.abs(c)*2);
}
function sunPos(t){
  var pad=W*0.16;
  var x=pad + (W-2*pad)*t;
  var horizon=H*0.80;
  var peakY=H*0.20;
  // parabola peak at t=0.5
  var arc=1-Math.pow((t-0.5)/0.5,2); // 0..1, peak 1 at center
  var y=horizon-(horizon-peakY)*arc;
  return {x:x,y:y};
}
var zenithY=H*0.20;
function zenith(){ return {x:W*0.5, y:H*0.20}; }

//============ shake / flash ============
var shake=0, flashEl=document.getElementById('flash');
function doFlash(col,amt){ flashEl.style.background=col; flashEl.style.opacity=amt; }

//============ DOM refs ============
var elStart=document.getElementById('start'), elHud=document.getElementById('hud'),
    elDots=document.getElementById('dots'), elInstruct=document.getElementById('instruct'),
    elScore=document.getElementById('scoreVal'), elCardWrap=document.getElementById('cardWrap');

function buildDots(){ elDots.innerHTML=''; for(var i=0;i<ATTACKS;i++){ var d=document.createElement('div'); d.className='dot'; d.id='dot'+i; elDots.appendChild(d); } }
function setDot(i,cls){ var d=document.getElementById('dot'+i); if(d) d.className='dot '+cls; }

//============ game flow ============
function startGame(){
  audio(); sfxClick();
  attack=0; results=[]; score=0; displayScore=0; combo=0; luck=0; displayLuck=0; P.length=0;
  STATE='rising'; tapped=false; t0Anim=performance.now()/1000;
  elStart.classList.add('hidden'); elCardWrap.classList.add('hidden');
  elHud.classList.remove('hidden'); elDots.classList.remove('hidden'); elInstruct.classList.remove('hidden');
  buildDots();
}
function beginAttack(){
  tapped=false; t0Anim=performance.now()/1000; STATE='rising';
  elInstruct.style.opacity=1;
}
function judgeTap(t){
  if(tapped||STATE!=='rising') return;
  tapped=true;
  var tn=TUNE[attack];
  var d=Math.abs(t-0.5);
  var sp=sunPos(t);
  var res, gained=0;
  if(d<=tn.jwin){
    res='just'; combo++; gained=1000*(1+(combo-1)*0.5);
    spawnRay(sp.x,sp.y,'#FFE38A'); spawnRay(zenith().x,zenith().y,'#FFC83D');
    spawnKichi(sp.x,sp.y,26,'#FFD86b');
    doFlash('#fff',0.55); shake=10; sfxJust(); vibe([0,40,30,60]);
    luck=Math.min(1,luck+0.42);
    setDot(attack,'just');
  } else if(d<=tn.gwin){
    res='good'; combo=0; gained=400;
    spawnRay(sp.x,sp.y,'#7fe9ff'); spawnKichi(sp.x,sp.y,12,'#9fe7ff');
    doFlash('#cfeffff0',0.28); shake=5; sfxGood(); vibe([0,28]);
    luck=Math.min(1,luck+0.20);
    setDot(attack,'good');
  } else {
    res='kyo'; combo=0; gained=40;
    spawnEmber(sp.x,sp.y,'#5b6bb0');
    doFlash('#0a1430',0.30); shake=3; sfxKyo(); vibe([0,18]);
    luck=Math.min(1,luck+0.04);
    setDot(attack,'miss');
  }
  results.push(res); score+=Math.round(gained);
  elInstruct.style.opacity=0;
  STATE='between';
  setTimeout(nextAttack, 950);
}
function nextAttack(){
  attack++;
  if(attack>=ATTACKS){ finish(); return; }
  beginAttack();
}
function finish(){
  STATE='done';
  elHud.classList.add('hidden'); elInstruct.classList.add('hidden');
  // small celebratory glints
  setTimeout(showCard, 380);
}

//============ tap input ============
function onTap(e){
  if(STATE==='rising'){
    e.preventDefault();
    var tn=TUNE[attack];
    var el=(performance.now()/1000 - t0Anim)/tn.dur; // 0..1 linear
    el=Math.max(0,Math.min(1,el));
    judgeTap(el);
  }
}
cv.addEventListener('pointerdown',onTap,{passive:false});
cv.addEventListener('touchstart',onTap,{passive:false});

//============ render loop ============
var last=performance.now();
function frame(t){
  var dt=Math.min(0.05,(t-last)/1000); last=t;
  // background
  ctx.setTransform(DPR,0,0,DPR,0,0);
  var sx=(rng()-0.5)*shake, sy=(rng()-0.5)*shake;
  if(shake>0.2) ctx.translate(sx,sy);
  shake*=0.86;

  drawSky();
  drawHorizon();
  if(STATE==='rising'||STATE==='between'){
    drawZenithTarget();
    drawSun();
  }
  if(STATE==='start') drawIdleSun(t);
  updateParticles(dt); drawParticles();
  drawLuckGauge();

  // flash fade
  var fo=parseFloat(flashEl.style.opacity)||0; if(fo>0){ flashEl.style.opacity=Math.max(0,fo-dt*2.2); }

  // animate score / luck numbers
  if(displayScore<score){ displayScore=Math.min(score,displayScore+Math.ceil((score-displayScore)*0.12)+7); }
  elScore.textContent=displayScore.toLocaleString();
  displayLuck += (luck-displayLuck)*0.12;

  // arc miss auto
  if(STATE==='rising'){
    var tn=TUNE[attack];
    var el=(performance.now()/1000 - t0Anim)/tn.dur;
    if(el>=1 && !tapped){ judgeTap(0.999); } // missed the whole pass
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

//============ drawing helpers ============
function drawSky(){
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#070a1c'); g.addColorStop(0.45,'#0c1030'); g.addColorStop(0.78,'#241a3e'); g.addColorStop(1,'#3a1f38');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // faint stars
  ctx.save();
  for(var i=0;i<40;i++){
    var x=((i*97)%W), y=((i*53)%(H*0.6));
    ctx.globalAlpha=0.12+0.12*Math.sin(i*1.7);
    ctx.fillStyle='#cdd6ff'; ctx.fillRect(x,y,1.4,1.4);
  }
  ctx.restore();
}
function drawHorizon(){
  var hy=H*0.80;
  var g=ctx.createLinearGradient(0,hy-60,0,hy+30);
  g.addColorStop(0,'rgba(255,140,60,0)'); g.addColorStop(1,'rgba(255,120,50,0.30)');
  ctx.fillStyle=g; ctx.fillRect(0,hy-60,W,90);
  // neon horizon line
  ctx.save(); ctx.strokeStyle='#FF9A3D'; ctx.lineWidth=2; ctx.shadowColor='#FF9A3D'; ctx.shadowBlur=18;
  ctx.beginPath(); ctx.moveTo(0,hy); ctx.lineTo(W,hy); ctx.stroke();
  // grid floor
  ctx.globalAlpha=0.5; ctx.strokeStyle='#FF7a3a'; ctx.lineWidth=1; ctx.shadowBlur=8;
  for(var i=1;i<=7;i++){ var yy=hy+i*i*2.2; ctx.globalAlpha=0.4-i*0.045; ctx.beginPath(); ctx.moveTo(0,yy); ctx.lineTo(W,yy); ctx.stroke(); }
  ctx.restore();
}
function drawZenithTarget(){
  var z=zenith(), r=Math.max(20,W*0.085);
  var pulse=0.5+0.5*Math.sin(performance.now()/240);
  ctx.save();
  ctx.translate(z.x,z.y);
  // target ring
  ctx.globalAlpha=0.55+0.25*pulse; ctx.strokeStyle='#FFD86b'; ctx.lineWidth=2; ctx.shadowColor='#FFC83D'; ctx.shadowBlur=16;
  ctx.beginPath(); ctx.arc(0,0,r,0,7); ctx.stroke();
  ctx.globalAlpha=0.25; ctx.beginPath(); ctx.arc(0,0,r*1.5,0,7); ctx.stroke();
  // crosshair
  ctx.globalAlpha=0.5; ctx.lineWidth=1.4; ctx.beginPath();
  ctx.moveTo(-r*1.5,0);ctx.lineTo(-r*0.7,0); ctx.moveTo(r*0.7,0);ctx.lineTo(r*1.5,0);
  ctx.stroke();
  // label 頂
  ctx.globalAlpha=0.85; ctx.fillStyle='#FFE7a8'; ctx.shadowBlur=10;
  ctx.font="600 14px 'Hiragino Mincho ProN',serif"; ctx.textAlign='center';
  ctx.fillText('頂',0,-r-12);
  ctx.restore();
}
function curT(){
  var tn=TUNE[attack];
  var el=(performance.now()/1000 - t0Anim)/tn.dur;
  el=Math.max(0,Math.min(1,el));
  return easeArc(el,tn.hold);
}
function drawSun(){
  var t=curT(), p=sunPos(t);
  var prox=1-Math.min(1,Math.abs(t-0.5)/0.5); // near zenith glow
  var R=Math.max(16,W*0.07)*(1+prox*0.18);
  ctx.save();
  // outer glow
  var g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,R*3.4);
  g.addColorStop(0,'rgba(255,250,230,'+(0.9)+')');
  g.addColorStop(0.18,'rgba(255,210,110,'+(0.8)+')');
  g.addColorStop(0.5,'rgba(255,150,60,'+(0.28+prox*0.2)+')');
  g.addColorStop(1,'rgba(255,120,40,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p.x,p.y,R*3.4,0,7); ctx.fill();
  // core
  ctx.shadowColor='#FFD37a'; ctx.shadowBlur=30;
  var cg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,R);
  cg.addColorStop(0,'#ffffff'); cg.addColorStop(0.6,'#FFE39a'); cg.addColorStop(1,'#FF9a30');
  ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(p.x,p.y,R,0,7); ctx.fill();
  // trailing glints near zenith
  if(prox>0.6){
    ctx.globalAlpha=(prox-0.6)*2.2; ctx.strokeStyle='#fff5d8'; ctx.lineWidth=1.5; ctx.shadowBlur=14;
    for(var i=0;i<8;i++){ var a=i/8*Math.PI*2; ctx.beginPath();
      ctx.moveTo(p.x+Math.cos(a)*R*1.3,p.y+Math.sin(a)*R*1.3);
      ctx.lineTo(p.x+Math.cos(a)*R*(1.9+0.5*Math.sin(performance.now()/120+i)),p.y+Math.sin(a)*R*1.9); ctx.stroke(); }
  }
  ctx.restore();
}
function drawIdleSun(t){
  var x=W*0.5, y=H*0.42 + Math.sin(t/900)*6, R=W*0.085;
  ctx.save();
  var g=ctx.createRadialGradient(x,y,0,x,y,R*3);
  g.addColorStop(0,'rgba(255,250,230,0.85)'); g.addColorStop(0.3,'rgba(255,200,90,0.5)'); g.addColorStop(1,'rgba(255,140,50,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,R*3,0,7); ctx.fill();
  ctx.shadowColor='#FFD37a'; ctx.shadowBlur=28;
  var cg=ctx.createRadialGradient(x,y,0,x,y,R);
  cg.addColorStop(0,'#fff'); cg.addColorStop(0.6,'#FFE39a'); cg.addColorStop(1,'#FF9a30');
  ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(x,y,R,0,7); ctx.fill();
  ctx.restore();
}
function drawLuckGauge(){
  if(STATE==='start') return;
  var mx=W-26, top=H*0.30, bot=H*0.72, h=bot-top;
  ctx.save();
  // track
  ctx.lineWidth=8; ctx.lineCap='round'; ctx.strokeStyle='rgba(255,255,255,.10)';
  ctx.beginPath(); ctx.moveTo(mx,bot); ctx.lineTo(mx,top); ctx.stroke();
  // fill
  var fy=bot-h*displayLuck;
  var g=ctx.createLinearGradient(0,bot,0,top);
  g.addColorStop(0,'#FF7a3a'); g.addColorStop(0.5,'#FFC83D'); g.addColorStop(1,'#FFF1b8');
  ctx.strokeStyle=g; ctx.shadowColor='#FFC83D'; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.moveTo(mx,bot); ctx.lineTo(mx,fy); ctx.stroke();
  // cap dot
  ctx.shadowBlur=18; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(mx,fy,4,0,7); ctx.fill();
  // label
  ctx.shadowBlur=0; ctx.globalAlpha=0.7; ctx.fillStyle='#cdbf9a';
  ctx.font="10px -apple-system,sans-serif"; ctx.textAlign='center';
  ctx.save(); ctx.translate(mx-12,(top+bot)/2); ctx.rotate(-Math.PI/2); ctx.fillText('運気',0,0); ctx.restore();
  ctx.restore();
}

};
function pick(a){ return a[Math.floor(rng()*a.length)]; }
function justCount(){ var c=0; for(var i=0;i<results.length;i++) if(results[i]==='just') c++; return c; }

//============ result card ============
var lastCard=null;
function showCard(){
  var jc=justCount();
  var grade=GRADES[jc];
  var kichiToday=['大安','寅の日','夏至'];
  var fortune=pick(FORTUNE[jc]);

function roundRect(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }
function drawCard(grade,fortune,kichiToday){
  var cc=document.getElementById('cardCanvas');
  var cw=1080, chh=1920; cc.width=cw; cc.height=chh;
  var c=cc.getContext('2d');
  // bg
  var bg=c.createLinearGradient(0,0,0,chh);
  bg.addColorStop(0,'#070a1c'); bg.addColorStop(0.5,'#0d1030'); bg.addColorStop(1,'#2a1838');
  c.fillStyle=bg; c.fillRect(0,0,cw,chh);
  // foil panel
  var m=70, pw=cw-m*2, ph=chh-m*2;
  var fg=c.createLinearGradient(m,m,cw-m,chh-m);
  if(grade.cols.length===3){ fg.addColorStop(0,grade.cols[0]); fg.addColorStop(0.5,grade.cols[1]); fg.addColorStop(1,grade.cols[2]); }
  else { fg.addColorStop(0,grade.cols[0]); fg.addColorStop(1,grade.cols[1]); }
  c.save(); roundRect(c,m,m,pw,ph,40); c.globalAlpha=0.10; c.fillStyle=fg; c.fill(); c.restore();
  c.save(); roundRect(c,m,m,pw,ph,40); c.lineWidth=3; c.strokeStyle=grade.ring; c.globalAlpha=0.85;
  c.shadowColor=grade.ring; c.shadowBlur=30; c.stroke(); c.restore();
  // foil sheen stripes
  c.save(); roundRect(c,m,m,pw,ph,40); c.clip();
  for(var i=-2;i<10;i++){ c.globalAlpha=0.05; var gx=c.createLinearGradient(i*180,0,i*180+120,chh);
    gx.addColorStop(0,'rgba(255,255,255,0)'); gx.addColorStop(0.5,'#ffffff'); gx.addColorStop(1,'rgba(255,255,255,0)');
    c.fillStyle=gx; c.save(); c.translate(i*180,0); c.transform(1,0,-0.4,1,0,0); c.fillRect(0,0,120,chh); c.restore(); }
  c.restore();

  // header
  c.textAlign='center';
  c.fillStyle='#FFD86b'; c.shadowColor='#FFC83D'; c.shadowBlur=18;
  c.font="600 40px 'Hiragino Mincho ProN',serif";
  c.fillText('夏至 ・ 最強開運日', cw/2, m+120);
  c.shadowBlur=0; c.fillStyle='rgba(255,240,210,.65)'; c.font="500 30px -apple-system,sans-serif";
  c.fillText('2026.6.21  '+kichiToday.join(' × '), cw/2, m+172);

  // big 頂 + grade
  c.save();
  var sun=c.createRadialGradient(cw/2,560,10,cw/2,560,260);
  sun.addColorStop(0,'rgba(255,255,255,.9)'); sun.addColorStop(0.4,'rgba(255,200,90,.5)'); sun.addColorStop(1,'rgba(255,140,50,0)');
  c.fillStyle=sun; c.beginPath(); c.arc(cw/2,560,260,0,7); c.fill();
  c.restore();
  c.fillStyle='#fff'; c.shadowColor=grade.ring; c.shadowBlur=40;
  c.font="900 280px 'Hiragino Mincho ProN',serif"; c.fillText('頂', cw/2, 660);
  c.shadowBlur=0;

  // grade badge
  c.save();
  var by=820;
  c.fillStyle=grade.ring; c.globalAlpha=0.16; roundRect(c,cw/2-150,by,300,96,48); c.fill(); c.globalAlpha=1;
  c.lineWidth=2.5; c.strokeStyle=grade.ring; roundRect(c,cw/2-150,by,300,96,48); c.stroke();
  c.fillStyle=grade.ring; c.font="800 52px 'Hiragino Mincho ProN',serif";
  c.fillText(grade.label+' の お守り', cw/2, by+64);
  c.restore();

  // score
  c.fillStyle='rgba(255,240,210,.6)'; c.font="500 34px -apple-system,sans-serif";
  c.fillText('下半期 運気スコア', cw/2, 1080);
  c.fillStyle='#fff'; c.shadowColor='#FFC83D'; c.shadowBlur=24;
  c.font="900 168px -apple-system,sans-serif"; c.fillText(score.toLocaleString(), cw/2, 1240);
  c.shadowBlur=0;

  // just count stars
  var jc=justCount();
  c.font="56px -apple-system,sans-serif";
  var stars=''; for(var s=0;s<3;s++){ stars += s<jc?'★':'☆'; }
  c.fillStyle='#FFD86b'; c.fillText(stars, cw/2, 1340);
  c.fillStyle='rgba(255,240,210,.5)'; c.font="500 28px -apple-system,sans-serif";
  c.fillText('頂を掴んだ回数  '+jc+' / 3', cw/2, 1392);

  // fortune
  c.save();
  roundRect(c,m+50,1470,pw-100,210,26); c.fillStyle='rgba(255,255,255,.05)'; c.fill();
  c.strokeStyle='rgba(255,200,100,.35)'; c.lineWidth=1.5; c.stroke();
  c.restore();
  c.fillStyle='#FFE7a8'; c.font="500 30px 'Hiragino Mincho ProN',serif"; c.fillText('下半期のひとこと', cw/2, 1532);
  c.fillStyle='#fff'; c.font="600 38px 'Hiragino Mincho ProN',serif";
  wrapText(c,fortune,cw/2,1592,pw-160,52);

  // footer
  c.fillStyle='rgba(255,240,210,.4)'; c.font="500 26px -apple-system,sans-serif";
  c.fillText('頂 — Itadaki  ·  Idea Radar', cw/2, chh-90);

  lastCard=cc;
}
function wrapText(c,text,x,y,maxw,lh){
  // crude wrap for JP (per-char)
  var line='',yy=y, chars=text.split('');
  for(var i=0;i<chars.length;i++){
    var test=line+chars[i];
    if(c.measureText(test).width>maxw && line!==''){ c.fillText(line,x,yy); line=chars[i]; yy+=lh; }
    else line=test;
  }
  c.fillText(line,x,yy);
}

      var a=document.createElement('a'); a.href=url; a.download='itadaki-omamori.png'; a.click();
      setTimeout(function(){URL.revokeObjectURL(url);},1500);
