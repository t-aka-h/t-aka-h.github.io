<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>決定打 — Kettei-da</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;overflow:hidden;background:#05060a;
    font-family:-apple-system,'Hiragino Sans',sans-serif;color:#eef2ff;
    touch-action:none;user-select:none;-webkit-user-select:none;}
  #stage{position:fixed;inset:0;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;z-index:10;
    padding:28px;pointer-events:none;}
  .overlay.show{pointer-events:auto;}
  .title{font-weight:900;letter-spacing:6px;font-size:54px;
    color:#fff;text-shadow:0 0 24px #ff2d55,0 0 48px #ff003c;}
  .romaji{font-weight:800;letter-spacing:4px;font-size:15px;color:#ff5d7a;margin-top:6px;}
  .lead{font-size:14px;line-height:1.9;color:#aeb6d6;margin-top:22px;max-width:330px;}
  .tap{margin-top:34px;font-size:17px;font-weight:800;letter-spacing:2px;color:#00e5ff;
    text-shadow:0 0 18px #00e5ff;animation:bb 1.1s ease-in-out infinite;}
  @keyframes bb{0%,100%{opacity:.4;transform:scale(.98)}50%{opacity:1;transform:scale(1.04)}}
  .bigstat{font-size:120px;font-weight:900;line-height:1;color:#fff;
    text-shadow:0 0 30px #00e5ff,0 0 70px #00e5ff;}
  .bigstat.bad{text-shadow:0 0 30px #ff2d55,0 0 70px #ff003c;}
  .label{font-size:13px;font-weight:800;letter-spacing:3px;color:#9aa0c4;margin-top:6px;}
  .rank{font-size:26px;font-weight:900;margin-top:18px;color:#ffd56b;text-shadow:0 0 22px #b8860033;}
  .sub2{font-size:13px;color:#8b93b6;margin-top:10px;line-height:1.8;}
  .btns{display:flex;gap:12px;margin-top:30px;flex-wrap:wrap;justify-content:center;}
  .btn{pointer-events:auto;cursor:pointer;border:none;border-radius:40px;
    padding:15px 26px;font-size:15px;font-weight:800;letter-spacing:1px;color:#05060a;
    background:#00e5ff;box-shadow:0 0 26px #00e5ff88;}
  .btn.ghost{background:transparent;color:#cfd6f5;border:1.5px solid #39406a;box-shadow:none;}
  .hide{display:none!important;}
</style>
</head>
<body>
<div id="stage">
  <canvas id="cv"></canvas>

  <div id="titleScreen" class="overlay show">
    <div class="title">決定打</div>
    <div class="romaji">KETTEI&middot;DA</div>
    <div class="lead">チャンピオンシップポイント。<br>勝利が近づくほど、的は縮み、手は震える。<br>揺れるスイートスポットに、<br>最後のスマッシュを叩き込め。</div>
    <div class="tap">タップでサーブ ▸</div>
  </div>

  <div id="overScreen" class="overlay hide">
    <div id="overNum" class="bigstat bad">0</div>
    <div class="label">CHAMPIONSHIP POINTS</div>
    <div id="overRank" class="rank">—</div>
    <div id="overSub" class="sub2"></div>
    <div class="btns">
      <button id="shareBtn" class="btn">結果をシェア</button>
      <button id="againBtn" class="btn ghost">もう一度</button>
    </div>
  </div>
</div>

<script>
"use strict";
(function(){
//==================== canvas / DPR ====================
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2.5);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize); resize();

//==================== audio ====================
let AC=null, master=null;
function initAudio(){
  if(AC) return;
  try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
  master=AC.createGain(); master.gain.value=0.9; master.connect(AC.destination);
}
function now(){ return AC?AC.currentTime:0; }
function noiseBuf(dur){
  const n=Math.floor(AC.sampleRate*dur), b=AC.createBuffer(1,n,AC.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=Math.random()*2-1;
  return b;
}
// heartbeat "lub-dub" with missing-fundamental harmonics
function thump(strength){
  if(!AC) return;
  const t=now();
  [ [50,1.0],[80,0.5],[120,0.32],[160,0.22] ].forEach(([f,a])=>{
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='sine'; o.frequency.setValueAtTime(f*1.5,t); o.frequency.exponentialRampToValueAtTime(f,t+0.05);
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(a*0.5*strength,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.32);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+0.36);
  });
  // soft transient
  const ns=AC.createBufferSource(); ns.buffer=noiseBuf(0.05);
  const bp=AC.createBiquadFilter(); bp.type='lowpass'; bp.frequency.value=180;
  const g2=AC.createGain(); g2.gain.setValueAtTime(0.18*strength,t); g2.gain.exponentialRampToValueAtTime(0.0001,t+0.08);
  ns.connect(bp); bp.connect(g2); g2.connect(master); ns.start(t);
}
function smash(){
  if(!AC) return; const t=now();
  // low punch
  const o=AC.createOscillator(), g=AC.createGain();
  o.type='sine'; o.frequency.setValueAtTime(140,t); o.frequency.exponentialRampToValueAtTime(48,t+0.18);
  g.gain.setValueAtTime(0.9,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.3);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+0.32);
  // crack
  const ns=AC.createBufferSource(); ns.buffer=noiseBuf(0.12);
  const hp=AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=1400;
  const g2=AC.createGain(); g2.gain.setValueAtTime(0.5,t); g2.gain.exponentialRampToValueAtTime(0.0001,t+0.12);
  ns.connect(hp); hp.connect(g2); g2.connect(master); ns.start(t);
}
function chord(perfect){
  if(!AC) return; const t=now();
  const notes=perfect?[523.25,659.25,783.99,1046.5]:[392,493.88,587.33];
  notes.forEach((f,i)=>{
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='triangle'; o.frequency.value=f;
    const d=perfect?0.9:0.6;
    g.gain.setValueAtTime(0,t+i*0.02); g.gain.linearRampToValueAtTime(0.16,t+i*0.02+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+d);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+d+0.05);
  });
}
function crowd(big){
  if(!AC) return; const t=now(); const dur=big?1.1:0.7;
  const ns=AC.createBufferSource(); ns.buffer=noiseBuf(dur);
  const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=900; bp.Q.value=0.7;
  const g=AC.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(big?0.55:0.34,t+0.18); // "ワッ" swell
  g.gain.linearRampToValueAtTime(big?0.32:0.18,t+0.45);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  ns.connect(bp); bp.connect(g); g.connect(master); ns.start(t);
}
function missSweep(){
  if(!AC) return; const t=now();
  const o=AC.createOscillator(), g=AC.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(220,t); o.frequency.exponentialRampToValueAtTime(80,t+0.4);
  g.gain.setValueAtTime(0.28,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.42);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+0.44);
}
function buzz(){
  if(!AC) return; const t=now();
  const o=AC.createOscillator(), g=AC.createGain();
  o.type='square'; o.frequency.value=70;
  g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.25,t+0.05);
  g.gain.linearRampToValueAtTime(0.25,t+0.6); g.gain.exponentialRampToValueAtTime(0.0001,t+1.1);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+1.15);
}
function vibe(p){ if(navigator.vibrate){ try{navigator.vibrate(p);}catch(e){} } }

//==================== state ====================
const TITLE=0,PLAY=1,OVER=2;
let mode=TITLE;
let streak=0, misses=0, level=0;
let phase=0;        // sweep phase 0..1
let spotBase=0.5;   // sweet-spot center (normalized along bar)
let jitterT=0;
let pulse=0;        // heartbeat visual pulse 0..1
let beatTimer=0, beatInterval=0.85;
let slowmo=0;       // success slow-motion timer
let flash=0, flashCol='#00e5ff';
let shake=0;
let lastInch=0;
let particles=[];
let floaters=[];
let banner=null;    // {text,col,t,big}
let opp={x:0,t:0,returning:0}; // opponent return animation
let bestStreak=0;
try{ bestStreak=parseInt(localStorage.getItem('ketteida_best')||'0',10)||0; }catch(e){}

// ambient floaters
for(let i=0;i<26;i++) floaters.push({x:Math.random(),y:Math.random(),s:Math.random()*1.6+0.4,v:Math.random()*0.02+0.005,a:Math.random()*0.4+0.1});

function recompute(){ level=streak+misses; beatInterval=60/Math.min(72+level*6,164); }
function barGeom(){ const x0=0.08*W, x1=0.92*W, y=0.80*H; return {x0,x1,y,len:x1-x0}; }
function halfWidth(){ return Math.max(0.03, 0.145*Math.pow(0.88,level)); } // normalized
function jitterAmp(){ return Math.min(0.062, 0.004+level*0.0042); }
function spotCenter(){
  const ja=jitterAmp();
  let sc=spotBase + ja*(Math.sin(jitterT*3.1)*0.6 + Math.sin(jitterT*5.3+1.1)*0.4);
  const hw=halfWidth();
  return Math.max(0.10+hw, Math.min(0.90-hw, sc));
}
function markerPos(){ // triangle wave across bar
  const tri = phase<0.5 ? phase*2 : 2-phase*2;
  return 0.11 + 0.78*tri;
}
function sweepFreq(){ return 0.50 + level*0.085; } // cycles/sec

function newPoint(){ spotBase=0.25+Math.random()*0.50; phase=Math.random(); }

function startGame(){
  initAudio(); if(AC&&AC.state==='suspended') AC.resume();
  streak=0; misses=0; recompute(); newPoint(); particles=[];
  banner={text:'MATCH POINT',col:'#ff2d55',t:1.0,big:true};
  mode=PLAY;
  document.getElementById('titleScreen').classList.remove('show');
  document.getElementById('titleScreen').classList.add('hide');
}

function rankOf(s){
  if(s>=18) return 'GRAND SLAM CHAMPION';
  if(s>=12) return 'クラッチの帝王';
  if(s>=8)  return '勝負強さの怪物';
  if(s>=5)  return '本物のメンタル';
  if(s>=3)  return '勝ち切れる男';
  if(s>=1)  return 'まだ震えてる';
  return '本番に弱い';
}

function swing(){
  const mt=markerPos(), sc=spotCenter(), hw=halfWidth();
  const off=Math.abs(mt-sc);
  lastInch = +(off*30).toFixed(1);
  if(off<=hw){
    // SUCCESS
    const perfect = off<=hw*0.34;
    streak++; if(streak>bestStreak){ bestStreak=streak; try{localStorage.setItem('ketteida_best',''+bestStreak);}catch(e){} }
    recompute(); newPoint();
    slowmo=0.26; flash=1; flashCol=perfect?'#00e5ff':'#34d399';
    smash(); chord(perfect); crowd(perfect);
    vibe(perfect?[0,45,30,120]:[0,30,20,70]);
    banner={text:perfect?'決定打 !!':'IN !',col:perfect?'#00e5ff':'#34d399',t:0.9,big:perfect};
    const g=barGeom(); const hx=g.x0+sc*g.len;
    for(let i=0;i<(perfect?46:26);i++){
      const a=Math.random()*Math.PI*2, sp=Math.random()*(perfect?7:5)+2;
      particles.push({x:hx,y:g.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,col:perfect?'#00e5ff':'#34d399',r:Math.random()*3+1.5});
    }
    shake=perfect?9:5;
  } else {
    // MISS
    misses++; recompute();
    missSweep(); vibe([90]); shake=12; flash=0.6; flashCol='#ff003c';
    opp.returning=1; opp.t=0;
    const g=barGeom(); const hx=g.x0+mt*g.len;
    for(let i=0;i<18;i++){
      const a=Math.random()*Math.PI*2, sp=Math.random()*4+1;
      particles.push({x:hx,y:g.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,col:'#ff2d55',r:Math.random()*2.5+1});
    }
    if(misses>=3){
      banner={text:'GAME',col:'#ff003c',t:1.2,big:true};
      buzz(); vibe([0,120,60,200]);
      setTimeout(endGame,650);
    } else {
      banner={text:'返された！',col:'#ff2d55',t:0.8,big:false};
      newPoint();
    }
  }
}

function endGame(){
  mode=OVER;
  const o=document.getElementById('overScreen');
  document.getElementById('overNum').textContent=streak;
  document.getElementById('overRank').textContent='称号: '+rankOf(streak);
  let sub='最後の一打 ズレ '+lastInch.toFixed(1)+' in &nbsp;/&nbsp; 自己ベスト '+bestStreak;
  document.getElementById('overSub').innerHTML=sub;
  o.classList.remove('hide'); o.classList.add('show');
}

//==================== input ====================
function onDown(e){
  e.preventDefault();
  if(mode===TITLE){ startGame(); return; }
  if(mode===PLAY){ if(banner&&banner.text==='GAME') return; swing(); return; }
}
cv.addEventListener('pointerdown',onDown,{passive:false});
document.getElementById('titleScreen').addEventListener('pointerdown',function(e){ if(mode===TITLE){ e.preventDefault(); startGame(); }},{passive:false});

document.getElementById('againBtn').addEventListener('click',function(){
  document.getElementById('overScreen').classList.remove('show');
  document.getElementById('overScreen').classList.add('hide');
  startGame();
});
document.getElementById('shareBtn').addEventListener('click',shareCard);

//==================== loop ====================
let last=performance.now();
function frame(t){
  let dt=(t-last)/1000; last=t; if(dt>0.05)dt=0.05;
  let gdt=dt;
  if(slowmo>0){ slowmo-=dt; gdt=dt*0.25; }

  if(mode===PLAY){
    phase=(phase+gdt*sweepFreq())%1;
    jitterT+=gdt;
    // heartbeat
    beatTimer-=dt;
    if(beatTimer<=0){
      beatTimer+=beatInterval;
      pulse=1; thump(0.6+Math.min(level,18)*0.03);
      vibe([0,8]); // subtle heartbeat tick
      // schedule "dub"
      setTimeout(()=>{ if(mode===PLAY) thump(0.35); },120);
    }
  }
  pulse*=Math.pow(0.001,dt); // decay
  flash*=Math.pow(0.02,dt);
  shake*=Math.pow(0.001,dt);
  if(banner){ banner.t-=dt; if(banner.t<=0) banner=null; }
  if(opp.returning){ opp.t+=dt*2.2; if(opp.t>=1) opp.returning=0; }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.vx*=0.98; p.life-=dt*1.4;
    if(p.life<=0) particles.splice(i,1);
  }
  for(const f of floaters){ f.y-=f.v*dt*10; if(f.y<-0.02){ f.y=1.02; f.x=Math.random(); } }

  draw();
  requestAnimationFrame(frame);
}

//==================== draw ====================
function draw(){
  ctx.clearRect(0,0,W,H);
  // background gradient
  const tension=Math.min(1,level/14);
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#070914'); g.addColorStop(0.55,'#05060a'); g.addColorStop(1,'#0a0712');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  ctx.save();
  // global heartbeat scale + shake
  const sc=1+pulse*0.012*(1+tension);
  const sx=(Math.random()-0.5)*shake, sy=(Math.random()-0.5)*shake;
  ctx.translate(W/2+sx,H/2+sy); ctx.scale(sc,sc); ctx.translate(-W/2,-H/2);

  drawFloaters();
  drawCourt(tension);
  drawMeter(tension);
  ctx.restore();

  drawVignette(tension);
  drawHUD();
  drawBanner();
  drawFlash();
}

function drawFloaters(){
  for(const f of floaters){
    ctx.globalAlpha=f.a; ctx.fillStyle='#2a3360';
    ctx.beginPath(); ctx.arc(f.x*W,f.y*H,f.s,0,7); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawCourt(tension){
  const cx=W/2, topY=0.12*H, netY=0.30*H, baseY=0.66*H;
  // perspective court trapezoid
  ctx.strokeStyle='rgba(120,140,210,0.30)'; ctx.lineWidth=2;
  const tw=W*0.16, bw=W*0.52;
  ctx.beginPath();
  ctx.moveTo(cx-tw,topY); ctx.lineTo(cx+tw,topY);
  ctx.lineTo(cx+bw,baseY); ctx.lineTo(cx-bw,baseY); ctx.closePath(); ctx.stroke();
  // center service line
  ctx.beginPath(); ctx.moveTo(cx,topY); ctx.lineTo(cx,baseY); ctx.stroke();
  // net
  ctx.strokeStyle='rgba(180,200,255,0.5)'; ctx.lineWidth=2;
  const nw=tw + (bw-tw)*((netY-topY)/(baseY-topY));
  ctx.beginPath(); ctx.moveTo(cx-nw,netY); ctx.lineTo(cx+nw,netY); ctx.stroke();
  ctx.strokeStyle='rgba(120,140,210,0.18)'; ctx.lineWidth=1;
  for(let i=-6;i<=6;i++){ const x=cx+i*(nw/6); ctx.beginPath(); ctx.moveTo(x,netY); ctx.lineTo(x,netY-12); ctx.stroke(); }

  // opponent silhouette across the net
  const oy=topY+18, ox=cx + (opp.returning?Math.sin(opp.t*Math.PI)* (W*0.10):0);
  ctx.fillStyle = opp.returning? 'rgba(255,80,110,0.85)' : 'rgba(150,165,220,0.5)';
  ctx.beginPath();
  ctx.ellipse(ox,oy,9,11,0,0,7); ctx.fill();
  ctx.fillRect(ox-7,oy+9,14,26);
  if(opp.returning){ // racket flash
    ctx.strokeStyle='rgba(255,120,150,0.9)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(ox+16,oy+6,9,0,7); ctx.stroke();
  }

  // "YOU" near baseline center
  ctx.fillStyle='rgba(0,229,255,0.85)';
  const py=baseY-6, pxx=cx;
  ctx.beginPath(); ctx.ellipse(pxx,py-30,11,13,0,0,7); ctx.fill();
  ctx.fillRect(pxx-9,py-17,18,30);

  // particles
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.col;
    ctx.shadowColor=p.col; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill();
  }
  ctx.shadowBlur=0; ctx.globalAlpha=1;
}

function drawMeter(tension){
  const {x0,x1,y,len}=barGeom();
  // track
  ctx.lineCap='round';
  ctx.strokeStyle='rgba(60,70,110,0.7)'; ctx.lineWidth=14;
  ctx.beginPath(); ctx.moveTo(x0,y); ctx.lineTo(x1,y); ctx.stroke();
  ctx.strokeStyle='rgba(30,36,60,0.9)'; ctx.lineWidth=8;
  ctx.beginPath(); ctx.moveTo(x0,y); ctx.lineTo(x1,y); ctx.stroke();

  // sweet spot (shrinking, jittering)
  const sc=spotCenter(), hw=halfWidth();
  const sxL=x0+(sc-hw)*len, sxR=x0+(sc+hw)*len, sxC=x0+sc*len;
  const col = tension>0.55? '#ff2d55' : (tension>0.3? '#ffb347':'#34d399');
  ctx.strokeStyle=col; ctx.lineWidth=14; ctx.shadowColor=col; ctx.shadowBlur=18;
  ctx.beginPath(); ctx.moveTo(sxL,y); ctx.lineTo(sxR,y); ctx.stroke();
  // perfect core
  const pw=hw*0.34*len;
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=14; ctx.shadowBlur=22;
  ctx.beginPath(); ctx.moveTo(sxC-pw,y); ctx.lineTo(sxC+pw,y); ctx.stroke();
  ctx.shadowBlur=0;

  // marker
  if(mode===PLAY){
    const mt=markerPos(), mx=x0+mt*len;
    ctx.strokeStyle='#eaf0ff'; ctx.lineWidth=4; ctx.shadowColor='#fff'; ctx.shadowBlur=14;
    ctx.beginPath(); ctx.moveTo(mx,y-26); ctx.lineTo(mx,y+26); ctx.stroke();
    ctx.fillStyle='#eaf0ff';
    ctx.beginPath(); ctx.moveTo(mx,y-30); ctx.lineTo(mx-7,y-42); ctx.lineTo(mx+7,y-42); ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0;
  }
  // hint text
  ctx.fillStyle='rgba(160,170,210,0.6)'; ctx.font='600 12px -apple-system,sans-serif';
  ctx.textAlign='center';
  ctx.fillText(mode===PLAY?'タップでスマッシュ':'',W/2,y+52);
}

function drawVignette(tension){
  const r=Math.max(W,H);
  const v=ctx.createRadialGradient(W/2,H*0.45,r*0.3,W/2,H*0.5,r*0.75);
  const red=0.18+tension*0.5+pulse*0.25*tension;
  v.addColorStop(0,'rgba(0,0,0,0)');
  v.addColorStop(1,`rgba(${Math.round(120*tension+10)},6,30,${Math.min(0.85,red)})`);
  ctx.fillStyle=v; ctx.fillRect(0,0,W,H);
}

function drawHUD(){
  // top: MATCH POINT label
  ctx.textAlign='center';
  ctx.fillStyle='rgba(255,80,110,0.9)'; ctx.font='900 13px -apple-system,sans-serif';
  ctx.fillText('● MATCH POINT',W/2,40);
  // streak big
  ctx.fillStyle='#fff'; ctx.font='900 46px -apple-system,sans-serif';
  ctx.shadowColor='#00e5ff'; ctx.shadowBlur=16;
  ctx.fillText(String(streak),W/2,86); ctx.shadowBlur=0;
  ctx.fillStyle='rgba(150,160,200,0.8)'; ctx.font='700 11px -apple-system,sans-serif';
  ctx.fillText('CHAMPIONSHIP POINTS',W/2,104);

  // composure hearts (top-left)
  ctx.textAlign='left';
  for(let i=0;i<3;i++){
    const on=i<(3-misses);
    ctx.font='18px -apple-system,sans-serif';
    ctx.globalAlpha=on?1:0.22;
    ctx.fillStyle=on?'#ff2d55':'#555';
    ctx.fillText('❤',18+i*24,40);
  }
  ctx.globalAlpha=1;

  // bpm (top-right)
  if(mode===PLAY){
    const bpm=Math.round(60/beatInterval);
    ctx.textAlign='right';
    ctx.fillStyle=pulse>0.4?'#ff5d7a':'rgba(180,120,140,0.85)';
    ctx.font='900 15px -apple-system,sans-serif';
    ctx.fillText('♥ '+bpm,W-18,38);
    ctx.fillStyle='rgba(150,120,140,0.6)'; ctx.font='700 9px -apple-system,sans-serif';
    ctx.fillText('BPM',W-18,52);
  }
}

function drawBanner(){
  if(!banner) return;
  const a=Math.min(1,banner.t*1.6);
  ctx.save(); ctx.textAlign='center';
  ctx.globalAlpha=a;
  const size=banner.big?72:42;
  ctx.font='900 '+size+'px -apple-system,sans-serif';
  ctx.fillStyle=banner.col; ctx.shadowColor=banner.col; ctx.shadowBlur=banner.big?40:22;
  const yy=H*0.42 - (1-a)*14;
  ctx.fillText(banner.text,W/2,yy);
  ctx.restore();
}

function drawFlash(){
  if(flash<=0.01) return;
  ctx.globalAlpha=Math.min(0.6,flash*0.6);
  ctx.fillStyle=flashCol; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1;
}

//==================== share card ====================
function shareCard(){
  const c=document.createElement('canvas'); c.width=1080; c.height=1920;
  const x=c.getContext('2d');
  // bg
  const g=x.createLinearGradient(0,0,0,1920);
  g.addColorStop(0,'#0a0d18'); g.addColorStop(0.6,'#05060a'); g.addColorStop(1,'#100712');
  x.fillStyle=g; x.fillRect(0,0,1080,1920);
  // vignette
  const v=x.createRadialGradient(540,820,200,540,900,1100);
  v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(120,6,30,0.55)');
  x.fillStyle=v; x.fillRect(0,0,1080,1920);
  x.textAlign='center';
  // title
  x.fillStyle='#ff5d7a'; x.font='900 40px -apple-system,sans-serif';
  x.fillText('● MATCH POINT',540,180);
  x.fillStyle='#fff'; x.font='900 96px -apple-system,sans-serif';
  x.shadowColor='#ff2d55'; x.shadowBlur=40; x.fillText('決定打',540,300); x.shadowBlur=0;
  x.fillStyle='#9aa0c4'; x.font='800 30px -apple-system,sans-serif'; x.fillText('KETTEI-DA',540,350);
  // big number
  x.fillStyle='#00e5ff'; x.font='900 360px -apple-system,sans-serif';
  x.shadowColor='#00e5ff'; x.shadowBlur=70; x.fillText(String(streak),540,860); x.shadowBlur=0;
  x.fillStyle='#aeb6d6'; x.font='800 40px -apple-system,sans-serif';
  x.fillText('CHAMPIONSHIP POINTS 連続成功',540,950);
  // ECG heartbeat line
  x.strokeStyle='#ff2d55'; x.lineWidth=5; x.shadowColor='#ff2d55'; x.shadowBlur=20;
  x.beginPath();
  let ex=80, ey=1130;
  x.moveTo(ex,ey);
  const beats=Math.max(3,Math.min(streak+misses+3,14));
  const seg=(1080-160)/beats;
  for(let i=0;i<beats;i++){
    const bx=80+i*seg;
    x.lineTo(bx+seg*0.3,ey);
    x.lineTo(bx+seg*0.4,ey-70);
    x.lineTo(bx+seg*0.5,ey+90);
    x.lineTo(bx+seg*0.6,ey-20);
    x.lineTo(bx+seg,ey);
  }
  x.stroke(); x.shadowBlur=0;
  // rank
  x.fillStyle='#ffd56b'; x.font='900 56px -apple-system,sans-serif';
  x.fillText('称号  '+rankOf(streak),540,1320);
  // sub stats
  x.fillStyle='#8b93b6'; x.font='700 34px -apple-system,sans-serif';
  x.fillText('最後の一打 ズレ '+lastInch.toFixed(1)+' in', 540,1400);
  x.fillText('自己ベスト '+bestStreak+' 連続', 540,1450);
  // tagline
  x.fillStyle='#cfd6f5'; x.font='800 40px -apple-system,sans-serif';
  x.fillText('勝利が近づくほど、手は震える。',540,1620);
  x.fillStyle='#5b6388'; x.font='700 30px -apple-system,sans-serif';
  x.fillText('決定打 — t-aka-h.github.io/idea-radar/kettei-da',540,1760);

  c.toBlob(function(blob){
    if(!blob){ return; }
    const file=new File([blob],'ketteida.png',{type:'image/png'});
    const data={files:[file],title:'決定打',text:'チャンピオンシップポイント'+streak+'連続成功！ #決定打 #KETTEIDA'};
    if(navigator.canShare&&navigator.canShare(data)){
      navigator.share(data).catch(()=>{});
    } else {
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download='ketteida.png'; a.click();
      setTimeout(()=>URL.revokeObjectURL(url),4000);
    }
  },'image/png');
}

requestAnimationFrame(frame);
})();
</script>
