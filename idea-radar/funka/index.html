<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Funka 噴火 — 今日のクラッシュアウト</title>
<meta name="theme-color" content="#050614">
<meta name="description" content="怒りをためて、ちょうどいいピークで噴火させろ。今日のクラッシュアウト指数を測る感情解放トイ。">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{width:100%;height:100%;overflow:hidden;background:#050614;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Segoe UI",sans-serif;color:#f4f6f9}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#050614}
  canvas{display:block;touch-action:none}
  #game{position:absolute;inset:0}
  .layer{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:28px;transition:opacity .4s}
  .hidden{opacity:0;pointer-events:none}
  .logo{font-size:13vw;font-weight:900;letter-spacing:.04em;line-height:1;
    background:linear-gradient(180deg,#FF2D87,#FFB347);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 18px rgba(255,45,135,.55))}
  .sub{margin-top:10px;font-size:4.4vw;color:#cdd3e0;font-weight:700;letter-spacing:.02em}
  .sub2{margin-top:22px;font-size:3.5vw;color:#7b8398;line-height:1.7;max-width:86%}
  .cta{margin-top:42px;font-size:5.4vw;font-weight:900;letter-spacing:.14em;color:#050614;
    background:linear-gradient(135deg,#FF2D87,#FF6A3D);padding:18px 46px;border-radius:999px;
    box-shadow:0 0 30px rgba(255,45,135,.6);animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 26px rgba(255,45,135,.5)}50%{transform:scale(1.06);box-shadow:0 0 44px rgba(255,106,61,.8)}}
  .tiny{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:2.7vw;color:#4a5066;letter-spacing:.04em}
  /* result */
  #result .card{position:relative}
  #cardImg{width:min(78vw,360px);border-radius:18px;box-shadow:0 10px 50px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.06)}
  .rbtns{display:flex;gap:14px;margin-top:24px}
  .rbtn{font-size:4vw;font-weight:800;letter-spacing:.06em;padding:14px 26px;border-radius:999px;color:#f4f6f9;
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16)}
  .rbtn.primary{color:#050614;background:linear-gradient(135deg,#FF2D87,#FF6A3D);border:none;box-shadow:0 0 22px rgba(255,45,135,.55)}
  .hint{position:absolute;left:0;right:0;bottom:9%;text-align:center;font-size:4.2vw;font-weight:800;color:#fff;
    text-shadow:0 0 14px rgba(255,45,135,.7);letter-spacing:.04em;pointer-events:none}
  .savehint{font-size:2.7vw;color:#7b8398;margin-top:14px;letter-spacing:.03em}
</style>
</head>
<body>
<div id="wrap">
  <div id="game">
    <canvas id="cv"></canvas>
  </div>

  <!-- TITLE -->
  <div class="layer" id="title">
    <div class="logo">FUNKA<br>噴火</div>
    <div class="sub">今日のクラッシュアウト</div>
    <div class="sub2">理不尽が降るほど怒りマグマが満ちる。<br>満タン直前の“スイートゾーン”で<br>盛大に噴火させろ。</div>
    <div class="cta" id="startBtn">ためる</div>
    <div class="tiny">Idea Radar 2026-06-17 ・ L05 文化・若者「crash out」</div>
  </div>

  <!-- PLAYING hint -->
  <div class="layer hidden" id="playUI">
    <div class="hint" id="releaseHint">満タン手前で画面をタップ＝噴火</div>
  </div>

  <!-- RESULT -->
  <div class="layer hidden" id="result">
    <div class="card"><img id="cardImg" alt="クラッシュアウト指数カード"></div>
    <div class="rbtns">
      <div class="rbtn primary" id="shareBtn">シェア</div>
      <div class="rbtn" id="againBtn">もう一度</div>
    </div>
    <div class="savehint">カードを長押しで保存もできます</div>
  </div>
</div>

<script>
"use strict";
(function(){
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  let W=0,H=0,DPR=1;
  function resize(){
    DPR = Math.min(window.devicePixelRatio||1, 2.5);
    W = window.innerWidth; H = window.innerHeight;
    cv.width = Math.floor(W*DPR); cv.height = Math.floor(H*DPR);
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ---------- audio (WebAudio, no files) ----------
  let AC=null;
  function ac(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=null; } }
    if(AC && AC.state==='suspended') AC.resume(); return AC; }
  function master(g){ const a=ac(); if(!a) return null; const node=a.createGain(); node.gain.value=g; node.connect(a.destination); return node; }
  // missing-fundamental bass: stack harmonics of 55Hz so phone speakers imply the low note
  function bass(dur, gain){
    const a=ac(); if(!a) return; const out=master(gain); if(!out) return;
    const t=a.currentTime;
    [110,165,220,275,330].forEach((f,i)=>{
      const o=a.createOscillator(); o.type='sine'; o.frequency.value=f;
      const g=a.createGain(); const amp=gain*(1-i*0.13);
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(amp,t+0.012);
      g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
      o.connect(g); g.connect(out); o.start(t); o.stop(t+dur+0.05);
    });
  }
  function noiseBurst(dur,gain){
    const a=ac(); if(!a) return; const len=Math.floor(a.sampleRate*dur);
    const buf=a.createBuffer(1,len,a.sampleRate); const d=buf.getChannelData(0);
    for(let i=0;i<len;i++){ d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2); }
    const src=a.createBufferSource(); src.buffer=buf;
    const f=a.createBiquadFilter(); f.type='lowpass'; f.frequency.value=2200;
    const g=master(gain); if(!g) return; src.connect(f); f.connect(g); src.start();
  }
  function sweep(f0,f1,dur,gain){
    const a=ac(); if(!a) return; const o=a.createOscillator(); o.type='sawtooth';
    const t=a.currentTime; o.frequency.setValueAtTime(f0,t);
    o.frequency.exponentialRampToValueAtTime(f1,t+dur);
    const g=master(gain); if(!g) return; const gg=a.createGain(); gg.gain.setValueAtTime(gain,t);
    gg.gain.exponentialRampToValueAtTime(0.001,t+dur); o.disconnect(); o.connect(gg); gg.connect(g.destination||a.destination);
    // route through gg only
    o.start(t); o.stop(t+dur+0.02);
  }
  function tick(freq,gain){ // heartbeat pulse
    const a=ac(); if(!a) return; const o=a.createOscillator(); o.type='sine'; o.frequency.value=freq;
    const t=a.currentTime; const g=a.createGain(); g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(gain,t+0.01); g.gain.exponentialRampToValueAtTime(0.001,t+0.16);
    o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+0.2);
  }
  function eruptSound(power){ // power 0..1
    noiseBurst(0.18+0.12*power, 0.5);
    // exp sweep down
    const a=ac(); if(a){ const o=a.createOscillator(); o.type='sawtooth'; const t=a.currentTime;
      o.frequency.setValueAtTime(800,t); o.frequency.exponentialRampToValueAtTime(60,t+0.4+0.3*power);
      const g=a.createGain(); g.gain.setValueAtTime(0.32,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5+0.3*power);
      o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+0.85);
    }
    bass(0.7+0.6*power, 0.45+0.25*power);
  }
  function vibrate(p){ if(navigator.vibrate){ try{ navigator.vibrate(p); }catch(e){} } }

  // ---------- triggers ----------
  const TRIGGERS = [
    "通知72件","Wi-Fiが切れた","既読スルー","電車5分遅延","“それ常識だよ?”","充電1%","アプデ強制再起動",
    "レジ長蛇の列","二度寝で遅刻","返信は明日でいい?","会議が延長","“前にも言ったよね”","傘を忘れた",
    "信号ぜんぶ赤","ポイント失効","容量いっぱい","レコメンド全部ハズレ","“で、要するに?”","コピー機が紙詰まり",
    "宅配で不在票","スクショ撮り忘れ","推しの値上げ","行列の途中で売り切れ","隣の貧乏ゆすり","“いつもの感じで”",
    "サブスク自動更新","給料は据え置き","物価また上昇"
  ];
  function pick(){ return TRIGGERS[(Math.random()*TRIGGERS.length)|0]; }

  // ---------- state ----------
  let state='title';
  let magma=0;            // 0..110
  let rate=9;             // %/sec base rise
  const SWEET_LO=85, SWEET_HI=99, OVERLOAD=100;
  let last=0, started=0;
  let particles=[];
  let floaters=[];        // floating trigger texts
  let shake=0, flash=0, shock=null;
  let spawnT=0, beatT=0, beatGap=0.9;
  let seenTriggers=[];    // for share card
  let resultData=null;
  let bg=0;

  function reset(){
    magma=0; rate=9; particles=[]; floaters=[]; shake=0; flash=0; shock=null;
    spawnT=0; beatT=0; seenTriggers=[]; resultData=null; bg=0;
  }

  // ---------- particles ----------
  function spawnEruption(power){
    const n = Math.floor(180 + power*620);
    const cx = W*0.5, cy = H*0.92;
    for(let i=0;i<n;i++){
      const ang = -Math.PI/2 + (Math.random()-0.5)*(0.9+power*0.7);
      const sp = (3 + Math.random()*9) * (0.6+power*1.4);
      const tier = Math.random();
      let col;
      if(tier<0.45) col=[255,45,135];      // magenta core
      else if(tier<0.8) col=[0,229,255];    // cyan
      else col=[255,179,71];                // amber sparks
      particles.push({
        x:cx+(Math.random()-0.5)*W*0.18, y:cy,
        vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp - 2,
        life:1, decay:0.006+Math.random()*0.012,
        size:1.6+Math.random()*3.4*(0.7+power), col
      });
    }
    shock={r:10, a:1, mega:power>0.55};
  }
  function spawnBubbles(){
    // gentle magma bubbles while charging
    if(Math.random()<0.4){
      particles.push({ x:W*0.5+(Math.random()-0.5)*W*0.5, y:H*0.98,
        vx:(Math.random()-0.5)*0.6, vy:-(0.6+Math.random()*1.2),
        life:1, decay:0.02+Math.random()*0.02, size:1+Math.random()*2.2, col:[255,120,60] });
    }
  }

  function frac(){ return Math.min(magma,100)/100; }
  function inSweet(){ return magma>=SWEET_LO && magma<SWEET_HI+ (magma>=OVERLOAD?0:1); }

  // ---------- main loop ----------
  function loop(ts){
    if(!last) last=ts;
    let dt=(ts-last)/1000; if(dt>0.05) dt=0.05; last=ts;
    update(dt); render();
    requestAnimationFrame(loop);
  }

  function update(dt){
    bg += dt;
    // shake/flash decay
    shake*=Math.pow(0.001,dt); if(shake<0.2) shake=0;
    flash*=Math.pow(0.0006,dt); if(flash<0.01) flash=0;
    if(shock){ shock.r+= (shock.mega?900:520)*dt; shock.a-=dt*1.7; if(shock.a<=0) shock=null; }

    // particles
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.vx*=0.99; p.life-=p.decay;
      if(p.life<=0 || p.y>H+30) particles.splice(i,1);
    }
    // floaters
    for(let i=floaters.length-1;i>=0;i--){
      const f=floaters[i]; f.y-=18*dt*60*0.016; f.life-=dt*0.6; if(f.life<=0) floaters.splice(i,1);
    }

    if(state==='playing'){
      // rise (accelerates a touch as it fills = mounting pressure)
      magma += (rate + magma*0.06) * dt;
      spawnBubbles();
      // spawn triggers
      spawnT-=dt;
      if(spawnT<=0){
        spawnT = 0.7 + Math.random()*0.7;
        const txt=pick();
        floaters.push({txt, x: W*(0.18+Math.random()*0.64), y: H*(0.62+Math.random()*0.18), life:1.3});
        seenTriggers.push(txt);
        // each trigger bumps the magma + a jolt
        magma += 2.2 + Math.random()*2.2;
        flash = Math.max(flash, 0.18);
        shake = Math.max(shake, 4);
        vibrate(18);
        tick(70, 0.12);
      }
      // heartbeat accelerates near the top
      const f=frac();
      beatGap = 0.95 - f*0.7;            // 0.95s -> 0.25s
      beatT-=dt;
      if(beatT<=0){ beatT=Math.max(0.22,beatGap); tick(inSweet()?120:60, inSweet()?0.16:0.09); if(inSweet()) vibrate([22,28,22]); }
      // overload auto-erupt
      if(magma>=OVERLOAD){ erupt(true); }
    }
  }

  function colorForMagma(){
    const f=frac();
    if(magma<SWEET_LO) return f<0.5? '#FF8A3D':'#FF5A2A';
    if(inSweet()) return '#FFE14D';       // sweet = bright yellow
    return '#FF2D87';
  }

  function render(){
    ctx.clearRect(0,0,W,H);
    // bg gradient
    const g=ctx.createRadialGradient(W*0.5,H*1.05,H*0.1,W*0.5,H*1.05,H*1.2);
    g.addColorStop(0,'#1a0716'); g.addColorStop(0.5,'#0a0512'); g.addColorStop(1,'#050614');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // top red glow
    const tg=ctx.createRadialGradient(W*0.5,-H*0.1,0,W*0.5,-H*0.1,H*0.6);
    tg.addColorStop(0,'rgba(255,45,90,0.18)'); tg.addColorStop(1,'rgba(255,45,90,0)');
    ctx.fillStyle=tg; ctx.fillRect(0,0,W,H);

    ctx.save();
    if(shake>0){ ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake); }

    if(state==='playing' || state==='erupting'){
      drawMagmaColumn();
      drawFloaters();
    }
    // particles (additive)
    ctx.globalCompositeOperation='lighter';
    for(const p of particles){
      ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle='rgb('+p.col[0]+','+p.col[1]+','+p.col[2]+')';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,7); ctx.fill();
    }
    ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
    // shockwave
    if(shock){ ctx.globalCompositeOperation='lighter'; ctx.strokeStyle='rgba(0,229,255,'+shock.a*0.8+')';
      ctx.lineWidth=shock.mega?6:3; ctx.beginPath(); ctx.arc(W*0.5,H*0.92,shock.r,0,7); ctx.stroke();
      ctx.globalCompositeOperation='source-over'; }
    ctx.restore();

    // flash overlay
    if(flash>0){ ctx.fillStyle='rgba(255,255,255,'+Math.min(0.85,flash)+')'; ctx.fillRect(0,0,W,H); }
  }

  function drawMagmaColumn(){
    const f=frac();
    const colW=Math.min(W*0.34,150);
    const x0=W*0.5-colW/2, x1=W*0.5+colW/2;
    const topY=H*0.85 - (H*0.66)*f;     // fill from bottom up
    const baseY=H*0.985;
    // tube outline
    ctx.lineWidth=2; ctx.strokeStyle='rgba(255,255,255,0.10)';
    roundRect(x0-8, H*0.18, colW+16, H*0.81, 16); ctx.stroke();
    // sweet zone band on tube
    const syHi=H*0.85-(H*0.66)*(SWEET_HI/100);
    const syLo=H*0.85-(H*0.66)*(SWEET_LO/100);
    ctx.fillStyle='rgba(255,225,77,0.14)'; ctx.fillRect(x0-8,syHi,colW+16,syLo-syHi);
    ctx.strokeStyle='rgba(255,225,77,0.55)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x0-8,syHi); ctx.lineTo(x1+8,syHi); ctx.moveTo(x0-8,syLo); ctx.lineTo(x1+8,syLo); ctx.stroke();
    // magma fill with wobbly surface
    const col=colorForMagma();
    ctx.save();
    ctx.beginPath(); roundRect(x0,topY,colW,baseY-topY,10); ctx.clip();
    const lg=ctx.createLinearGradient(0,topY,0,baseY);
    lg.addColorStop(0,col); lg.addColorStop(1,'#7a0e22');
    ctx.fillStyle=lg; ctx.fillRect(x0,topY-20,colW,baseY-topY+40);
    // surface wobble
    ctx.beginPath(); ctx.moveTo(x0,topY);
    for(let xx=x0;xx<=x1;xx+=8){ const yy=topY+Math.sin(xx*0.06+bg*4)*4; ctx.lineTo(xx,yy); }
    ctx.lineTo(x1,topY-30); ctx.lineTo(x0,topY-30); ctx.closePath();
    ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fill();
    ctx.restore();
    // glow at surface in sweet zone
    if(inSweet()){
      ctx.globalCompositeOperation='lighter';
      const pulse=0.4+0.4*Math.sin(bg*12);
      ctx.fillStyle='rgba(255,225,77,'+(0.25*pulse)+')';
      ctx.fillRect(x0-20,topY-26,colW+40,52);
      ctx.globalCompositeOperation='source-over';
    }
    // % label
    ctx.fillStyle='#fff'; ctx.textAlign='center';
    ctx.font='900 '+Math.min(W*0.11,52)+'px -apple-system,sans-serif';
    ctx.fillText(Math.min(100,Math.round(magma))+'%', W*0.5, H*0.135);
    ctx.font='800 '+Math.min(W*0.035,16)+'px -apple-system,sans-serif';
    ctx.fillStyle=inSweet()?'#FFE14D':'rgba(255,255,255,0.5)';
    ctx.fillText(inSweet()?'★ NOW — 噴火しろ ★':(magma<SWEET_LO?'怒りマグマ 上昇中…':'臨界 — 暴発する'), W*0.5, H*0.165);
  }

  function drawFloaters(){
    ctx.textAlign='center';
    for(const f of floaters){
      ctx.globalAlpha=Math.max(0,Math.min(1,f.life));
      ctx.font='800 '+Math.min(W*0.04,18)+'px -apple-system,sans-serif';
      ctx.fillStyle='rgba(255,90,90,0.95)';
      ctx.shadowColor='rgba(255,45,90,0.8)'; ctx.shadowBlur=10;
      ctx.fillText('💢 '+f.txt, f.x, f.y);
      ctx.shadowBlur=0;
    }
    ctx.globalAlpha=1;
  }

  function roundRect(x,y,w,h,r){ ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
  // rounded-rect path on an arbitrary context (used by the share card)
  function rr(c,x,y,w,h,r){ c.beginPath();
    c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r);
    c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }

  // ---------- flow ----------
  function startGame(){
    ac(); reset(); state='playing';
    document.getElementById('title').classList.add('hidden');
    document.getElementById('result').classList.add('hidden');
    document.getElementById('playUI').classList.remove('hidden');
  }

  function erupt(overload){
    if(state!=='playing') return;
    state='erupting';
    document.getElementById('playUI').classList.add('hidden');
    const m=magma;
    // score: peak at 95, sweet zone is generous; overload = funny-but-low
    let index, rank, power, line;
    if(overload || m>=OVERLOAD){
      index = 28 + Math.floor(Math.random()*10);
      rank='暴発'; power=0.7; line='我慢しすぎた…マグマだまり崩壊';
    } else if(m>=SWEET_LO && m<=SWEET_HI){
      const d=Math.abs(m-95)/10;            // 0 at 95
      index = Math.round(100 - d*16);
      index = Math.max(86, Math.min(100,index));
      rank = (index>=97?'MEGA噴火':'ナイス噴火'); power=0.7+ (index-86)/14*0.3; line='ちょうどいい爆発、最高';
    } else { // early
      index = Math.round((m/SWEET_LO)*70);
      index = Math.max(20,Math.min(74,index));
      rank='小噴火'; power=0.25+ m/SWEET_LO*0.35; line='早すぎ…でもスッキリ';
    }
    power=Math.max(0.18,Math.min(1,power));
    spawnEruption(power);
    eruptSound(power);
    flash = power>0.55? 0.9: 0.45;
    shake = 8+power*16;
    vibrate(power>0.55? [0,90,40,140] : [0,50,30,70]);
    if(power>0.55){ // overload tint hint handled by particles; mega extra burst
      setTimeout(()=>{ spawnEruption(power*0.6); }, 110);
    }
    resultData={index, rank, line, magma:Math.round(Math.min(100,m)),
      triggers: seenTriggers.slice(-3).reverse()};
    setTimeout(showResult, 1200);
  }

  function showResult(){
    state='result';
    buildCard(resultData);
    document.getElementById('result').classList.remove('hidden');
  }

  // ---------- 9:16 share card ----------
  let cardBlob=null;
  function buildCard(d){
    const c=document.createElement('canvas'); c.width=1080; c.height=1920;
    const x=c.getContext('2d');
    // bg
    const g=x.createRadialGradient(540,1750,80,540,1750,1700);
    g.addColorStop(0,'#23091c'); g.addColorStop(0.5,'#0c0614'); g.addColorStop(1,'#050614');
    x.fillStyle=g; x.fillRect(0,0,1080,1920);
    const tg=x.createRadialGradient(540,-120,0,540,-120,900);
    tg.addColorStop(0,'rgba(255,45,90,0.22)'); tg.addColorStop(1,'rgba(255,45,90,0)');
    x.fillStyle=tg; x.fillRect(0,0,1080,1920);
    // border
    x.strokeStyle='rgba(255,255,255,0.10)'; x.lineWidth=3; rr(x,40,40,1000,1840,40); x.stroke();

    x.textAlign='center';
    // header
    x.fillStyle='#FF6A8A'; x.font='900 54px -apple-system,sans-serif';
    x.fillText('本日のクラッシュアウト指数', 540, 250);

    // big index number
    const ig=x.createLinearGradient(0,330,0,720);
    ig.addColorStop(0,'#FFE14D'); ig.addColorStop(0.5,'#FF2D87'); ig.addColorStop(1,'#FF6A3D');
    x.fillStyle=ig;
    x.shadowColor='rgba(255,45,135,0.6)'; x.shadowBlur=60;
    x.font='900 420px -apple-system,sans-serif';
    x.fillText(d.index, 540, 720);
    x.shadowBlur=0;

    // rank chip
    const rankColor = d.rank.indexOf('MEGA')>=0?'#FFE14D':(d.rank==='暴発'?'#B388FF':(d.rank==='小噴火'?'#7fd1ff':'#FF8A3D'));
    x.font='900 70px -apple-system,sans-serif';
    const rw=x.measureText(d.rank).width+90;
    x.fillStyle='rgba(255,255,255,0.06)'; rr(x,540-rw/2,790,rw,110,55); x.fill();
    x.strokeStyle=rankColor; x.lineWidth=4; rr(x,540-rw/2,790,rw,110,55); x.stroke();
    x.fillStyle=rankColor; x.fillText(d.rank, 540, 866);

    // line
    x.fillStyle='#cdd3e0'; x.font='600 42px -apple-system,sans-serif';
    x.fillText(d.line, 540, 1000);

    // triggers list
    x.fillStyle='#7b8398'; x.font='700 36px -apple-system,sans-serif';
    x.fillText('— 今日の理不尽 —', 540, 1140);
    x.fillStyle='#FF7A7A'; x.font='700 44px -apple-system,sans-serif';
    let yy=1230;
    (d.triggers.length?d.triggers:['平穏…なはずがない']).forEach(t=>{ x.fillText('💢 '+t, 540, yy); yy+=78; });

    // mini eruption art
    x.globalCompositeOperation='lighter';
    for(let i=0;i<260;i++){
      const ang=-Math.PI/2+(Math.random()-0.5)*1.3; const r=Math.random()*420*(0.4+d.index/100);
      const px=540+Math.cos(ang)*r, py=1640+Math.sin(ang)*r*0.9;
      const t=Math.random(); x.fillStyle = t<0.45?'#FF2D87':(t<0.8?'#00E5FF':'#FFB347');
      x.globalAlpha=0.5+Math.random()*0.4;
      x.beginPath(); x.arc(px,py,2+Math.random()*6,0,7); x.fill();
    }
    x.globalAlpha=1; x.globalCompositeOperation='source-over';

    // footer logo
    const lg2=x.createLinearGradient(0,1800,0,1880);
    lg2.addColorStop(0,'#FF2D87'); lg2.addColorStop(1,'#FFB347');
    x.fillStyle=lg2; x.font='900 70px -apple-system,sans-serif';
    x.fillText('FUNKA 噴火', 540, 1840);
    x.fillStyle='#5b6373'; x.font='600 30px -apple-system,sans-serif';
    x.fillText('t-aka-h.github.io/idea-radar', 540, 1890);

    const url=c.toDataURL('image/png');
    document.getElementById('cardImg').src=url;
    c.toBlob(b=>{ cardBlob=b; }, 'image/png');
  }

  async function share(){
    try{
      if(cardBlob && navigator.canShare){
        const file=new File([cardBlob],'funka.png',{type:'image/png'});
        if(navigator.canShare({files:[file]})){
          await navigator.share({files:[file], text:'今日のクラッシュアウト指数 '+(resultData?resultData.index:'')+' 🌋 #Funka噴火'});
          return;
        }
      }
      if(navigator.share){ await navigator.share({title:'Funka 噴火', text:'今日のクラッシュアウト指数 '+(resultData?resultData.index:'')+' 🌋', url:location.href}); return; }
    }catch(e){}
    alert('カードを長押しして保存できます');
  }

  // ---------- input ----------
  function tapDuringPlay(e){
    if(state==='playing'){ e.preventDefault(); erupt(false); }
  }
  document.getElementById('game').addEventListener('pointerdown', tapDuringPlay);
  document.getElementById('startBtn').addEventListener('pointerdown', (e)=>{ e.preventDefault(); e.stopPropagation(); startGame(); });
  document.getElementById('againBtn').addEventListener('pointerdown', (e)=>{ e.preventDefault(); e.stopPropagation(); startGame(); });
  document.getElementById('shareBtn').addEventListener('pointerdown', (e)=>{ e.preventDefault(); e.stopPropagation(); share(); });

  requestAnimationFrame(loop);

  // expose for verification
  window.__funka = {
    start:startGame,
    eruptAt:(m)=>{ if(state!=='playing'){startGame();} magma=m; erupt(false); },
    get state(){return state;}, get magma(){return magma;}, get result(){return resultData;}
  };
})();
</script>
</body>
</html>
