<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050614">
<title>寝支度 Nejitaku — 積みすぎ注意の安眠タワー</title>
<style>
  :root{
    --bg0:#050614; --bg1:#0B0E1F;
    --saph:#5B8AFF; --emer:#34D399; --amber:#FBBF24; --mag:#FF2D87;
    --ink:#EAF0FF; --sub:#9aa3c8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0;}
  html,body{height:100%; background:var(--bg0); overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Segoe UI",sans-serif; color:var(--ink); user-select:none; -webkit-user-select:none;}
  #wrap{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;}
  #stage{position:relative; background:radial-gradient(120% 80% at 50% 0%, #11163a 0%, var(--bg1) 45%, var(--bg0) 100%);
         box-shadow:0 0 60px rgba(0,0,0,.6) inset; overflow:hidden;}
  canvas{display:block; position:absolute; inset:0;}
  .layer{position:absolute; inset:0; display:flex; flex-direction:column; pointer-events:none;}
  /* HUD */
  #hud{position:absolute; top:0; left:0; right:0; padding:14px 16px 0; pointer-events:none; z-index:5;}
  .row{display:flex; justify-content:space-between; align-items:flex-start;}
  .brand{font-weight:800; letter-spacing:.18em; font-size:13px; color:var(--sub);}
  .brand b{color:var(--ink);}
  .stk{font-size:12px; color:var(--sub); text-align:right; line-height:1.5;}
  .stk b{color:var(--ink); font-size:15px;}
  .gauges{margin-top:12px; display:flex; gap:10px;}
  .g{flex:1;}
  .g .lab{font-size:10px; letter-spacing:.14em; color:var(--sub); margin-bottom:4px; display:flex; justify-content:space-between;}
  .bar{height:7px; border-radius:6px; background:rgba(255,255,255,.08); overflow:hidden; position:relative;}
  .fill{position:absolute; left:0; top:0; bottom:0; width:0%; border-radius:6px; transition:width .25s ease;}
  .fill.sleep{background:linear-gradient(90deg,#2a4bb8,var(--saph)); box-shadow:0 0 12px var(--saph);}
  .fill.rem{background:linear-gradient(90deg,#1f8f6b,var(--emer)); box-shadow:0 0 12px var(--emer);}
  /* screens */
  .screen{position:absolute; inset:0; z-index:30; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:32px; gap:18px; pointer-events:auto;}
  .screen.hidden{display:none;}
  #title h1{font-size:46px; font-weight:900; letter-spacing:.16em; color:var(--ink); text-shadow:0 0 28px rgba(91,138,255,.55);}
  #title .en{font-size:14px; letter-spacing:.5em; color:var(--saph); margin-top:2px;}
  #title p{font-size:14px; color:var(--sub); line-height:1.8; max-width:300px;}
  .btn{pointer-events:auto; cursor:pointer; border:none; border-radius:999px; font-weight:800; letter-spacing:.1em;
       padding:15px 34px; font-size:17px; color:#04122e;
       background:linear-gradient(90deg,var(--saph),#7aa2ff); box-shadow:0 8px 30px rgba(91,138,255,.45); }
  .btn:active{transform:scale(.96);}
  .btn.amber{background:linear-gradient(90deg,var(--amber),#ffd35e); color:#3a2a00; box-shadow:0 8px 30px rgba(251,191,36,.5);}
  .btn.ghost{background:rgba(255,255,255,.08); color:var(--ink); box-shadow:none; border:1px solid rgba(255,255,255,.16);}
  .hint{font-size:12px; color:var(--sub); letter-spacing:.04em;}
  /* sleep button (in-game) */
  #sleepBtn{position:absolute; left:50%; bottom:30px; transform:translateX(-50%); z-index:20; opacity:0; pointer-events:none; transition:opacity .3s;}
  #sleepBtn.show{opacity:1; pointer-events:auto; animation:pulse 1.1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 8px 30px rgba(251,191,36,.45);}50%{box-shadow:0 8px 46px rgba(251,191,36,.9);}}
  #tapcue{position:absolute; left:0; right:0; bottom:96px; text-align:center; font-size:12px; letter-spacing:.18em; color:var(--sub); z-index:6; pointer-events:none; opacity:.85;}
  /* result */
  #result{background:rgba(5,6,20,.78); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px);}
  #result h2{font-size:15px; letter-spacing:.3em; color:var(--sub);}
  #result .score{font-size:74px; font-weight:900; line-height:1; text-shadow:0 0 30px rgba(91,138,255,.6);}
  #result .ttl{font-size:22px; font-weight:800; color:var(--amber); letter-spacing:.06em;}
  #result .sub{font-size:13px; color:var(--sub); line-height:1.7;}
  #shareCanvas{display:none;}
  .toast{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:25; font-weight:900; letter-spacing:.1em; pointer-events:none; opacity:0;}
  @media (min-width:520px){ #stage{border-radius:22px;} }
</style>
</head>
<body>
<div id="wrap"><div id="stage">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="row">
      <div class="brand"><b>寝支度</b> NEJITAKU</div>
      <div class="stk">積んだハック<br><b id="cnt">0</b></div>
    </div>
    <div class="gauges">
      <div class="g"><div class="lab"><span>入眠</span><span id="sleepPct">0%</span></div><div class="bar"><div class="fill sleep" id="sleepFill"></div></div></div>
      <div class="g"><div class="lab"><span>REM(夢)</span><span id="remPct">100%</span></div><div class="bar"><div class="fill rem" id="remFill" style="width:100%"></div></div></div>
    </div>
  </div>

  <div id="tapcue">タップで そっと積む</div>
  <button class="btn amber" id="sleepBtn">おやすみ…💤</button>

  <!-- TITLE -->
  <div class="screen" id="title">
    <div>
      <h1>寝支度</h1>
      <div class="en">N E J I T A K U</div>
    </div>
    <p>就寝ハックを積むほど眠りは深くなる——でも<b style="color:var(--amber)">積みすぎ</b>るとタワーが傾いてREMが削れ、<b style="color:var(--mag)">崩落=浅い眠り</b>。<br>ちょうどいい所で手を止めた人だけが、星空にたどり着く。</p>
      <button class="btn" id="startBtn">積みはじめる</button>
    <div class="hint">遮光・マグネシウム・口テープ・重い毛布…足し算の健康はどこで止める？</div>
  </div>

  <!-- RESULT -->
  <div class="screen hidden" id="result">
    <h2 id="rHead">深い眠り</h2>
    <div class="score" id="rScore">0</div>
    <div class="ttl" id="rTitle">—</div>
    <div class="sub" id="rSub"></div>
    <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
      <button class="btn amber" id="shareBtn">結果をシェア</button>
      <button class="btn ghost" id="againBtn">もう一度</button>
    </div>
    <div class="hint" id="shareHint"></div>
  </div>

  <div class="toast" id="toast"></div>
  <canvas id="shareCanvas" width="1080" height="1920"></canvas>
</div></div>

<script>
"use strict";
(function(){
const stage=document.getElementById('stage');
const cv=document.getElementById('game'); const ctx=cv.getContext('2d');
let W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2.5);

function fit(){
  // portrait 9:16, fit to viewport
  const vw=window.innerWidth, vh=window.innerHeight;
  let h=vh, w=h*9/16;
  if(w>vw){ w=vw; h=w*16/9; }
  stage.style.width=w+'px'; stage.style.height=h+'px';
  W=w; H=h;
  cv.width=Math.round(w*DPR); cv.height=Math.round(h*DPR);
  cv.style.width=w+'px'; cv.style.height=h+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',fit); fit();

/* ---------- Audio (WebAudio synth only) ---------- */
let AC=null;
function ac(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } if(AC&&AC.state==='suspended')AC.resume(); return AC; }
function tone(freq,dur,type,gain,t0){ const c=ac(); if(!c)return; t0=t0||c.currentTime; const o=c.createOscillator(),g=c.createGain(); o.type=type||'sine'; o.frequency.setValueAtTime(freq,t0); g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(gain||.2,t0+.012); g.gain.exponentialRampToValueAtTime(.0008,t0+dur); o.connect(g); g.connect(c.destination); o.start(t0); o.stop(t0+dur+.04); }
function noiseBurst(dur,gain,lp){ const c=ac(); if(!c)return; const n=Math.floor(c.sampleRate*dur); const b=c.createBuffer(1,n,c.sampleRate); const d=b.getChannelData(0); for(let i=0;i<n;i++){ d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2); } const s=c.createBufferSource(); s.buffer=b; const f=c.createBiquadFilter(); f.type='lowpass'; f.frequency.value=lp||1200; const g=c.createGain(); g.gain.value=gain||.4; s.connect(f); f.connect(g); g.connect(c.destination); s.start(); }
function sndLand(){ tone(150,.09,'triangle',.18); navg(8); }
function sndWarn(){ tone(52,.18,'sine',.16); }
function sndCollapse(){ const c=ac(); if(!c)return; const t=c.currentTime; [40,80,120,160,200].forEach((f,i)=>tone(f,.9,'sine',.22/(i*0.5+1),t)); noiseBurst(.5,.45,900); navg([40,30,90,30,140]); }
function sndSuccess(){ const c=ac(); if(!c)return; const t=c.currentTime; [523,659,784,1047].forEach((f,i)=>tone(f,.5,'sine',.16,t+i*.09)); tone(1568,.6,'sine',.07,t+.4); tone(2093,.7,'sine',.05,t+.5); navg([12,40,12]); }
function navg(p){ if(navigator.vibrate){ try{navigator.vibrate(p);}catch(e){} } }

/* ---------- Game ---------- */
const HACKS=[
  {n:'遮光カーテン',c:'#5B8AFF'},{n:'マグネシウム',c:'#34D399'},{n:'白色雑音',c:'#9b8cff'},
  {n:'口テープ',c:'#FBBF24'},{n:'重い毛布',c:'#ff7ab8'},{n:'クール枕',c:'#4fd6e6'},
  {n:'ホットミルク',c:'#ffb86b'},{n:'アイマスク',c:'#8aa0ff'}
];
const ZONE_LO=7, ZONE_HI=9;   // sweet zone (heights)
const COLLAPSE_TILT=1.0;       // normalized COM offset that triggers collapse

let state='title';
let blocks=[];      // {x,y,w,h,vx,vy,vr,rot,hack}
let carrier={x:0,dir:1,speed:0,w:0,h:0};
let baseY=0, baseCX=0, blockH=0, baseW=0;
let tilt=0, tiltVel=0, shownAngle=0;
let count=0, sleepG=0, remG=100;
let shake=0;
let particles=[];
let stars=[];
let starAlpha=0;
let collapsing=false, success=false;
let wobblePhase=0;

function reset(){
  blocks=[]; particles=[]; stars=[]; starAlpha=0;
  count=0; sleepG=0; remG=100; tilt=0; tiltVel=0; shownAngle=0; shake=0;
  collapsing=false; success=false; wobblePhase=0;
  blockH=H*0.052; baseW=W*0.42; baseCX=W*0.5; baseY=H*0.90;
  carrier.h=blockH; carrier.w=baseW; carrier.x=baseCX; carrier.dir=1;
  carrier.speed=W*0.55; // px/s, ramps later
  // base block (the pillow / bed)
  blocks.push({x:baseCX, y:baseY, w:baseW, h:blockH, base:true, hack:{n:'枕',c:'#3a4a8c'}});
  updateHUD();
}

function topBlock(){ return blocks[blocks.length-1]; }

function dropBlock(){
  if(state!=='play'||collapsing||success) return;
  const t=topBlock();
  const w=Math.max(W*0.22, t.w*0.985);
  const nb={x:carrier.x, y:t.y - blockH, w:w, h:blockH, hack:HACKS[(count)%HACKS.length],
            vx:0,vy:0,vr:0,rot:0, settle:1};
  blocks.push(nb);
  count++;
  if(count===1){ document.getElementById('tapcue').style.opacity='0'; }
  // landing offset feel: bigger miss => more tilt kick
  const off=(nb.x - t.x);
  tiltVel += (off/ (baseW)) * 1.7;
  // gauges
  if(count<=ZONE_HI){ sleepG=Math.min(100, sleepG + (100/ (ZONE_HI))); }
  else { // over-stack penalty: REM erodes, sleep stalls, tilt grows
    remG=Math.max(0, remG - 16);
    sleepG=Math.max(0, sleepG - 4);
    tiltVel += (Math.random()<.5?-1:1)*0.10*(count-ZONE_HI);
  }
  // carrier shrinks & speeds up
  carrier.w=w; carrier.speed=Math.min(W*1.25, carrier.speed*1.06);
  sndLand();
  updateHUD();
  // sleep button availability
  if(count>=ZONE_LO){ document.getElementById('sleepBtn').classList.add('show'); }
}

function updateHUD(){
  document.getElementById('cnt').textContent=count;
  document.getElementById('sleepFill').style.width=sleepG+'%';
  document.getElementById('remFill').style.width=remG+'%';
  document.getElementById('sleepPct').textContent=Math.round(sleepG)+'%';
  document.getElementById('remPct').textContent=Math.round(remG)+'%';
}

function comOffset(){
  // center of mass X of stacked (non-base) blocks relative to base center, normalized by baseW
  let m=0,sx=0;
  for(const b of blocks){ if(b.base) continue; m+=b.w; sx+=b.x*b.w; }
  if(m===0) return 0;
  return ((sx/m)-baseCX)/(baseW*0.62);
}

function goSleep(){
  if(state!=='play'||collapsing||success) return;
  success=true; state='ending';
  document.getElementById('sleepBtn').classList.remove('show');
  document.getElementById('tapcue').style.display='none';
  sndSuccess();
  // build stars
  for(let i=0;i<160;i++){ stars.push({x:Math.random()*W, y:Math.random()*H*0.8, r:Math.random()*1.6+0.4, ph:Math.random()*6.28, sp:Math.random()*2+0.5}); }
  computeScore();
  setTimeout(()=>showResult(),1500);
}

function collapse(){
  if(collapsing||success) return;
  collapsing=true; state='ending';
  document.getElementById('sleepBtn').classList.remove('show');
  document.getElementById('tapcue').style.display='none';
  shake=26;
  sndCollapse();
  // give every non-base block a velocity
  for(const b of blocks){ if(b.base) continue; b.vx=(b.x-baseCX)*0.04 + (Math.random()*2-1)*5; b.vy=-Math.random()*6-2; b.vr=(Math.random()*2-1)*0.25; }
  for(let i=0;i<70;i++){ const b=blocks[(Math.random()*blocks.length)|0]; particles.push({x:b?b.x:baseCX,y:b?b.y:baseY,vx:(Math.random()*2-1)*7,vy:-Math.random()*9,life:1,c:'#FF2D87'}); }
  computeScore();
  setTimeout(()=>showResult(),1700);
}

let finalScore=0, finalTitle='', finalSub='', finalOk=false;
function computeScore(){
  finalOk=success;
  const stab=Math.max(0, 1-Math.abs(tilt)/COLLAPSE_TILT);
  let zoneMult;
  if(count<ZONE_LO) zoneMult=0.45;
  else if(count<=ZONE_HI) zoneMult=1.0;
  else zoneMult=Math.max(0.28, 1.0-(count-ZONE_HI)*0.16);
  let base = count*120 + stab*620 + sleepG*2 + remG*1.5;
  if(!success) base*=0.4; // collapse penalty
  finalScore=Math.round(base*zoneMult);
  // titles
  if(success && count>=ZONE_LO && count<=ZONE_HI && stab>0.7){ finalTitle='眠りの建築家'; finalSub='ちょうどいい高さで手を止めた。深いノンレム睡眠に到達。'; }
  else if(success && count<ZONE_LO){ finalTitle='早寝の慎重派'; finalSub='崩さなかったが、もう少し積めば眠りは深まったかも。'; }
  else if(success && count>ZONE_HI){ finalTitle='積みすぎ注意報'; finalSub='ハックの足しすぎでREMが削れぎみ。'+remG+'%まで低下。'; }
  else if(success){ finalTitle='ゆらぎの安眠'; finalSub='傾きかけたが踏みとどまった。'; }
  else { finalTitle='ハック崩落'; finalSub=count+'段で全部崩れた。浅い眠りの夜。'; }
}

function showResult(){
  state='result';
  document.getElementById('rHead').textContent = finalOk?'深い眠り':'浅い眠り…';
  document.getElementById('rScore').textContent=finalScore;
  document.getElementById('rScore').style.color = finalOk?'var(--saph)':'var(--mag)';
  document.getElementById('rTitle').textContent=finalTitle;
  document.getElementById('rTitle').style.color = finalOk?'var(--amber)':'var(--mag)';
  document.getElementById('rSub').textContent='積んだハック '+count+' 段 ／ '+finalSub;
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('shareHint').textContent='';
}

/* ---------- loop ---------- */
let last=0;
function loop(ts){
  const dt=Math.min(0.033,(ts-last)/1000||0); last=ts;
  // carrier movement
  if(state==='play'){
    carrier.x+=carrier.dir*carrier.speed*dt;
    const margin=carrier.w*0.5+6;
    if(carrier.x> W-margin){ carrier.x=W-margin; carrier.dir=-1; }
    if(carrier.x< margin){ carrier.x=margin; carrier.dir=1; }
    // tilt physics
    const target=comOffset();
    tiltVel += (target-tilt)*dt*2.2;
    tiltVel*=0.92;
    tilt+=tiltVel*dt*3.0;
    wobblePhase+=dt*(2+Math.abs(tilt)*6);
    if(Math.abs(tilt)>0.62 && Math.random()<0.04) sndWarn();
    if(Math.abs(tilt)>=COLLAPSE_TILT) collapse();
  }
  if(collapsing){
    for(const b of blocks){ if(b.base)continue; b.vy+=28*dt; b.x+=b.vx; b.y+=b.vy*1.6; b.rot+=b.vr; }
  }
  if(state==='ending'||state==='result'){
    if(success && starAlpha<1) starAlpha=Math.min(1,starAlpha+dt*0.8);
  }
  // particles
  for(const p of particles){ p.vy+=24*dt; p.x+=p.vx; p.y+=p.vy; p.life-=dt*1.1; }
  particles=particles.filter(p=>p.life>0);
  if(shake>0) shake*=0.86;
  render();
  requestAnimationFrame(loop);
}

function render(){
  ctx.clearRect(0,0,W,H);
  let sx=0,sy=0;
  if(shake>0.4){ sx=(Math.random()*2-1)*shake; sy=(Math.random()*2-1)*shake; }
  ctx.save(); ctx.translate(sx,sy);

  // success night sky overlay
  if(starAlpha>0){
    ctx.save(); ctx.globalAlpha=starAlpha*0.9;
    const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0a1340'); g.addColorStop(1,'#04060f'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    for(const s of stars){ const tw=0.5+0.5*Math.sin(performance.now()/600*s.sp+s.ph); ctx.globalAlpha=starAlpha*tw; ctx.fillStyle= s.r>1.2?'#bcd0ff':'#ffffff'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,6.28); ctx.fill(); }
    // moon
    ctx.globalAlpha=starAlpha; ctx.fillStyle='#f4f1d8'; ctx.shadowColor='#fff6c8'; ctx.shadowBlur=40; ctx.beginPath(); ctx.arc(W*0.78,H*0.16,W*0.075,0,6.28); ctx.fill(); ctx.shadowBlur=0;
    ctx.restore();
  }

  // tower (tilts around base top center)
  const base=blocks[0];
  ctx.save();
  ctx.translate(baseCX, base.y);
  if(!collapsing){ ctx.rotate(shownAngle = lerp(shownAngle, tilt*0.16 + Math.sin(wobblePhase)*Math.abs(tilt)*0.02, 0.2)); }
  for(const b of blocks){
    if(collapsing && !b.base){ continue; } // collapsed blocks drawn separately in world space
    drawBlock(b.x-baseCX, b.y-base.y, b.w, b.h, b.hack, b.base);
  }
  ctx.restore();

  // collapsed blocks (world space)
  if(collapsing){ for(const b of blocks){ if(b.base)continue; ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.rot); drawBlock(0,0,b.w,b.h,b.hack,false); ctx.restore(); } }

  // carrier (next block) + drop guide
  if(state==='play'){
    const t=topBlock();
    const cy=Math.max(H*0.16, t.y-blockH*2.4);
    ctx.save(); ctx.globalAlpha=0.95;
    drawBlock(carrier.x-baseCX+baseCX, cy, carrier.w, blockH, HACKS[count%HACKS.length], false, true);
    ctx.restore();
    // drop line
    ctx.strokeStyle='rgba(91,138,255,.25)'; ctx.setLineDash([4,8]); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(carrier.x, cy+blockH); ctx.lineTo(carrier.x, t.y-blockH); ctx.stroke(); ctx.setLineDash([]);
    // sweet-zone marker on side
    drawZoneMarker();
  }

  // particles
  for(const p of particles){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,3.2,0,6.28); ctx.fill(); }
  ctx.globalAlpha=1;
  ctx.restore();
}

function drawZoneMarker(){
  // shows where the sweet zone (7-9) sits as amber band near the left edge
  const yFor=(n)=> baseY - n*blockH;
  const yHi=yFor(ZONE_HI+1), yLo=yFor(ZONE_LO);
  ctx.save();
  ctx.fillStyle='rgba(251,191,36,.10)'; ctx.fillRect(0,yHi,W,yLo-yHi);
  ctx.fillStyle='rgba(251,191,36,.85)'; ctx.fillRect(0,yHi,4,yLo-yHi);
  ctx.fillStyle='rgba(251,191,36,.9)'; ctx.font='700 10px -apple-system,sans-serif'; ctx.textBaseline='middle';
  ctx.fillText('安眠ゾーン', 8, (yHi+yLo)/2);
  ctx.restore();
}

function drawBlock(cx,cy,w,h,hack,isBase,isCarrier){
  const x=cx-w/2, y=cy-h/2;
  const r=Math.min(10,h*0.34);
  roundRect(x,y,w,h,r);
  const grad=ctx.createLinearGradient(x,y,x,y+h);
  if(isBase){ grad.addColorStop(0,'#2a3570'); grad.addColorStop(1,'#161d3f'); }
  else { grad.addColorStop(0, hexA(hack.c,0.30)); grad.addColorStop(1, hexA(hack.c,0.12)); }
  ctx.fillStyle=grad; ctx.fill();
  // neon border
  ctx.lineWidth= isCarrier?2:1.4; ctx.strokeStyle=hexA(hack.c,isCarrier?1:0.9); ctx.shadowColor=hack.c; ctx.shadowBlur=isCarrier?16:8; ctx.stroke(); ctx.shadowBlur=0;
  // label
  ctx.fillStyle='rgba(255,255,255,.92)'; ctx.font='700 '+Math.round(h*0.4)+'px -apple-system,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(hack.n, cx, cy);
  ctx.textAlign='left';
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function hexA(hex,a){ const h=hex.replace('#',''); const n=parseInt(h.length===3?h.split('').map(c=>c+c).join(''):h,16); return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')'; }
function lerp(a,b,t){ return a+(b-a)*t; }

/* ---------- input ---------- */
function tap(e){
  if(state!=='play') return;
  // ignore taps that hit the sleep button (handled separately)
  dropBlock();
}
stage.addEventListener('pointerdown',function(e){
  ac();
  if(e.target.closest('.btn')) return; // let buttons work
  if(state==='play') dropBlock();
},{passive:true});

document.getElementById('startBtn').addEventListener('click',function(){ ac(); document.getElementById('title').classList.add('hidden'); document.getElementById('tapcue').style.display='block'; state='play'; reset(); });
document.getElementById('againBtn').addEventListener('click',function(){ document.getElementById('result').classList.add('hidden'); document.getElementById('tapcue').style.display='block'; state='play'; reset(); });
document.getElementById('sleepBtn').addEventListener('click',function(e){ e.stopPropagation(); goSleep(); });
document.getElementById('shareBtn').addEventListener('click',doShare);

/* ---------- share card (9:16) ---------- */
function doShare(){
  const c=document.getElementById('shareCanvas'); const g=c.getContext('2d'); const w=1080,h=1920;
  const bg=g.createLinearGradient(0,0,0,h); bg.addColorStop(0, finalOk?'#0a1340':'#1a0a1e'); bg.addColorStop(1,'#04060f'); g.fillStyle=bg; g.fillRect(0,0,w,h);
  // stars / debris motif
  g.globalAlpha=.9; for(let i=0;i<140;i++){ g.fillStyle= finalOk?(Math.random()<.5?'#bcd0ff':'#fff'):'#FF2D87'; const r=Math.random()*2.4+0.6; g.beginPath(); g.arc(Math.random()*w,Math.random()*h*0.9,r,0,6.28); g.fill(); } g.globalAlpha=1;
  g.textAlign='center';
  g.fillStyle='#9aa3c8'; g.font='600 34px -apple-system,sans-serif'; g.fillText('寝支度  NEJITAKU', w/2, 150);
  g.fillStyle='#EAF0FF'; g.font='800 56px -apple-system,sans-serif'; g.fillText(finalOk?'深い眠り':'浅い眠り…', w/2, 250);
  // tower silhouette
  const cx=w/2, baseYc=h*0.74, bh=64; const n=Math.min(count, finalOk?count:count);
  for(let i=0;i<=n;i++){ const bw=420-i*16; const off= finalOk?Math.sin(i*0.6)*10 : (i*(Math.random()*40-20)); const x=cx-bw/2+off, y=baseYc-i*bh;
    g.fillStyle= finalOk? 'rgba(91,138,255,.28)' : 'rgba(255,45,135,.22)'; g.strokeStyle= finalOk?'#5B8AFF':'#FF2D87'; g.lineWidth=3; g.shadowColor=g.strokeStyle; g.shadowBlur=18;
    rr(g,x,y,bw,bh-8,12); g.fill(); g.stroke(); g.shadowBlur=0; }
  // score
  g.fillStyle= finalOk?'#5B8AFF':'#FF2D87'; g.font='900 200px -apple-system,sans-serif'; g.shadowColor=g.fillStyle; g.shadowBlur=40; g.fillText(String(finalScore), w/2, h*0.40); g.shadowBlur=0;
  g.fillStyle='#FBBF24'; g.font='800 60px -apple-system,sans-serif'; g.fillText(finalTitle, w/2, h*0.86);
  g.fillStyle='#9aa3c8'; g.font='500 38px -apple-system,sans-serif'; g.fillText('積んだ就寝ハック '+count+' 段', w/2, h*0.90);
  g.fillStyle='#5b6373'; g.font='500 30px -apple-system,sans-serif'; g.fillText('Idea Radar — t-aka-h.github.io/idea-radar', w/2, h*0.955);

  c.toBlob(function(blob){
    const file=new File([blob],'nejitaku.png',{type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file], text:'寝支度で深眠スコア '+finalScore+'（'+finalTitle+'）'}).catch(()=>{});
    } else {
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='nejitaku.png'; a.click();
      document.getElementById('shareHint').textContent='画像を保存しました📸';
    }
  },'image/png');
}
function rr(g,x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }

reset();
requestAnimationFrame(loop);
})();
