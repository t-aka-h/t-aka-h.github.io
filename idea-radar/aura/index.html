<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AURA — キメ間を、決めろ。</title>
<meta name="description" content="流れるキメ間をジャストタップしてオーラを farming する体感ゲー。早すぎ=CRINGE、遅すぎ=NPC、ジャストで主人公。">
<meta property="og:title" content="AURA — キメ間を、決めろ。">
<meta property="og:description" content="AI時代に希少資源は“人間のオーラ”。ジャストタップでオーラを farming せよ。">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#000; overflow:hidden; font-family:-apple-system,'Hiragino Sans',system-ui,sans-serif; color:#fff; user-select:none; -webkit-user-select:none; }
  #stage { position:fixed; inset:0; touch-action:manipulation; }
  canvas { display:block; width:100%; height:100%; }
  .hud { position:fixed; left:0; right:0; pointer-events:none; text-align:center; }
  #top { top:env(safe-area-inset-top,14px); padding-top:14px; }
  #rank { font-size:13px; letter-spacing:4px; font-weight:800; opacity:.85; }
  #aura { font-size:64px; font-weight:900; line-height:1; margin-top:2px; font-variant-numeric:tabular-nums; text-shadow:0 0 24px currentColor; }
  #auraLabel { font-size:11px; letter-spacing:6px; opacity:.5; margin-top:2px; }
  #combo { font-size:14px; letter-spacing:2px; opacity:.6; margin-top:8px; height:18px; }
  #verdict { position:fixed; left:0; right:0; top:42%; transform:translateY(-50%); text-align:center; pointer-events:none; }
  #verdictMain { font-size:54px; font-weight:900; letter-spacing:2px; opacity:0; }
  #verdictSub { font-size:14px; letter-spacing:3px; opacity:0; margin-top:4px; }
  #hint { position:fixed; left:0; right:0; bottom:calc(env(safe-area-inset-bottom,20px) + 26px); text-align:center; font-size:13px; letter-spacing:1px; opacity:.55; pointer-events:none; }
  /* overlays */
  .panel { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:28px; background:radial-gradient(circle at 50% 35%,rgba(20,14,40,.7),rgba(0,0,0,.94)); z-index:20; }
  .hidden { display:none !important; }
  .logo { font-size:46px; font-weight:900; letter-spacing:8px; background:linear-gradient(90deg,#46e3ff,#ff2d87); -webkit-background-clip:text; background-clip:text; color:transparent; text-shadow:0 0 40px rgba(120,80,255,.5); }
  .tag { font-size:13px; letter-spacing:2px; opacity:.7; margin-top:10px; line-height:1.7; max-width:330px; }
  .btn { margin-top:26px; padding:16px 40px; border:none; border-radius:40px; font-size:17px; font-weight:800; letter-spacing:2px; color:#000; background:linear-gradient(90deg,#46e3ff,#ff2d87); box-shadow:0 0 30px rgba(120,80,255,.6); cursor:pointer; }
  .btn.sub { background:transparent; color:#fff; border:1.5px solid rgba(255,255,255,.35); box-shadow:none; margin-top:14px; font-size:14px; padding:12px 28px; }
  .small { font-size:11px; opacity:.4; margin-top:18px; letter-spacing:1px; }
  #shareCanvasWrap { width:min(62vw,260px); aspect-ratio:9/16; border-radius:16px; overflow:hidden; box-shadow:0 0 40px rgba(120,80,255,.5); margin-bottom:6px; }
  #shareCanvasWrap canvas { width:100%; height:100%; }
  .row { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game"></canvas>

  <div id="top" class="hud">
    <div id="rank">NPC</div>
    <div id="aura">0</div>
    <div id="auraLabel">A U R A</div>
    <div id="combo"></div>
  </div>

  <div id="verdict">
    <div id="verdictMain"></div>
    <div id="verdictSub"></div>
  </div>

  <div id="hint">流れる光が <b>真ん中</b> に来た瞬間にタップ</div>
</div>

<!-- START -->
<div id="startPanel" class="panel">
  <div class="logo">AURA</div>
  <div class="tag">AIが何でも代わりにやる時代。<br>最後に残る希少資源は <b>“人間のオーラ”</b>。<br>キメ間をジャストで決めて、オーラを farming せよ。</div>
  <button class="btn" id="startBtn">TAP TO START</button>
  <div class="small">早すぎ = CRINGE　/　遅すぎ = NPC　/　ジャスト = AURA</div>
  <div class="small" style="opacity:.3;margin-top:8px;">Idea Radar 優勝作 · 単一HTMLのライブデモ</div>
</div>

<!-- RESULT -->
<div id="resultPanel" class="panel hidden">
  <div id="shareCanvasWrap"><canvas id="shareCanvas" width="540" height="960"></canvas></div>
  <div class="row">
    <button class="btn" id="shareBtn">称号カードを共有</button>
  </div>
  <div class="row">
    <button class="btn sub" id="retryBtn">もう一度</button>
    <button class="btn sub" id="saveBtn">画像を保存</button>
  </div>
  <div class="small">完全オンデバイス · データ送信ゼロ</div>
</div>

<script>
(() => {
  "use strict";
  const cv = document.getElementById('game');
  const ctx = cv.getContext('2d');
  let W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2.5);
  function resize(){ W=cv.clientWidth; H=cv.clientHeight; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
  window.addEventListener('resize',resize); resize();

  // ---------- audio (WebAudio synth, no files) ----------
  let AC=null;
  function audio(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended') AC.resume(); return AC; }
  function tone(freq,dur,type,gain,when,sweepTo){
    const ac=audio(); if(!ac) return; const t0=ac.currentTime+(when||0);
    const o=ac.createOscillator(), g=ac.createGain();
    o.type=type||'sine'; o.frequency.setValueAtTime(freq,t0);
    if(sweepTo) o.frequency.exponentialRampToValueAtTime(Math.max(20,sweepTo),t0+dur);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(gain||0.3,t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g).connect(ac.destination); o.start(t0); o.stop(t0+dur+0.05);
  }
  function noise(dur,gain,when){
    const ac=audio(); if(!ac) return; const t0=ac.currentTime+(when||0);
    const n=Math.floor(ac.sampleRate*dur), b=ac.createBuffer(1,n,ac.sampleRate), d=b.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const s=ac.createBufferSource(); s.buffer=b; const g=ac.createGain();
    g.gain.value=gain||0.2; s.connect(g).connect(ac.destination); s.start(t0);
  }
  // JUST: sub-bass (missing fundamental) + rising arpeggio
  function sfxJust(combo){
    noise(0.05,0.25);
    [55,110,165,220].forEach((f,i)=>tone(f,0.45,'sine',0.22-i*0.03,0));
    const base=440+Math.min(combo,8)*40;
    [0,0.07,0.14].forEach((d,i)=>tone(base*(1+i*0.26),0.18,'triangle',0.18,d));
  }
  function sfxCringe(){ noise(0.06,0.18); tone(620,0.28,'sawtooth',0.22,0,120); }
  function sfxNpc(){ tone(300,0.16,'square',0.14,0); }
  function sfxRankUp(){ [523,659,784,1046].forEach((f,i)=>tone(f,0.5,'triangle',0.16,i*0.06)); [44,88].forEach(f=>tone(f,0.6,'sine',0.2,0)); }
  function buzz(p){ if(navigator.vibrate) navigator.vibrate(p); }

  // ---------- ranks ----------
  const RANKS=[
    {name:'NPC',        min:0, col:'#8a8f9c', glow:'rgba(138,143,156,.5)'},
    {name:'MID',        min:1, col:'#46e3ff', glow:'rgba(70,227,255,.6)'},
    {name:'SIGMA',      min:3, col:'#7a8bff', glow:'rgba(122,139,255,.7)'},
    {name:'AURA FARMER',min:5, col:'#ff2d87', glow:'rgba(255,45,135,.7)'},
    {name:'主人公',      min:8, col:'#ffd23f', glow:'rgba(255,210,63,.8)'}
  ];
  function rankFor(combo){ let r=RANKS[0]; for(const x of RANKS) if(combo>=x.min) r=x; return r; }

  // ---------- state ----------
  let state='idle';            // idle | sweep | judged | result
  let aura=0, combo=0, best=0, maxCombo=0, justs=0, taps=0;
  let cursor=0, dir=1, speed=0.55, hw=0.11, swept=false, round=0;
  let slowmo=0, flash=0, shake=0, charge=0;
  let particles=[], rings=[], floats=[];
  const elRank=document.getElementById('rank'), elAura=document.getElementById('aura'),
        elCombo=document.getElementById('combo'), elVM=document.getElementById('verdictMain'),
        elVS=document.getElementById('verdictSub'), elHint=document.getElementById('hint');

  function setRankUI(){ const r=rankFor(combo); elRank.textContent=r.name; elRank.style.color=r.col;
    elAura.style.color=r.col; }

  function startGame(){
    audio();
    document.getElementById('startPanel').classList.add('hidden');
    document.getElementById('resultPanel').classList.add('hidden');
    aura=0; combo=0; maxCombo=0; justs=0; taps=0; round=0; charge=0;
    particles=[]; rings=[]; floats=[];
    elAura.textContent='0'; elCombo.textContent=''; setRankUI();
    nextSweep(true);
  }

  function nextSweep(first){
    round++;
    state='sweep'; swept=false; cursor=0; dir=1;
    // first round slow & guaranteed-ish; speed scales with combo
    speed = first ? 0.40 : 0.52 + Math.min(combo,10)*0.05;
    hw = first ? 0.16 : Math.max(0.065, 0.12 - combo*0.006);
  }

  function judge(){
    if(state!=='sweep') return;
    taps++;
    const d=cursor-0.5;
    state='judged';
    if(Math.abs(d)<=hw){            // JUST
      onJust();
    } else if(d<0){                 // tapped before center → too early
      onMiss('CRINGE','必死すぎ',  '#ff5c5c');
    } else {
      onMiss('NPC','空気',         '#9aa0b4');
    }
    setTimeout(()=>{ if(state==='judged') nextSweep(false); }, 560);
  }

  function onJust(){
    const prevRank=rankFor(combo).name;
    combo++; justs++; maxCombo=Math.max(maxCombo,combo);
    const gain=100+combo*50;
    aura+=gain; elAura.textContent=aura.toLocaleString();
    const r=rankFor(combo); setRankUI();
    elCombo.textContent = combo>1 ? combo+' COMBO' : '';
    showVerdict('AURA', r.name, r.col, true);
    sfxJust(combo); buzz([18]);
    burst(r.col, r.glow); slowmo=0.16; flash=0.5; shake=8;
    charge=Math.min(1,charge+0.2);
    addFloat('+'+gain, r.col);
    if(rankFor(combo).name!==prevRank){ sfxRankUp(); flash=0.85; shake=12; buzz([12,40,12]); }
    if(charge>=1){ charge=0; flash=1; bigBurst(r.col,r.glow); buzz([10,30,10,30,40]); }
  }

  function onMiss(main,sub,col){
    combo=0; setRankUI(); elCombo.textContent='';
    showVerdict(main, sub, col, false);
    if(main==='CRINGE'){ sfxCringe(); shake=14; } else { sfxNpc(); }
    buzz([60]);
    // misses don't end the game; they reset combo. Auto-result option after some taps + a miss when score is meaningful
  }

  function showVerdict(main,sub,col,good){
    elVM.textContent=main; elVS.textContent=sub; elVM.style.color=col; elVS.style.color=col;
    elVM.animate([{opacity:0,transform:'scale(.7)'},{opacity:1,transform:'scale(1)'},{opacity:1,transform:'scale(1)'},{opacity:0,transform:'scale(1.15)'}],{duration:good?620:520,easing:'cubic-bezier(.2,.8,.3,1)'});
    elVS.animate([{opacity:0},{opacity:.9},{opacity:.9},{opacity:0}],{duration:good?620:520});
    if(elHint.style.opacity!=='0'){ elHint.style.transition='opacity .4s'; elHint.style.opacity='0'; }
  }

  function addFloat(txt,col){ floats.push({txt,col,x:W/2,y:H*0.42,life:1}); }

  function burst(col,glow){
    const cx=W/2, cy=H*0.5, n=34;
    for(let i=0;i<n;i++){ const a=(i/n)*Math.PI*2+Math.random()*0.3, sp=2+Math.random()*5.5;
      particles.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,col,sz:2+Math.random()*3}); }
    rings.push({x:cx,y:cy,r:10,max:Math.max(W,H)*0.55,life:1,col});
  }
  function bigBurst(col,glow){ for(let k=0;k<3;k++) setTimeout(()=>burst(col,glow),k*70); }

  // ---------- main loop ----------
  let last=performance.now();
  function frame(now){
    let dt=(now-last)/1000; last=now; if(dt>0.05) dt=0.05;
    const slow = slowmo>0 ? 0.25 : 1; if(slowmo>0) slowmo-=dt;
    if(state==='sweep'){
      cursor+=dir*speed*dt*slow;
      if(cursor>=1){ cursor=1; if(!swept){ swept=true; // moment passed without tap
          if(state==='sweep'){ state='judged'; onMiss('NPC','空気','#9aa0b4'); setTimeout(()=>{ if(state==='judged') nextSweep(false); },560);} } }
    }
    draw(dt,slow);
    requestAnimationFrame(frame);
  }

  function draw(dt,slow){
    ctx.clearRect(0,0,W,H);
    if(flash>0){ ctx.fillStyle='rgba(255,255,255,'+(flash*0.5)+')'; ctx.fillRect(0,0,W,H); flash-=dt*2.2; }
    let sx=0,sy=0; if(shake>0){ sx=(Math.random()*2-1)*shake; sy=(Math.random()*2-1)*shake; shake*=0.85; if(shake<0.5)shake=0; }
    ctx.save(); ctx.translate(sx,sy);

    const cx=W/2, cy=H*0.5;
    const r=rankFor(combo);

    // aura halo around the avatar (grows with combo)
    const halo=40+combo*14+ (charge*30);
    const g=ctx.createRadialGradient(cx,cy,4,cx,cy,halo);
    g.addColorStop(0, hex(r.col,0.9)); g.addColorStop(0.4,hex(r.col,0.25)); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,halo,0,7); ctx.fill();
    // avatar core
    ctx.fillStyle='#fff'; ctx.shadowColor=r.col; ctx.shadowBlur=30;
    ctx.beginPath(); ctx.arc(cx,cy,16+ (state==='judged'?2:0),0,7); ctx.fill(); ctx.shadowBlur=0;

    // rings
    for(let i=rings.length-1;i>=0;i--){ const o=rings[i]; o.r+=(o.max-o.r)*0.08; o.life-=dt*1.3;
      ctx.strokeStyle=hex(o.col,Math.max(0,o.life)); ctx.lineWidth=3; ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,7); ctx.stroke();
      if(o.life<=0) rings.splice(i,1); }
    // particles
    for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.vx*=0.98; p.life-=dt*1.1;
      ctx.fillStyle=hex(p.col,Math.max(0,p.life)); ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*Math.max(0,p.life),0,7); ctx.fill();
      if(p.life<=0) particles.splice(i,1); }
    // floats
    for(let i=floats.length-1;i>=0;i--){ const f=floats[i]; f.y-=1.1; f.life-=dt*0.9;
      ctx.fillStyle=hex(f.col,Math.max(0,f.life)); ctx.font='800 26px -apple-system,sans-serif'; ctx.textAlign='center';
      ctx.fillText(f.txt,f.x,f.y); if(f.life<=0) floats.splice(i,1); }

    // the timing track
    const trackY=H*0.74, tw=Math.min(W*0.82,460), x0=cx-tw/2, x1=cx+tw/2;
    ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=10; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x0,trackY); ctx.lineTo(x1,trackY); ctx.stroke();
    if(state==='sweep'||state==='judged'){
      // just zone
      const zw=hw*tw; ctx.strokeStyle=hex('#ffd23f',0.85); ctx.lineWidth=10;
      ctx.beginPath(); ctx.moveTo(cx-zw,trackY); ctx.lineTo(cx+zw,trackY); ctx.stroke();
      // center tick
      ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(cx,trackY-14); ctx.lineTo(cx,trackY+14); ctx.stroke();
      // cursor
      const px=x0+cursor*tw;
      ctx.fillStyle='#fff'; ctx.shadowColor=r.col; ctx.shadowBlur=22;
      ctx.beginPath(); ctx.arc(px,trackY,9,0,7); ctx.fill(); ctx.shadowBlur=0;
    }

    // charge gauge (edge)
    if(charge>0){ ctx.fillStyle=hex(r.col,0.8); const bh=H*charge;
      ctx.fillRect(W-6,H-bh,6,bh); ctx.fillRect(0,H-bh,6,bh); }

    ctx.restore();
  }

  function hex(c,a){ // c '#rrggbb'
    const n=parseInt(c.slice(1),16); return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')'; }

  // ---------- result / share ----------
  function endRun(){
    state='result'; best=Math.max(best,aura);
    drawShareCard();
    document.getElementById('resultPanel').classList.remove('hidden');
  }
  function drawShareCard(){
    const c=document.getElementById('shareCanvas'), x=c.getContext('2d'), w=c.width, h=c.height;
    const r=rankFor(maxCombo);
    x.fillStyle='#05030d'; x.fillRect(0,0,w,h);
    // glow particles bg
    for(let i=0;i<70;i++){ const px=Math.random()*w, py=Math.random()*h, rr=Math.random()*3+1;
      x.fillStyle=hex(Math.random()<.5?'#46e3ff':'#ff2d87',Math.random()*0.5+0.1); x.beginPath(); x.arc(px,py,rr,0,7); x.fill(); }
    const cx=w/2;
    const g=x.createRadialGradient(cx,h*0.34,10,cx,h*0.34,260);
    g.addColorStop(0,hex(r.col,0.9)); g.addColorStop(.5,hex(r.col,0.18)); g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g; x.beginPath(); x.arc(cx,h*0.34,260,0,7); x.fill();
    x.textAlign='center';
    x.fillStyle='#fff'; x.font='900 40px -apple-system,sans-serif'; x.fillText('AURA',cx,90);
    x.fillStyle=r.col; x.font='900 64px -apple-system,sans-serif'; x.shadowColor=r.col; x.shadowBlur=30;
    x.fillText(r.name,cx,h*0.36+10); x.shadowBlur=0;
    x.fillStyle='#fff'; x.font='900 150px -apple-system,sans-serif';
    x.fillText(aura.toLocaleString(),cx,h*0.58);
    x.fillStyle='rgba(255,255,255,.5)'; x.font='700 30px -apple-system,sans-serif';
    x.fillText('A U R A   S C O R E',cx,h*0.58+56);
    x.fillStyle=r.col; x.font='800 44px -apple-system,sans-serif';
    x.fillText('MAX '+maxCombo+' COMBO',cx,h*0.72);
    x.fillStyle='rgba(255,255,255,.45)'; x.font='600 26px -apple-system,sans-serif';
    x.fillText(saying(r.name),cx,h*0.80);
    x.fillStyle='rgba(255,255,255,.3)'; x.font='600 22px -apple-system,sans-serif';
    x.fillText('t-aka-h.github.io/idea-radar/aura',cx,h-54);
  }
  function saying(rank){
    return ({'NPC':'…次は決めろ。','MID':'オーラ、芽生えた。','SIGMA':'空気を支配しはじめた。',
      'AURA FARMER':'オーラを収穫する者。','主人公':'お前が物語だ。'})[rank]||'';
  }
  function shareCard(save){
    const c=document.getElementById('shareCanvas');
    c.toBlob(async (blob)=>{
      const file=new File([blob],'aura.png',{type:'image/png'});
      if(!save && navigator.canShare && navigator.canShare({files:[file]})){
        try{ await navigator.share({files:[file], title:'AURA', text:'AURAスコア '+aura.toLocaleString()+' / '+rankFor(maxCombo).name+' #aurafarming'}); return; }catch(e){}
      }
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='aura_score.png'; a.click();
    },'image/png');
  }

  // ---------- input ----------
  function tap(e){ if(e) e.preventDefault();
    if(state==='sweep'){ judge(); }
  }
  document.getElementById('stage').addEventListener('pointerdown',tap,{passive:false});
  document.getElementById('startBtn').addEventListener('click',(e)=>{e.stopPropagation();startGame();});
  document.getElementById('retryBtn').addEventListener('click',(e)=>{e.stopPropagation();startGame();});
  document.getElementById('shareBtn').addEventListener('click',(e)=>{e.stopPropagation();shareCard(false);});
  document.getElementById('saveBtn').addEventListener('click',(e)=>{e.stopPropagation();shareCard(true);});

  // double-tap on HUD aura number = finish & show share card
  let lastTopTap=0;
  document.getElementById('top').style.pointerEvents='auto';
  document.getElementById('top').addEventListener('pointerdown',(e)=>{ e.stopPropagation();
    const t=Date.now(); if(t-lastTopTap<350 && state!=='idle' && state!=='result'){ endRun(); } lastTopTap=t; });
  // also: long sessions — offer finishing via hint replaced text
  // Replace bottom hint after first miss with finish affordance
  const finishHint=document.createElement('div');
  finishHint.id='finishHint';
  finishHint.style.cssText='position:fixed;left:0;right:0;bottom:calc(env(safe-area-inset-bottom,20px) + 4px);text-align:center;font-size:12px;letter-spacing:1px;opacity:.4;pointer-events:auto;color:#fff;';
  finishHint.innerHTML='スコアの数字を <b>ダブルタップ</b> で称号カード →';
  document.body.appendChild(finishHint);
  finishHint.addEventListener('pointerdown',(e)=>{ e.stopPropagation(); if(state!=='idle'&&state!=='result') endRun(); });

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
